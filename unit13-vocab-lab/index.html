o bring out its flavor.","廚師擠了一點檸檬汁在魚肉上來引出味道。"],["Henry gave my hand a little squeeze and wished me good luck.","亨利緊握著我的手，祝我好運。"]]},{"w":"twist","z":"扭轉；曲解；扭曲；扭轉動作","p":"vt. / n.","i":"/twɪst/","b":"2A","f":["twist one’s head around","twist the truth","twist someone’s words","do the twist"],"s":["distort","turn"],"a":["straighten"],"x":[["I twisted my head around to see what was going on.","我轉頭看發生了什麼事。"],["Be honest. Don’t twist the truth.","要老實。別扭曲事實。"],["I don’t like John because he tends to twist people’s words.","我不喜歡約翰，因為他常曲解大家的話。"],["Terry gave the cap of the jar another twist to open it.","泰瑞又扭轉了罐子的瓶蓋一次，試圖打開它。"],["When Jerry heard the music, he rushed onto the dance floor to do the twist.","傑瑞一聽到音樂就衝進舞池跳扭扭舞。"]]},{"w":"award","z":"獎品；授予；給予","p":"n. / vt.","i":"/əˈwɔːrd/","b":"3","f":["awards ceremony","award someone something","be awarded something"],"s":["prize","grant"],"a":[],"x":[["Many celebrities attended the awards ceremony.","許多名人都出席了該頒獎典禮。"],["The university awarded Joy a scholarship.","該大學頒給喬伊獎學金。"],["Tim was awarded a statue for Best Actor.","提姆獲頒最佳男演員獎座。"]]},{"w":"medal","z":"獎章；獎牌","p":"n.","i":"/ˈmedl/","b":"3A","f":["gold medal","silver medal","bronze medal"],"s":["decoration"],"a":[],"x":[["Officer Smith was given a medal for his brave deeds.","史密斯警官因英勇行徑獲頒一枚獎章。"],["The athlete won two gold medals in the Athens Olympic Games.","這名運動員在雅典奧運贏了兩面金牌。"]]},{"w":"drip","z":"滴下；滴水聲","p":"vi. / vt. / n.","i":"/drɪp/","b":"4","f":["drip–dripped–dripped","drip from","a drip of"],"s":["drop","dribble"],"a":[],"x":[["Water dripped from my ceiling during rainstorms.","暴風雨時，水從我家天花板上滴了下來。"],["The injured man dripped blood all over the floor.","這位受傷的男子血滴得滿地都是。"],["Jane didn’t sleep well last night because of the endless drip of the rain from the roof.","因為屋頂不停傳來的滴水聲，珍昨晚一夜沒睡好。"]]},{"w":"journey","z":"旅行；尤指長途旅行","p":"n. / vi.","i":"/ˈdʒɜːrni/","b":"5","f":["journey to","go on a journey","take a trip","travel to"],"s":["trip","voyage"],"a":[],"x":[["Peter has decided to go on a journey to southern Taiwan next month.","彼得已決定下個月到南臺灣旅遊。"],["I journeyed to Japan last summer and had a fantastic time there.","去年夏天我到日本旅遊，在那兒玩得很愉快。"]]},{"w":"client","z":"客戶；委託人","p":"n.","i":"/ˈklaɪənt/","b":"6","f":["important client","bank client","lawyer’s client"],"s":["customer","patron"],"a":[],"x":[["We can’t afford to lose Mr. Johnson. He’s a very important client of ours.","我們萬萬不能失去強森先生。他是我們非常重要的客戶。"]]},{"w":"precious","z":"珍貴的；寶貴的","p":"adj.","i":"/ˈpreʃəs/","b":"7","f":["precious time","precious memory"],"s":["valuable"],"a":["worthless"],"x":[["Time is precious, and we cannot afford to waste it.","時間很寶貴，我們浪費不起。"]]},{"w":"jet","z":"噴射機；搭噴機旅行；噴出","p":"n. / vi. / vt.","i":"/dʒet/","b":"8","f":["passenger jet","jet fighter","jet lag","jet off"],"s":["aircraft","spray"],"a":[],"x":[["Mr. Stevenson is so rich that he even has his own jet.","史帝文森先生很有錢，甚至擁有自己的噴射機。"],["Jet lag makes you feel tired, so I don’t like long flights.","時差感會讓人疲勞，因此我不喜歡長途飛行。"],["Jessica is jetting off to New Zealand next week.","潔西卡下週搭飛機到紐西蘭旅行。"],["The fire hose jetted water onto the burning building.","消防水柱朝燃燒的大樓噴水。"]]},{"w":"mystery","z":"神祕；神祕難解的事物","p":"n.","i":"/ˈmɪstəri/","b":"9","f":["remain a mystery","mysterious"],"s":["riddle","puzzle"],"a":["certainty","explanation"],"x":[["The reasons behind Dr. Todd’s murder have remained a mystery for many years.","陶德醫師命案的犯罪動機多年來一直成謎。"]]},{"w":"mankind","z":"人類","p":"n.","i":"/mænˈkaɪnd/","b":"10","f":["the history of mankind","human beings"],"s":["humankind","humanity"],"a":[],"x":[["Television is one of the most popular inventions in the history of mankind.","電視是人類史上最普及的發明之一。"]]},{"w":"humankind","z":"人類","p":"n.","i":"/ˌhjuːmənˈkaɪnd/","b":"10A","f":["all humankind","benefit humankind"],"s":["mankind","humanity"],"a":[],"x":[["All humankind will benefit from the scientist’s discovery.","該科學家的發現將使全體人類獲益。"]]},{"w":"campus","z":"大學校園","p":"n.","i":"/ˈkæmpəs/","b":"11","f":["on campus","off campus"],"s":["school grounds"],"a":[],"x":[["Mary didn’t live on campus while in college. She lived off campus with her aunt and uncle.","瑪莉念大學時不住校內。她在校外與阿姨及姨丈同住。"]]},{"w":"scream","z":"發出尖叫聲；尖叫","p":"vi. / n.","i":"/skriːm/","b":"12","f":["scream in fear","let out a scream","a scream of joy"],"s":["shriek","shout"],"a":["whisper"],"x":[["It is horrible to hear someone screaming in the middle of the night.","半夜聽到有人尖叫真恐怖。"],["When Sandra opened her birthday present, she let out a scream of joy.","當珊卓打開生日禮物時，開心地尖叫了一聲。"]]},{"w":"roar","z":"吼聲；大吼；發出很大聲響","p":"n. / vi.","i":"/rɔːr/","b":"12A","f":["the roar of","roar with laughter"],"s":["bellow","boom"],"a":["whisper"],"x":[["The roar of a lion can be quite scary.","獅子的吼聲挺嚇人的。"],["They all roared with laughter after John told the joke.","約翰講完笑話時，大家全都笑翻了。"]]},{"w":"yell","z":"大聲說；喊叫；叫喊","p":"vi. / n.","i":"/jel/","b":"12B","f":["yell at someone","let out a yell"],"s":["shout","cry"],"a":["whisper"],"x":[["Dad yelled at me when I made the same mistake again.","我又犯同樣的錯時，老爸就開口罵我。"],["James let out a yell of frustration and then walked out of the room.","詹姆士在大吼一聲吐出鬱悶後，便走出了房外。"]]},{"w":"harm","z":"傷害；損害","p":"n. / vt.","i":"/hɑːrm/","b":"13","f":["do someone harm","do someone good","wouldn’t harm a fly"],"s":["hurt","damage"],"a":["help","benefit"],"x":[["Smoking will do you great harm. Why don’t you just quit?","抽菸對你傷害很大。你幹嘛不乾脆戒掉？"],["Mary wouldn’t even harm a fly. How could she commit such a crime?","瑪莉心地非常善良。她怎麼可能會犯下這起案子呢？"]]},{"w":"harmful","z":"有害的","p":"adj.","i":"/ˈhɑːrmfəl/","b":"13A","f":["be harmful to","be detrimental to"],"s":["detrimental","damaging"],"a":["harmless","beneficial"],"x":[["Anything can be harmful when carried to extremes.","任何事做得過火都可能變得有害。"]]},{"w":"budget","z":"預算；安排開支；規劃時間","p":"n. / vt.","i":"/ˈbʌdʒɪt/","b":"14","f":["on a tight budget","budget one’s time","budget money for"],"s":["financial plan","allocate"],"a":[],"x":[["We have to carry out the project on a tight budget.","我們必須在有限的預算下完成案子。"],["We budgeted $3,000 for our month-long trip to Europe.","我們要到歐洲旅遊一個月，預算為三千美元。"],["To get the work done on time, you need to learn how to budget your time.","要準時完工的話，你就得學習如何妥善規劃時間。"]]},{"w":"flame","z":"火焰；燃燒","p":"n. / vi.","i":"/fleɪm/","b":"15","f":["be in flames","flame with envy","inflame"],"s":["fire","blaze"],"a":["extinguish"],"x":[["The barn was already in flames by the time the fire engine arrived.","等到消防車抵達時，整個穀倉已陷在一片火海中。"],["Mary’s eyes flamed with envy when she saw her friend’s designer purse.","瑪莉看到她朋友的名牌包時，眼裡滿是羨慕。"]]},{"w":"wipe","z":"擦拭；消滅；擦拭動作","p":"vt. / n.","i":"/waɪp/","b":"16","f":["wipe something out","give something a wipe"],"s":["clean","erase"],"a":["soil"],"x":[["The waitress wiped the table with a damp cloth.","這個女服務生用一塊溼抹布擦拭桌子。"],["The typhoon wiped out the whole village.","颱風將整座村莊破壞殆盡。"],["The waiter gave the table in the café a quick wipe.","服務生很快地擦拭咖啡廳的桌面。"]]},{"w":"angel","z":"天使","p":"n.","i":"/ˈeɪndʒəl/","b":"17","f":["sing like an angel","guardian angel"],"s":["saint"],"a":["devil"],"x":[["Helen has a perfect voice and sings just like an angel.","海倫有副好歌喉，唱起歌來就像天使一樣。"]]},{"w":"devil","z":"魔鬼；惡魔","p":"n.","i":"/ˈdevəl/","b":"17A","f":["a real devil","speak of the devil"],"s":["demon"],"a":["angel"],"x":[["Stay away from that guy! He is a real devil!","離那人遠點！他是個不折不扣的惡魔！"],["Speak of the devil, and he shall appear.","說到曹操，曹操就到了。"]]},{"w":"barrel","z":"大桶；槍管","p":"n.","i":"/ˈbærəl/","b":"18","f":["oak barrel","barrel of a gun"],"s":["cask"],"a":[],"x":[["These oak barrels are used for wine storage.","這些橡木桶是用來貯藏酒的。"],["The bullet shot through the barrel of the gun and hit a nearby tree.","子彈穿過槍管，擊中附近的樹。"]]},{"w":"bucket","z":"水桶","p":"n.","i":"/ˈbʌkɪt/","b":"18A","f":["fill a bucket","kick the bucket","alive and kicking"],"s":["pail"],"a":[],"x":[["Can you help me fill these buckets with water?","你可以幫我把這些水桶裝滿水嗎？"],["Old Henry hasn’t kicked the bucket yet. He’s still alive and kicking.","老亨利還沒死。他老兄還硬朗得很。"]]},{"w":"pail","z":"桶；提桶","p":"n.","i":"/peɪl/","b":"18B","f":["a pail of water"],"s":["bucket"],"a":[],"x":[["It took several pails of water to put out the fire.","用了好幾桶水才把火熄滅。"],["After a two-hour walk, my dog drank a whole pail of water.","走了兩小時後，我的狗喝下了一整桶水。"]]},{"w":"clue","z":"線索；端倪；頭緒","p":"n.","i":"/kluː/","b":"19","f":["a clue to","do not have a clue"],"s":["hint","evidence"],"a":[],"x":[["Do you have any clues to the robber’s whereabouts?","你有任何搶匪下落的線索嗎？"],["I didn’t have a clue why Roger yelled at me.","我一點都不知道為什麼羅傑對我大叫。"]]},{"w":"hint","z":"暗示；提示","p":"n. / vt. / vi.","i":"/hɪnt/","b":"19A","f":["take / get the hint","hint that","hint at"],"s":["suggest","clue"],"a":["state directly"],"x":[["Tammy hoped Steven would take the hint and stop bothering her.","塔米希望史蒂芬識相點，別再煩她。"],["Emily glanced at her watch, hinting that she had to leave.","艾蜜莉看了一下錶，暗示她得走了。"],["Tom hinted that he might buy Jane a diamond ring for their anniversary.","湯姆暗示他可能會買一只鑽戒送給珍當作結婚週年紀念禮物。"],["Our general manager hinted at the possibility of opening a new branch next summer.","總經理暗示了來年夏天開設新分公司的可能性。"]]},{"w":"eager","z":"渴望的；熱切的","p":"adj.","i":"/ˈiːɡər/","b":"20","f":["be eager to + V","be eager for","be longing to","be dying for"],"s":["keen","anxious"],"a":["reluctant","uninterested"],"x":[["Mary is eager to start her new job.","瑪莉渴望開始新工作。"],["Children are always eager for the arrival of Christmas.","孩子們總是期待聖誕節的到來。"]]},{"w":"spin","z":"紡紗；編造故事；旋轉","p":"vt. / vi. / n.","i":"/spɪn/","b":"21","f":["spin–spun–spun","spin a story / yarn","spin around"],"s":["rotate","turn"],"a":["stop"],"x":[["The factory has a reputation for spinning fine wool yarn.","這座工廠紡的細緻羊毛線相當有名。"],["The sailor spun a story about his trip to Egypt.","這位水手編了一個他到埃及的冒險故事。"],["The dancer spun around and around but never fell over.","這名舞者不停地轉圈，卻不會摔倒。"],["The dancer took the woman by the hand and gave her a spin.","舞者用手挽著女子並讓她旋轉。"]]},{"w":"romantic","z":"不切實際的；浪漫的；浪漫主義者","p":"adj. / n.","i":"/roʊˈmæntɪk/","b":"22","f":["romantic ideas","hopeless romantic","romance"],"s":["dreamy","impractical"],"a":["realistic","practical"],"x":[["Many girls have romantic ideas about becoming a model.","關於當模特兒，許多女孩都有不切實際的想法。"],["It would be romantic for us to go to Venice together.","咱們一起去威尼斯一定會很浪漫。"],["They say Bob is a hopeless romantic who indulges in his own fantasies.","他們說鮑伯是個無可救藥的浪漫主義者，沉浸在自己的幻想裡。"]]},{"w":"passion","z":"熱情；熱愛","p":"n.","i":"/ˈpæʃən/","b":"23","f":["have a passion for","passionate","have a liking for"],"s":["enthusiasm","love"],"a":["apathy"],"x":[["Amy has a passion for clothes. She always wears stylish things.","艾咪熱愛服飾。她的穿著一向很時髦。"]]},{"w":"warmth","z":"溫暖；暖意","p":"n.","i":"/wɔːrmθ/","b":"23A","f":["bring someone warmth","warm"],"s":["heat","kindness"],"a":["coldness"],"x":[["Seeing Jane smile brings me warmth and makes my day.","看到珍的笑容會帶給我溫暖，讓我開心一整天。"]]},{"w":"adventure","z":"冒險；奇遇","p":"n.","i":"/ədˈventʃər/","b":"24","f":["have an adventure","venture","Nothing ventured, nothing gained"],"s":["expedition","exploit"],"a":["routine"],"x":[["That old man often tells us of his many adventures in Africa.","那個老伯伯常告訴我們他在非洲的許多冒險經歷。"]]},{"w":"adventurous","z":"大膽的；充滿危險和刺激的","p":"adj.","i":"/ədˈventʃərəs/","b":"24A","f":["adventurous trip","when it comes to"],"s":["daring","risk-taking"],"a":["cautious","safe"],"x":[["George is not very adventurous when it comes to food.","談到食物，喬治就不是那麼大膽了。"],["Roger wants to climb Mt. Everest, but I’d prefer a less adventurous trip.","羅傑想攀登聖母峰，我則比較想要冒險性沒那麼高的旅行。"]]},{"w":"studio","z":"播音室；工作室；攝影棚","p":"n.","i":"/ˈstuːdioʊ/","b":"25","f":["recording studio","artist’s studio"],"s":["workshop"],"a":[],"x":[["This recording studio is fully equipped.","這間錄音室的設備很齊全。"],["The artist used this abandoned warehouse as his studio.","這名藝術家把這座廢棄的倉庫當作工作室。"]]},{"w":"verse","z":"韻文；詩","p":"n.","i":"/vɜːrs/","b":"26","f":["in verse","versed","be versed in"],"s":["poetry"],"a":["prose"],"x":[["The poet expressed his ideas in verse.","這位詩人用詩來表達他的想法。"],["Peter is versed in Chinese calligraphy.","彼得精通中國書法。"]]},{"w":"bride","z":"新娘","p":"n.",
