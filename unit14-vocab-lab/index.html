2}.fb{margin-top:12px;background:#f7f8fc;border-radius:14px;padding:13px;white-space:pre-wrap;line-height:1.6}.ans{display:flex;gap:8px;margin-top:12px}.ans input{flex:1;border:1px solid #dbe3f5;border-radius:14px;padding:13px}.primary{border:0;background:#27469d;color:#fff;border-radius:14px;padding:13px;font-weight:800;cursor:pointer}@media(max-width:760px){.layout{grid-template-columns:1fr}.list{max-height:280px}.tools{flex-wrap:wrap}.opts{grid-template-columns:1fr}.word{font-size:44px}}</style></head><body><main class="app"><header class="hero"><a href="../vocab-lab/">← 返回總目錄</a><h1>Unit 14</h1><p>44 個核心與延伸單字：搜尋、發音、字族、完整例句、填空、中翻英與錯題複習。</p></header><div class="tools"><input id="search" placeholder="搜尋英文、中文、片語或例句"><button class="tab on" data-m="learn">學習</button><button class="tab" data-m="quiz">填空</button><button class="tab" data-m="type">輸入</button><button class="tab" data-m="wrong">錯題</button></div><section class="layout"><aside class="list" id="list"></aside><article class="stage" id="stage"></article></section></main><script>const words=[{"w":"swear","z":"發誓；說髒話","p":"vt. / vi.","i":"/swer/","b":"1","f":["swear–swore–sworn","swear to God that…","be sworn in as…"],"s":["promise solemnly"],"a":[],"x":[["I swear to God that I didn’t take your pen!","我對天發誓我沒拿你的筆！"],["Mr. Johnson was sworn in as mayor of the city yesterday.","強森先生昨天宣誓就任市長。"],["Don’t swear in front of the children.","不要在孩子面前說髒話。"]]},{"w":"parade","z":"遊行；列隊行進","p":"vi. / n.","i":"/pəˈreɪd/","b":"2","f":["be on parade","parade in front of"],"s":["procession"],"a":[],"x":[["Those soldiers were parading in front of the presidential palace.","那些士兵正在總統府前做分列式遊行。"],["Those soldiers were on parade in front of the presidential palace.","那些士兵正在總統府前列隊行進。"]]},{"w":"march","z":"前進；行軍；行進；遊行","p":"vi. / n.","i":"/mɑːrtʃ/","b":"2A","f":["be on the march","march toward"],"s":["parade","advance"],"a":["retreat"],"x":[["Thousands of demonstrators marched toward City Hall at 2:00 yesterday afternoon.","昨天下午兩點，數千名示威者往市政府方向前進。"],["The troops were on a long march into the mountains.","部隊往深山長途行軍。"]]},{"w":"cigarette","z":"香菸","p":"n.","i":"/ˌsɪɡəˈret/","b":"3","f":["be addicted to cigarettes / smoking","get addicted to cigarettes / smoking","put out a cigarette"],"s":[],"a":[],"x":[["Please put out your cigarette, sir. This is a non-smoking area.","先生，請把香菸熄掉。這裡是禁菸區。"],["I got addicted to cigarettes while I was in college.","我念大學時染上菸癮。"]]},{"w":"tobacco","z":"菸草","p":"n.","i":"/təˈbækoʊ/","b":"3A","f":["nicotine","addictive substance","cigar"],"s":[],"a":[],"x":[["The nicotine in tobacco is an addictive and harmful substance.","菸草內的尼古丁是種會使人上癮且有害的物質。"]]},{"w":"plastic","z":"塑膠；塑膠的","p":"n. / adj.","i":"/ˈplæstɪk/","b":"4","f":["a plastic bag","plastic surgery","made of plastic"],"s":["synthetic material"],"a":[],"x":[["Bags made of plastic are harmful to the environment.","塑膠製的袋子對環境有害。"],["Stores no longer give customers plastic bags for the sake of environmental protection.","為了環保的緣故，商店不再供應塑膠袋給顧客了。"]]},{"w":"leather","z":"皮革","p":"n.","i":"/ˈleðər/","b":"4A","f":["a leather coat","leather boots"],"s":["hide"],"a":[],"x":[["Leather coats are back in fashion.","皮革外套又再度流行了。"]]},{"w":"float","z":"漂浮；浮板","p":"vi. / n.","i":"/floʊt/","b":"5","f":["learn how to float","use something as a float"],"s":["drift"],"a":["sink"],"x":[["The first step in learning how to swim is to learn how to float.","學游泳的第一步就是學會如何漂浮。"],["The man used a piece of wood as a float to get back to shore.","該男子用了一塊木頭當浮板回到岸邊。"]]},{"w":"pole","z":"極；磁極；竿子","p":"n.","i":"/poʊl/","b":"6","f":["a fishing pole","be poles apart","the North Pole / South Pole","positive pole / negative pole"],"s":["fishing rod"],"a":[],"x":[["Place the positive pole of the battery in the toy first and then the negative one.","先將電池正極的那一端放進玩具裡，再放進負極。"],["If you want to catch a big fish, the right kind of fishing pole and bait are a must.","想要釣大魚，就必須要選對釣竿及釣餌。"],["Both of the sisters are great artists, though they are poles apart in artistic styles.","這對姐妹都是很傑出的藝術家，但她們的藝術風格截然不同。"]]},{"w":"casual","z":"偶然的；無心的；非正式的","p":"adj.","i":"/ˈkæʒuəl/","b":"7","f":["casual wear","a casual meeting","a casual remark"],"s":["informal"],"a":["formal"],"x":[["Peter and Bruce’s long friendship began with a casual meeting at a party.","彼得與布魯斯長久的友誼始於派對上的一次偶遇。"],["Mr. Lee’s casual remark caused a political storm.","李先生無心的言論引發了一場政治風暴。"],["You can find casual wear on the sixth floor.","六樓是休閒服裝區。"]]},{"w":"casually","z":"悠閒地；隨便地","p":"adv.","i":"/ˈkæʒuəli/","b":"7A","f":["stroll casually","be casually dressed"],"s":["informally"],"a":["formally"],"x":[["On weekends, I enjoy strolling casually in the park near where I live.","週末我喜歡在我住處附近的公園悠閒地漫步。"],["Much to our surprise, Mary was casually dressed for the formal party.","令我們大感驚訝的是，那是個正式宴會，瑪莉卻穿得很隨便。"]]},{"w":"doubtful","z":"起疑的；可疑的","p":"adj.","i":"/ˈdaʊtfəl/","b":"8","f":["be doubtful about","It is doubtful whether…","without a doubt","doubtfully"],"s":["unsure","uncertain","unconvinced"],"a":["certain","convinced"],"x":[["I was doubtful about the old man’s good intentions.","這個老頭的好意令我起疑。"],["It is doubtful whether Ted will keep his promise.","泰德會不會履行諾言令人懷疑。"]]},{"w":"doubtless","z":"無疑地；必定地","p":"adv.","i":"/ˈdaʊtləs/","b":"8A","f":["doubtless pass","undoubtedly","without a doubt"],"s":["undoubtedly","certainly"],"a":["doubtfully"],"x":[["Bill has been studying so hard that he will doubtless pass the exam.","比爾一直那麼用功，所以他必定會通過這次考試。"],["Bill has been studying so hard that he will undoubtedly pass the exam.","比爾一直那麼用功，所以他無疑會通過這次考試。"]]},{"w":"stuff","z":"東西；塞滿","p":"n. / vt.","i":"/stʌf/","b":"9","f":["be stuffed with something","a lot of stuff to do","stuffy"],"s":["things","fill"],"a":["empty"],"x":[["Leave your stuff in the car while we check if the hotel has any rooms available.","我們去確認飯店還有沒有房間的時候，把你的東西留在車內。"],["This closet is stuffed with clothes I don’t wear anymore.","這個衣櫥塞滿我再也不穿的衣服。"]]},{"w":"bare","z":"空的；赤裸的；露出","p":"adj. / vt.","i":"/ber/","b":"10","f":["barehanded","barefoot / barefooted","walk barefoot","bare one’s legs"],"s":["empty","uncovered"],"a":["covered","full"],"x":[["Don’t walk around barefoot because there are pieces of broken glass on the floor.","地板上有玻璃碎片，所以不要光著腳到處走。"],["Our fridge is bare, so we must do some shopping this afternoon.","我們的冰箱空了，因此下午我們得買些東西。"],["Sue put her shorts on so she could bare her legs to the hot sun.","蘇換上短褲把腿露出來曬曬太陽。"]]},{"w":"barely","z":"僅僅；勉強；幾乎不","p":"adv.","i":"/ˈberli/","b":"10A","f":["barely able to","make ends meet"],"s":["only","hardly","scarcely"],"a":["easily","fully"],"x":[["Linda is barely 18 years old and yet has two children.","琳達只有十八歲，卻已經有兩個小孩子。"],["With such a meager income, John is barely able to make ends meet.","約翰的收入很少，收支勉強過得去。"]]},{"w":"tourist","z":"觀光客；遊客；觀光的","p":"n. / adj.","i":"/ˈtʊrɪst/","b":"11","f":["tourist attraction","be on a tour of a city","tour a city"],"s":["traveler","visitor"],"a":[],"x":[["This scenic spot draws tens of thousands of tourists every month.","這個景點每個月都會吸引好幾萬名遊客。"],["Eluanbi is a famous tourist attraction in southern Taiwan.","鵝鑾鼻是臺灣南部知名的觀光勝地。"]]},{"w":"tourism","z":"觀光業；觀光","p":"n.","i":"/ˈtʊrɪzəm/","b":"11A","f":["depend on tourism","support the economy"],"s":["travel industry"],"a":[],"x":[["The country heavily depends on tourism to support its economy.","該國的經濟極度仰賴觀光業。"]]},{"w":"leap","z":"跳躍；跳","p":"vi. / n.","i":"/liːp/","b":"12","f":["leap–leapt–leapt","look before you leap","by leaps and bounds","a leap year","make a leap for"],"s":["jump"],"a":[],"x":[["You’d better look before you leap. I don’t think you really understand the situation.","你最好三思而後行。我覺得你還沒真正了解狀況。"],["The dog made a leap for the cat, but it managed to get away.","這隻狗跳向這隻貓，但牠設法逃脫了。"],["Since I moved to America, my English has improved by leaps and bounds.","我搬到美國後，我的英文就突飛猛進了。"]]},{"w":"fade","z":"褪色；漸弱","p":"vi.","i":"/feɪd/","b":"13","f":["fade away","fade out"],"s":["dim","weaken"],"a":["brighten","intensify"],"x":[["General MacArthur once said, “Old soldiers never die; they just fade away.”","麥克阿瑟將軍曾說：「老兵不死，只是凋零。」"],["When the music faded out, the show host walked onto the stage.","音樂漸弱時，節目主持人走上舞臺。"]]},{"w":"vanish","z":"消失","p":"vi.","i":"/ˈvænɪʃ/","b":"13A","f":["vanish mysteriously"],"s":["disappear"],"a":["appear"],"x":[["Many ancient civilizations have vanished mysteriously.","許多古文明都已神祕消失了。"]]},{"w":"cabin","z":"小木屋；船艙；機艙","p":"n.","i":"/ˈkæbɪn/","b":"14","f":["a log cabin","the passenger cabin","leave one’s cabin"],"s":["hut"],"a":[],"x":[["Nobody lives in that log cabin.","那個圓木搭建的小木屋沒有人住。"],["Even though the ship was sinking, the captain refused to leave his cabin.","雖然船即將下沉，船長還是拒絕離開他的船艙。"]]},{"w":"hut","z":"小屋","p":"n.","i":"/hʌt/","b":"14A","f":["a wooden hut"],"s":["cabin","shed"],"a":[],"x":[["Jim built a wooden hut all by himself.","吉姆靠一己之力蓋了一間小木屋。"]]},{"w":"powder","z":"粉末；灑粉；補妝","p":"n. / vt.","i":"/ˈpaʊdər/","b":"15","f":["grind into a powder","powder one’s face"],"s":["dust"],"a":[],"x":[["Slowly grind these ingredients into a powder.","慢慢地將這些原料磨成粉末。"],["Mary went to the restroom to powder her face.","瑪莉去洗手間補妝。"]]},{"w":"pill","z":"藥丸","p":"n.","i":"/pɪl/","b":"15A","f":["sleeping pills","take pills"],"s":["tablet"],"a":[],"x":[["Judy has to rely on sleeping pills in order to fall asleep.","茱蒂要靠安眠藥才能睡著。"],["Take those pills according to the instructions.","按照說明指示服用那些藥丸。"]]},{"w":"tablet","z":"藥片；平板電腦","p":"n.","i":"/ˈtæblət/","b":"15B","f":["take a tablet","the latest model of the tablet"],"s":["pill"],"a":[],"x":[["The doctor gave me some tablets to help control my frequent headaches.","醫師給了我一些藥片幫助我控制經常性的頭痛。"],["Jack bought the latest model of the tablet with his annual bonus.","傑克用年度獎金買了最新型的平板電腦。"],["Take this medicine, and you’ll feel better.","服用這個藥，你就會覺得好多了。"]]},{"w":"deck","z":"甲板","p":"n.","i":"/dek/","b":"16","f":["go up on deck"],"s":["shipboard"],"a":[],"x":[["Let’s go up on deck and take a look at the night view.","我們上甲板去看看夜景吧。"]]},{"w":"limb","z":"四肢之一","p":"n.","i":"/lɪm/","b":"17","f":["lose a limb","li
