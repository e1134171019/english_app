.65}.tr{color:var(--muted);margin:5px 0 0 46px;line-height:1.55}.hot{display:inline;border:0;border-radius:10px;padding:2px 6px;background:#eef2ff;color:#1d4ed8;font-weight:900}.hot.active{background:#1d4ed8;color:#fff}.hint{font-size:14px;color:var(--muted);margin-top:16px}.side{position:sticky;top:18px;padding:22px}.wordTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.word{font-size:46px;line-height:.95;font-weight:950;letter-spacing:-.07em;margin:0;color:#111827}.pos{background:#eff6ff;color:#1d4ed8;border-radius:999px;padding:7px 10px;font-weight:900}.pron{color:var(--muted);margin:8px 0 0}.zh{font-size:23px;font-weight:950;margin:20px 0 8px}.concept{color:var(--muted);line-height:1.7}.block{margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}.block h3{font-size:13px;color:var(--muted);margin:0 0 10px;text-transform:uppercase;letter-spacing:.08em}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{border-radius:999px;padding:7px 10px;background:#eef2ff;color:#3730a3;font-weight:800}.syn{background:#ecfdf5;color:#047857}.ant{background:#fff1f2;color:#be123c}.ex{border-left:4px solid #93c5fd;padding-left:12px;margin:10px 0}.ex strong{display:block;line-height:1.55}.ex span{display:block;color:var(--muted);margin-top:4px;line-height:1.55}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}.btn{border-radius:16px;padding:13px 14px;font-weight:900;background:#e5e7eb;color:#111827}.primary{background:var(--blue);color:#fff}.dark{background:#111827;color:#fff}.panel{padding:22px}.panel h2{margin:0 0 14px}.levels{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}.level{border-radius:16px;padding:12px 8px;background:#fff;border:1px solid var(--line);font-weight:900;color:var(--muted)}.level.active{background:#2563eb;color:white}.qcard{border-radius:22px;background:#111827;color:#fff;padding:22px;margin-bottom:14px}.qcard small{color:#cbd5e1;font-weight:900;text-transform:uppercase}.q{font-size:28px;font-weight:950;line-height:1.35;margin:10px 0 0}.options{display:grid;grid-template-columns:1fr 1fr;gap:10px}.opt{border-radius:16px;padding:14px;background:#fff;border:1px solid var(--line);font-weight:900;text-align:left}.opt.correct{background:#dcfce7;color:#166534;border-color:#86efac}.opt.wrong{background:#ffe4e6;color:#be123c;border-color:#fda4af}.input{width:100%;border:1px solid var(--line);border-radius:16px;padding:14px;font-size:20px;font-weight:900}.feedback{margin-top:12px;border-radius:18px;padding:14px;background:#f9fafb;border:1px solid var(--line);white-space:pre-wrap;line-height:1.7}.list{display:grid;gap:10px}.row{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);border-radius:18px;padding:14px}.row strong{font-size:20px}.row span{color:var(--muted);font-size:14px}.small{font-size:13px;color:var(--muted)}@media(max-width:900px){.layout{grid-template-columns:1fr}.side{position:static}.levels,.options{grid-template-columns:1fr 1fr}}@media(max-width:560px){.app{padding:12px}.top{align-items:flex-start;flex-direction:column}.reader,.side,.panel{border-radius:22px;padding:18px}.word{font-size:40px}.levels,.options,.btns{grid-template-columns:1fr}.stat{width:100%}.tr{margin-left:0}.sent{font-size:17px}}</style></head><body><div class="app"><header class="top"><div class="brand"><h1>Unit 03 Reading Vocabulary Lab</h1><p>第 3 課：閱讀例句 → 點擊單字 → 字族理解 → 分層測驗 → 錯題複習</p></div><div class="stat"><span id="stat">0 / 0 mastered</span><div class="barBox"><div class="bar" id="bar"></div></div></div></header><nav class="tabs"><button class="tab active" data-view="read">文章閱讀</button><button class="tab" data-view="practice">分層測驗</button><button class="tab" data-view="review">錯題複習</button><button class="tab" data-view="map">字族總覽</button></nav><main id="main"></main></div><script>
const words=[
{word:'react',pos:'vi.',pron:'[riˈækt]',zh:'反應',concept:'對某事物做出反應，常與 to 並用。',related:['reaction'],syn:['respond'],ant:[],ex:[['Ted reacted calmly to the plaintiff\'s accusation.','泰德對原告的指控反應冷靜。']]},
{word:'reaction',pos:'n.',pron:'[riˈækʃən]',zh:'反應',concept:'對某事物的回應或反應。',related:['react'],syn:['response'],ant:[],ex:[["What is Tom's reaction to my proposal?",'湯姆對我的提議有什麼表示？']]},
{word:'fund',pos:'n./vt.',pron:'[fʌnd]',zh:'基金；資金；提供資金',concept:'資金或為某事提供資金。',related:['fundraiser','funded'],syn:['capital','finance'],ant:[],ex:[['We contributed to the charity fund.','我們捐款給這個慈善基金。'],['The hospital is trying to raise funds for research into AIDS.','這家醫院正設法為愛滋病研究籌募資金。'],['The research was primarily funded by the government.','這項研究計畫大部分是由政府資助。']]},
{word:'audience',pos:'n.',pron:'[ˈɔdiəns]',zh:'觀眾',concept:'觀看表演或聽演講的人群，集合名詞。',related:['spectator'],syn:['viewers'],ant:[],ex:[['Because of the rain, the audience at the concert was small.','由於下雨的緣故，那場音樂會的觀眾很少。'],['The concert drew a large audience.','那場演唱會吸引了很多的觀眾。']]},
{word:'moral',pos:'a./n.',pron:'[ˈmɔrəl]',zh:'教導明辨是非的；道德的；寓意',concept:'與道德相關，也可指故事寓意。',related:['morality','immoral','ethical'],syn:['ethical'],ant:['immoral','wicked'],ex:[['The film has a good moral lesson.','這部影片有個很好的教訓，要我們明辨是非。'],['Tony is a true and moral man.','湯尼是一個真誠而有道德的人。'],['The moral of this story is that money cannot buy happiness.','這個故事的寓意就是金錢無法買到幸福。']]},
{word:'immoral',pos:'a.',pron:'[ɪˈmɔrəl]',zh:'不道德的',concept:'違反道德原則。',related:['moral'],syn:['wicked'],ant:['moral','ethical'],ex:[["Taking advantage of other people's misfortune for one's own gain is immoral.",'把自己的利益建築在別人的不幸上是不道德的。']]},
{word:'announce',pos:'vt.',pron:'[əˈnaʊns]',zh:'公布；宣布',concept:'正式告知或公開消息。',related:['announcement'],syn:['declare','proclaim'],ant:[],ex:[['John will announce who will play the characters in the play.','約翰會公布該戲劇中的角色由哪些人擔綱。'],['Their engagement was officially announced last June.','他們訂婚的消息在去年六月正式宣布。']]},
{word:'announcement',pos:'n.',pron:'[əˈnaʊnsmənt]',zh:'公告；宣布',concept:'公開發布的消息。',related:['announce'],syn:['declaration'],ant:[],ex:[['The announcement of the name of the winner will be made at three o\'clock.','這次得獎人的名單將於三點鐘發布。'],['The politician made a formal announcement that he would resign early next year.','這名政治人物正式宣告明年初他將辭職。']]},
{word:'theory',pos:'n.',pron:'[ˈθiəri]',zh:'學說；理論',concept:'用來解釋現象的理論或學說。',related:['theoretical'],syn:['hypothesis'],ant:['practice'],ex:[['Many scientists believe the theory that the universe is getting larger.','很多科學家相信宇宙正在變大的這個說法。'],['Developing a theory and proving it are very different things.','研發一套理論和加以證實是兩碼事。'],['Well, that sounds good in theory, but I don\'t know if it will work in practice.','嗯，那在理論上聽起來不錯，但我不知道它實際上是否可行。']]},
{word:'skate',pos:'n./vi.',pron:'[sket]',zh:'溜冰鞋；溜冰',concept:'溜冰或溜冰鞋。',related:['go skating'],syn:[],ant:[],ex:[["I've worn out these skates. I want to buy a new pair.",'這雙溜冰鞋我穿壞了，我要買一雙新的。'],['Would you like to join us in going skating this weekend?','這個週末你要不要跟我們溜冰去？']]},
{word:'ski',pos:'n./vi.',pron:'[ski]',zh:'滑雪板；滑雪',concept:'滑雪或滑雪板。',related:['go skiing','skied'],syn:[],ant:[],ex:[['That store specializes in imported skis.','那家店專賣進口的滑雪板。'],['Where will you go skiing this winter?','今年冬天你要到哪兒去滑雪？']]},
{word:'structure',pos:'n.',pron:'[ˈstrʌktʃɚ]',zh:'結構；建築物',concept:'事物的組成架構，也可指建築物。',related:['structural'],syn:['framework'],ant:[],ex:[['The structure of the poem is very complicated.','這首詩的結構很複雜。'],['The monument is a famous structure in town.','這座紀念碑是鎮上有名的建築。']]},
{word:'staff',pos:'n./vt.',pron:'[stæf]',zh:'職員；為……配備人員',concept:'全體職員，集合名詞，不可數。',related:['staff members'],syn:['employees'],ant:[],ex:[['Our company has a staff of 500, working in both Canada and Taiwan.','我們公司有五百名員工，分別在加拿大與臺灣工作。'],['Our company is staffed with individuals from three different countries.','我們公司有分別來自三個不同國家的職員。']]},
{word:'crew',pos:'n.',pron:'[kru]',zh:'工作人員；全體船員',concept:'船上或飛機上的全體工作人員，集合名詞。',related:['crew members'],syn:['team'],ant:[],ex:[['We have a crew of twenty on our ship.','我們船上一共有二十位工作人員。']]},
{word:'suffer',pos:'vt./vi.',pron:'[ˈsʌfɚ]',zh:'遭受；受苦',concept:'承受損失、疾病或痛苦。',related:['suffer from'],syn:['endure'],ant:[],ex:[['That company suffered a big loss because of poor management.','那家公司由於管理不善蒙受重大損失。'],['My father suffers from diabetes.','我爸爸患有糖尿病。']]},
{word:'spite',pos:'n.',pron:'[spaɪt]',zh:'怨恨；恨意；儘管',concept:'可指怨恨，也出現在 in spite of 表示儘管。',related:['in spite of','despite','notwithstanding'],syn:['malice'],ant:[],ex:[['Jason vandalized those cars out of spite.','傑森因怨恨而任意破壞那些車子。'],['In spite of his dad\'s warning, Paul went fishing alone.','儘管他爸爸提出警告，保羅還是獨自一個人釣魚去。']]},
{word:'lifestyle',pos:'n.',pron:'[ˈlaɪfˌstaɪl]',zh:'生活方式',concept:'個人或群體的生活型態。',related:[],syn:['way of life'],ant:[],ex:[['The topic of the magazine this month is living a healthy lifestyle.','這本雜誌這個月的主題談的是如何過健康的生活方式。']]},
{word:'somehow',pos:'adv.',pron:'[ˈsʌmˌhaʊ]',zh:'不知怎麼的；設法',concept:'不知為何，或以某種方式完成。',related:['somewhat'],syn:['in some way'],ant:[],ex:[["My blind date was beautiful, but somehow I didn't find her attractive.",'我相親的對象蠻美的，不過不知怎地我發現她並不吸引我。'],['I know the job is difficult, but we have to finish it somehow.','我知道這份工作很困難，但我們總得設法解決。']]},
{word:'original',pos:'a./n.',pron:'[əˈrɪdʒənl]',zh:'原來的；原創的；原著；原文',concept:'最初的、原創的，或原文原著。',related:['origin','originality','originate','originally'],syn:['initial','innovative'],ant:[],ex:[['The original plan was later changed.','最初的計畫後來有所更動。'],['Kelly has a very original idea.','凱莉有一個非常有創意的點子。'],['Have you read the original of the report?','這份報告的原文你看過了沒有？']]},
{word:'originally',pos:'adv.',pron:'[əˈrɪdʒənli]',zh:'原本；最初地',concept:'起先、原本。',related:['original'],syn:['in the beginning'],ant:['eventually'],ex:[["We're originally from Texas.",'我們原籍是德州。'],['The town was originally quite small.','這個鎮最初規模相當小。']]},
{word:'additional',pos:'a.',pron:'[əˈdɪʃənl]',zh:'額外的；另加的',concept:'在原有之外再增加的。',related:['add','addition','additionally'],syn:['extra'],ant:[],ex:[['So many children came to the party that additional tables and chairs were required.','參加派對的孩子真多，以致於需要備用的桌椅。'],['You have to pay an additional charge for overweight baggage.','超重的行李你必須額外付費。'],['Completion of this project calls for an additional $500,000.','要完成這項計畫另需五十萬美元。']]},
{word:'additionally',pos:'adv.',pron:'[əˈdɪʃənli]',zh:'除此之外',concept:'用來補充額外資訊。',related:['additional','in addition','on top of that'],syn:['besides','furthermore','moreover'],ant:[],ex:[['The rent is cheap. Additionally, the location is perfect.','除了房租便宜之外，地點更是棒得沒話講。']]},
{word:'advantage',pos:'n.',pron:'[ədˈvæntɪdʒ]',zh:'優勢；優點；便利；益處',concept:'有利條件或優點。',related:['take advantage of','disadvantage'],syn:['benefit','strength'],ant:['disadvantage'],ex:[["Bill's superior strength gave him an advantage over his opponents.",'比爾的力氣比對手大多了，因此使他占了上風。'],['This book has the advantage of being easy to use.','這本書的優點在於它很容易使用。'],['All students are invited to take advantage of our student discounts.','誠邀歡迎所有學生多加利用我們的學生折扣優惠。']]},
{word:'specific',pos:'a.',pron:'[spɪˈsɪfɪk]',zh:'特定的；特有的；明確的',concept:'清楚特定或明確說明。',related:['specify','specifically'],syn:['particular','accurate'],ant:['general'],ex:[['The man went there for a specific purpose.','那名男子到那兒去是有特定的目的。'],['This problem is specific to big cities.','這個問題是大城市所特有的。'],['Please be more specific about what you want.','你要什麼請說明確一點。']]},
{word:'specifically',pos:'adv.',pron:'[spɪˈsɪfɪkli]',zh:'尤其；特別地',concept:'特別指出某對象或某情況。',related:['specific'],syn:['specially','particularly'],ant:[],ex:[['The doctor warned Mark specifically not to eat eggs.','醫生特別警告馬克不要吃蛋。']]},
{word:'destroy',pos:'vt.',pron:'[dɪˈstrɔɪ]',zh:'毀壞；破壞',concept:'嚴重破壞或摧毀。',related:['destruction','destructive'],syn:['damage','ruin'],ant:['restore'],ex:[['The typhoon destroyed the whole area.','颱風把這一帶全部摧毀了。'],["The bribery scandal destroyed the politician's reputation.",'這次賄賂醜聞毀了該政客的名聲。']]},
{word:'column',pos:'n.',pron:'[ˈkɑləm]',zh:'圓柱；專欄',concept:'可指柱子或報刊專欄。',related:['columnist'],syn:['pillar'],ant:[],ex:[['The wooden columns are severely decayed as a result of exposure to the elements.','由於受到風雨淋的關係，這些木製的柱子已經嚴重腐朽了。'],['Nicole writes a weekly column for The China Post.','妮可每星期替《中國郵報》寫專欄。']]},
{word:'mission',pos:'n.',pron:'[ˈmɪʃən]',zh:'任務',concept:'被交付或執行的任務。',related:['missionary','be on a mission'],syn:['task'],ant:[],ex:[['Rumor has it that Michael is on a secret mission in Syria.','謠傳麥可正在敘利亞執行一項祕密任務。']]},
{word:'reveal',pos:'vt.',pron:'[rɪˈvil]',zh:'透露；揭露',concept:'使秘密或資訊被知道。',related:['revelation'],syn:['disclose'],ant:['conceal'],ex:[['The agent was jailed for revealing secrets to the enemy.','該名探員因洩密給敵方而入獄。']]},
{word:'tropical',pos:'a.',pron:'[ˈtrɑpɪkl]',zh:'熱帶的',concept:'與熱帶地區有關。',related:['tropical zone','subtropical','temperate zone','frigid zone'],syn:[],ant:[],ex:[['I have a liking for tropical fruits such as bananas and pineapples.','我很喜歡香蕉和鳳梨這類的熱帶水果。']]},
{word:'agriculture',pos:'n.',pron:'[ˈæɡrɪˌkʌltʃɚ]',zh:'農業',concept:'農作、畜牧與土地生產相關活動。',related:['agricultural','farming'],syn:['farming'],ant:[],ex:[['We are developing new technology to improve our agriculture.','我們正在研發新科技來改善農業。']]},
{word:'drag',pos:'vt./n.',pron:'[dræɡ]',zh:'拖曳；阻力',concept:'拖拉某物或指阻礙力量。',related:['pull','tow','haul'],syn:['pull'],ant:[],ex:[["Don't drag the chair around! It will leave marks on the wooden floor.",'不要拖著椅子到處走。這樣會在木質地板上留下刮痕。'],['The new design of the plane will help to reduce drag.','這架飛機的新設計能幫助減少阻力。']]},
{word:'drugstore',pos:'n.',pron:'[ˈdrʌɡˌstɔr]',zh:'藥妝店',concept:'販售藥物與日用品的店。',related:['drug'],syn:['pharmacy'],ant:[],ex:[['The drugstore is open 24 hours a day.','這家藥妝店全天候營業。']]},
{word:'cough',pos:'vi./n.',pron:'[kɔf]',zh:'咳嗽',concept:'咳嗽或咳嗽症狀。',related:['have a cough'],syn:[],ant:[],ex:[['Cover your mouth when you cough.','咳嗽時要用手摀著嘴。'],["I had a bad cough and couldn't sleep last night.",'我昨晚咳得很厲害，無法入眠。']]},
{word:'dizzy',pos:'a.',pron:'[ˈdɪzi]',zh:'暈眩的',concept:'頭暈或失去平衡感。',related:[],syn:['lightheaded'],ant:[],ex:[['After three glasses of beer, I felt slightly dizzy.','喝了三杯啤酒後，我感覺有一點暈眩。']]},
{word:'tasty',pos:'a.',pron:'[ˈtesti]',zh:'好吃的',concept:'味道好的。',related:['taste'],syn:['delicious','yummy'],ant:[],ex:[['My mother makes very tasty cakes.','我媽媽做的蛋糕很好吃。']]},
{word:'weapon',pos:'n.',pron:'[ˈwɛpən]',zh:'武器',concept:'用於攻擊或防衛的器具。',related:['nuclear weapon','lethal weapon'],syn:['arm'],ant:[],ex:[['The police found a large number of weapons in the deserted warehouse.','警方在廢置的倉庫裡查獲大批武器。']]},

const key='unit03_vocab_lab';let state=JSON.parse(localStorage.getItem(key)||'{"selected":"react","level":1,"mastered":{},"wrong":[],"query":""}');let view='read';const $=s=>document.querySelector(s);function save(){localStorage.setItem(key,JSON.stringify(state));topStat()}function W(x=state.selected){return words.find(w=>w.word===x)||words[0]}function filtered(){let q=(state.query||'').toLowerCase();if(!q)return words;return words.filter(w=>[w.word,w.zh,w.pos,w.related.join(' '),w.syn.join(' '),w.ant.join(' '),w.ex.map(e=>e.join(' ')).join(' ')].join(' ').toLowerCase().includes(q))}function topStat(){let n=Object.keys(state.mastered).length;$('#stat').textContent=`${n} / ${words.length} mastered`;$('#bar').style.width=(n/words.length*100)+'%'}function chips(a,c=''){return (a||[]).length?a.map(x=>`<span class="chip ${c}">${x}</span>`).join(''):'<span class="small">No data</span>'}function speak(t){speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=.78;speechSynthesis.speak(u)}function esc(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}function hotSent(w){let s=esc(w.ex[0][0]);let re=new RegExp('\\b'+w.word+'s?\\b','i');if(re.test(s))return s.replace(re,m=>`<button class="hot ${state.selected===w.word?'active':''}" onclick="pick('${w.word}')">${m}</button>`);return `<button class="hot ${state.selected===w.word?'active':''}" onclick="pick('${w.word}')">${w.word}</button> — ${s}`}function card(w){return `<aside class="side"><div class="wordTop"><div><h2 class="word">${w.word}</h2><p class="pron">${w.pron}</p></div><span class="pos">${w.pos}</span></div><p class="zh">${w.zh}</p><p class="concept">${w.concept}</p><div class="block"><h3>Related Words</h3><div class="chips">${chips(w.related)}</div></div><div class="block"><h3>Synonyms</h3><div class="chips">${chips(w.syn,'syn')}</div></div><div class="block"><h3>Antonyms</h3><div class="chips">${chips(w.ant,'ant')}</div></div><div class="block"><h3>Examples</h3>${w.ex.map(e=>`<p class="ex"><strong>${e[0]}</strong><span>${e[1]}</span></p>`).join('')}</div><div class="btns"><button class="btn dark" onclick="speak('${w.word}')">朗讀</button><button class="btn primary" onclick="view='practice';renderPractice()">練這個字</button></div></aside>`}function renderRead(){view='read';let w=W(),arr=filtered();$('#main').innerHTML=`<section class="layout"><article class="reader"><h2>Unit 03 Example Context</h2><input class="search" value="${esc(state.query||'')}" placeholder="搜尋第 3 課單字、中文、相關詞，例如 react / moral / 反義詞" oninput="state.query=this.value;save();renderRead()"><div class="article">${arr.map((x,i)=>`<div class="vline"><div class="sent"><b>${words.indexOf(x)+1}</b>${hotSent(x)}</div><div class="tr">${x.ex[0][1]}</div></div>`).join('')}</div><p class="hint">已加入第 3 課圖片中可辨識的單字。點藍色單字看右側卡片，再按「練這個字」進入分層測驗。</p></article>${card(w)}</section>`;nav()}function pick(x){state.selected=x;save();renderRead()}function addWrong(w,why){if(!state.wrong.some(x=>x.word===w.word&&x.why===why))state.wrong.unshift({word:w.word,zh:w.zh,why,time:new Date().toLocaleString()});save()}function sampleOptions(answer,field){let pool=words.filter(x=>x[field]!==answer).map(x=>x[field]);return [answer,...pool.sort(()=>Math.random()-.5).slice(0,3)].sort(()=>Math.random()-.5)}function qdata(){let w=W(),l=state.level;if(l===1)return {type:'choice',label:'Level 1 英選中',q:`${w.word} 的中文意思是？`,answer:w.zh,opts:sampleOptions(w.zh,'zh')};if(l===2)return {type:'choice',label:'Level 2 中選英',q:`${w.zh} 的英文是？`,answer:w.word,opts:sampleOptions(w.word,'word')};if(l===3){let e=w.ex[0][0].replace(new RegExp('\\b'+w.word+'s?\\b','i'),'______');return {type:'choice',label:'Level 3 例句填空',q:e,answer:w.word,opts:sampleOptions(w.word,'word')}}return {type:'input',label:'Level 4 主動輸出',q:`請輸入英文：${w.zh}`,answer:w.word}}function renderPractice(){view='practice';let w=W(),q=qdata();$('#main').innerHTML=`<section class="panel"><h2>分層測驗：${w.word}</h2><div class="levels">${[1,2,3,4].map(n=>`<button class="level ${state.level===n?'active':''}" onclick="state.level=${n};save();renderPractice()">Level ${n}</button>`).join('')}</div><div class="qcard"><small>${q.label}</small><p class="q">${q.q}</p></div>${q.type==='choice'?`<div class="options">${q.opts.map(o=>`<button class="opt" onclick="checkChoice(this,${JSON.stringify(o).replaceAll('"','&quot;')})">${o}</button>`).join('')}</div>`:`<input class="input" id="answer" placeholder="輸入英文單字"><div class="btns"><button class="btn primary" onclick="checkInput()">檢查</button><button class="btn" onclick="nextWord()">下一個字</button></div>`}<div class="feedback" id="fb">答題後會顯示例句與中文解析。</div></section>`;if($('#answer'))$('#answer').focus();nav()}function checkChoice(btn,val){let w=W(),q=qdata();document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.textContent===q.answer)b.classList.add('correct')});if(val===q.answer){btn.classList.add('correct');state.mastered[w.word]=true;$('#fb').textContent=`正確\n${w.ex[0][0]}\n${w.ex[0][1]}`}else{btn.classList.add('wrong');addWrong(w,q.label);$('#fb').textContent=`錯誤。答案：${q.answer}\n${w.ex[0][0]}\n${w.ex[0][1]}`}save()}function checkInput(){let w=W(),v=$('#answer').value.trim().toLowerCase();if(v===w.word.toLowerCase()){state.mastered[w.word]=true;$('#fb').textContent=`正確\n${w.ex[0][0]}\n${w.ex[0][1]}`}else{addWrong(w,'Level 4 主動輸出');$('#fb').textContent=`錯誤。答案：${w.word}\n${w.ex[0][0]}\n${w.ex[0][1]}`}save()}function nextWord(){let arr=filtered(),i=arr.findIndex(x=>x.word===state.selected);state.selected=arr[(i+1+arr.length)%arr.length].word;save();renderPractice()}function renderReview(){view='review';let arr=state.wrong;$('#main').innerHTML=`<section class="panel"><h2>錯題複習</h2>${arr.length?`<div class="list">${arr.map(x=>`<div class="row"><div><strong>${x.word}</strong><br><span>${x.zh}｜${x.why}</span></div><button class="btn" onclick="state.selected='${x.word}';save();renderPractice()">重練</button></div>`).join('')}</div><br><button class="btn" onclick="state.wrong=[];save();renderReview()">清空錯題</button>`:'<div class="feedback">目前沒有錯題。分層測驗答錯會自動加入。</div>'}</section>`;nav()}function renderMap(){view='map';$('#main').innerHTML=`<section class="panel"><h2>字族總覽</h2><div class="list">${words.map(w=>`<div class="row"><div><strong>${w.word}</strong><br><span>${w.pos}｜${w.zh}<br>Related: ${w.related.join(' / ')}<br>Antonyms: ${w.ant.join(' / ')}</span></div><button class="btn" onclick="state.selected='${w.word}';save();renderRead()">閱讀</button></div>`).join('')}</div></section>`;nav()}function nav(){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.view===view));topStat()}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{if(b.dataset.view==='read')renderRead();if(b.dataset.view==='practice')renderPractice();if(b.dataset.view==='review')renderReview();if(b.dataset.view==='map')renderMap()});topStat();renderRead();
</script></body></html>
