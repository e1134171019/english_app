<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Unit 02 Reading Vocabulary Lab</title><style>:root{--bg:#f5f7fb;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--blue:#2563eb;--shadow:0 18px 55px rgba(15,23,42,.1)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}button,input{font:inherit}button{border:0;cursor:pointer}.app{max-width:1180px;margin:0 auto;padding:18px}.top{display:flex;justify-content:space-between;gap:14px;align-items:center;margin-bottom:14px}.brand h1{font-size:28px;margin:0;letter-spacing:-.04em}.brand p{margin:4px 0 0;color:var(--muted)}.stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px 16px;font-weight:900;box-shadow:var(--shadow);min-width:170px}.barBox{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:10px}.bar{height:100%;width:0;background:linear-gradient(90deg,#2563eb,#60a5fa)}.tabs{display:flex;gap:8px;overflow:auto;margin:12px 0 18px}.tab{white-space:nowrap;border-radius:999px;padding:12px 16px;background:#fff;border:1px solid var(--line);color:var(--muted);font-weight:900}.tab.active{background:#111827;color:#fff}.layout{display:grid;grid-template-columns:minmax(0,1fr) 390px;gap:18px;align-items:start}.reader,.side,.panel{background:#fff;border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow)}.reader{padding:24px}.reader h2{margin:0 0 14px;font-size:22px}.search{width:100%;padding:14px 16px;border:1px solid var(--line);border-radius:16px;margin-bottom:14px;font-weight:800}.article{display:grid;gap:10px}.vline{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff}.vline b{display:inline-grid;place-items:center;background:#dbeafe;color:#1d4ed8;border-radius:10px;min-width:34px;height:30px;margin-right:8px}.sent{font-size:18px;line-height:1.65}.tr{color:var(--muted);margin:5px 0 0 46px;line-height:1.55}.hot{display:inline;border:0;border-radius:10px;padding:2px 6px;background:#eef2ff;color:#1d4ed8;font-weight:900}.hot.active{background:#1d4ed8;color:#fff}.hint{font-size:14px;color:var(--muted);margin-top:16px}.side{position:sticky;top:18px;padding:22px}.wordTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.word{font-size:46px;line-height:.95;font-weight:950;letter-spacing:-.07em;margin:0;color:#111827}.pos{background:#eff6ff;color:#1d4ed8;border-radius:999px;padding:7px 10px;font-weight:900}.pron{color:var(--muted);margin:8px 0 0}.zh{font-size:23px;font-weight:950;margin:20px 0 8px}.concept{color:var(--muted);line-height:1.7}.block{margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}.block h3{font-size:13px;color:var(--muted);margin:0 0 10px;text-transform:uppercase;letter-spacing:.08em}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{border-radius:999px;padding:7px 10px;background:#eef2ff;color:#3730a3;font-weight:800}.syn{background:#ecfdf5;color:#047857}.ant{background:#fff1f2;color:#be123c}.ex{border-left:4px solid #93c5fd;padding-left:12px;margin:10px 0}.ex strong{display:block;line-height:1.55}.ex span{display:block;color:var(--muted);margin-top:4px;line-height:1.55}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}.btn{border-radius:16px;padding:13px 14px;font-weight:900;background:#e5e7eb;color:#111827}.primary{background:var(--blue);color:#fff}.dark{background:#111827;color:#fff}.panel{padding:22px}.panel h2{margin:0 0 14px}.levels{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}.level{border-radius:16px;padding:12px 8px;background:#fff;border:1px solid var(--line);font-weight:900;color:var(--muted)}.level.active{background:#2563eb;color:white}.qcard{border-radius:22px;background:#111827;color:#fff;padding:22px;margin-bottom:14px}.qcard small{color:#cbd5e1;font-weight:900;text-transform:uppercase}.q{font-size:28px;font-weight:950;line-height:1.35;margin:10px 0 0}.options{display:grid;grid-template-columns:1fr 1fr;gap:10px}.opt{border-radius:16px;padding:14px;background:#fff;border:1px solid var(--line);font-weight:900;text-align:left}.opt.correct{background:#dcfce7;color:#166534;border-color:#86efac}.opt.wrong{background:#ffe4e6;color:#be123c;border-color:#fda4af}.input{width:100%;border:1px solid var(--line);border-radius:16px;padding:14px;font-size:20px;font-weight:900}.feedback{margin-top:12px;border-radius:18px;padding:14px;background:#f9fafb;border:1px solid var(--line);white-space:pre-wrap;line-height:1.7}.list{display:grid;gap:10px}.row{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);border-radius:18px;padding:14px}.row strong{font-size:20px}.row span{color:var(--muted);font-size:14px}.small{font-size:13px;color:var(--muted)}@media(max-width:900px){.layout{grid-template-columns:1fr}.side{position:static}.levels,.options{grid-template-columns:1fr 1fr}}@media(max-width:560px){.app{padding:12px}.top{align-items:flex-start;flex-direction:column}.reader,.side,.panel{border-radius:22px;padding:18px}.word{font-size:40px}.levels,.options,.btns{grid-template-columns:1fr}.stat{width:100%}.tr{margin-left:0}.sent{font-size:17px}}</style></head><body><div class="app"><header class="top"><div class="brand"><h1>Unit 02 Reading Vocabulary Lab</h1><p>第 2 課：閱讀例句 → 點擊單字 → 字族理解 → 分層測驗 → 錯題複習</p></div><div class="stat"><span id="stat">0 / 0 mastered</span><div class="barBox"><div class="bar" id="bar"></div></div></div></header><nav class="tabs"><button class="tab active" data-view="read">文章閱讀</button><button class="tab" data-view="practice">分層測驗</button><button class="tab" data-view="review">錯題複習</button><button class="tab" data-view="map">字族總覽</button></nav><main id="main"></main></div><script>
const words=[
{word:'permit',pos:'vt./vi./n.',pron:'[pɚˈmɪt] / [ˈpɝmɪt]',zh:'准許；允許；許可證',concept:'允許某人做某事，或指正式許可證。',related:['permitted','permissive','permissible','permission'],syn:['allow'],ant:['ban','prohibit'],ex:[['We are not permitted to smoke here.','我們不能在此地抽菸。'],["I'll contact you after the meeting if time permits.",'如果時間許可的話，開完會後我會跟你聯絡。'],['You need a permit to go fishing here.','你要有許可證才可以在這裡釣魚。']]},
{word:'permission',pos:'n.',pron:'[pɚˈmɪʃən]',zh:'許可；准許',concept:'某人同意或准許做某事。',related:['permit','permissive'],syn:['consent','agreement'],ant:['prohibition'],ex:[['You are not allowed to use the machine without my permission.','沒有我的許可，你不能使用這臺機器。']]},
{word:'volume',pos:'n.',pron:'[ˈvɑljəm]',zh:'量；容量；冊；音量',concept:'可指數量、容量、書冊或聲音大小。',related:['turn the volume up','turn the volume down'],syn:['amount','capacity'],ant:[],ex:[['The volume of traffic reaches its peak during rush hour.','交通流量在上下班尖峰時間會達到高峰。'],['The history of the Roman Empire is in volumes 3 and 4.','羅馬帝國的歷史收錄在第 3、4 冊中。'],['Would you mind turning the volume down? I\'m studying.','你介意把音量關小嗎？我正在念書。']]},
{word:'represent',pos:'vt.',pron:'[ˌrɛprɪˈzɛnt]',zh:'代表；象徵',concept:'代表某人、某組織或象徵某意義。',related:['representation','representative'],syn:['symbolize','stand for'],ant:[],ex:[['George represented his company at the press conference.','喬治代表公司出席記者會。'],['This ring, though inexpensive, represents my love for you.','這只戒指雖然不貴，卻代表著我對你的愛。']]},
{word:'representative',pos:'a./n.',pron:'[ˌrɛprɪˈzɛntətɪv]',zh:'代表性的；代表者',concept:'可作形容詞表示代表性的，也可作名詞表示代表。',related:['represent','representation'],syn:['delegate','agent'],ant:[],ex:[['The dove is representative of peace.','鴿子代表和平。'],['The union sent a representative to negotiate with management.','工會派出一位代表和資方談判。']]},
{word:'attitude',pos:'n.',pron:'[ˈætəˌtjud]',zh:'態度',concept:'對人、事、生活的看法或態度。',related:['an attitude to','an attitude toward'],syn:['view','mindset'],ant:[],ex:[['Tony has a positive attitude towards life.','東尼對人生持積極的態度。']]},
{word:'reduce',pos:'vt.',pron:'[rɪˈdus]',zh:'使減少；使淪為',concept:'降低數量、程度，也可表示使某人淪落到某狀態。',related:['reduction'],syn:['decrease'],ant:['increase'],ex:[['Despite Andy\'s pay cut, he won\'t reduce his standard of living.','儘管安迪被減薪，他仍不願降低他的生活水準。'],['Bankruptcy reduced Bruce to begging.','布魯斯破產後淪為乞丐。']]},
{word:'fake',pos:'a./n./vt.',pron:'[fek]',zh:'假的；贗品；偽造；假裝',concept:'不真實的、偽造的，或假裝某狀態。',related:['faked'],syn:['false','counterfeit'],ant:['genuine'],ex:[['Brian was caught using fake money.','布萊恩因為使用假鈔被抓。'],['After careful examination, the experts revealed that the painting was a fake.','經過詳細檢驗，專家指出這幅畫是偽畫。'],['The teacher was angry when he found Gary had faked his father\'s signature.','老師發現蓋瑞偽造父親的簽名時很生氣。'],['Ruth didn\'t want to go out with Tim, so she faked a stomachache.','茹絲不想和提姆約會，所以假裝胃痛。']]},
{word:'religious',pos:'a.',pron:'[rɪˈlɪdʒəs]',zh:'虔誠的；宗教的',concept:'與宗教有關或非常虔誠。',related:['religion','religious belief'],syn:['devout'],ant:['secular'],ex:[['The rational scientist is very religious.','這位理性的科學家對宗教非常虔誠。'],['Never talk about religious or political issues at social gatherings.','社交聚會中萬不要談論宗教或政治議題。']]},
{word:'strength',pos:'n.',pron:'[strɛŋθ]',zh:'力量；優點',concept:'可指力氣、強度或優勢。',related:['strong','strengthen'],syn:['power','advantage'],ant:['weakness'],ex:[['Operating this machine requires skill more than physical strength.','操作這臺機器需要的技巧比體力還多。'],['Please analyze the strengths and weaknesses of this proposal.','請針對這個提案分析它的優缺點。']]},
{word:'weakness',pos:'n.',pron:'[ˈwiknɪs]',zh:'虛弱；弱點',concept:'不足、弱項或身體虛弱。',related:['weak','weaken'],syn:['shortcoming','disadvantage'],ant:['strength','forte'],ex:[['You\'re not suitable for the job because of your physical weakness.','你身體虛弱，因此不適合這個工作。'],['Math is my weakness, but music is my forte.','數學是我的弱項，不過音樂卻是我的強項。']]},
{word:'vary',pos:'vi./vt.',pron:'[ˈvɛri]',zh:'變化；改變',concept:'在不同情況下有差異或改變。',related:['various','variety','variation'],syn:['differ','change'],ant:[],ex:[['The weather here varies between cool and very hot.','這裡的天氣變化很大，忽而涼爽忽而酷熱。'],['Tom varied the games he played with the children so as not to bore them.','湯姆更換和孩子們玩的遊戲，以免使他們感到無聊。']]},
{word:'various',pos:'a.',pron:'[ˈvɛriəs]',zh:'各式各樣的',concept:'有很多種類或不同形式。',related:['variation','variable','invariably'],syn:['different','diverse'],ant:['same'],ex:[['There have been various solutions to the problem.','這個問題有各式各樣的解決辦法。']]},
{word:'variety',pos:'n.',pron:'[vəˈraɪəti]',zh:'變化；種類',concept:'多樣性或種類。',related:['a variety of'],syn:['diversity','kind'],ant:[],ex:[['Peter is a workaholic; his life lacks variety.','彼得是個工作狂；他的生活缺乏變化。'],['The library offers a wide variety of books to choose from.','圖書館有各類書可供選擇。']]},
{word:'product',pos:'n.',pron:'[ˈprɑdʌkt]',zh:'產品；成果；結果',concept:'生產出來的東西或某過程造成的結果。',related:['produce','producer','productivity','by-product'],syn:['goods','result'],ant:[],ex:[['The country\'s main product is timber.','該國的主要產物是木材。'],['Nick\'s big muscles were the product of years spent in the gym.','尼克的結實肌肉是多年耗在健身房的成果。']]},
{word:'imagination',pos:'n.',pron:'[ɪˌmædʒəˈneʃən]',zh:'想像力',concept:'形成想法、影像或可能性的能力。',related:['image','imagine','imaginative','imaginary','imaginable'],syn:['creativity'],ant:[],ex:[['Use your imagination and see if you can come up with a better idea.','運用你的想像力，看看你能不能想出更好的辦法。']]},
{word:'prevent',pos:'vt.',pron:'[prɪˈvɛnt]',zh:'阻止；預防；避免',concept:'阻止某事發生或阻止某人做某事。',related:['prevention','preventive'],syn:['avoid','stop'],ant:['cause'],ex:[['Robert\'s sore legs prevented him from joining the marathon.','羅伯特腿痠使他無法參加馬拉松比賽。'],['Taking necessary precautions will prevent many accidents from happening.','採取必要的預防措施能防止許多意外的發生。']]},
{word:'response',pos:'n.',pron:'[rɪˈspɑns]',zh:'回應；回答；反應',concept:'對某事做出的答覆或反應。',related:['respond','responsive','responsibility'],syn:['reply','feedback'],ant:[],ex:[['Has there been any response to your letter?','你的信有回音了嗎？'],['In response to your letter dated July 1, we regret to say that we\'ll have to cancel the deal.','茲回覆臺端七月一日的來信，我們很遺憾表示，我們不得不取消這個交易。'],['Jason\'s response to my proposal was discouraging.','傑森對我的提議反應很令人沮喪。']]},
{word:'responsibility',pos:'n.',pron:'[rɪˌspɑnsəˈbɪləti]',zh:'責任',concept:'應該承擔或負責的事情。',related:['responsible','irresponsible'],syn:['duty'],ant:['irresponsibility'],ex:[['You should take responsibility for what you\'ve done.','你應該對自己做過的事負責。']]},
{word:'perform',pos:'vt./vi.',pron:'[pɚˈfɔrm]',zh:'執行；履行；表演；表現',concept:'執行任務、履行義務、演出或表現。',related:['performer','performance'],syn:['carry out','act'],ant:[],ex:[['The surgeon has performed this operation before.','該外科醫生以前動過這種手術。'],['The teacher told us to perform our civic duties.','老師告訴我們要盡市民的義務。'],['The young actor performed with such zest that there is no doubt that he will be awarded the prize for the most outstanding actor in the play.','這名年輕男演員的演出如此賣力，他將獲頒此劇的最佳男演員獎是無庸置疑的。'],['Much to my surprise, most of the students performed very well on the exam.','很讓我驚訝的是，大部分的學生這次考試表現得很好。']]},
{word:'performance',pos:'n.',pron:'[pɚˈfɔrməns]',zh:'表演；表現',concept:'演出或成績表現。',related:['perform'],syn:['show','achievement'],ant:[],ex:[['The famous actress gave a great performance in the play last night.','那位知名的女演員昨晚在舞臺劇中有精彩的演出。'],["I'm pleased that my son's academic performance is very good.",'我兒子的功課很好，這令我滿意。']]},
{word:'technique',pos:'n.',pron:'[tɛkˈnik]',zh:'技巧；手法',concept:'完成某事的方法或技術手法。',related:['technical'],syn:['method'],ant:[],ex:[['The artist was highly acclaimed for his painting techniques.','該藝術家的繪畫技巧受到高度讚揚。']]},
{word:'technical',pos:'a.',pron:'[ˈtɛknɪkl]',zh:'技術的；專門的',concept:'與技術或專業知識相關。',related:['technique','technical term'],syn:['specialized'],ant:[],ex:[['Frank studied auto repair at a technical school.','法蘭克在一所技術學校學汽車修護。']]},
{word:'normal',pos:'a.',pron:'[ˈnɔrml]',zh:'正常的',concept:'符合一般情況或常態。',related:['abnormal'],syn:['regular','usual'],ant:['abnormal'],ex:[['It\'s normal to feel nervous before a test.','考前會感到緊張是正常的。']]},
{word:'committee',pos:'n.',pron:'[kəˈmɪti]',zh:'委員會',concept:'由多人組成負責特定任務的團體。',related:['team'],syn:['board','council'],ant:[],ex:[['How many members are there on your committee?','你的委員會有多少人？']]},
{word:'achieve',pos:'vt.',pron:'[əˈtʃiv]',zh:'達成；達到',concept:'透過努力完成目標。',related:['achievement','accomplishment'],syn:['accomplish','attain','obtain'],ant:['fail'],ex:[['If you work hard, you will eventually achieve your goals.','如果你努力，最後終將達成目標。'],['At this time, this project is 95 percent achieved.','目前這項計畫已經完成了 95%。']]},
{word:'achievement',pos:'n.',pron:'[əˈtʃivmənt]',zh:'成就',concept:'努力後得到的成果。',related:['achieve','accomplishment'],syn:['accomplishment'],ant:[],ex:[['The achievements of computer technology have been incredible.','電腦科技的成就令人難以置信。'],['You\'ve made it into Harvard, Jim. That\'s quite an achievement.','吉姆，你成功進入哈佛大學。這真是一項了不起的成就。']]},
{word:'immediate',pos:'a.',pron:'[ɪˈmidɪɪt]',zh:'立即的；最接近的；直接的',concept:'沒有延遲、很接近或直接相關。',related:['immediately'],syn:['instant','direct'],ant:['delayed'],ex:[['There was an immediate response to Mary\'s request.','瑪莉的要求立刻得到回應。'],['The man\'s immediate heir was his son.','這位男子的直接繼承人就是他兒子。']]},
{word:'immediately',pos:'adv.',pron:'[ɪˈmidɪɪtli]',zh:'立刻；馬上',concept:'很快、沒有延遲。',related:['immediate'],syn:['instantly','shortly','right away','at once'],ant:[],ex:[["I went over immediately after I finished writing the letter.",'我一寫完信就立刻過去。']]},
{word:'magical',pos:'a.',pron:'[ˈmædʒɪkl]',zh:'魔術的；神奇的',concept:'像魔法般神奇。',related:['magically','magic','magician'],syn:['mysterious','wonderful'],ant:[],ex:[['No medicine is so magical that it can cure all illnesses.','沒有一種藥神奇到什麼病都能治。']]},
{word:'magician',pos:'n.',pron:'[məˈdʒɪʃən]',zh:'魔術師',concept:'表演魔術的人。',related:['magic','magical'],syn:['wizard'],ant:[],ex:[['The magician took out a rabbit from his hat.','魔術師從帽子裡抓出一隻兔子。']]},
{word:'expectation',pos:'n.',pron:'[ˌɛkspɛkˈteʃən]',zh:'期望；預期',concept:'對未來結果的期待。',related:['expect'],syn:['hope','anticipation'],ant:[],ex:[['If you lower your expectations, you\'ll never be disappointed.','假使你不多所期待，就永遠不會失望。'],["Without hard work, you can't meet your parents' expectations.",'你若不努力就不能達到你父母的期望。']]},
{word:'ongoing',pos:'a.',pron:'[ˈɑnˌɡoɪŋ]',zh:'前進的；不斷發展中的',concept:'持續進行或發展中。',related:['go on'],syn:['continuing'],ant:['finished'],ex:[['There is an ongoing crisis because that infectious disease is spreading quickly.','由於該傳染病蔓延得很快，因此危機一直存在。'],['The lawyer refused to comment on the ongoing case.','這名律師拒絕就該審理中的案件發表評論。']]},
{word:'underlying',pos:'a.',pron:'[ˌʌndɚˈlaɪɪŋ]',zh:'在下面的；隱含的；根本的',concept:'位於底下，或指深層、根本原因。',related:[],syn:['basic','hidden'],ant:['surface'],ex:[['The company drilled into the ground to get to the underlying reservoir of oil.','這間公司鑽入地面以便到達在其下的石油層。'],['It\'s difficult for such a young student to understand the underlying meaning of this novel.','要年紀這麼輕的學生了解這部小說隱含的意義是有難度的。'],['What are the underlying causes of this problem?','這個問題的根本原因是什麼？']]},
{word:'semester',pos:'n.',pron:'[səˈmɛstɚ]',zh:'學期',concept:'學校一段教學期間。',related:['term','spring semester','fall semester'],syn:['term'],ant:[],ex:[["I'm going to take 13 credits this semester.",'我這學期要修 13 個學分。']]},

const key='unit02_vocab_lab';let state=JSON.parse(localStorage.getItem(key)||'{"selected":"permit","level":1,"mastered":{},"wrong":[],"query":""}');let view='read';const $=s=>document.querySelector(s);function save(){localStorage.setItem(key,JSON.stringify(state));topStat()}function W(x=state.selected){return words.find(w=>w.word===x)||words[0]}function filtered(){let q=(state.query||'').toLowerCase();if(!q)return words;return words.filter(w=>[w.word,w.zh,w.pos,w.related.join(' '),w.syn.join(' '),w.ant.join(' '),w.ex.map(e=>e.join(' ')).join(' ')].join(' ').toLowerCase().includes(q))}function topStat(){let n=Object.keys(state.mastered).length;$('#stat').textContent=`${n} / ${words.length} mastered`;$('#bar').style.width=(n/words.length*100)+'%'}function chips(a,c=''){return (a||[]).length?a.map(x=>`<span class="chip ${c}">${x}</span>`).join(''):'<span class="small">No data</span>'}function speak(t){speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=.78;speechSynthesis.speak(u)}function esc(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}function hotSent(w){let s=esc(w.ex[0][0]);let re=new RegExp('\\b'+w.word+'s?\\b','i');if(re.test(s))return s.replace(re,m=>`<button class="hot ${state.selected===w.word?'active':''}" onclick="pick('${w.word}')">${m}</button>`);return `<button class="hot ${state.selected===w.word?'active':''}" onclick="pick('${w.word}')">${w.word}</button> — ${s}`}function card(w){return `<aside class="side"><div class="wordTop"><div><h2 class="word">${w.word}</h2><p class="pron">${w.pron}</p></div><span class="pos">${w.pos}</span></div><p class="zh">${w.zh}</p><p class="concept">${w.concept}</p><div class="block"><h3>Related Words</h3><div class="chips">${chips(w.related)}</div></div><div class="block"><h3>Synonyms</h3><div class="chips">${chips(w.syn,'syn')}</div></div><div class="block"><h3>Antonyms</h3><div class="chips">${chips(w.ant,'ant')}</div></div><div class="block"><h3>Examples</h3>${w.ex.map(e=>`<p class="ex"><strong>${e[0]}</strong><span>${e[1]}</span></p>`).join('')}</div><div class="btns"><button class="btn dark" onclick="speak('${w.word}')">朗讀</button><button class="btn primary" onclick="view='practice';renderPractice()">練這個字</button></div></aside>`}function renderRead(){view='read';let w=W(),arr=filtered();$('#main').innerHTML=`<section class="layout"><article class="reader"><h2>Unit 02 Example Context</h2><input class="search" value="${esc(state.query||'')}" placeholder="搜尋第 2 課單字、中文、相關詞，例如 permit / 責任 / 反義詞" oninput="state.query=this.value;save();renderRead()"><div class="article">${arr.map((x,i)=>`<div class="vline"><div class="sent"><b>${words.indexOf(x)+1}</b>${hotSent(x)}</div><div class="tr">${x.ex[0][1]}</div></div>`).join('')}</div><p class="hint">已加入第 2 課圖片中可辨識的單字。點藍色單字看右側卡片，再按「練這個字」進入分層測驗。</p></article>${card(w)}</section>`;nav()}function pick(x){state.selected=x;save();renderRead()}function addWrong(w,why){if(!state.wrong.some(x=>x.word===w.word&&x.why===why))state.wrong.unshift({word:w.word,zh:w.zh,why,time:new Date().toLocaleString()});save()}function sampleOptions(answer,field){let pool=words.filter(x=>x[field]!==answer).map(x=>x[field]);return [answer,...pool.sort(()=>Math.random()-.5).slice(0,3)].sort(()=>Math.random()-.5)}function qdata(){let w=W(),l=state.level;if(l===1)return {type:'choice',label:'Level 1 英選中',q:`${w.word} 的中文意思是？`,answer:w.zh,opts:sampleOptions(w.zh,'zh')};if(l===2)return {type:'choice',label:'Level 2 中選英',q:`${w.zh} 的英文是？`,answer:w.word,opts:sampleOptions(w.word,'word')};if(l===3){let e=w.ex[0][0].replace(new RegExp('\\b'+w.word+'s?\\b','i'),'______');return {type:'choice',label:'Level 3 例句填空',q:e,answer:w.word,opts:sampleOptions(w.word,'word')}}return {type:'input',label:'Level 4 主動輸出',q:`請輸入英文：${w.zh}`,answer:w.word}}function renderPractice(){view='practice';let w=W(),q=qdata();$('#main').innerHTML=`<section class="panel"><h2>分層測驗：${w.word}</h2><div class="levels">${[1,2,3,4].map(n=>`<button class="level ${state.level===n?'active':''}" onclick="state.level=${n};save();renderPractice()">Level ${n}</button>`).join('')}</div><div class="qcard"><small>${q.label}</small><p class="q">${q.q}</p></div>${q.type==='choice'?`<div class="options">${q.opts.map(o=>`<button class="opt" onclick="checkChoice(this,${JSON.stringify(o).replaceAll('"','&quot;')})">${o}</button>`).join('')}</div>`:`<input class="input" id="answer" placeholder="輸入英文單字"><div class="btns"><button class="btn primary" onclick="checkInput()">檢查</button><button class="btn" onclick="nextWord()">下一個字</button></div>`}<div class="feedback" id="fb">答題後會顯示例句與中文解析。</div></section>`;if($('#answer'))$('#answer').focus();nav()}function checkChoice(btn,val){let w=W(),q=qdata();document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.textContent===q.answer)b.classList.add('correct')});if(val===q.answer){btn.classList.add('correct');state.mastered[w.word]=true;$('#fb').textContent=`正確\n${w.ex[0][0]}\n${w.ex[0][1]}`}else{btn.classList.add('wrong');addWrong(w,q.label);$('#fb').textContent=`錯誤。答案：${q.answer}\n${w.ex[0][0]}\n${w.ex[0][1]}`}save()}function checkInput(){let w=W(),v=$('#answer').value.trim().toLowerCase();if(v===w.word.toLowerCase()){state.mastered[w.word]=true;$('#fb').textContent=`正確\n${w.ex[0][0]}\n${w.ex[0][1]}`}else{addWrong(w,'Level 4 主動輸出');$('#fb').textContent=`錯誤。答案：${w.word}\n${w.ex[0][0]}\n${w.ex[0][1]}`}save()}function nextWord(){let arr=filtered(),i=arr.findIndex(x=>x.word===state.selected);state.selected=arr[(i+1+arr.length)%arr.length].word;save();renderPractice()}function renderReview(){view='review';let arr=state.wrong;$('#main').innerHTML=`<section class="panel"><h2>錯題複習</h2>${arr.length?`<div class="list">${arr.map(x=>`<div class="row"><div><strong>${x.word}</strong><br><span>${x.zh}｜${x.why}</span></div><button class="btn" onclick="state.selected='${x.word}';save();renderPractice()">重練</button></div>`).join('')}</div><br><button class="btn" onclick="state.wrong=[];save();renderReview()">清空錯題</button>`:'<div class="feedback">目前沒有錯題。分層測驗答錯會自動加入。</div>'}</section>`;nav()}function renderMap(){view='map';$('#main').innerHTML=`<section class="panel"><h2>字族總覽</h2><div class="list">${words.map(w=>`<div class="row"><div><strong>${w.word}</strong><br><span>${w.pos}｜${w.zh}<br>Related: ${w.related.join(' / ')}<br>Antonyms: ${w.ant.join(' / ')}</span></div><button class="btn" onclick="state.selected='${w.word}';save();renderRead()">閱讀</button></div>`).join('')}</div></section>`;nav()}function nav(){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.view===view));topStat()}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{if(b.dataset.view==='read')renderRead();if(b.dataset.view==='practice')renderPractice();if(b.dataset.view==='review')renderReview();if(b.dataset.view==='map')renderMap()});topStat();renderRead();
</script></body></html>
