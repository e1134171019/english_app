window.VOCAB_UNIT={"no":"24","storageKey":"unit24_vocab_wrong_v1","irregular":{"clip":["clip","clips","clipped","clipping"],"hatch":["hatch","hatches","hatched","hatching"],"hug":["hug","hugs","hugged","hugging"],"leak":["leak","leaks","leaked","leaking"],"scrub":["scrub","scrubs","scrubbed","scrubbing"],"sting":["sting","stings","stung","stinging"],"tow":["tow","tows","towed","towing"],"bomb":["bomb","bombs","bombed","bombing"]},"words":[{"word":"chimney","zh":"煙囪","pos":"n.","ipa":"/ˈtʃɪmni/","bookNo":"1","family":["smoke like a chimney"],"syn":[],"ant":[],"ex":[["Charlie smoked like a chimney all night, worrying about his missing daughter.","查理整晚菸抽個不停，擔心他失蹤的女兒。"]]},{"word":"clip","zh":"迴紋針；紙夾；夾住；剪去、修剪","pos":"n. / vt.","ipa":"/klɪp/","bookNo":"2","family":["clip–clipped–clipped","paper clip","stationery","tack","press a tack to the wall","thumbtack"],"syn":["fasten","trim"],"ant":["release"],"ex":[["We need more office stationery for our work.","我們的工作需要更多的文具。"],["I need some clips to hold these papers together.","我需要一些迴紋針或紙夾把這些文件夾在一起。"],["Mother asked me to clip the receipts together for her.","媽媽要我幫她把這些收據夾起來。"],["Mr. Smith spent the whole afternoon clipping rose bushes in his backyard.","史密斯先生整個下午都在後院修剪玫瑰叢。"],["Jack used a tack to fix the note onto the bulletin board.","傑克用圖釘將字條釘在布告欄上。"],["George got hurt when he tried to tack the letter to the wall.","喬治試著用圖釘把那封信按到牆上的時候弄傷了自己。"]]},{"word":"countable","zh":"可數的","pos":"adj.","ipa":"/ˈkaʊntəbəl/","bookNo":"3","family":["countless","uncountable","countable noun","uncountable noun"],"syn":["enumerable"],"ant":["uncountable"],"ex":[["The word dog is a countable noun, whereas the word water is an uncountable noun.","dog 這個字是可數名詞，而 water 這個字則是不可數名詞。"]]},{"word":"dearly","zh":"非常；昂貴地；付出很大代價地","pos":"adv.","ipa":"/ˈdɪrli/","bookNo":"4","family":["cost somebody dearly","cost somebody greatly","greatly","deeply","arrogance"],"syn":["greatly","deeply"],"ant":["slightly"],"ex":[["Henry loves his family dearly. He is willing to do anything for them.","亨利非常愛他的家人。他願意為他們做任何事。"],["John’s arrogance and laziness cost him dearly—he has no job, nor does he have any friends.","約翰的自大和懶惰令他付出慘痛代價——他沒工作，也沒有朋友。"],["The mistake cost the company dearly.","這項錯誤讓公司付出很大的代價。"]]},{"word":"energetic","zh":"精力充沛的","pos":"adj.","ipa":"/ˌenərˈdʒetɪk/","bookNo":"5","family":["energy","active","dynamic","vigorous","persistent"],"syn":["active","vigorous"],"ant":["lethargic"],"ex":[["Modern women are energetic, ambitious and, most of all, persistent in the pursuit of their goals.","現代女性有活力、有雄心，而且最重要的是，有毅力追求自己的目標。"]]},{"word":"fairy","zh":"妖精；仙子；妖精般的、仙子般的","pos":"n. / adj.","ipa":"/ˈferi/","bookNo":"6","family":["fairies","a fairy tale","folklore","tiny","fairy princess"],"syn":["sprite"],"ant":[],"ex":[["Fairies are often described in folklore as tiny, mysterious creatures.","民間傳說常把妖精描繪成體型極小且神祕的生物。"],["Children love to hear fairy tales.","孩子們喜歡聽童話故事。"],["Jessica liked to dress up as a fairy princess when she was little.","潔西卡小時候喜歡裝扮成仙女般的公主。"]]},{"word":"fireworks","zh":"煙火（恆用複數）","pos":"n.","ipa":"/ˈfaɪərwɜːrks/","bookNo":"7","family":["set off fireworks","firecracker","firecrackers","set off firecrackers"],"syn":[],"ant":[],"ex":[["Last night’s fireworks were really impressive.","昨晚的煙火秀真讓人印象深刻。"],["In the evening, colorful fireworks were set off along the river in celebration of the National Day.","晚間時，有人沿著河畔施放五彩繽紛的煙火慶祝國慶。"]]},{"word":"greenhouse","zh":"溫室","pos":"n.","ipa":"/ˈɡriːnhaʊs/","bookNo":"8","family":["the greenhouse effect","lighthouse","cast a light"],"syn":[],"ant":[],"ex":[["The greenhouse effect is raising ocean temperatures worldwide.","溫室效應使得全球海洋持續升溫。"],["The lighthouse cast a light onto the sea to guide the ships.","燈塔投射一道光到海面上，以指引船隻。"]]},{"word":"housekeeper","zh":"管家；家庭主婦","pos":"n.","ipa":"/ˈhaʊskiːpər/","bookNo":"9","family":["housewife","housewives","butler"],"syn":["domestic worker"],"ant":[],"ex":[["Since you are so busy, you should hire a housekeeper to take care of your house.","既然你這麼忙，你應該雇用一名管家照顧你的房子。"]]},{"word":"hairdresser","zh":"美髮師","pos":"n.","ipa":"/ˈherdresər/","bookNo":"10","family":["hair","haircut","get a haircut","hairdo","hairstyle","barbershop","barber","beauty parlor","hair salon"],"syn":["hairstylist"],"ant":[],"ex":[["A hairdresser is one whose job is to cut, style, and color people’s hair.","美髮師的工作就是為人剪髮、做造型及染髮。"],["Bob swore he would never go to that barbershop again because none of his friends seemed to appreciate his new haircut.","鮑伯發誓再也不去那家理髮店了，因為他朋友似乎都不欣賞他的新髮型。"]]},{"word":"hatch","zh":"孵化；祕密擬定；艙口、艙門","pos":"vi. / vt. / n.","ipa":"/hætʃ/","bookNo":"11","family":["hatches","hatch a plan","hatch a plot"],"syn":["incubate","devise"],"ant":[],"ex":[["The hen is sitting on the eggs waiting for them to hatch.","母雞正坐在蛋上孵這些蛋。"],["Don’t count your chickens before they hatch.","勿打如意算盤。"],["Those people hatched a plan to overthrow the government.","那些人策劃要推翻政府。"],["The bad guy in the movie opened the hatch and jumped out of the plane.","電影裡的歹徒打開艙門，然後跳出了飛機。"]]},{"word":"hug","zh":"擁抱","pos":"n. / vt.","ipa":"/hʌɡ/","bookNo":"12","family":["hug–hugged–hugged","give somebody a big hug","give somebody a warm hug","embrace"],"syn":["embrace"],"ant":[],"ex":[["John gave his girlfriend a big hug when they met at the airport.","在機場見到女友時，約翰熱情地擁抱她。"],["Dan’s parents hugged him as soon as he returned home after several years’ traveling in Asia.","丹在亞洲旅行多年之後，一回到家，他的父母便立刻擁抱他。"]]},{"word":"kangaroo","zh":"袋鼠","pos":"n.","ipa":"/ˌkæŋɡəˈruː/","bookNo":"13","family":["kangaroos","koala","Australia"],"syn":[],"ant":[],"ex":[["Many tourists have been attacked by wild kangaroos recently.","近來有許多遊客遭到野生袋鼠攻擊。"]]},{"word":"keyboard","zh":"電腦、樂器的鍵盤","pos":"n.","ipa":"/ˈkiːbɔːrd/","bookNo":"14","family":["computer keyboard","electronic keyboard","wrist strain"],"syn":[],"ant":[],"ex":[["This computer keyboard is designed to reduce wrist strain.","這組電腦鍵盤是專門為減少手腕壓力所設計的。"]]},{"word":"kit","zh":"成套工具","pos":"n.","ipa":"/kɪt/","bookNo":"15","family":["a first-aid kit","a tool kit","handy","have something handy"],"syn":["set"],"ant":[],"ex":[["When you’re at home, it’s always a good idea to have a first-aid kit handy in case of emergency.","你在家裡隨時都要準備好急救箱以備緊急之需，這種作法一向是個好點子。"]]},{"word":"lace","zh":"蕾絲；花邊；鞋帶；用花邊等裝飾","pos":"n. / vt.","ipa":"/leɪs/","bookNo":"16","family":["be trimmed with lace","trim","a pair of shoelaces","laces","undone","lace at the front"],"syn":["cord"],"ant":[],"ex":[["Peggy is wearing a beautiful evening gown which is trimmed with black lace.","佩姬穿著一件有黑色蕾絲鑲邊的美麗晚禮服。"],["Be careful! Your laces are undone.","小心點！你的鞋帶沒綁好。"],["Mary’s favorite clothing is a blouse that laces at the front.","瑪莉最喜歡的衣服是前面有花邊的上衣。"]]},{"word":"leak","zh":"漏水、油、瓦斯等","pos":"vi. / n.","ipa":"/liːk/","bookNo":"17","family":["leaky","leaking","gas leak","The roof is leaking.","a leaky roof"],"syn":["seep"],"ant":["seal"],"ex":[["Oil was leaking out of the truck.","那輛卡車正在漏油。"],["Over 50 factory workers were rushed to the hospital due to a gas leak.","由於瓦斯外洩，有五十多名工廠員工被緊急送醫。"],["The roof is leaking.","這屋頂漏水。"],["This is a leaky roof.","這是漏水的屋頂。"]]},{"word":"scrub","zh":"用力擦；擦洗、擦淨","pos":"vt.","ipa":"/skrʌb/","bookNo":"18","family":["scrub–scrubbed–scrubbed","give the floor a good scrub","give the table a good scrub","mop"],"syn":["scour"],"ant":[],"ex":[["Julie was busy scrubbing the floor while her husband prepared dinner.","茱莉忙著刷洗地板，而老公則在煮晚餐。"],["Jane told her husband to give the floors a good scrub.","珍叫她先生要使勁擦地板。"]]},{"word":"scarf","zh":"圍巾","pos":"n.","ipa":"/skɑːrf/","bookNo":"19","family":["scarfs","scarves"],"syn":["wrap"],"ant":[],"ex":[["The scarf you’re wearing looks great. Where did you get it?","你戴的這條圍巾真好看。哪兒買的？"]]},{"word":"pearl","zh":"珍珠","pos":"n.","ipa":"/pɜːrl/","bookNo":"20","family":["a string of pearls","cast pearls before swine","swine","pearly","pearly white teeth"],"syn":[],"ant":[],"ex":[["I bought this pearl necklace at a bargain price.","我用很便宜的價錢買到了這串珍珠項鍊。"],["I bought John a very good English dictionary, and he now uses it as a pillow. It was just like casting pearls before swine.","我買了本很好的英文字典給約翰，他現在卻把它當枕頭用，真是暴殄天物啊。"],["Susan has pearly white teeth.","蘇珊有一口潔白的牙齒。"]]},{"word":"poster","zh":"海報","pos":"n.","ipa":"/ˈpoʊstər/","bookNo":"21","family":["put up a poster"],"syn":["placard"],"ant":[],"ex":[["Mary put up a poster of Madonna on the wall.","瑪莉在牆上貼上瑪丹娜的海報。"]]},{"word":"sausage","zh":"香腸","pos":"n.","ipa":"/ˈsɔːsɪdʒ/","bookNo":"22","family":["German sausages","beer"],"syn":[],"ant":[],"ex":[["This restaurant is famous for its German sausages and beer.","這家餐廳以它的德國香腸和啤酒聞名。"]]},{"word":"shovel","zh":"鏟子；鏟雪","pos":"n. / vt.","ipa":"/ˈʃʌvəl/","bookNo":"23","family":["shove","shove somebody out of the way","spade"],"syn":["spade"],"ant":[],"ex":[["John used a shovel to shovel the snow away from his front door.","約翰用鏟子把前門的積雪剷除。"]]},{"word":"spice","zh":"香料；情趣、風味；加香料於；為某事增添趣味","pos":"n. / vt.","ipa":"/spaɪs/","bookNo":"24","family":["spicy","spicy food","spice up","cinnamon","Variety is the spice of life."],"syn":["seasoning"],"ant":[],"ex":[["The chef told Peter that he could add some spices to his foods.","廚師告訴彼得可以在食物中添加一些香料。"],["The cook spiced the food with cinnamon.","廚師用肉桂來為這食物調味。"],["Lisa and Steve are trying to spice up their marriage.","麗莎和史提夫想為他們的婚姻生活增添一些情趣。"],["Variety is the spice of life.","變化是人生的香料；生活應有變化才有情趣。"]]},{"word":"starve","zh":"使飢餓；挨餓","pos":"vt. / vi.","ipa":"/stɑːrv/","bookNo":"25","family":["be starving","starve to death","starvation"],"syn":["go hungry"],"ant":["feed"],"ex":[["All the prisoners of war here have been starved and ill treated.","這裡所有的戰犯都沒飯可吃，而且還被虐待。"],["These poor kids are starving to death. Do you have any food?","這些可憐的孩子餓壞了。你有什麼吃的嗎？"]]},{"word":"sting","zh":"刺、螫、叮；螫針；刺、螫傷處","pos":"vt. / n.","ipa":"/stɪŋ/","bookNo":"26","family":["sting–stung–stung","stinger","bee sting","bee stings"],"syn":["prick"],"ant":[],"ex":[["Stay away from the bees. They might sting you.","離那些蜜蜂遠一點。牠們可能會螫你。"],["The insect may be small, but it has a powerful sting.","這隻昆蟲也許體型很小，不過牠有一根強而有力的螫針。"],["Robert had several bee stings after his walk in the park.","羅伯特在公園散步後被蜜蜂螫了幾下。"]]},{"word":"tame","zh":"溫馴的；馴服","pos":"adj. / vt.","ipa":"/teɪm/","bookNo":"27","family":["obedient","docile","wild"],"syn":["docile","domesticate"],"ant":["wild"],"ex":[["Strange to say, the wild horse became very tame as soon as it saw me.","說來奇怪，那頭野馬一見到我就變得溫馴極了。"],["It takes skill and a lot of energy to tame a wild horse.","馴服野馬需要技巧和充沛的體力。"]]},{"word":"thirst","zh":"口渴；渴望","pos":"n. / vi.","ipa":"/θɜːrst/","bookNo":"28","family":["quench one’s thirst","thirst for something","long for something","thirsty"],"syn":["craving"],"ant":["satisfaction"],"ex":[["I need a glass of water to quench my thirst.","我需要一杯水止渴。"],["Rebecca goes to the library in her free time to quench her thirst for knowledge.","蕾貝卡有空時就到圖書館去，以滿足其求知慾。"],["Rebecca goes to the library in her free time to satisfy her thirst for knowledge.","蕾貝卡有空時就到圖書館去，以滿足其求知慾。"],["We all thirst for peace.","我們大家都渴望和平。"]]},{"word":"tow","zh":"拖、拉；拖走；牽引","pos":"vt.","ipa":"/toʊ/","bookNo":"29","family":["tow something away","give somebody a tow"],"syn":["pull","haul"],"ant":["push"],"ex":[["All illegally parked cars are to be towed away.","違規停車的車輛全部要被拖吊。"],["When my car broke down, a kind man offered to give me a tow.","我的汽車拋錨時，有個好心人幫忙把我的車拖走。"]]},{"word":"vase","zh":"花瓶","pos":"n.","ipa":"/veɪs/","bookNo":"30","family":["a vase of flowers"],"syn":[],"ant":[],"ex":[["I bumped into a table and broke a vase.","我撞到桌子，打破了一個花瓶。"]]},{"word":"lollipop","zh":"棒棒糖","pos":"n.","ipa":"/ˈlɑːlipɑːp/","bookNo":"31","family":["suck on a lollipop"],"syn":[],"ant":[],"ex":[["You should brush your teeth after eating the lollipop, Johnny.","強尼，吃完棒棒糖後應該要去刷牙。"]]},{"word":"teenage","zh":"青少年的","pos":"adj.","ipa":"/ˈtiːneɪdʒ/","bookNo":"32","family":["teenaged","teenager","teens","adolescent"],"syn":["adolescent"],"ant":["adult"],"ex":[["My teenage daughter loves rock ’n’ roll.","我正值青春期的女兒熱愛搖滾樂。"]]},{"word":"tank","zh":"坦克車；槽；油箱","pos":"n.","ipa":"/tæŋk/","bookNo":"33","family":["a water tank","a fuel tank","a gas tank","tanker","fill the tank"],"syn":["container"],"ant":[],"ex":[["The tank smashed through the building at a high speed.","坦克車以高速衝進大樓。"],["We need to clean the water tank this weekend.","這個週末我們要清洗水塔。"],["We should fill the tank with gas before we set out.","出發前我們應該把油箱加滿。"]]},{"word":"bacteria","zh":"細菌（複數）","pos":"n.","ipa":"/bækˈtɪriə/","bookNo":"34","family":["bacterium","germ","virus","handrail"],"syn":["germs"],"ant":[],"ex":[["Handrails are covered in bacteria.","扶手上都是細菌。"]]},{"word":"bay","zh":"海灣","pos":"n.","ipa":"/beɪ/","bookNo":"35","family":["keep somebody at bay","keep somebody at a distance","gulf","mansion"],"syn":["gulf"],"ant":[],"ex":[["Polly lives in a beautiful mansion overlooking the bay.","波莉住在一棟美麗的豪宅，可以俯瞰整個海灣。"],["Believing that Peter is not a nice guy, Mary’s father asked her to keep him at bay.","瑪莉的父親認為彼得不是個好人，要她與他保持距離。"]]},{"word":"bomb","zh":"炸彈；轟炸","pos":"n. / vt.","ipa":"/bɑːm/","bookNo":"36","family":["a bomb squad","bomber","bombard","mine","missile","time bomb"],"syn":["explosive"],"ant":[],"ex":[["The time bomb went off at 10, killing all the people around.","那枚定時炸彈在十點鐘引爆，周圍所有的人全部喪生。"],["The terrorists bombed the city again.","恐怖分子又再轟炸這座城市。"]]},{"word":"cave","zh":"山洞","pos":"n.","ipa":"/keɪv/","bookNo":"37","family":["a cave-in"],"syn":["cavern"],"ant":[],"ex":[["The cave was dark and scary.","這個山洞既黑且嚇人。"]]},{"word":"flute","zh":"長笛","pos":"n.","ipa":"/fluːt/","bookNo":"38","family":["play the flute"],"syn":[],"ant":[],"ex":[["John plays the flute very well.","約翰笛子吹得很好。"]]},{"word":"razor","zh":"剃刀；刮鬍刀","pos":"n.","ipa":"/ˈreɪzər/","bookNo":"39","family":["a razor blade","shaver","blade","disposable","disposable chopsticks"],"syn":["shaver"],"ant":[],"ex":[["I bought some disposable razors for my trip overseas.","為了要海外旅遊，我買了一些拋棄式刮鬍刀。"],["The razor blade is dull, so you have to replace it with a new one.","這片刮鬍刀片鈍了，你需要更換一片新的。"]]},{"word":"magnet","zh":"磁鐵","pos":"n.","ipa":"/ˈmæɡnət/","bookNo":"40","family":["magnetic","nail"],"syn":[],"ant":[],"ex":[["The boy picked up the nails with a magnet.","男孩子用一塊磁鐵吸起這些釘子。"]]}]};
