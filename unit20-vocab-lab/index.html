  words:[{"word":"import","zh":"進口；進口品","pos":"vt. / n.","ipa":"/ˈɪmpɔːrt/","bookNo":"1","family":["import something to + 地方","import something from + 地方","export","export something to + 地方","export something from + 地方"],"syn":["bring in"],"ant":["export"],"ex":[["Most cheeses in that store are imported from France.","那家店的起司大多是從法國進口。"],["Millions of cheap imports from India enter European markets each year.","每年都有大量的廉價進口品從印度進入歐洲市場。"],["Cheap toys made in that country are exported to the US in large numbers every year.","那個國家製造的便宜玩具每年都大量出口到美國。"],["Oil is the major export of Saudi Arabia.","石油是沙烏地阿拉伯主要的出口品。"]]},{"word":"tribe","zh":"部落","pos":"n.","ipa":"/traɪb/","bookNo":"2","family":["tribal","distinctive","tribal traditions and cultures"],"syn":["clan"],"ant":[],"ex":[["Each of the tribes has its distinctive tribal traditions and cultures.","每個部落都有其獨特的部落習俗與文化。"]]},{"word":"leisure","zh":"閒暇；空閒時間","pos":"n.","ipa":"/ˈliːʒər/","bookNo":"3","family":["at one’s leisure","at one’s free time","leisurely","lead a leisurely life","live a leisurely life"],"syn":["free time"],"ant":["work"],"ex":[["What do you usually do at your leisure?","你空閒時通常做些什麼事？"],["Playing chess is a leisure activity that requires a lot of mental effort.","下棋是個需要許多心力的休閒活動。"]]},{"word":"gum","zh":"牙齦（複數）；口香糖（不可數）","pos":"n.","ipa":"/ɡʌm/","bookNo":"4","family":["chewing gum","bubble gum","a stick of chewing gum","a piece of chewing gum","a pack of chewing gum"],"syn":[],"ant":[],"ex":[["I went to see a dentist for my sore gums.","因為牙齦疼痛，我去看了牙醫。"],["The driver chewed gum to keep himself awake.","司機嚼著口香糖，好保持清醒。"]]},{"word":"awake","zh":"醒來；清醒的","pos":"vi. / adj.","ipa":"/əˈweɪk/","bookNo":"5","family":["awake–awoke–awoken","be awake to something","wake up","wake–woke–woken","awaken","awaken somebody to something","waken"],"syn":["wakeful","alert"],"ant":["asleep"],"ex":[["It was raining outside when Dylan awoke.","狄倫醒來時，外面正在下雨。"],["Lisa was wide awake the whole night, fearing the worst.","麗莎整晚都沒睡，擔心最壞的情況會發生。"],["John doesn’t seem to be awake to the dangers of smoking.","約翰似乎不了解抽菸的危險。"],["Bill was awakened by a strange noise in the middle of the night.","比爾在半夜被奇怪的聲響吵醒。"],["Bill was woken up by a strange noise in the middle of the night.","比爾在半夜被奇怪的聲響吵醒。"],["We should awaken Brad to the dangers of taking drugs.","我們應喚醒布萊德了解吸毒的危險。"]]},{"word":"heap","zh":"一堆；堆滿","pos":"n. / vt.","ipa":"/hiːp/","bookNo":"6","family":["a heap of...","a pile of..."],"syn":["pile"],"ant":[],"ex":[["There is a heap of dirty clothes on Jack’s bed.","傑克床上有一堆髒衣服。"],["The teenager heaped her dirty clothes in the corner instead of washing them.","這名少女把髒衣服堆在角落而不把它們拿去洗。"]]},{"word":"ivory","zh":"象牙；象牙材質；象牙製品；乳白色的","pos":"n. / adj.","ipa":"/ˈaɪvəri/","bookNo":"7","family":["ivories","live in an ivory tower","tusk","ivory paint"],"syn":["off-white"],"ant":[],"ex":[["A grown male elephant has two long tusks of ivory.","成年公象有兩條象牙。"],["The politician lives in an ivory tower and has no understanding of ordinary people’s problems.","這名政客活在象牙塔裡，無視普通老百姓的問題。"],["The rich man has a collection of ivories from all over the world.","這位有錢人擁有來自全世界的象牙製品。"],["Darren wanted to use ivory paint, but his wife wanted to use white.","戴倫想漆乳白色的，但他太太想漆白色的。"]]},{"word":"stubborn","zh":"頑固的","pos":"adj.","ipa":"/ˈstʌbərn/","bookNo":"8","family":["be as stubborn as a mule","mule","talk some sense into somebody","greedy","be greedy for...","greed","optimistic","be optimistic about...","optimism"],"syn":["obstinate"],"ant":["flexible"],"ex":[["Jane wanted to try traveling abroad all by herself, but her stubborn parents wouldn’t let her.","珍想嘗試獨自出國旅行，但她固執的父母親不答應。"],["Can someone help me talk some sense into this man? He’s as stubborn as a mule!","有人能幫我說通這個人，讓他明理一點嗎？他簡直像騾一樣固執！"],["The young man is greedy for power.","那個年輕人貪圖權力。"],["Investors are still relatively optimistic about the company’s prospects.","投資人對該公司的前景仍舊相當樂觀。"]]},{"word":"rid","zh":"使擺脫；擺脫了的","pos":"vt. / adj.","ipa":"/rɪd/","bookNo":"9","family":["rid–rid–rid","rid somebody/something of something","get rid of somebody/something","nuisance"],"syn":["remove","free"],"ant":["retain"],"ex":[["The police chief promised he would do whatever he could to rid the city of crime.","警察局長承諾將竭盡所能讓該城免於犯罪侵擾。"],["We all felt it was a great relief to get rid of Bob. He was such a nuisance.","能擺脫鮑伯，大家都鬆了口氣。他真的很惹人厭。"]]},{"word":"moist","zh":"潮溼的；溼潤的","pos":"adj.","ipa":"/mɔɪst/","bookNo":"10","family":["damp","humid","moisture","dampness","moist soil","a damp shirt"],"syn":["damp"],"ant":["dry"],"ex":[["The warm and moist climate here makes it a perfect place for tropical fruits.","該地溫暖且溼潤的氣候很適合種熱帶水果。"],["Frogs live near wet places to keep their skin moist.","青蛙靠近溼地居住以保持表皮溼潤。"],["Moisture is taken out of the air by this machine, after which it turns into water.","溼氣被這臺機器從空氣裡抽出，之後便轉變成水。"]]},{"word":"laundry","zh":"待洗衣物（集合名詞；不可數）","pos":"n.","ipa":"/ˈlɔːndri/","bookNo":"11","family":["do the laundry","do the dishes"],"syn":["washing"],"ant":[],"ex":[["I used to do the laundry once a week when I lived in a dormitory.","我以前住宿舍時一星期洗一次衣服。"]]},{"word":"chill","zh":"寒冷；感冒；恐懼；寒意；使冷卻；寒冷的","pos":"n. / vt. / vi. / adj.","ipa":"/tʃɪl/","bookNo":"12","family":["catch a chill","catch a cold","a chill of fear","chill somebody to the bone","chill out","chilly","cold"],"syn":["cold"],"ant":["warmth"],"ex":[["I felt the chill in the air when I left home this morning and realized that winter was around the corner.","今天早上我出門時感受到一陣寒意，知道冬天就要到了。"],["Dry your hair before you go out, or you’ll catch a chill.","把你頭髮吹乾再出門，不然你會著涼的。"],["David suddenly realized, with a chill of fear, that his business partners had been plotting against him.","大衛倒抽一口涼氣，突然發現自己的生意合夥人一直對他圖謀不軌。"],["After playing in the snow all morning, Jeff was chilled to the bone.","傑夫玩了一個早上的雪，他凍僵了。"],["Emma told her friend to chill the white wine before drinking it.","艾瑪告訴她的朋友在飲用白酒前要冰鎮一下。"],["Chill out! We’ve got loads of time to get to the airport.","放鬆點！我們有很多時間能抵達機場。"],["When I left the front door open, a chill wind blew through the house.","我讓前門開啟時，一陣冷風吹進屋內。"],["It is getting chilly in here. Let’s turn the heater on.","這裡頭越來越冷了。把暖氣打開吧。"]]},{"word":"headline","zh":"（報紙）標題；給……加標題","pos":"n. / vt.","ipa":"/ˈhedlaɪn/","bookNo":"13","family":["be in the headlines","hit the headlines","grab the headlines","make the headlines","heading","title"],"syn":["heading","title"],"ant":[],"ex":[["The financial scandal has been in the headlines for weeks.","這則財經醜聞已被媒體大肆報導了好幾週。"],["The front-page story was headlined, “Political Crisis at City Hall.”","這個頭版報導下的標題是：「市政府的政治危機。」"],["What’s the heading of that article you mentioned?","你提到的那篇文章標題是什麼？"]]},{"word":"bleed","zh":"流血","pos":"vi.","ipa":"/bliːd/","bookNo":"14","family":["bleed–bled–bled","bleed like a stuck pig","bleed heavily","bleeding","bloody","blood","violent"],"syn":["hemorrhage"],"ant":[],"ex":[["After being hit in the face with a volleyball, Tom’s nose kept bleeding.","被排球打中臉部後，湯姆的鼻子一直流血不停。"],["The criminal fell down on his back after being shot by police, bleeding like a stuck pig.","被警方射擊後，該名罪犯仰天倒地，流了很多血。"],["The driver’s bloody leg was tied up immediately.","司機流血的那條腿馬上就被包紮起來了。"],["Many people consider boxing to be a bloody and violent sport.","許多人認為拳擊是一項血腥且殘暴的運動。"]]},{"word":"dash","zh":"衝撞；急奔；短跑比賽","pos":"vt. / n.","ipa":"/dæʃ/","bookNo":"15","family":["dash to...","make a dash for...","dash somebody’s dreams","sprint"],"syn":["rush","sprint"],"ant":[],"ex":[["Frank dashed to the toilet as soon as the film was over.","電影一結束，法蘭克馬上急奔廁所。"],["Frank made a dash for the toilet as soon as the film was over.","電影一結束，法蘭克馬上急奔廁所。"],["Mary dashed John’s dreams when she told him she had no interest in him at all.","瑪莉告訴約翰她對他一點興趣都沒有，讓約翰的夢想全都落空了。"],["Phoebe won first prize in the women’s 100-meter dash.","菲比贏得女子一百公尺短跑比賽第一名。"]]},{"word":"robe","zh":"長袍；浴袍","pos":"n.","ipa":"/roʊb/","bookNo":"16","family":["bathrobe","dressing gown"],"syn":["gown"],"ant":[],"ex":[["The judge was wearing a black robe.","那位法官穿著黑色長袍。"],["Bryan put on his robe before he went to answer the door.","布萊恩去應門前，先穿上了他的浴袍。"],["Bryan put on his bathrobe before he went to answer the door.","布萊恩去應門前，先穿上了他的浴袍。"]]},{"word":"icy","zh":"結冰的；冰涼的","pos":"adj.","ipa":"/ˈaɪsi/","bookNo":"17","family":["icy cold","iced","iced tea","icy tea"],"syn":["frozen","cold"],"ant":["warm"],"ex":[["Be careful! The sidewalk is icy.","小心點！人行道上都結冰了。"],["Nothing beats a glass of iced tea on a hot day.","大熱天一杯冰茶比什麼都好。"]]},{"word":"screw","zh":"螺絲；用螺絲鎖；擰緊；搞砸","pos":"n. / vt. / vi.","ipa":"/skruː/","bookNo":"18","family":["screw A to B","screw up","mess up","screwdriver","wrench","hammer"],"syn":["fasten"],"ant":[],"ex":[["I used strong screws to fix the shelf to the wall.","我用大螺絲釘把這個架子固定在牆上。"],["The benches in the park are screwed to the ground.","公園內的長凳被用螺絲鎖到地面上。"],["Handle this problem with care. Don’t screw up.","謹慎處理這個問題。別搞砸了。"],["Toby screwed up his life with drugs.","托比的人生讓毒品給毀了。"],["Toby messed up his life with drugs.","托比的人生讓毒品給毀了。"]]},{"word":"pottery","zh":"陶器（集合名詞；不可數）","pos":"n.","ipa":"/ˈpɑːtəri/","bookNo":"19","family":["porcelain","vase","auction"],"syn":["ceramics"],"ant":[],"ex":[["Bill has a fine collection of pottery.","比爾收藏了一批很棒的陶器。"],["I bought this porcelain vase at an auction.","我在一場拍賣會上買了這只瓷花瓶。"]]},{"word":"vitamin","zh":"維他命","pos":"n.","ipa":"/ˈvaɪtəmɪn/","bookNo":"20","family":["Vitamin C","crucial"],"syn":[],"ant":[],"ex":[["Vitamin C is crucial for healthy gums.","維他命C對牙齦的健康很重要。"]]},{"word":"ache","zh":"疼痛；渴望；疼痛","pos":"vi. / n.","ipa":"/eɪk/","bookNo":"21","family":["ache for something","long for something","have a headache","have a toothache","have a backache","have a stomachache"],"syn":["hurt","pain"],"ant":[],"ex":[["My heart ached when I saw images of bony-faced children in refugee camps on TV.","看著電視畫面中難民營裡臉頰削瘦的幼童，我很心痛。"],["I’m so tired that I’m aching for a good sleep.","我好累，因此好想要好好睡一下。"],["Nick had an ache in his shoulder when he woke up yesterday morning.","昨天早上尼克醒來時，他肩膀痛。"],["I had a toothache and didn’t sleep a wink last night.","我牙痛，昨晚都沒睡過眼。"]]},{"word":"sometime","zh":"某個時候（與明確的時間並用）","pos":"adv.","ipa":"/ˈsʌmtaɪm/","bookNo":"22","family":["some time","sometimes","at times","on occasion","occasionally","someday","some day","one day"],"syn":["at an unspecified time"],"ant":[],"ex":[["Let’s meet sometime next week to discuss the details of our plan, all right?","我們下星期找個時間見面，討論一下計畫的細節，好嗎？"],["I met John sometime last week.","上星期某個時候我曾見到約翰。"],["I call on my grandparents in the country sometimes.","我有時候會到鄉下看我爺爺奶奶。"],["Ryan always believes he’ll become a millionaire someday.","萊恩總是認為他有朝一日會成為百萬富翁。"],["I’m busy now, but I’ll do it one day.","我現在很忙，不過我有一天會做這件事。"],["I ran into John downtown one day.","有一天我在城裡碰見了約翰。"]]},{"word":"heal","zh":"使身體或心理的傷口痊癒","pos":"vi. / vt.","ipa":"/hiːl/","bookNo":"23","family":["cure","recover","heal the sick","Time heals all wounds."],"syn":["cure","recover"],"ant":["injure"],"ex":[["My broken leg is gradually healing, but the doctor said it’ll take me three more weeks to fully recover.","我斷掉的腿正慢慢在復原，不過醫生說還要再三個禮拜才會完全康復。"],["Some people claim they can heal the sick by simply touching them with their hands.","有些人宣稱他們藉著用手碰觸病患便能使他們復原。"],["Time heals all wounds.","時間可療合所有的傷口。"]]},{"word":"jungle","zh":"叢林；競爭激烈的環境（可數）","pos":"n.","ipa":"/ˈdʒʌŋɡl/","bookNo":"24","family":["a concrete jungle","forest","woods","stronghold","trek","wilderness"],"syn":["forest"],"ant":[],"ex":[["They said the rebels had a stronghold deep in the jungle.","據說叛軍在叢林深處有個據點。"],["Many people consider big cities to be jungles because you have to watch out for yourself.","許多人認為大都市就像叢林，因為你必須時時提防以求自保。"],["After trekking through the wilderness of New Zealand, Peter returned to his life in the concrete jungle.","經過一趟紐西蘭野外之旅後，彼得又重回都市的水泥叢林生活。"]]},{"word":"pave","zh":"鋪（路）","pos":"vt.","ipa":"/peɪv/","bookNo":"25","family":["pave the way for...","pavement","sidewalk","merger"],"syn":["surface"],"ant":[],"ex":[["The construction workers were busy paving the road.","建築工人正忙著鋪路。"],["The decision paved the way for a future merger with another company.","這個決定為日後與別家公司合併打下基礎。"],["David fell from his bike and his head hit the pavement.","大衛從腳踏車上摔下來，頭撞到了人行道。"]]},{"word":"sword","zh":"劍","pos":"n.","ipa":"/sɔːrd/","bookNo":"26","family":["swordsman","knight","duel","The pen is mightier than the sword.","mighty"],"syn":["blade"],"ant":[],"ex":[["The young man drew his sword and challenged the knight to a duel.","年輕人拔出了他的劍，向騎士要求決鬥。"],["The pen is mightier than the sword.","文勝於武。"]]},{"word":"armed","zh":"武裝的","pos":"adj.","ipa":"/ɑːrmd/","bookNo":"27","family":["be armed with...","armed robbery","unarmed"],"syn":["equipped"],"ant":["unarmed"],"ex":[["The bank robber was armed with only a knife.","那個銀行搶匪僅持有一把刀。"],["The armed robbery took place this morning.","那宗持械搶案發生在今天早上。"]]},{"word":"canyon","zh":"峽谷","pos":"n.","ipa":"/ˈkænjən/","bookNo":"28","family":["gorge","the Grand Canyon","the Taroko Gorge","crayon"],"syn":["gorge"],"ant":[],"ex":[["Have you ever visited the Grand Canyon in Arizona?","你有去過亞利桑納州的大峽谷嗎？"]]},{"word":"sprain","zh":"扭到；扭傷","pos":"vt. / n.","ipa":"/spreɪn/","bookNo":"29","family":["twist","wrench"],"syn":["twist"],"ant":[],"ex":[["Paula tripped on her shoelaces and sprained her ankle.","寶拉踩到自己的鞋帶，因而扭傷了腳踝。"],["Larry suffered a bad wrist sprain during the basketball game.","賴瑞在籃球比賽中手腕嚴重扭傷。"]]},{"word":"dive","zh":"跳水；俯衝；急跌","pos":"vi. / vt. / n.","ipa":"/daɪv/","bookNo":"30","family":["dive–dived/dove–dived","dive into...","take a dive","skydive","go skydiving"],"syn":["plunge"],"ant":[],"ex":[["The boys took off their clothes and dived into the river.","男孩們脫下衣服跳進河裡去。"],["The swimmer got ready for her dive into the water.","這位女泳者準備好跳水。"],["Global markets took a dive last night after the US election results.","昨晚全球市場在美國選舉結果公布後重挫。"]]},{"word":"violet","zh":"紫羅蘭；紫羅蘭色的","pos":"n. / adj.","ipa":"/ˈvaɪələt/","bookNo":"31","family":["tulip"],"syn":["purple"],"ant":[],"ex":[["Violets are my grandmother’s favorite flowers.","紫羅蘭是我祖母最愛的花。"],["The violet carpet in the bedroom made Kelly feel relaxed.","臥室的紫羅蘭色地毯讓凱莉覺得很放鬆。"],["Tulips are on sale today at the flower shop.","這家花店今天鬱金香特價。"]]}]
