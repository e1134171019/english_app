<script>
window.VOCAB_UNIT={"no":"21","storageKey":"unit21_vocab_wrong_v1","irregular":{"chat":["chat","chats","chatted","chatting"],"chop":["chop","chops","chopped","chopping"],"bud":["bud","buds","budded","budding"],"bump":["bump","bumps","bumped","bumping"],"spoil":["spoil","spoils","spoiled","spoilt","spoiling"],"invent":["invent","invents","invented","inventing"],"dump":["dump","dumps","dumped","dumping"],"brake":["brake","brakes","braked","braking"],"slice":["slice","slices","sliced","slicing"],"zipper":["zipper","zippers","zippered","zippering"],"best-seller":["best-seller","best-sellers"],"buffet":["buffet","buffets","buffeted","buffeting"]},"words":[{"word":"luggage","zh":"行李（英；不可數）","pos":"n.","ipa":"/ˈlʌɡɪdʒ/","bookNo":"1","family":["不可說：a luggage / two luggages / many luggages","a piece of luggage","two pieces of luggage","a lot of luggage","claim one’s luggage","baggage（美；不可數）","baggage allowance"],"syn":["baggage"],"ant":[],"ex":[["Don’t forget to claim your luggage before you leave the airport.","在你離開機場前，別忘了領取行李。"],["Be sure to check the baggage allowance for your airline.","記得要確認你搭乘的航空公司行李允載重量限制。"],["How many pieces of baggage or luggage do you have with you?","你隨身帶了多少件行李？"]]},{"word":"excellence","zh":"傑出；優異","pos":"n.","ipa":"/ˈeksələns/","bookNo":"2","family":["excellent","excel in...","excel at...","excel in / at painting","be good at painting"],"syn":["superiority","distinction"],"ant":["inferiority"],"ex":[["Professor Burton is well-known for his academic excellence.","波頓教授因其學術優異表現廣為人知。"],["I’m amazed at Peter’s excellence in Chinese calligraphy.","我很驚訝地發現彼得書法寫得真棒。"]]},{"word":"spoil","zh":"（食物）腐敗；寵壞；破壞","pos":"vi. / vt.","ipa":"/spɔɪl/","bookNo":"3","family":["spoil–spoiled/spoilt–spoiled/spoilt","go bad","ruin","Spare the rod, spoil the child."],"syn":["ruin","damage"],"ant":["preserve"],"ex":[["Food tends to spoil quickly in summer.","夏天食物容易腐敗。"],["Food tends to go bad quickly in summer.","夏天食物容易腐敗。"],["You will spoil your children if you give them whatever they want.","如果小孩要什麼就給什麼，你會把他們寵壞的。"],["The continuous rain has spoiled our plan to go fishing today.","持續下雨破壞了我們今天要去釣魚的計畫。"]]},{"word":"novelist","zh":"小說家","pos":"n.","ipa":"/ˈnɑːvəlɪst/","bookNo":"4","family":["novel","an average Joe"],"syn":["writer","author"],"ant":[],"ex":[["Ken was just an average Joe until he wrote the book. He is a famous novelist now.","在寫那本書之前，肯不過是個無名小卒。他現在可是位名小說家了。"]]},{"word":"invent","zh":"發明；捏造","pos":"vt.","ipa":"/ɪnˈvent/","bookNo":"5","family":["invent a story","make up a story","invention","inventive","inventor","alibi"],"syn":["create","devise","make up"],"ant":[],"ex":[["Some people claim that Bell didn’t invent the telephone.","某些人主張電話不是貝爾發明的。"],["Al invented many stories to cover his lies.","艾爾編造出許多故事來掩飾謊言。"],["Al made up many stories to cover his lies.","艾爾編造出許多故事來掩飾謊言。"],["The criminal invented an alibi to deceive the judge.","那名犯人捏造了不在場證明欺騙法官。"],["Edison was one of the greatest inventors of the twentieth century.","愛迪生是二十世紀最偉大的發明家之一。"]]},{"word":"cheerful","zh":"愉快的","pos":"adj.","ipa":"/ˈtʃɪrfəl/","bookNo":"6","family":["a cheerful tone"],"syn":["happy","pleasant"],"ant":["gloomy","sad"],"ex":[["Ruth can speak in a cheerful tone even when she is really mad.","即使茹絲很生氣，她還是可以用愉快的語調說話。"]]},{"word":"gossip","zh":"八卦；閒言閒語；聊八卦","pos":"n. / vi.","ipa":"/ˈɡɑːsɪp/","bookNo":"7","family":["gossip about...","rumor","hearsay","keep somebody up to date"],"syn":["rumor","hearsay"],"ant":[],"ex":[["My friend Ruby always keeps me up to date with the latest gossip about celebrities.","我的朋友露比總是會告訴我最新的名人八卦。"],["The staff members spent a whole afternoon in the office doing nothing but gossiping about their boss.","這些職員花了一整個下午在辦公室啥都沒做，盡聊老闆的八卦。"]]},{"word":"dump","zh":"丟棄；隨意扔；甩掉、分手；垃圾集中處","pos":"vt. / n.","ipa":"/dʌmp/","bookNo":"8","family":["dump somebody","walk out on somebody","ditch","ditch somebody","drain","jerk"],"syn":["discard","ditch"],"ant":["keep"],"ex":[["The police finally found the stolen car, which had been dumped near the beach.","警方最後尋獲了這輛失竊的車子，它被丟棄在海灘附近。"],["That guy is really a jerk. I’m glad Lucy dumped him.","那個傢伙是個混球。我很高興露西甩了他。"],["Mom asked me to take the garbage bag to the dump.","媽媽要我把那包垃圾拿去丟在垃圾集中處。"],["Farmers use ditches for draining water.","農夫利用溝渠來排水。"],["The boss ditched the project because it was impractical.","老闆丟棄了該企畫案，因為它不切實際。"],["Judy was heartbroken when Johnny ditched her at the party last night.","茱蒂很傷心，強尼在昨晚的派對上把她給甩了。"]]},{"word":"dairy","zh":"乳酪業；乳品業","pos":"n.","ipa":"/ˈderi/","bookNo":"9","family":["dairies","diary","keep a diary","dairy products"],"syn":["milk industry"],"ant":[],"ex":[["Dairy products, such as cheese and butter, are produced from milk.","像是起司和奶油等的乳酪產品，是由牛奶做成的。"]]},{"word":"jar","zh":"罐（尤指玻璃罐）","pos":"n.","ipa":"/dʒɑːr/","bookNo":"10","family":["container","a jar of peanut butter"],"syn":["container"],"ant":[],"ex":[["I bought a jar of peanut butter at the supermarket.","我在超市買了一罐花生醬。"]]},{"word":"sticky","zh":"黏的；（天氣）溼熱的","pos":"adj.","ipa":"/ˈstɪki/","bookNo":"11","family":["stick","sweat like a pig"],"syn":["adhesive","muggy"],"ant":["dry"],"ex":[["I was sweating like a pig because it was hot and sticky.","因為天氣又溼熱又黏，我流了滿身大汗。"]]},{"word":"advanced","zh":"先進的；進階的；年高的","pos":"adj.","ipa":"/ədˈvænst/","bookNo":"12","family":["advance","in advance","beforehand","advanced learners","at an advanced age"],"syn":["modern","progressive"],"ant":["basic","outdated"],"ex":[["The landlord told us to pay the rent a week in advance.","房東要我們提前一週付房租。"],["This digital camera is the most advanced model on the market.","這臺數位相機是市面上最先進的機種。"],["This dictionary is for advanced learners of English.","這本字典適用於進階的英文學習者。"],["Mrs. Anderson died at an advanced age.","安德森太太高齡過世。"]]},{"word":"bacon","zh":"培根","pos":"n.","ipa":"/ˈbeɪkən/","bookNo":"13","family":["bring home the bacon","support one’s family","be responsible for the livelihood of one’s family"],"syn":[],"ant":[],"ex":[["A typical English breakfast includes eggs, bacon, sausages, baked beans, and a cup of tea.","典型的英式早餐包括蛋、培根、香腸、烤豆跟一杯茶。"],["Who brings home the bacon in your house?","你們家是誰負責維持生計的？"],["Who is responsible for the livelihood of your family?","你們家是誰負責維持生計的？"]]},{"word":"bait","zh":"餌；設誘餌","pos":"n. / vt.","ipa":"/beɪt/","bookNo":"14","family":["take the bait","bait something with...","con artist","conman"],"syn":["lure"],"ant":[],"ex":[["The con artist used a small amount of money as bait to cheat the old man out of all his life savings.","這名金光黨用一小筆錢做餌，把老翁的畢生積蓄全騙走了。"],["Do you think you can have the car for free? Don’t take the bait!","你以為你可以免費得到那輛車嗎？別上當！"],["My father baited the trap with a piece of meat.","我父親用一塊肉來當陷阱的餌。"]]},{"word":"beast","zh":"野獸；兇殘的人","pos":"n.","ipa":"/biːst/","bookNo":"15","family":["monster","monstrous"],"syn":["animal","monster"],"ant":["human"],"ex":[["The power of reason is believed to be the chief difference between man and beasts.","理性被認為是人跟獸的主要區別。"],["Stay away from that beast. He might hurt you.","遠離那個兇巴巴的傢伙。他可能會傷害你。"],["The witch turned the animal into a monster.","巫婆把那隻動物變成了怪物。"]]},{"word":"berry","zh":"莓；果子","pos":"n.","ipa":"/ˈberi/","bookNo":"16","family":["strawberry","blueberry","cranberry","mulberry","cherry","cherry lips"],"syn":[],"ant":[],"ex":[["Tom picked some berries from that bush and popped them into his mouth.","湯姆從樹叢裡採了一些果子塞進嘴裡。"],["Mr. Brown grew a cherry tree in his backyard.","布朗先生在後院種了一棵櫻桃樹。"],["Tina’s cherry lips left a bright mark on the little boy’s cheek.","提娜的鮮紅色嘴唇在小男孩的臉頰上留下一抹鮮明的印記。"]]},{"word":"best-seller","zh":"暢銷貨（尤指書）","pos":"n.","ipa":"/ˌbestˈselər/","bookNo":"17","family":["sell like hot cakes"],"syn":["hit"],"ant":[],"ex":[["The writer’s latest novel has been a best-seller for over 20 weeks.","該作家最新出版的小說二十多週以來都很暢銷。"]]},{"word":"pancake","zh":"煎餅","pos":"n.","ipa":"/ˈpænkeɪk/","bookNo":"18","family":["jelly","dessert"],"syn":[],"ant":[],"ex":[["Can I have some of your pancakes? I’m starving.","我可以吃點你的煎餅嗎？我好餓喔。"],["Tonight we’ll have some jelly for dessert.","今晚我們的甜點是果凍。"]]},{"word":"brake","zh":"煞車；制動器；煞車","pos":"n. / vi.","ipa":"/breɪk/","bookNo":"19","family":["put on the brakes","apply the brakes","break","a break in the pipe","windshield"],"syn":["stop"],"ant":["accelerate"],"ex":[["Nicole put on the brakes all of a sudden and my head almost hit the windshield.","妮可突然踩煞車，害我的頭差點撞上擋風玻璃。"],["Wendy braked to avoid hitting a stray dog.","溫蒂煞車以避免撞到流浪狗。"],["We found a break in the pipe.","我們發現水管有一道裂痕。"]]},{"word":"bud","zh":"芽；花苞；發苞、結苞","pos":"n. / vi.","ipa":"/bʌd/","bookNo":"20","family":["bud–budded–budded","be in bud","nip something in the bud","nip"],"syn":["sprout"],"ant":[],"ex":[["The roses in my backyard are in bud.","我後院的玫瑰結苞了。"],["You’d better nip the problem in the bud before it worsens.","你最好在問題惡化前解決它。"],["Global warming has caused plants in this area to bud early in recent years.","全球暖化造成該區植物近年提早發苞。"]]},{"word":"yolk","zh":"蛋黃","pos":"n.","ipa":"/joʊk/","bookNo":"21","family":["egg white"],"syn":[],"ant":["egg white"],"ex":[["An egg is made up of the yolk and the white.","蛋是由蛋黃和蛋白所組成。"]]},{"word":"buffet","zh":"自助餐；打擊","pos":"n. / vt.","ipa":"/bəˈfeɪ/；/ˈbʌfɪt/","bookNo":"22","family":["all-you-can-eat buffet","pig out","be buffeted by...","strike"],"syn":["smorgasbord","strike"],"ant":[],"ex":[["It’s an all-you-can-eat buffet, so take whatever you want and pig out!","這是吃到飽的自助吧，所以想吃什麼儘管拿，吃個痛快吧！"],["Many African countries are buffeted by civil war.","許多非洲國家都受到內戰摧殘。"]]},{"word":"bump","zh":"碰撞；腫塊；隆起之處；重擊","pos":"vi. / n.","ipa":"/bʌmp/","bookNo":"23","family":["bump into somebody","run across somebody","bump into something","bumper","bumpy","a bumpy road"],"syn":["collide","run into"],"ant":[],"ex":[["I bumped into an old friend of mine on the street last night.","我昨晚在街上巧遇老友。"],["The brakes suddenly failed, and the car bumped into a tree.","煞車突然失靈，然後車子撞上了樹。"],["How did you get that bump on your head?","你頭上腫一塊是怎麼來的？"],["James got a bad bump on his head when he fell down the stairs.","詹姆士從樓梯上摔下來時，他的頭部受到重擊。"]]},{"word":"carpenter","zh":"木匠","pos":"n.","ipa":"/ˈkɑːrpəntər/","bookNo":"24","family":["carpentry","mason","plumber","tailor","a tailor-made suit","a custom-made suit","a ready-made suit"],"syn":["woodworker"],"ant":[],"ex":[["A few carpenters were hired by the government to reconstruct the temple.","政府僱用了幾名木匠進行寺廟的重建工作。"],["The tailor makes the man.","人靠衣裝，佛靠金裝。"]]},{"word":"chat","zh":"聊天；閒談","pos":"vi. / n.","ipa":"/tʃæt/","bookNo":"25","family":["chat–chatted–chatted","chat with somebody","have a chat with somebody","the chat room","chat over dinner"],"syn":["talk","conversation"],"ant":[],"ex":[["We had a good time chatting over dinner last night.","我們昨晚吃晚餐邊吃邊聊很愉快。"],["We had a pleasant chat over dinner last night.","我們昨晚吃晚餐邊吃邊聊很愉快。"]]},{"word":"chop","zh":"切；砍；帶骨的肉塊","pos":"vt. / n.","ipa":"/tʃɑːp/","bookNo":"26","family":["chop–chopped–chopped","chop down","get the chop","get the boot","get the sack","be fired","a pork chop","a lamb chop","印章、圖章"],"syn":["cut","hack"],"ant":[],"ex":[["Workers were busy chopping down trees in the forest.","工人正在樹林裡忙著砍樹。"],["Wendy got the chop after she was found stealing from the company.","溫蒂被發現偷公司錢後遭到開除。"],["That restaurant serves the finest grilled lamb chops in town.","那家餐廳供應鎮上最好的烤羊排。"]]},{"word":"slice","zh":"一片；削、切","pos":"n. / vt.","ipa":"/slaɪs/","bookNo":"27","family":["a slice of bread / cheese / pizza / ham","a piece of bread / cheese / pizza / ham","loaf","loaves","a loaf of bread","loaf around","play around"],"syn":["piece","cut"],"ant":[],"ex":[["Jerry grabbed a slice of bread and then rushed to work.","傑瑞抓了片麵包後就匆匆去上班了。"],["Mom sliced some onions and dumped them into the cooking pot.","媽媽切了一些洋蔥然後丟進鍋裡。"],["We bought a loaf of bread at the bakery.","我們在麵包店買了一條麵包。"],["Billy and I loafed around in the park after school.","比利和我放學後在公園裡閒晃。"]]},{"word":"circus","zh":"馬戲團","pos":"n.","ipa":"/ˈsɜːrkəs/","bookNo":"28","family":["clown","crow","crown"],"syn":["big top"],"ant":[],"ex":[["Sammy was so happy when her father promised to take her to the circus on Saturday night.","爸爸答應星期六晚上帶她去看馬戲團表演時，珊米高興極了。"],["The funny clown made all of the children happy.","滑稽的小丑讓所有的孩子很開心。"]]},{"word":"clinic","zh":"診所","pos":"n.","ipa":"/ˈklɪnɪk/","bookNo":"29","family":["a dental clinic","make an appointment"],"syn":["medical center"],"ant":[],"ex":[["Have you made an appointment with the local clinic?","你有沒有跟當地那家診所先預約看診？"]]},{"word":"stool","zh":"凳子；高腳椅","pos":"n.","ipa":"/stuːl/","bookNo":"30","family":["couch","bar stool","bartender"],"syn":["seat"],"ant":[],"ex":[["Roger sat on the bar stool drinking beer and talking to the bartender.","羅傑坐在酒館高腳椅上，邊喝酒邊跟酒保聊天。"]]},{"word":"zipper","zh":"拉鍊；拉上拉鍊","pos":"n. / vt.","ipa":"/ˈzɪpər/","bookNo":"31","family":["zip","zip–zipped–zipped","zip up a coat","zipper something shut","a piece of junk"],"syn":["fastener"],"ant":["unzip"],"ex":[["The zipper of the jacket I just bought is not working. What a piece of junk!","這件夾克的拉鍊剛買就壞掉。真是爛貨！"],["My keys fell out of my backpack because I forgot to zipper it shut.","我忘了把背包的拉鍊拉上，所以鑰匙掉出來了。"],["Can you help me zip up my dress?","你可以幫我把洋裝拉鍊拉上嗎？"]]},{"word":"cable","zh":"電纜","pos":"n.","ipa":"/ˈkeɪbəl/","bookNo":"32","family":["a cable car","cable TV"],"syn":["wire"],"ant":[],"ex":[["We have to pay to watch cable TV.","我們得付費才能收看有線電視。"]]},{"word":"cart","zh":"手推車；（馬、牛等動物拉的）貨運車","pos":"n.","ipa":"/kɑːrt/","bookNo":"33","family":["put the cart before the horse","horse-drawn cart"],"syn":["wagon","trolley"],"ant":[],"ex":[["The cart was full of fruit and vegetables.","手推車上滿是蔬果。"],["The horse-drawn cart is loaded with fruit and vegetables.","這輛馬車載滿了蔬果。"],["Brushing your teeth before eating is putting the cart before the horse.","吃東西前刷牙是本末倒置。"]]}]};
