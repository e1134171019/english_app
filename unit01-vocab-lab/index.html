<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Unit 01 Vocab Trainer</title>
<style>
:root{--bg:#f6f7fb;--ink:#111827;--muted:#6b7280;--card:#fff;--line:#e5e7eb;--blue:#2563eb;--blue2:#1d4ed8;--green:#16a34a;--amber:#f59e0b;--red:#ef4444;--shadow:0 18px 60px rgba(17,24,39,.10);--r:26px}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}button,input{font:inherit}button{cursor:pointer;border:0}.app{min-height:100dvh;display:grid;grid-template-rows:auto 1fr auto;max-width:760px;margin:auto;padding:18px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;flex-direction:column;gap:2px}.brand strong{font-size:20px}.brand span,.meta{color:var(--muted);font-size:13px}.progress{height:10px;background:#e9eefb;border-radius:999px;overflow:hidden;margin:16px 0}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--blue),#60a5fa);border-radius:999px;transition:.25s}.screen{display:grid;align-content:center;gap:16px}.card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:34px;box-shadow:var(--shadow);padding:28px;min-height:520px;display:grid;grid-template-rows:auto 1fr auto;gap:18px}.cardHead{display:flex;justify-content:space-between;align-items:center}.tag{font-size:13px;font-weight:800;color:var(--blue);background:#eff6ff;padding:7px 11px;border-radius:999px}.count{color:var(--muted);font-weight:700}.mainWord{display:grid;place-items:center;text-align:center}.word{font-size:clamp(62px,14vw,120px);font-weight:950;letter-spacing:-.08em;line-height:.9}.pron{margin-top:12px;color:var(--muted);font-size:18px}.meaning{font-size:30px;font-weight:900;line-height:1.25;margin:0}.hint{color:var(--muted);line-height:1.7;margin:8px 0 0}.layers{display:grid;gap:12px}.layer{display:none;background:#f9fafb;border:1px solid var(--line);border-radius:20px;padding:16px}.layer.show{display:block}.layer h3{margin:0 0 10px;font-size:14px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{background:#eef2ff;color:#3730a3;border-radius:999px;padding:7px 10px;font-weight:800}.ant{background:#fff1f2;color:#be123c}.syn{background:#ecfdf5;color:#047857}.ex{margin:8px 0 0;padding-left:14px;border-left:4px solid #93c5fd}.ex strong{display:block;line-height:1.55}.ex span{display:block;color:var(--muted);margin-top:4px;line-height:1.55}.controls{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{border-radius:18px;padding:15px 16px;font-weight:900;background:#e5e7eb;color:#111827}.primary{background:var(--blue);color:white}.speak{background:#111827;color:white}.grade{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.again{background:#fee2e2;color:#991b1b}.good{background:#dcfce7;color:#166534}.easy{background:#dbeafe;color:#1d4ed8}.bottomNav{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding-top:14px}.navBtn{border-radius:16px;padding:13px 8px;background:#fff;border:1px solid var(--line);font-weight:900;color:var(--muted)}.navBtn.active{background:#111827;color:#fff}.panel{background:#fff;border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:22px}.panel h2{margin:0 0 14px}.list{display:grid;gap:10px}.row{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);border-radius:18px;padding:14px}.row strong{font-size:20px}.row span{color:var(--muted);font-size:14px}.input{width:100%;border:1px solid var(--line);border-radius:18px;padding:16px;font-size:20px;font-weight:800}.feedback{white-space:pre-wrap;background:#f9fafb;border:1px solid var(--line);border-radius:18px;padding:15px;line-height:1.7}.hide{display:none}@media(max-width:560px){.app{padding:12px}.card{min-height:calc(100dvh - 190px);padding:22px;border-radius:28px}.controls,.grade{grid-template-columns:1fr}.word{font-size:76px}.bottomNav{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(246,247,251,.2),#f6f7fb 38%);padding-bottom:8px}}
</style>
</head>
<body>
<div class="app">
<header class="top"><div class="brand"><strong>Unit 01 Vocabulary</strong><span id="modeText">看單字 → 回想 → 顯示答案 → 分級</span></div><div class="meta" id="score">0 learned</div></header>
<div class="progress"><div class="bar" id="bar"></div></div>
<main class="screen" id="screen"></main>
<nav class="bottomNav"><button class="navBtn active" data-mode="learn">學習</button><button class="navBtn" data-mode="quiz">測驗</button><button class="navBtn" data-mode="review">複習</button><button class="navBtn" data-mode="all">總覽</button></nav>
</div>
<script>
const words=[{word:"unite",pos:"v.",pron:"[juˈnaɪt]",zh:"使聯合；團結",concept:"把原本分散的人、團體或力量整合成一體。",related:["unity","union","united","reunion"],syn:["join","combine","connect"],ant:["divide","separate","split"],ex:[['Our goal is to unite the labor unions to oppose the new policy.','我們的目標是聯合這些勞工團體反對這項新政策。'],['We should unite, or we\'ll be defeated by the enemy.','我們要團結，否則會被敵人擊潰。']]},{word:"unity",pos:"n.",pron:"[ˈjuːnəti]",zh:"一致；團結",concept:"強調整體一致、沒有分裂，也可指作品或劇情的一致性。",related:["unite","union","united"],syn:["teamwork","harmony","togetherness"],ant:["division","conflict","disunity"],ex:[['Without unity, we\'ll face failure.','我們若不團結，就會面臨失敗。'],['The plot of the drama lacks unity.','這齣戲的劇情缺乏一致性。'],['In unity there is strength.','團結就是力量。']]},{word:"union",pos:"n.",pron:"[ˈjuːnjən]",zh:"工會；聯合",concept:"可以指由人組成的組織，也可以指兩種事物的結合。",related:["unite","unity","reunion"],syn:["association","alliance","organization"],ant:["separation","division"],ex:[['The union decided to go on strike due to the low wages.','由於薪資偏低，因此該工會決定罷工。'],['This car is a perfect union of beauty and technology.','這輛車子是美與科技的完美結合。']]},{word:"remain",pos:"vi.",pron:"[rɪˈmeɪn]",zh:"繼續存在；仍是",concept:"事情改變後，某個狀態、人或物仍然保留。",related:["remaining","remains"],syn:["stay","continue","keep"],ant:["leave","disappear","go away"],ex:[['No one remained in the hall soon after the concert was over.','音樂會結束沒多久，大廳裡一個人影都不剩了。'],['Though divorced, Anna and David still remain friends.','雖然離婚了，安娜和大衛仍是朋友。'],['The problem still remains unsolved.','這個問題仍然一直沒被解決。']]}];
const key='unit01_vocab_state_v3';let state=JSON.parse(localStorage.getItem(key)||'{"i":0,"done":{},"review":[]}');let mode='learn',revealed=0;const $=s=>document.querySelector(s);function save(){localStorage.setItem(key,JSON.stringify(state));updateTop()}function cur(){return words[state.i%words.length]}function updateTop(){const learned=Object.keys(state.done||{}).length;$('#score').textContent=`${learned}/${words.length} learned`;$('#bar').style.width=(learned/words.length*100)+'%'}function chip(a,c=''){return a.map(x=>`<span class="chip ${c}">${x}</span>`).join('')}function speak(t){if(!speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=.78;speechSynthesis.speak(u)}function next(){state.i=(state.i+1)%words.length;revealed=0;save();renderLearn()}function grade(level){const w=cur();state.done[w.word]=level;if(level==='again'&&!state.review.includes(w.word))state.review.push(w.word);save();next()}function renderLearn(){mode='learn';$('#modeText').textContent='看單字 → 回想意思 → 顯示答案 → Again / Good / Easy';const w=cur();$('#screen').innerHTML=`<section class="card"><div class="cardHead"><span class="tag">${w.pos}</span><span class="count">${state.i+1} / ${words.length}</span></div><div class="mainWord"><div><div class="word">${w.word}</div><div class="pron">${w.pron}</div></div></div><div class="layers"><div class="layer ${revealed>=1?'show':''}"><h3>Meaning</h3><p class="meaning">${w.zh}</p><p class="hint">${w.concept}</p></div><div class="layer ${revealed>=2?'show':''}"><h3>Word Family</h3><div class="chips">${chip(w.related)}</div></div><div class="layer ${revealed>=3?'show':''}"><h3>Synonyms / Antonyms</h3><div class="chips">${chip(w.syn,'syn')}${chip(w.ant,'ant')}</div></div><div class="layer ${revealed>=4?'show':''}"><h3>Examples</h3>${w.ex.map(e=>`<p class="ex"><strong>${e[0]}</strong><span>${e[1]}</span></p>`).join('')}</div></div><div class="controls"><button class="btn speak" onclick="speak('${w.word}')">朗讀</button><button class="btn primary" id="reveal">${revealed<4?'顯示下一層':'已全部顯示'}</button></div><div class="grade"><button class="btn again" onclick="grade('again')">Again</button><button class="btn good" onclick="grade('good')">Good</button><button class="btn easy" onclick="grade('easy')">Easy</button></div></section>`;$('#reveal').onclick=()=>{if(revealed<4)revealed++;renderLearn()};updateNav()}function renderQuiz(){mode='quiz';$('#modeText').textContent='主動輸出：看到中文，自己打英文';const w=cur();$('#screen').innerHTML=`<section class="card"><div class="cardHead"><span class="tag">Active Recall</span><span class="count">${state.i+1} / ${words.length}</span></div><div class="mainWord"><div><p class="meaning">${w.zh}</p><p class="hint">${w.concept}</p></div></div><input class="input" id="answer" placeholder="輸入英文單字"><div class="feedback" id="fb">提示：${w.pos} ${w.pron}</div><div class="controls"><button class="btn" onclick="next();renderQuiz()">跳過</button><button class="btn primary" id="check">檢查</button></div></section>`;$('#check').onclick=()=>{const ok=$('#answer').value.trim().toLowerCase()===w.word.toLowerCase();if(ok){state.done[w.word]='quiz';save();$('#fb').textContent=`正確\n${w.ex[0][0]}\n${w.ex[0][1]}`}else{if(!state.review.includes(w.word))state.review.push(w.word);save();$('#fb').textContent=`錯誤，答案是：${w.word}\n${w.ex[0][0]}\n${w.ex[0][1]}`}};$('#answer').addEventListener('keydown',e=>{if(e.key==='Enter')$('#check').click()});$('#answer').focus();updateNav()}function renderReview(){mode='review';$('#modeText').textContent='只看你按 Again 或答錯的單字';const items=state.review.map(x=>words.find(w=>w.word===x)).filter(Boolean);$('#screen').innerHTML=`<section class="panel"><h2>Review Queue</h2>${items.length?`<div class="list">${items.map(w=>`<div class="row"><div><strong>${w.word}</strong><br><span>${w.zh}</span></div><button class="btn" onclick="state.i=words.findIndex(x=>x.word==='${w.word}');revealed=0;renderLearn()">練習</button></div>`).join('')}</div><br><button class="btn" onclick="state.review=[];save();renderReview()">清空複習清單</button>`:'<div class="feedback">目前沒有複習單字。學習時按 Again 或測驗答錯會加入這裡。</div>'}</section>`;updateNav()}function renderAll(){mode='all';$('#modeText').textContent='快速總覽與跳轉';$('#screen').innerHTML=`<section class="panel"><h2>All Words</h2><div class="list">${words.map((w,i)=>`<div class="row"><div><strong>${w.word}</strong><br><span>${w.pos} · ${w.zh}</span></div><button class="btn" onclick="state.i=${i};revealed=0;renderLearn()">打開</button></div>`).join('')}</div></section>`;updateNav()}function updateNav(){document.querySelectorAll('.navBtn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));updateTop()}document.querySelectorAll('.navBtn').forEach(b=>b.onclick=()=>{if(b.dataset.mode==='learn')renderLearn();if(b.dataset.mode==='quiz')renderQuiz();if(b.dataset.mode==='review')renderReview();if(b.dataset.mode==='all')renderAll()});updateTop();renderLearn();
</script>
</body>
</html>
