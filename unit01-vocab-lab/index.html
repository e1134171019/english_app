<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Unit 01 Reading Vocabulary Lab</title>
<style>
:root{--bg:#f5f7fb;--ink:#111827;--muted:#6b7280;--card:#fff;--line:#e5e7eb;--blue:#2563eb;--deep:#1e40af;--green:#16a34a;--red:#e11d48;--amber:#f59e0b;--shadow:0 18px 55px rgba(15,23,42,.10)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}button,input{font:inherit}button{border:0;cursor:pointer}.app{max-width:1180px;margin:0 auto;padding:18px}.top{display:flex;justify-content:space-between;gap:14px;align-items:center;margin-bottom:14px}.brand h1{font-size:28px;margin:0;letter-spacing:-.04em}.brand p{margin:4px 0 0;color:var(--muted)}.stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px 16px;font-weight:900;box-shadow:var(--shadow)}.tabs{display:flex;gap:8px;overflow:auto;margin:12px 0 18px}.tab{white-space:nowrap;border-radius:999px;padding:12px 16px;background:#fff;border:1px solid var(--line);color:var(--muted);font-weight:900}.tab.active{background:#111827;color:#fff}.layout{display:grid;grid-template-columns:minmax(0,1fr) 390px;gap:18px;align-items:start}.reader,.side,.panel{background:#fff;border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow)}.reader{padding:28px}.reader h2{margin:0 0 14px;font-size:22px}.article{font-size:22px;line-height:2.05}.hot{display:inline;border:0;border-radius:10px;padding:2px 6px;background:#eef2ff;color:#1d4ed8;font-weight:900}.hot.active{background:#1d4ed8;color:#fff}.hint{font-size:14px;color:var(--muted);margin-top:16px}.side{position:sticky;top:18px;padding:22px}.wordTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.word{font-size:52px;line-height:.95;font-weight:950;letter-spacing:-.07em;margin:0;color:#111827}.pos{background:#eff6ff;color:#1d4ed8;border-radius:999px;padding:7px 10px;font-weight:900}.pron{color:var(--muted);margin:8px 0 0}.zh{font-size:24px;font-weight:950;margin:20px 0 8px}.concept{color:var(--muted);line-height:1.7}.block{margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}.block h3{font-size:13px;color:var(--muted);margin:0 0 10px;text-transform:uppercase;letter-spacing:.08em}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{border-radius:999px;padding:7px 10px;background:#eef2ff;color:#3730a3;font-weight:800}.syn{background:#ecfdf5;color:#047857}.ant{background:#fff1f2;color:#be123c}.ex{border-left:4px solid #93c5fd;padding-left:12px;margin:10px 0}.ex strong{display:block;line-height:1.55}.ex span{display:block;color:var(--muted);margin-top:4px;line-height:1.55}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}.btn{border-radius:16px;padding:13px 14px;font-weight:900;background:#e5e7eb;color:#111827}.primary{background:var(--blue);color:#fff}.dark{background:#111827;color:#fff}.panel{padding:22px}.panel h2{margin:0 0 14px}.levels{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}.level{border-radius:16px;padding:12px 8px;background:#fff;border:1px solid var(--line);font-weight:900;color:var(--muted)}.level.active{background:#2563eb;color:white}.qcard{border-radius:22px;background:#111827;color:#fff;padding:22px;margin-bottom:14px}.qcard small{color:#cbd5e1;font-weight:900;text-transform:uppercase}.q{font-size:28px;font-weight:950;line-height:1.35;margin:10px 0 0}.options{display:grid;grid-template-columns:1fr 1fr;gap:10px}.opt{border-radius:16px;padding:14px;background:#fff;border:1px solid var(--line);font-weight:900;text-align:left}.opt.correct{background:#dcfce7;color:#166534;border-color:#86efac}.opt.wrong{background:#ffe4e6;color:#be123c;border-color:#fda4af}.input{width:100%;border:1px solid var(--line);border-radius:16px;padding:14px;font-size:20px;font-weight:900}.feedback{margin-top:12px;border-radius:18px;padding:14px;background:#f9fafb;border:1px solid var(--line);white-space:pre-wrap;line-height:1.7}.list{display:grid;gap:10px}.row{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);border-radius:18px;padding:14px}.row strong{font-size:20px}.row span{color:var(--muted);font-size:14px}.barBox{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:10px}.bar{height:100%;width:0;background:linear-gradient(90deg,#2563eb,#60a5fa)}@media(max-width:900px){.layout{grid-template-columns:1fr}.side{position:static}.levels,.options{grid-template-columns:1fr 1fr}.article{font-size:20px}}@media(max-width:560px){.app{padding:12px}.top{align-items:flex-start;flex-direction:column}.reader,.side,.panel{border-radius:22px;padding:18px}.word{font-size:44px}.article{font-size:18px;line-height:1.9}.levels,.options,.btns{grid-template-columns:1fr}.stat{width:100%}}
</style>
</head>
<body>
<div class="app">
<header class="top"><div class="brand"><h1>Unit 01 Reading Vocabulary Lab</h1><p>文章閱讀 → 點擊單字 → 字族理解 → 分層測驗 → 錯題複習</p></div><div class="stat"><span id="stat">0 / 4 mastered</span><div class="barBox"><div class="bar" id="bar"></div></div></div></header>
<nav class="tabs"><button class="tab active" data-view="read">文章閱讀</button><button class="tab" data-view="practice">分層測驗</button><button class="tab" data-view="review">錯題複習</button><button class="tab" data-view="map">字族總覽</button></nav>
<main id="main"></main>
</div>
<script>
const words=[{word:'unite',pos:'v.',pron:'[juˈnaɪt]',zh:'使聯合；團結',concept:'把原本分散的人、團體或力量整合成一體。',related:['unity','union','united','reunion'],syn:['join','combine','connect'],ant:['divide','separate','split'],ex:[['Our goal is to unite the labor unions to oppose the new policy.','我們的目標是聯合這些勞工團體反對這項新政策。'],['We should unite, or we\'ll be defeated by the enemy.','我們要團結，否則會被敵人擊潰。']]},{word:'unity',pos:'n.',pron:'[ˈjuːnəti]',zh:'一致；團結',concept:'強調整體一致、沒有分裂，也可指作品或劇情的一致性。',related:['unite','union','united'],syn:['teamwork','harmony','togetherness'],ant:['division','conflict','disunity'],ex:[['Without unity, we\'ll face failure.','我們若不團結，就會面臨失敗。'],['The plot of the drama lacks unity.','這齣戲的劇情缺乏一致性。'],['In unity there is strength.','團結就是力量。']]},{word:'union',pos:'n.',pron:'[ˈjuːnjən]',zh:'工會；聯合',concept:'可以指由人組成的組織，也可以指兩種事物的結合。',related:['unite','unity','reunion'],syn:['association','alliance','organization'],ant:['separation','division'],ex:[['The union decided to go on strike due to the low wages.','由於薪資偏低，因此該工會決定罷工。'],['This car is a perfect union of beauty and technology.','這輛車子是美與科技的完美結合。']]},{word:'remain',pos:'vi.',pron:'[rɪˈmeɪn]',zh:'繼續存在；仍是',concept:'事情改變後，某個狀態、人或物仍然保留。',related:['remaining','remains'],syn:['stay','continue','keep'],ant:['leave','disappear','go away'],ex:[['No one remained in the hall soon after the concert was over.','音樂會結束沒多久，大廳裡一個人影都不剩了。'],['Though divorced, Anna and David still remain friends.','雖然離婚了，安娜和大衛仍是朋友。'],['The problem still remains unsolved.','這個問題仍然一直沒被解決。']]}];
const key='unit01_reading_vocab_lab';let state=JSON.parse(localStorage.getItem(key)||'{"selected":"unite","level":1,"mastered":{},"wrong":[]}');let view='read';const $=s=>document.querySelector(s);function save(){localStorage.setItem(key,JSON.stringify(state));topStat()}function W(x=state.selected){return words.find(w=>w.word===x)||words[0]}function topStat(){let n=Object.keys(state.mastered).length;$('#stat').textContent=`${n} / ${words.length} mastered`;$('#bar').style.width=(n/words.length*100)+'%'}function chips(a,c=''){return a.map(x=>`<span class="chip ${c}">${x}</span>`).join('')}function speak(t){speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=.78;speechSynthesis.speak(u)}function card(w){return `<aside class="side"><div class="wordTop"><div><h2 class="word">${w.word}</h2><p class="pron">${w.pron}</p></div><span class="pos">${w.pos}</span></div><p class="zh">${w.zh}</p><p class="concept">${w.concept}</p><div class="block"><h3>Related Words</h3><div class="chips">${chips(w.related)}</div></div><div class="block"><h3>Synonyms</h3><div class="chips">${chips(w.syn,'syn')}</div></div><div class="block"><h3>Antonyms</h3><div class="chips">${chips(w.ant,'ant')}</div></div><div class="block"><h3>Examples</h3>${w.ex.map(e=>`<p class="ex"><strong>${e[0]}</strong><span>${e[1]}</span></p>`).join('')}</div><div class="btns"><button class="btn dark" onclick="speak('${w.word}')">朗讀</button><button class="btn primary" onclick="view='practice';renderPractice()">練這個字</button></div></aside>`}
function renderRead(){view='read';let w=W();$('#main').innerHTML=`<section class="layout"><article class="reader"><h2>Article Context</h2><div class="article">Our goal is to <button class="hot ${w.word==='unite'?'active':''}" onclick="pick('unite')">unite</button> the labor unions to oppose the new policy.<br>Without <button class="hot ${w.word==='unity'?'active':''}" onclick="pick('unity')">unity</button>, we'll face failure.<br>The <button class="hot ${w.word==='union'?'active':''}" onclick="pick('union')">union</button> decided to go on strike due to the low wages.<br>The problem still <button class="hot ${w.word==='remain'?'active':''}" onclick="pick('remain')">remains</button> unsolved.</div><p class="hint">點擊藍色單字，右側會顯示中文、字族、反義詞與例句。這是主入口，不是先背卡片。</p></article>${card(w)}</section>`;nav()}function pick(x){state.selected=x;save();renderRead()}function addWrong(w,why){if(!state.wrong.some(x=>x.word===w.word&&x.why===why))state.wrong.unshift({word:w.word,zh:w.zh,why,time:new Date().toLocaleString()});save()}function qdata(){let w=W();let l=state.level;if(l===1)return {type:'choice',label:'Level 1 英選中',q:`${w.word} 的中文意思是？`,answer:w.zh,opts:[w.zh,...words.filter(x=>x.word!==w.word).map(x=>x.zh)].sort(()=>Math.random()-.5)};if(l===2)return {type:'choice',label:'Level 2 中選英',q:`${w.zh} 的英文是？`,answer:w.word,opts:[w.word,...words.filter(x=>x.word!==w.word).map(x=>x.word)].sort(()=>Math.random()-.5)};if(l===3){let e=w.ex[0][0].replace(new RegExp('\\b'+w.word+'\\b','i'),'______');return {type:'choice',label:'Level 3 例句填空',q:e,answer:w.word,opts:[w.word,...words.filter(x=>x.word!==w.word).map(x=>x.word)].sort(()=>Math.random()-.5)}}return {type:'input',label:'Level 4 主動輸出',q:`請輸入英文：${w.zh}`,answer:w.word}}
function renderPractice(){view='practice';let w=W(),q=qdata();$('#main').innerHTML=`<section class="panel"><h2>分層測驗：${w.word}</h2><div class="levels">${[1,2,3,4].map(n=>`<button class="level ${state.level===n?'active':''}" onclick="state.level=${n};save();renderPractice()">Level ${n}</button>`).join('')}</div><div class="qcard"><small>${q.label}</small><p class="q">${q.q}</p></div>${q.type==='choice'?`<div class="options">${q.opts.map(o=>`<button class="opt" onclick="checkChoice(this,'${String(o).replaceAll("'","&#39;")}')">${o}</button>`).join('')}</div>`:`<input class="input" id="answer" placeholder="輸入英文單字"><div class="btns"><button class="btn primary" onclick="checkInput()">檢查</button><button class="btn" onclick="nextWord()">下一個字</button></div>`}<div class="feedback" id="fb">答題後會顯示例句與中文解析。</div></section>`;if($('#answer'))$('#answer').focus();nav()}function checkChoice(btn,val){let w=W(),q=qdata();document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.textContent===q.answer)b.classList.add('correct')});if(val===q.answer){btn.classList.add('correct');state.mastered[w.word]=true;$('#fb').textContent=`正確\n${w.ex[0][0]}\n${w.ex[0][1]}`}else{btn.classList.add('wrong');addWrong(w,q.label);$('#fb').textContent=`錯誤。答案：${q.answer}\n${w.ex[0][0]}\n${w.ex[0][1]}`}save()}function checkInput(){let w=W(),v=$('#answer').value.trim().toLowerCase();if(v===w.word.toLowerCase()){state.mastered[w.word]=true;$('#fb').textContent=`正確\n${w.ex[0][0]}\n${w.ex[0][1]}`}else{addWrong(w,'Level 4 主動輸出');$('#fb').textContent=`錯誤。答案：${w.word}\n${w.ex[0][0]}\n${w.ex[0][1]}`}save()}function nextWord(){let i=words.findIndex(x=>x.word===state.selected);state.selected=words[(i+1)%words.length].word;save();renderPractice()}function renderReview(){view='review';let arr=state.wrong;$('#main').innerHTML=`<section class="panel"><h2>錯題複習</h2>${arr.length?`<div class="list">${arr.map(x=>`<div class="row"><div><strong>${x.word}</strong><br><span>${x.zh}｜${x.why}</span></div><button class="btn" onclick="state.selected='${x.word}';save();renderPractice()">重練</button></div>`).join('')}</div><br><button class="btn" onclick="state.wrong=[];save();renderReview()">清空錯題</button>`:'<div class="feedback">目前沒有錯題。分層測驗答錯會自動加入。</div>'}</section>`;nav()}function renderMap(){view='map';$('#main').innerHTML=`<section class="panel"><h2>字族總覽</h2><div class="list">${words.map(w=>`<div class="row"><div><strong>${w.word}</strong><br><span>${w.pos}｜${w.zh}<br>Related: ${w.related.join(' / ')}<br>Antonyms: ${w.ant.join(' / ')}</span></div><button class="btn" onclick="state.selected='${w.word}';save();renderRead()">閱讀</button></div>`).join('')}</div></section>`;nav()}function nav(){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.view===view));topStat()}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{if(b.dataset.view==='read')renderRead();if(b.dataset.view==='practice')renderPractice();if(b.dataset.view==='review')renderReview();if(b.dataset.view==='map')renderMap()});topStat();renderRead();
</script>
</body>
</html>
