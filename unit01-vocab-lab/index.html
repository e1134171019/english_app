<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit 01 Vocabulary Lab</title>
  <style>
    :root{--bg:#eef3ff;--card:#fff;--ink:#172033;--muted:#667085;--blue:#275efe;--deep:#173cbd;--cyan:#4bd4ff;--green:#16a34a;--red:#e11d48;--line:rgba(39,94,254,.14);--shadow:0 24px 70px rgba(31,58,147,.15);--soft:0 12px 34px rgba(31,58,147,.10);--r:28px}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;color:var(--ink);background:radial-gradient(circle at 18% 8%,rgba(75,212,255,.45),transparent 34%),radial-gradient(circle at 82% 2%,rgba(39,94,254,.22),transparent 30%),linear-gradient(180deg,#f7f9ff 0%,#edf3ff 52%,#f8fbff 100%)}button,input{font-family:inherit}button{cursor:pointer}.shell{width:min(1180px,calc(100% - 36px));margin:0 auto;padding:28px 0 42px}.hero{position:relative;overflow:hidden;display:grid;grid-template-columns:1fr 330px;gap:24px;padding:clamp(28px,5vw,56px);border-radius:38px;color:#fff;background:linear-gradient(135deg,rgba(16,42,143,.96),rgba(39,94,254,.92));box-shadow:var(--shadow)}.hero:before{content:"";position:absolute;width:520px;height:520px;right:-220px;top:-260px;border-radius:50%;border:72px solid rgba(255,255,255,.1)}.hero>*{position:relative}.badge{display:inline-flex;padding:9px 14px;border-radius:999px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);font-size:14px;font-weight:800;letter-spacing:.04em}.hero h1{margin:18px 0 8px;font-size:clamp(48px,8vw,88px);line-height:.92;letter-spacing:-.07em}.hero p{max-width:620px;margin:0;font-size:18px;color:rgba(255,255,255,.84)}.heroCard{border-radius:30px;padding:28px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.26);backdrop-filter:blur(18px);display:flex;flex-direction:column;justify-content:flex-end;min-height:230px}.heroNo{position:absolute;top:22px;right:26px;font-size:18px;font-weight:900;opacity:.58}.heroWord{font-size:46px!important;font-weight:900;letter-spacing:-.05em;color:#fff!important}.panel{margin:22px 0;display:grid;grid-template-columns:minmax(260px,1fr) auto;gap:16px;align-items:center}.search{height:62px;padding:0 20px;border-radius:22px;display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.8);box-shadow:var(--soft);backdrop-filter:blur(16px)}.search input{width:100%;border:0;outline:0;font-size:16px;background:transparent;color:var(--ink)}.tabs{display:flex;gap:8px;padding:7px;border-radius:22px;background:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.8);box-shadow:var(--soft);backdrop-filter:blur(16px)}.tab{min-width:70px;border:0;border-radius:16px;padding:13px 16px;background:transparent;color:var(--muted);font-weight:900}.tab.active{color:#fff;background:linear-gradient(135deg,var(--blue),var(--deep));box-shadow:0 12px 28px rgba(39,94,254,.26)}.grid{display:grid;grid-template-columns:300px 1fr;gap:22px;align-items:start}.rail,.stage{background:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.8);box-shadow:var(--soft);backdrop-filter:blur(16px)}.rail{border-radius:var(--r);padding:18px;position:sticky;top:18px}.railTitle{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.railTitle h2{margin:0;font-size:22px;letter-spacing:-.04em}.railTitle span{min-width:34px;height:34px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:900;background:var(--blue)}.wordList{display:grid;gap:10px}.wordItem{width:100%;border:1px solid transparent;border-radius:20px;padding:14px;background:rgba(255,255,255,.62);color:var(--ink);text-align:left;transition:.18s}.wordItem:hover{transform:translateY(-2px);background:#fff}.wordItem.active{background:#fff;border-color:rgba(39,94,254,.34);box-shadow:0 10px 24px rgba(39,94,254,.12)}.wordItem strong{display:block;font-size:20px;letter-spacing:-.03em}.wordItem span{display:block;margin-top:4px;color:var(--muted);font-size:13px;line-height:1.4}.stage{min-height:640px;border-radius:34px;padding:clamp(22px,4vw,38px)}.learn{display:grid;gap:24px}.wordMain{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:start}.kicker{margin:0 0 10px;font-size:14px;font-weight:900;color:var(--blue);letter-spacing:.08em;text-transform:uppercase}.title{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}.title h2{margin:0;font-size:clamp(58px,10vw,104px);line-height:.9;letter-spacing:-.08em;color:#12255d}.pill{padding:8px 13px;border-radius:999px;background:#e8efff;color:var(--deep);font-weight:900}.pron{margin:12px 0 0;font-size:18px;color:var(--muted)}.meaning{border-radius:26px;padding:22px;background:linear-gradient(135deg,rgba(39,94,254,.10),rgba(75,212,255,.10));border:1px solid var(--line)}.meaning p{margin:0;font-size:28px;font-weight:900;letter-spacing:-.03em}.actions{display:grid;gap:10px;min-width:140px}.primary,.secondary,.danger{border:0;border-radius:18px;padding:14px 18px;font-weight:900}.primary{color:#fff;background:linear-gradient(135deg,var(--blue),var(--deep));box-shadow:0 12px 28px rgba(39,94,254,.22)}.secondary{color:var(--deep);background:#e8efff}.danger{color:#fff;background:var(--red)}.info{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.box{border-radius:24px;padding:18px;background:rgba(255,255,255,.72);border:1px solid rgba(39,94,254,.10)}.box h3{margin:0 0 12px;font-size:15px;color:var(--muted)}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{display:inline-flex;align-items:center;min-height:34px;padding:7px 12px;border-radius:999px;font-weight:800;background:#edf3ff;color:#173cbd}.syn{background:#ecfdf5;color:#047857}.ant{background:#fff1f2;color:#be123c}.examples{display:grid;gap:14px}.ex{position:relative;border-radius:24px;padding:20px 20px 20px 24px;background:#fff;border:1px solid rgba(39,94,254,.12);overflow:hidden}.ex:before{content:"";position:absolute;left:0;top:18px;bottom:18px;width:6px;border-radius:999px;background:linear-gradient(180deg,var(--blue),var(--cyan))}.en{margin:0;font-size:20px;line-height:1.55;font-weight:800}.zh{margin:8px 0 0;color:var(--muted);line-height:1.6}mark{background:#fff2a8;border-radius:8px;padding:0 5px}.panelTitle{margin:0 0 20px;font-size:32px;letter-spacing:-.05em}.family{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.familyCard{border-radius:26px;padding:22px;background:#fff;border:1px solid rgba(39,94,254,.12)}.familyCard h3{margin:0 0 12px;font-size:28px;letter-spacing:-.05em;color:#12255d}.familyCard p{margin:10px 0;line-height:1.65}.quiz{display:grid;gap:18px}.qcard{border-radius:28px;padding:26px;color:#fff;background:linear-gradient(135deg,#13235c,#275efe);box-shadow:0 18px 46px rgba(39,94,254,.20)}.qlabel{margin:0 0 10px;color:rgba(255,255,255,.72);font-weight:900;text-transform:uppercase;letter-spacing:.08em}.qtext{margin:0;font-size:clamp(25px,4vw,42px);line-height:1.35;font-weight:900;letter-spacing:-.04em}.opts{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.opt{min-height:72px;border:1px solid rgba(39,94,254,.12);border-radius:22px;padding:16px 18px;background:#fff;color:var(--ink);text-align:left;font-size:18px;font-weight:900}.opt.correct{border-color:rgba(25,179,107,.38);background:#ecfdf5;color:#047857}.opt.wrong{border-color:rgba(239,68,68,.38);background:#fff1f2;color:#be123c}.fb{border-radius:22px;padding:18px;background:rgba(255,255,255,.72);border:1px solid rgba(39,94,254,.12);line-height:1.7;white-space:pre-wrap}.inputRow{display:flex;gap:12px}.inputRow input{flex:1;border:1px solid rgba(39,94,254,.16);outline:none;border-radius:20px;padding:0 18px;font-size:20px;font-weight:800;background:#fff}.empty{padding:34px;border-radius:26px;text-align:center;background:#fff;color:var(--muted)}@media(max-width:920px){.hero,.grid,.panel{grid-template-columns:1fr}.rail{position:static}.wordList{grid-template-columns:repeat(2,1fr)}.info,.family{grid-template-columns:1fr}}@media(max-width:620px){.shell{width:min(100% - 22px,1180px);padding-top:12px}.hero{border-radius:28px;padding:26px}.heroCard{min-height:180px}.tabs{overflow-x:auto;justify-content:flex-start}.wordList,.opts{grid-template-columns:1fr}.wordMain{grid-template-columns:1fr}.inputRow{flex-direction:column}.inputRow input{min-height:58px}}
  </style>
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div><span class="badge">Level 3 · Unit 01</span><h1>Vocabulary Lab</h1><p>從單字、字族、反義詞到例句輸出，讓單字真的進到腦中。</p></div>
      <div class="heroCard"><p class="heroNo" id="heroNo">01</p><p class="heroWord" id="heroWord">unite</p><p id="heroMeaning">使聯合；團結</p></div>
    </header>
    <section class="panel"><div class="search"><span>🔎</span><input id="search" type="search" placeholder="搜尋單字、中文、相關詞..." /></div><div class="tabs"><button class="tab active" data-mode="learn">學習</button><button class="tab" data-mode="family">字族</button><button class="tab" data-mode="quiz">填空</button><button class="tab" data-mode="typing">輸入</button><button class="tab" data-mode="mistakes">錯題</button></div></section>
    <main class="grid"><aside class="rail"><div class="railTitle"><h2>Words</h2><span id="count">4</span></div><div id="wordList" class="wordList"></div></aside><section id="stage" class="stage"></section></main>
  </div>
<script>
const words=[{word:"unite",pos:"v.",pron:"[juˈnaɪt]",meaning:"使聯合；團結",concept:"把原本分散的人、團體或力量整合成一體。",root:"uni = one，一個、統一",related:["unity","union","united","reunion"],syn:["join","combine","connect","bring together"],ant:["divide","separate","split"],ex:[{en:"Our goal is to unite the labor unions to oppose the new policy.",zh:"我們的目標是聯合這些勞工團體反對這項新政策。"},{en:"We should unite, or we'll be defeated by the enemy.",zh:"我們要團結，否則會被敵人擊潰。"}]},{word:"unity",pos:"n.",pron:"[ˈjuːnəti]",meaning:"一致；團結",concept:"強調整體一致、沒有分裂，也可指作品或劇情的一致性。",root:"uni = one，一個、統一",related:["unite","union","united"],syn:["teamwork","harmony","togetherness"],ant:["division","conflict","disunity"],ex:[{en:"Without unity, we'll face failure.",zh:"我們若不團結，就會面臨失敗。"},{en:"The plot of the drama lacks unity.",zh:"這齣戲的劇情缺乏一致性。"},{en:"In unity there is strength.",zh:"團結就是力量。"}]},{word:"union",pos:"n.",pron:"[ˈjuːnjən]",meaning:"工會；聯合",concept:"可以指由人組成的組織，也可以指兩種事物的結合。",root:"uni = one，一個、統一",related:["unite","unity","reunion"],syn:["association","alliance","organization"],ant:["separation","division"],ex:[{en:"The union decided to go on strike due to the low wages.",zh:"由於薪資偏低，因此該工會決定罷工。"},{en:"This car is a perfect union of beauty and technology.",zh:"這輛車子是美與科技的完美結合。"}]},{word:"remain",pos:"vi.",pron:"[rɪˈmeɪn]",meaning:"繼續存在；仍是",concept:"事情改變後，某個狀態、人或物仍然保留。",root:"remain = stay after something else has changed",related:["remaining","remains"],syn:["stay","continue","keep"],ant:["leave","disappear","go away"],ex:[{en:"No one remained in the hall soon after the concert was over.",zh:"音樂會結束沒多久，大廳裡一個人影都不剩了。"},{en:"Though divorced, Anna and David still remain friends.",zh:"雖然離婚了，安娜和大衛仍是朋友。"},{en:"The problem still remains unsolved.",zh:"這個問題仍然一直沒被解決。"}]}];
let list=[...words],idx=0,mode="learn";const mistakesKey="unit01_vocab_mistakes";const $=s=>document.querySelector(s);const mistakes=()=>JSON.parse(localStorage.getItem(mistakesKey)||"[]");function saveMistake(w,r){const m=mistakes();if(!m.some(x=>x.word===w.word&&x.reason===r)){m.unshift({word:w.word,meaning:w.meaning,reason:r,time:new Date().toLocaleString()});localStorage.setItem(mistakesKey,JSON.stringify(m))}}function w(){return list[idx]||list[0]||words[0]}function hero(x){$("#heroNo").textContent=String(words.indexOf(x)+1).padStart(2,"0");$("#heroWord").textContent=x.word;$("#heroMeaning").textContent=x.meaning}function chips(a,c=""){return a.map(x=>`<span class="chip ${c}">${x}</span>`).join("")}function hi(s,word){return s.replace(new RegExp(`\\b(${word})\\b`,`gi`),"<mark>$1</mark>")}function rail(){const el=$("#wordList");$("#count").textContent=list.length;el.innerHTML="";list.forEach((x,i)=>{const b=document.createElement("button");b.className=`wordItem ${i===idx?"active":""}`;b.innerHTML=`<strong>${x.word}</strong><span>${x.pos} · ${x.meaning}</span>`;b.onclick=()=>{idx=i;render()};el.appendChild(b)})}function learn(){const x=w();hero(x);$("#stage").innerHTML=`<article class="learn"><section class="wordMain"><div><p class="kicker">Current Vocabulary</p><div class="title"><h2>${x.word}</h2><span class="pill">${x.pos}</span></div><p class="pron">${x.pron}</p></div><div class="actions"><button class="primary" id="speak">朗讀</button><button class="secondary" id="next">下一個</button></div></section><section class="meaning"><p>${x.meaning}</p></section><section class="info"><div class="box"><h3>相關詞 Related</h3><div class="chips">${chips(x.related)}</div></div><div class="box"><h3>近義詞 Synonyms</h3><div class="chips">${chips(x.syn,"syn")}</div></div><div class="box"><h3>反義詞 Antonyms</h3><div class="chips">${chips(x.ant,"ant")}</div></div></section><section class="examples">${x.ex.map((e,i)=>`<div class="ex"><p class="en">${i+1}. ${hi(e.en,x.word)}</p><p class="zh">${e.zh}</p></div>`).join("")}</section></article>`;$("#speak").onclick=()=>speak(x.word);$("#next").onclick=next}function family(){hero(w());$("#stage").innerHTML=`<h2 class="panelTitle">字族網路 Family Map</h2><div class="family">${words.map(x=>`<article class="familyCard"><h3>${x.word} <span class="pill">${x.pos}</span></h3><p><strong>中文：</strong>${x.meaning}</p><p><strong>核心概念：</strong>${x.concept}</p><p><strong>字根/概念：</strong>${x.root}</p><p><strong>相關詞：</strong>${x.related.join(" / ")}</p><p><strong>反義方向：</strong>${x.ant.join(" / ")}</p></article>`).join("")}</div>`}function shuffle(a){return[...a].sort(()=>Math.random()-.5)}function quiz(){const x=w(),e=x.ex[0],q=e.en.replace(new RegExp(`\\b${x.word}\\b`,`i`),"______");let ops=shuffle([x.word,...words.filter(y=>y.word!==x.word).map(y=>y.word)]).slice(0,4);if(!ops.includes(x.word))ops[0]=x.word;ops=shuffle(ops);hero(x);$("#stage").innerHTML=`<div class="quiz"><h2 class="panelTitle">例句填空 Cloze Test</h2><section class="qcard"><p class="qlabel">Choose the best answer</p><p class="qtext">${q}</p></section><div class="opts">${ops.map(o=>`<button class="opt" data-a="${o}">${o}</button>`).join("")}</div><div class="fb" id="fb">先選答案，系統會顯示完整例句與中文。</div><button class="secondary" id="nq">下一題</button></div>`;document.querySelectorAll(".opt").forEach(b=>b.onclick=()=>{const sel=b.dataset.a;document.querySelectorAll(".opt").forEach(o=>{o.disabled=true;if(o.dataset.a===x.word)o.classList.add("correct")});if(sel===x.word)$("#fb").textContent=`正確。\n${e.en}\n${e.zh}`;else{b.classList.add("wrong");saveMistake(x,"例句填空答錯");$("#fb").textContent=`錯誤。正確答案：${x.word}\n${e.en}\n${e.zh}`}});$("#nq").onclick=next}function typing(){const x=w();hero(x);$("#stage").innerHTML=`<div class="quiz"><h2 class="panelTitle">中翻英輸入 Active Recall</h2><section class="qcard"><p class="qlabel">Type the English word</p><p class="qtext">${x.meaning}</p></section><div class="inputRow"><input id="input" autocomplete="off" placeholder="輸入英文單字，例如 unite"><button class="primary" id="check">檢查</button></div><div class="fb" id="fb">提示：${x.pos} · ${x.pron}</div><button class="secondary" id="nt">下一題</button></div>`;$("#check").onclick=()=>{const v=$("#input").value.trim().toLowerCase();if(v===x.word.toLowerCase())$("#fb").textContent=`正確。\n${x.word} = ${x.meaning}\n${x.ex[0].en}`;else{saveMistake(x,"中翻英輸入答錯");$("#fb").textContent=`錯誤。正確答案：${x.word}\n${x.ex[0].en}\n${x.ex[0].zh}`}};$("#input").addEventListener("keydown",e=>{if(e.key==="Enter")$("#check").click()});$("#nt").onclick=next;$("#input").focus()}function mistakeView(){const m=mistakes();hero(w());if(!m.length){$("#stage").innerHTML=`<h2 class="panelTitle">錯題本 Mistake Book</h2><div class="empty">目前沒有錯題。去做「填空」或「輸入」模式，答錯會自動記錄。</div>`;return}$("#stage").innerHTML=`<h2 class="panelTitle">錯題本 Mistake Book</h2><div class="family">${m.map(x=>`<article class="familyCard"><h3>${x.word}</h3><p><strong>中文：</strong>${x.meaning}</p><p><strong>來源：</strong>${x.reason}</p><p><strong>時間：</strong>${x.time}</p></article>`).join("")}</div><br><button class="danger" id="clear">清除錯題</button>`;$("#clear").onclick=()=>{localStorage.removeItem(mistakesKey);mistakeView()}}function render(){if(idx>=list.length)idx=0;rail();if(mode==="learn")learn();if(mode==="family")family();if(mode==="quiz")quiz();if(mode==="typing")typing();if(mode==="mistakes")mistakeView()}function next(){idx=(idx+1)%list.length;render()}function speak(t){if(!("speechSynthesis" in window)){alert("此瀏覽器不支援朗讀");return}speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang="en-US";u.rate=.78;speechSynthesis.speak(u)}document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));b.classList.add("active");mode=b.dataset.mode;render()});$("#search").addEventListener("input",e=>{const q=e.target.value.trim().toLowerCase();list=words.filter(x=>[x.word,x.meaning,x.pos,x.pron,x.related.join(" "),x.syn.join(" "),x.ant.join(" "),x.ex.map(e=>e.en+e.zh).join(" ")].join(" ").toLowerCase().includes(q));idx=0;if(!list.length){$("#wordList").innerHTML="";$("#count").textContent="0";$("#stage").innerHTML=`<div class="empty">找不到符合的單字。</div>`;return}render()});render();
</script>
</body>
</html>
