m:uppercase}.q{font-size:28px;font-weight:950;line-height:1.35;margin:10px 0 0}.options{display:grid;grid-template-columns:1fr 1fr;gap:10px}.opt{border-radius:16px;padding:14px;background:#fff;border:1px solid var(--line);font-weight:900;text-align:left}.opt.correct{background:#dcfce7;color:#166534;border-color:#86efac}.opt.wrong{background:#ffe4e6;color:#be123c;border-color:#fda4af}.input{width:100%;border:1px solid var(--line);border-radius:16px;padding:14px;font-size:20px;font-weight:900}.feedback{margin-top:12px;border-radius:18px;padding:14px;background:#f9fafb;border:1px solid var(--line);white-space:pre-wrap;line-height:1.7}.list{display:grid;gap:10px}.row{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);border-radius:18px;padding:14px}.row strong{font-size:20px}.row span{color:var(--muted);font-size:14px}.small{font-size:13px;color:var(--muted)}@media(max-width:900px){.layout{grid-template-columns:1fr}.side{position:static}.levels,.options{grid-template-columns:1fr 1fr}}@media(max-width:560px){.app{padding:12px}.top{align-items:flex-start;flex-direction:column}.reader,.side,.panel{border-radius:22px;padding:18px}.word{font-size:42px}.levels,.options,.btns{grid-template-columns:1fr}.stat{width:100%}.tr{margin-left:0}.sent{font-size:17px}}</style></head><body><div class="app"><header class="top"><div class="brand"><h1>Unit 01 Reading Vocabulary Lab</h1><p>文章閱讀 → 點擊單字 → 字族理解 → 分層測驗 → 錯題複習</p></div><div class="stat"><span id="stat">0 / 0 mastered</span><div class="barBox"><div class="bar" id="bar"></div></div></div></header><nav class="tabs"><button class="tab active" data-view="read">文章閱讀</button><button class="tab" data-view="practice">分層測驗</button><button class="tab" data-view="review">錯題複習</button><button class="tab" data-view="map">字族總覽</button></nav><main id="main"></main></div><script>
const words=[
{"word":"unite","pos":"v.","pron":"[juˈnaɪt]","zh":"使聯合；團結","concept":"把原本分散的人、團體或力量整合成一體。","related":["unity","union","united","reunion"],"syn":["join","combine","connect"],"ant":["divide","separate","split"],"ex":[["Our goal is to unite the labor unions to oppose the new policy.","我們的目標是聯合這些勞工團體反對這項新政策。"],["We should unite, or we'll be defeated by the enemy.","我們要團結，否則會被敵人擊潰。"]]},
{"word":"unity","pos":"n.","pron":"[ˈjuːnəti]","zh":"一致；團結","concept":"整體一致、沒有分裂。","related":["unite","union","united"],"syn":["teamwork","harmony"],"ant":["division","conflict"],"ex":[["Without unity, we'll face failure.","我們若不團結，就會面臨失敗。"],["The plot of the drama lacks unity.","這齣戲的劇情缺乏一致性。"]]},
{"word":"union","pos":"n.","pron":"[ˈjuːnjən]","zh":"工會；聯合","concept":"組織、團體或事物的結合。","related":["unite","unity","reunion"],"syn":["association","alliance"],"ant":["separation","division"],"ex":[["The union decided to go on strike due to the low wages.","由於薪資偏低，因此該工會決定罷工。"],["This car is a perfect union of beauty and technology.","這輛車子是美與科技的完美結合。"]]},
{"word":"remain","pos":"vi.","pron":"[rɪˈmeɪn]","zh":"繼續存在；仍是","concept":"改變後仍然保持某狀態。","related":["remaining","remains"],"syn":["stay","continue","keep"],"ant":["leave","disappear"],"ex":[["The problem still remains unsolved.","這個問題仍然一直沒被解決。"],["It remains to be seen which team will win.","哪一隊會贏尚有待觀察。"]]},
{"word":"remains","pos":"n.","pron":"[rɪˈmeɪnz]","zh":"遺跡；遺體","concept":"留下來的部分，常用複數。","related":["remain","remaining"],"syn":["ruins","body"],"ant":[],"ex":[["The remains are the most famous tourist attraction in the country.","這些遺跡是該國境內最有名的旅遊景點。"],["The writer's remains are buried in his hometown.","這位作家的遺體被埋在他的故鄉。"]]},
{"word":"probable","pos":"a.","pron":"[ˈprɑbəbl]","zh":"很可能的","concept":"某事發生的可能性很高。","related":["probably","probability"],"syn":["likely"],"ant":["unlikely","improbable"],"ex":[["It seems probable that this accident is the result of the driver's carelessness.","看來意外很可能是因為駕駛的粗心所致。"]]},
{"word":"probability","pos":"n.","pron":"[ˌprɑbəˈbɪləti]","zh":"可能性","concept":"事情發生的機率或可能。","related":["probable","probably"],"syn":["likelihood"],"ant":[],"ex":[["The probability is that the match will be postponed.","這場比賽很可能會延期。"]]},
{"word":"situation","pos":"n.","pron":"[ˌsɪtʃuˈeʃən]","zh":"處境；情勢","concept":"某人或某事所處的狀況。","related":[],"syn":["condition","circumstance"],"ant":[],"ex":[["This company's financial situation is getting more and more difficult.","這家公司的財務狀況越來越吃緊。"],["What would you do in such a situation?","在那種情況下你會怎麼做？"]]},
{"word":"determine","pos":"vt.","pron":"[dɪˈtɝmɪn]","zh":"決定；確定","concept":"下定決心或查明原因。","related":["determination","determined"],"syn":["decide","resolve"],"ant":[],"ex":[["Lilly determined to leave for the hospital at once.","莉莉決定馬上動身去醫院。"],["The police were finally able to determine the cause of the accident.","警方終於能確定這起意外的肇因了。"]]},
{"word":"determined","pos":"a.","pron":"[dɪˈtɝmɪnd]","zh":"有決心的","concept":"已下定決心要做某事。","related":["determine","determination"],"syn":["resolved"],"ant":["uncertain"],"ex":[["I'm determined to quit gambling.","我已下定決心要戒賭。"]]},
{"word":"rate","pos":"n./vt.","pron":"[ret]","zh":"比率；評比為","concept":"比例、速度，或對某事物評價。","related":["rated"],"syn":["ratio","evaluate"],"ant":[],"ex":[["The rate of unemployment has been rising in recent years.","近年來的失業率逐漸上升。"],["This resort is rated as the most beautiful place in the country.","這個觀光勝地被評為該國最美的地方。"],["At any rate, their performance did not live up to our expectations.","無論如何，他們的表現並不如我們所預期。"]]},
{"word":"political","pos":"a.","pron":"[pəˈlɪtɪkl]","zh":"政治的","concept":"與政治、政府或公共權力有關。","related":["politics","politician","politically"],"syn":[],"ant":[],"ex":[["The writer fled abroad seeking political asylum.","這位作家逃到國外尋求政治庇護。"]]},
{"word":"politics","pos":"n.","pron":"[ˈpɑlətɪks]","zh":"政治","concept":"政治活動與政治事務。","related":["political","politician"],"syn":[],"ant":[],"ex":[["Most youngsters are not interested in politics.","多數的年輕人都不熱衷政治。"]]},
{"word":"politician","pos":"n.","pron":"[ˌpɑləˈtɪʃən]","zh":"政客","concept":"從事政治的人。","related":["political","politics"],"syn":[],"ant":[],"ex":[["I'd rather trust a hungry wolf than a politician.","我寧願相信一匹餓狼也不願意相信政客。"]]},
{"word":"process","pos":"n./vt.","pron":"[ˈprɑses]","zh":"過程；處理","concept":"事情進行的流程，也可指處理資料或申請。","related":["processed","processing"],"syn":["procedure","handle"],"ant":[],"ex":[["I'm afraid getting things changed will be a slow process.","事情要改變恐怕會是一個緩慢的過程。"],["We're still in the process of conducting a market survey.","我們尚在做市場調查中。"],["It will take about 3 weeks to process your application.","處理您的申請約要三星期的時間。"]]},
{"word":"majority","pos":"n.","pron":"[məˈdʒɔrəti]","zh":"大部分","concept":"超過一半或大多數。","related":["major"],"syn":["most"],"ant":["minority"],"ex":[["The majority of residents on the island can only speak their own dialect.","這島上大部分的居民只會說他們自己的方言。"]]},
{"word":"property","pos":"n.","pron":"[ˈprɑpɚti]","zh":"財產；特性","concept":"可指所有物，也可指某物的特徵。","related":["possessions","assets","quality"],"syn":["assets","quality"],"ant":[],"ex":[["They lost all their property in the fire.","他們在這場大火中失去了所有財產。"],["One property of diamonds is hardness.","堅硬是鑽石的一項特性。"]]},
{"word":"opportunity","pos":"n.","pron":"[ˌɑpɚˈtunəti]","zh":"機會；良機","concept":"適合做某事的好時機。","related":["chance"],"syn":["chance"],"ant":[],"ex":[["This trip is a great opportunity to broaden your horizons and practice your English.","這趟旅行是個拓展視野以及練習英文的好機會。"]]},
{"word":"actually","pos":"adv.","pron":"[ˈæktʃuəli]","zh":"事實上；實際上","concept":"用來指出真實情況。","related":["actual"],"syn":["really","in fact"],"ant":[],"ex":[["Nick likes to act like a teenager, but actually he's more than 30 years old.","尼克喜歡裝作青少年的樣子，但他事實上已經三十多歲了。"]]},
{"word":"recognize","pos":"vt.","pron":"[ˈrɛkəɡˌnaɪz]","zh":"認出；承認；認可","concept":"辨認某人事物，或正式承認。","related":["recognizable","unrecognizable","recognition"],"syn":["identify","acknowledge"],"ant":[],"ex":[["After being separated for twenty years, Jack cannot recognize his daughter.","失散二十年後，傑克認不出他的女兒來了。"],["Professor Rollins is recognized as one of the best educators in the country.","羅林斯教授是該國公認為最優秀的教育家之一。"]]},
{"word":"enjoyable","pos":"a.","pron":"[ɪnˈdʒɔɪəbl]","zh":"愉快的","concept":"令人享受或感到愉快。","related":["enjoy","enjoyment"],"syn":["pleasant"],"ant":["boring"],"ex":[["The party we had last Friday night was really enjoyable.","我們上星期五晚上那場派對對實在愉快極了。"]]},
{"word":"joyful","pos":"a.","pron":"[ˈdʒɔɪfəl]","zh":"喜悅的","concept":"充滿快樂與喜悅。","related":["joy","joyfully","joyous"],"syn":["happy","joyous"],"ant":["sad"],"ex":[["We were excited and joyful, knowing that our team had won the game.","獲知我隊贏了比賽時，我們既興奮又高興。"]]},
{"word":"unique","pos":"a.","pron":"[juˈnik]","zh":"與眾不同的；獨有的","concept":"只有一個或特別不同。","related":["native","indigenous"],"syn":["special","distinctive"],"ant":["common"],"ex":[["Every person's fingerprints are unique. No two people's are alike.","每個人的指紋都是獨一無二的。沒有人是相同的。"],["Kiwi birds are unique to New Zealand.","鷸鴕為紐西蘭所獨有。"]]},
{"word":"terrific","pos":"a.","pron":"[təˈrɪfɪk]","zh":"很棒的","concept":"非常好、極佳。","related":[],"syn":["excellent","fantastic"],"ant":[],"ex":[["The restaurant on the corner serves terrific food.","轉角那間餐廳的餐點棒極了。"]]},
{"word":"wed","pos":"vt./vi.","pron":"[wɛd]","zh":"結婚","concept":"與某人結為夫妻。","related":["wedded","newlyweds"],"syn":["marry"],"ant":[],"ex":[["Ken wedded his lover without his parents' consent.","肯未經父母同意便娶了他的情人。"],["They wedded on a beautiful autumn day.","他們在一個美麗的秋日結為連理。"]]},
{"word":"tough","pos":"a.","pron":"[tʌf]","zh":"堅韌的；嚴厲的；困難的","concept":"可指物體硬、態度嚴厲，或事情困難。","related":[],"syn":["sturdy","difficult","harsh"],"ant":["easy"],"ex":[["This meat is too tough, Mom. I think you overcooked it.","媽，這塊肉好硬。我想妳把它煮得太老了。"],["Tom is tough on his son because he thinks his child is a little too naughty.","湯姆對他兒子很嚴厲，因為他覺得他孩子有點太頑皮。"],["Compared to last month's test, this one wasn't too tough.","跟上個月的考試比起來，這次的考試不算太難。"]]},
{"word":"hire","pos":"vt./n.","pron":"[haɪr]","zh":"雇用；租用","concept":"聘請某人或租用某物。","related":["for hire"],"syn":["employ","rent"],"ant":[],"ex":[["We hired a consultant to devise a new system for our company.","我們雇用一位顧問來替公司設計一套新制度。"],["Tina and her friends hired a limousine to drive them to the prom.","蒂娜和她朋友租了一臺加長型禮車載她們去學校舞會。"],["The cabins over there are for hire.","那邊的小木屋可供租用。"]]},
{"word":"homesick","pos":"a.","pron":"[ˈhomˌsɪk]","zh":"思鄉的","concept":"因離家而想念家鄉。","related":["nostalgic"],"syn":["nostalgic"],"ant":[],"ex":[["I couldn't help feeling homesick on sleepless nights.","夜晚我睡不著時就忍不住會想家。"]]},
{"word":"invitation","pos":"n.","pron":"[ˌɪnvəˈteʃən]","zh":"邀請；請帖；邀請卡","concept":"邀請某人參與活動或加入。","related":["invite","inviting"],"syn":[],"ant":[],"ex":[["Mr. Lee joined the group at the invitation of the government.","李先生應政府的邀請加入這個小組。"],["Have you received an invitation to the party?","你收到這次派對的邀請卡了嗎？"]]},
{"word":"jealous","pos":"a.","pron":"[ˈdʒɛləs]","zh":"嫉妒的；吃醋的","concept":"因別人擁有某事物或得到注意而不快。","related":["jealousy"],"syn":["envious"],"ant":[],"ex":[["Why are you so jealous of David's promotion?","為什麼大衛升遷你會那麼嫉妒？"]]},
{"word":"envy","pos":"n./vt.","pron":"[ˈɛnvi]","zh":"嫉妒；羨慕","concept":"羨慕或嫉妒某人擁有的東西。","related":["envious"],"syn":["jealousy"],"ant":[],"ex":[["Peter's new cell phone is the envy of everyone in the office.","彼得的新手機羨煞辦公室內所有人。"],["I sometimes envy the rich and famous whose lives seem so glamorous.","我有時候嫉妒有錢人和名人，他們的生活似乎很迷人。"],["I don't envy Peter his success.","我不羨慕彼得的成功。"]]},
{"word":"fright","pos":"n.","pron":"[fraɪt]","zh":"驚嚇","concept":"突然的害怕。","related":["frighten","frightened"],"syn":["fear","horror","terror"],"ant":[],"ex":[["Andy looked at the barking dog with fright.","安迪害怕地看著那隻狂吠的狗。"],["Sarah has no stage fright; in fact, she enjoys making public speeches.","莎拉不會怯場；事實上，她很喜歡上臺演講。"]]},
{"word":"frighten","pos":"vt.","pron":"[ˈfraɪtn]","zh":"使驚嚇","concept":"讓某人害怕。","related":["frightened","frightening"],"syn":["scare","terrify"],"ant":[],"ex":[["You should not let your son watch that movie because it might frighten him.","你不應該讓你的兒子看那部電影，因為那有可能會嚇到他。"],["I was frightened to death at the sight of the horrible accident.","目睹這起可怕的意外時，我嚇死了。"],["Tom frightened Jim into keeping quiet.","湯姆威脅吉姆保持安靜。"]]},
{"word":"locate","pos":"vt.","pron":"[ˈloket]","zh":"位於；找到位置；設置","concept":"找出位置，或描述某物所在。","related":["location","located"],"syn":["situate","find"],"ant":[],"ex":[["Our school is located in that area.","我們學校位在那個區域。"],["The leader was unable to locate the meeting point on the map.","隊長在地圖上找不到會合點。"],["They located their new store on Second Avenue.","他們把新的商店設在第二大道上。"]]},
{"word":"location","pos":"n.","pron":"[loˈkeʃən]","zh":"地點；位置","concept":"某人事物所在的地方。","related":["locate"],"syn":["place","site"],"ant":[],"ex":[["Please come visit our store at its new location.","請到我們店的新址參觀。"],["Finding the location of the escaped prisoner was difficult.","要找到這名逃犯的藏身處還真不容易。"]]},
{"word":"costly","pos":"a.","pron":"[ˈkɔstli]","zh":"昂貴的；代價高的","concept":"花費高或造成重大代價。","related":["cost"],"syn":["expensive"],"ant":["cheap"],"ex":[["Money is hard to earn, so I never buy costly clothes.","錢很難賺，因此我絕不買昂貴的衣服。"],["George made a costly mistake by investing all his money in that project.","喬治把所有的錢全部投入那項企畫，犯了一個代價很高的錯誤。"]]},
{"word":"mostly","pos":"adv.","pron":"[ˈmostli]","zh":"主要地","concept":"大部分、主要是。","related":["largely","mainly","primarily"],"syn":["mainly","largely"],"ant":[],"ex":[["John succeeded mostly because he worked hard and had great ambition.","約翰能夠成功主要是因為他努力工作又有強烈的企圖心。"]]},

const key='unit01_reading_vocab_lab_v2';let state=JSON.parse(localStorage.getItem(key)||'{"selected":"unite","level":1,"mastered":{},"wrong":[],"query":""}');let view='read';const $=s=>document.querySelector(s);function save(){localStorage.setItem(key,JSON.stringify(state));topStat()}function W(x=state.selected){return words.find(w=>w.word===x)||words[0]}function filtered(){let q=(state.query||'').toLowerCase();if(!q)return words;return words.filter(w=>[w.word,w.zh,w.pos,w.related.join(' '),w.syn.join(' '),w.ant.join(' '),w.ex.map(e=>e.join(' ')).join(' ')].join(' ').toLowerCase().includes(q))}function topStat(){let n=Object.keys(state.mastered).length;$('#stat').textContent=`${n} / ${words.length} mastered`;$('#bar').style.width=(n/words.length*100)+'%'}function chips(a,c=''){return (a||[]).length?a.map(x=>`<span class="chip ${c}">${x}</span>`).join(''):'<span class="small">No data</span>'}function speak(t){speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=.78;speechSynthesis.speak(u)}function esc(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}function hotSent(w){let s=esc(w.ex[0][0]);let re=new RegExp('\\b'+w.word+'s?\\b','i');if(re.test(s))return s.replace(re,m=>`<button class="hot ${state.selected===w.word?'active':''}" onclick="pick('${w.word}')">${m}</button>`);return `<button class="hot ${state.selected===w.word?'active':''}" onclick="pick('${w.word}')">${w.word}</button> — ${s}`}function card(w){return `<aside class="side"><div class="wordTop"><div><h2 class="word">${w.word}</h2><p class="pron">${w.pron}</p></div><span class="pos">${w.pos}</span></div><p class="zh">${w.zh}</p><p class="concept">${w.concept}</p><div class="block"><h3>Related Words</h3><div class="chips">${chips(w.related)}</div></div><div class="block"><h3>Synonyms</h3><div class="chips">${chips(w.syn,'syn')}</div></div><div class="block"><h3>Antonyms</h3><div class="chips">${chips(w.ant,'ant')}</div></div><div class="block"><h3>Examples</h3>${w.ex.map(e=>`<p class="ex"><strong>${e[0]}</strong><span>${e[1]}</span></p>`).join('')}</div><div class="btns"><button class="btn dark" onclick="speak('${w.word}')">朗讀</button><button class="btn primary" onclick="view='practice';renderPractice()">練這個字</button></div></aside>`}
function renderRead(){view='read';let w=W(),arr=filtered();$('#main').innerHTML=`<section class="layout"><article class="reader"><h2>Article / Example Context</h2><input class="search" value="${esc(state.query||'')}" placeholder="搜尋單字、中文、相關詞，例如 politics / 嫉妒 / 反義詞" oninput="state.query=this.value;save();renderRead()"><div class="article">${arr.map((x,i)=>`<div class="vline"><div class="sent"><b>${words.indexOf(x)+1}</b>${hotSent(x)}</div><div class="tr">${x.ex[0][1]}</div></div>`).join('')}</div><p class="hint">已加入圖片中可辨識的 Unit 01 單字。點藍色單字看右側卡片，再按「練這個字」進入分層測驗。</p></article>${card(w)}</section>`;nav()}function pick(x){state.selected=x;save();renderRead()}function addWrong(w,why){if(!state.wrong.some(x=>x.word===w.word&&x.why===why))state.wrong.unshift({word:w.word,zh:w.zh,why,time:new Date().toLocaleString()});save()}function sampleOptions(answer,field){let pool=words.filter(x=>x[field]!==answer).map(x=>x[field]);return [answer,...pool.sort(()=>Math.random()-.5).slice(0,3)].sort(()=>Math.random()-.5)}function qdata(){let w=W(),l=state.level;if(l===1)return {type:'choice',label:'Level 1 英選中',q:`${w.word} 的中文意思是？`,answer:w.zh,opts:sampleOptions(w.zh,'zh')};if(l===2)return {type:'choice',label:'Level 2 中選英',q:`${w.zh} 的英文是？`,answer:w.word,opts:sampleOptions(w.word,'word')};if(l===3){let e=w.ex[0][0].replace(new RegExp('\\b'+w.word+'s?\\b','i'),'______');return {type:'choice',label:'Level 3 例句填空',q:e,answer:w.word,opts:sampleOptions(w.word,'word')}}return {type:'input',label:'Level 4 主動輸出',q:`請輸入英文：${w.zh}`,answer:w.word}}function renderPractice(){view='practice';let w=W(),q=qdata();$('#main').innerHTML=`<section class="panel"><h2>分層測驗：${w.word}</h2><div class="levels">${[1,2,3,4].map(n=>`<button class="level ${state.level===n?'active':''}" onclick="state.level=${n};save();renderPractice()">Level ${n}</button>`).join('')}</div><div class="qcard"><small>${q.label}</small><p class="q">${q.q}</p></div>${q.type==='choice'?`<div class="options">${q.opts.map(o=>`<button class="opt" onclick="checkChoice(this,${JSON.stringify(o).replaceAll('"','&quot;')})">${o}</button>`).join('')}</div>`:`<input class="input" id="answer" placeholder="輸入英文單字"><div class="btns"><button class="btn primary" onclick="checkInput()">檢查</button><button class="btn" onclick="nextWord()">下一個字</button></div>`}<div class="feedback" id="fb">答題後會顯示例句與中文解析。</div></section>`;if($('#answer'))$('#answer').focus();nav()}function checkChoice(btn,val){let w=W(),q=qdata();document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.textContent===q.answer)b.classList.add('correct')});if(val===q.answer){btn.classList.add('correct');state.mastered[w.word]=true;$('#fb').textContent=`正確\n${w.ex[0][0]}\n${w.ex[0][1]}`}else{btn.classList.add('wrong');addWrong(w,q.label);$('#fb').textContent=`錯誤。答案：${q.answer}\n${w.ex[0][0]}\n${w.ex[0][1]}`}save()}function checkInput(){let w=W(),v=$('#answer').value.trim().toLowerCase();if(v===w.word.toLowerCase()){state.mastered[w.word]=true;$('#fb').textContent=`正確\n${w.ex[0][0]}\n${w.ex[0][1]}`}else{addWrong(w,'Level 4 主動輸出');$('#fb').textContent=`錯誤。答案：${w.word}\n${w.ex[0][0]}\n${w.ex[0][1]}`}save()}function nextWord(){let arr=filtered(),i=arr.findIndex(x=>x.word===state.selected);state.selected=arr[(i+1+arr.length)%arr.length].word;save();renderPractice()}function renderReview(){view='review';let arr=state.wrong;$('#main').innerHTML=`<section class="panel"><h2>錯題複習</h2>${arr.length?`<div class="list">${arr.map(x=>`<div class="row"><div><strong>${x.word}</strong><br><span>${x.zh}｜${x.why}</span></div><button class="btn" onclick="state.selected='${x.word}';save();renderPractice()">重練</button></div>`).join('')}</div><br><button class="btn" onclick="state.wrong=[];save();renderReview()">清空錯題</button>`:'<div class="feedback">目前沒有錯題。分層測驗答錯會自動加入。</div>'}</section>`;nav()}function renderMap(){view='map';$('#main').innerHTML=`<section class="panel"><h2>字族總覽</h2><div class="list">${words.map(w=>`<div class="row"><div><strong>${w.word}</strong><br><span>${w.pos}｜${w.zh}<br>Related: ${w.related.join(' / ')}<br>Antonyms: ${w.ant.join(' / ')}</span></div><button class="btn" onclick="state.selected='${w.word}';save();renderRead()">閱讀</button></div>`).join('')}</div></section>`;nav()}function nav(){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.view===view));topStat()}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{if(b.dataset.view==='read')renderRead();if(b.dataset.view==='practice')renderPractice();if(b.dataset.view==='review')renderReview();if(b.dataset.view==='map')renderMap()});topStat();renderRead();
</script></body></html>
