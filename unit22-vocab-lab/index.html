window.VOCAB_UNIT={"no":"22","storageKey":"unit22_vocab_wrong_v1","irregular":{"dam":["dam","dams","dammed","damming"],"deepen":["deepen","deepens","deepened","deepening"],"dip":["dip","dips","dipped","dipping"],"arrest":["arrest","arrests","arrested","arresting"],"erase":["erase","erases","erased","erasing"],"fancy":["fancy","fancies","fancied","fancying"],"flock":["flock","flocks","flocked","flocking"],"litter":["litter","litters","littered","littering"],"surround":["surround","surrounds","surrounded","surrounding"],"snap":["snap","snaps","snapped","snapping"]},"words":[{"word":"bravery","zh":"勇敢","pos":"n.","ipa":"/ˈbreɪvəri/","bookNo":"1","family":["brave","courage","cowardice","loyalty"],"syn":["courage"],"ant":["cowardice"],"ex":[["Peter’s bravery and loyalty led him to complete the mission.","彼得的勇氣和忠誠促使他完成這項任務。"]]},{"word":"cradle","zh":"搖籃；發源地；輕抱","pos":"n. / vt.","ipa":"/ˈkreɪdl/","bookNo":"2","family":["from the cradle to grave","hug","embrace","welfare","archaeological","cradle of civilization"],"syn":["birthplace","hold"],"ant":[],"ex":[["Thanks to the sound welfare system, everyone in this country is well taken care of from the cradle to grave.","由於健全的福利制度，該國所有的人一生都受到良好的照顧。"],["Archaeological evidence has shown that Mesopotamia was the cradle of civilization.","考古學上的證據顯示，美索不達米亞是人類文明的發源地。"],["Cathy cradled the baby in her arms as she fed it.","凱西把小寶寶抱在懷裡餵他牛奶。"]]},{"word":"dam","zh":"水壩；在河上築壩攔水","pos":"n. / vt.","ipa":"/dæm/","bookNo":"3","family":["dam–dammed–dammed","reservoir","conservationist","dam the river"],"syn":["barrier"],"ant":[],"ex":[["The government is building a dam in that area, but conservationists are strongly against it for fear that it might spoil the environment.","政府正在該區興建一座水壩，但保育人士強烈反對，害怕這麼做會對環境造成危害。"],["The government decided to dam the river to prevent further floods.","政府決定在河上築壩攔水，以防止再有洪水氾濫。"]]},{"word":"darling","zh":"親愛的；可愛的","pos":"n. / adj.","ipa":"/ˈdɑːrlɪŋ/","bookNo":"4","family":["dear","honey","puppy"],"syn":["dear","beloved"],"ant":[],"ex":[["Oh my darling! How I have missed you!","噢，親愛的！我真是想死你了！"],["What a darling little puppy you have, Lisa.","麗莎，妳這隻小狗狗真是可愛。"]]},{"word":"deepen","zh":"變深；使加深；使強烈","pos":"vi. / vt.","ipa":"/ˈdiːpən/","bookNo":"5","family":["deep","deeply","depth","in-depth","an in-depth report","lengthen"],"syn":["intensify","strengthen"],"ant":["weaken","shallow"],"ex":[["The expert suggested that we deepen the river to prevent flooding.","該專家建議我們把河加深以防水災。"],["The water deepens suddenly beyond this point.","越過這個地點後水位會突然加深。"],["You’ll find more interesting facts as you deepen your research into this subject.","你對這個主題有了更深入的研究後，就會發現更多有趣的事實。"],["After being classmates for three years, George and Betty’s friendship deepened into love.","在當了三年的同學後，喬治與貝蒂之間的友誼逐漸深化成愛情。"]]},{"word":"dime","zh":"（美金）一角硬幣","pos":"n.","ipa":"/daɪm/","bookNo":"6","family":["be a dime a dozen","penny","pence","be worth every penny","be worth every cent","pound","top-of-the-line"],"syn":[],"ant":[],"ex":[["A dime is worth one tenth of a United States dollar.","美金一角值十分之一美元。"],["MP3 players are a dime a dozen nowadays.","MP3播放器現在很普通。"],["The postcards are on sale for 99 pence each.","這些明信片特價一張九十九便士。"],["This car is expensive, but is worth every penny—it has all the top-of-the-line devices you can find.","這輛車很貴，不過它的每一分錢都很值得——它有所有你能找到的一流裝置。"]]},{"word":"dip","zh":"浸泡；沉下、下降；游泳；下跌；蘸醬","pos":"vt. / vi. / n.","ipa":"/dɪp/","bookNo":"7","family":["dip–dipped–dipped","dip in / into...","take a dip","sink","immerse","soapy","favorite dip"],"syn":["immerse","sink"],"ant":["rise"],"ex":[["Mary dipped her handkerchief in soapy water and gently washed it.","瑪莉把手帕浸在肥皂水裡，輕柔地洗滌。"],["The price of airline tickets dips between September and November.","九月到十一月間，機票價格會下跌。"],["Fiona decided to take a dip in the swimming pool before dinner.","費歐娜決定在吃晚餐前先在游泳池裡游一會兒。"],["There was a dip in sales towards the end of the year.","銷售量接近年底時下滑了。"],["Helen’s favorite dip is made from tomatoes and onions.","海倫最喜歡的蘸醬是用番茄和洋蔥調製成的。"]]},{"word":"arrest","zh":"逮捕","pos":"n. / vt.","ipa":"/əˈrest/","bookNo":"8","family":["be under arrest","be under house arrest","activist"],"syn":["detain"],"ant":["release"],"ex":[["Freeze! You’re under arrest! shouted the policeman.","不許動，你被捕了！警員喊道。"],["The young boy was arrested for robbing the bank.","這小子因搶銀行被逮捕。"],["The political activist has been placed under house arrest for three days.","這名政治活動分子已經被軟禁三天了。"]]},{"word":"erase","zh":"擦掉；消除","pos":"vt.","ipa":"/ɪˈreɪs/","bookNo":"9","family":["erase something from one’s mind","eraser","erasable","cancel","delete"],"syn":["delete","remove"],"ant":["preserve","record"],"ex":[["John helped his teacher erase the blackboard after class.","約翰下課後幫老師擦黑板。"],["Years have gone by, but I still can’t erase the image of my first girlfriend from my mind.","事隔多年，不過我第一任女友在我心中的影像仍然揮之不去。"]]},{"word":"fancy","zh":"愛好；想像力；別緻的；想像","pos":"n. / adj. / vt.","ipa":"/ˈfænsi/","bookNo":"10","family":["fancy–fancied–fancied","have a fancy for...","have a liking for...","fancy + noun / V-ing","imagine + noun / V-ing"],"syn":["imagine","like"],"ant":["dislike"],"ex":[["Tom has a fancy for spicy Mexican food.","湯姆喜歡吃味道重的墨西哥食物。"],["Dragons, fairies, and giants are creatures of fancy.","龍、精靈、巨人都是想像出來的。"],["Sarah dreamed that she was getting married to John while wearing a fancy dress.","莎拉夢見她穿著一件別緻的洋裝跟約翰結婚了。"],["I don’t fancy living on a desert island all by myself.","我不敢想像自己一個人住在荒島是什麼樣子。"],["I can’t imagine living on a desert island all by myself.","我不敢想像自己一個人住在荒島是什麼樣子。"]]},{"word":"fare","zh":"交通費","pos":"n.","ipa":"/fer/","bookNo":"11","family":["fee","bus fare","taxi fare","train fare"],"syn":["fee","charge"],"ant":[],"ex":[["How much is the bus fare from New York to Washington D.C.?","從紐約到華盛頓公車車費是多少錢？"]]},{"word":"flock","zh":"（羊）群；群眾；成群聚集","pos":"n. / vi.","ipa":"/flɑːk/","bookNo":"12","family":["a flock of sheep / goats","a flock of people","come in flocks","birds of a feather flock together"],"syn":["herd","crowd"],"ant":[],"ex":[["I see a flock of sheep on the hillside.","我看到山坡上有一群綿羊。"],["People came in flocks to see their favorite singer.","群眾湧進來看他們喜愛的歌手。"],["Birds of a feather flock together.","羽毛相似的鳥會聚在一塊兒；物以類聚。"],["Swallows are flocking together to fly south.","燕子正群集準備一起飛向南方。"]]},{"word":"pint","zh":"品脫；一品脫的量","pos":"n.","ipa":"/paɪnt/","bookNo":"13","family":["quart","gallon","half a kilogram","two pints make a quart","four quarts make a gallon"],"syn":[],"ant":[],"ex":[["Lee accidentally spilled about 10 pints of cream on the ground.","小李一不小心把約十品脫的奶油打翻在地上。"],["Milk comes in quart and gallon sized jugs.","牛奶都是以夸脫或加侖為單位的瓶罐裝填。"],["A gallon is a unit for measuring liquids.","加侖是測量液體的單位。"]]},{"word":"gasoline","zh":"汽油（常縮寫成 gas）","pos":"n.","ipa":"/ˈɡæsəliːn/","bookNo":"14","family":["gas","petrol","petroleum","gas station","petrol station"],"syn":["petrol"],"ant":[],"ex":[["We ran out of gasoline while in the middle of nowhere.","我們在荒郊野外時汽車沒油了。"]]},{"word":"grocery","zh":"食品雜貨（常用複數）","pos":"n.","ipa":"/ˈɡroʊsəri/","bookNo":"15","family":["groceries","a grocery store","pick up...","buy..."],"syn":["food supplies"],"ant":[],"ex":[["I need to pick up some groceries on my way home.","我回家時要順道買些食品雜貨。"]]},{"word":"stadium","zh":"體育場","pos":"n.","ipa":"/ˈsteɪdiəm/","bookNo":"16","family":["gymnasium","gym","spectator seats"],"syn":["arena"],"ant":[],"ex":[["The concert will be held in a large stadium.","演唱會將於一座大型運動場舉行。"]]},{"word":"helmet","zh":"頭盔；安全帽","pos":"n.","ipa":"/ˈhelmɪt/","bookNo":"17","family":["wear a helmet"],"syn":["headgear"],"ant":[],"ex":[["Always wear a helmet when you ride a motorcycle.","騎乘機車一定要戴安全帽。"]]},{"word":"hometown","zh":"故鄉；家鄉","pos":"n.","ipa":"/ˈhoʊmtaʊn/","bookNo":"18","family":["homesick","homeland","memorial"],"syn":["home town","birthplace"],"ant":[],"ex":[["William Shakespeare’s memorial is located in his hometown.","莎士比亞紀念館坐落在莎翁的故鄉。"]]},{"word":"honesty","zh":"誠實","pos":"n.","ipa":"/ˈɑːnəsti/","bookNo":"19","family":["honest","dishonesty","Honesty is the best policy.","competence"],"syn":["truthfulness","integrity"],"ant":["dishonesty"],"ex":[["John has won my respect not because of his competence but because of his honesty.","約翰贏得我的尊敬不是因為他有能力，而是因為他誠實。"],["Honesty is the best policy.","誠實為上策。"]]},{"word":"jewel","zh":"寶石；珠寶；可貴的東西（可數）","pos":"n.","ipa":"/ˈdʒuːəl/","bookNo":"20","family":["gem","jewelry（集合名詞；不可數）","a jewel","two jewels","a piece of jewelry","two pieces of jewelry","a lot of jewelry"],"syn":["gem"],"ant":[],"ex":[["The billionaire keeps most of his jewels in the bank lest they should be stolen.","因深怕被竊，那個億萬富翁把大部分的珠寶放在銀行裡。"],["Zack gave his wife a piece of jewelry to celebrate their wedding anniversary.","查克給了他太太一件珠寶以慶祝結婚週年。"]]},{"word":"junk","zh":"垃圾；廢物；丟棄廢棄物品","pos":"n. / vt.","ipa":"/dʒʌŋk/","bookNo":"21","family":["junk food","junkyard","a piece of junk","trash","garbage","rubbish","nonsense"],"syn":["trash","garbage"],"ant":["treasure"],"ex":[["That bicycle I bought yesterday is really a piece of junk.","我昨天買的那輛腳踏車真是個爛貨。"],["Marty decided to junk his old car and get a new one.","馬蒂決定丟掉舊車，然後買輛新車。"]]},{"word":"litter","zh":"垃圾；一窩小動物；把垃圾亂丟；產下一窩；亂丟垃圾","pos":"n. / vt. / vi.","ipa":"/ˈlɪtər/","bookNo":"22","family":["a litter of...","be littered with...","litterbug","trash","garbage","rubbish","a book fair"],"syn":["trash","scatter"],"ant":["clean"],"ex":[["After the fair, litter was everywhere.","展覽會之後，到處都是垃圾。"],["On hearing a strange sound, I walked over to the bushes and found a litter of puppies.","我聽到奇怪的聲音，走到樹叢去，發現了一窩小狗。"],["Some people litter by throwing garbage out of their car windows.","有些人會亂丟垃圾，把它們直接丟出車窗外。"],["Don’t litter, or you’ll be fined.","別亂丟垃圾，否則你會被罰款。"],["John is sloppy, and his room is always littered with old newspapers.","約翰很邋遢，他的房間到處都是舊報紙。"]]},{"word":"lifetime","zh":"一生；終生的","pos":"n. / adj.","ipa":"/ˈlaɪftaɪm/","bookNo":"23","family":["a chance of a lifetime","in one’s lifetime","lifelong","lifetime commitment","commitment"],"syn":["lifespan"],"ant":[],"ex":[["For Tammy, going on a trip to India was a chance of a lifetime.","對塔米來說，印度之行是個千載難逢的機會。"],["Russell married three times in his lifetime.","羅素一生中結過三次婚。"],["Marriage used to be thought of as a lifetime commitment.","婚姻曾經被視為是一種終生的承諾。"]]},{"word":"mall","zh":"大型購物中心","pos":"n.","ipa":"/mɔːl/","bookNo":"24","family":["a shopping mall","hang around"],"syn":["shopping center"],"ant":[],"ex":[["I usually hang around at the mall with friends on weekends.","我週末通常和朋友在購物中心閒晃。"]]},{"word":"marvelous","zh":"不可思議的；了不起的","pos":"adj.","ipa":"/ˈmɑːrvələs/","bookNo":"25","family":["marvellous（英）","marvel","marvel at...","wonderful"],"syn":["wonderful","amazing"],"ant":["awful"],"ex":[["John is famous for his marvelous achievements in computer science.","約翰因為在電腦科學方面有了不起的成就而聞名。"]]},{"word":"merry","zh":"愉快的","pos":"adj.","ipa":"/ˈmeri/","bookNo":"26","family":["happy","cheerful"],"syn":["happy","cheerful"],"ant":["sad"],"ex":[["The park was full of smiling parents and merry children.","整個公園都是笑容滿面的父母與高興的小朋友。"]]},{"word":"queer","zh":"古怪的","pos":"adj.","ipa":"/kwɪr/","bookNo":"27","family":["strange","weird"],"syn":["strange","weird"],"ant":["ordinary"],"ex":[["Last night, I heard a queer noise coming from the basement.","昨晚我聽見地下室傳來奇怪的噪音。"]]},{"word":"voter","zh":"選民","pos":"n.","ipa":"/ˈvoʊtər/","bookNo":"28","family":["vote","polling station","ballot"],"syn":["elector"],"ant":[],"ex":[["The voters lined up at the polling station to get the ballots.","選民在投票所排隊領取選票。"]]},{"word":"underwear","zh":"內衣（集合名詞；不可數）","pos":"n.","ipa":"/ˈʌndərwer/","bookNo":"29","family":["pack one’s underwear","suitcase"],"syn":["underclothes"],"ant":[],"ex":[["When Jack opened his suitcase, he realized that he’d forgotten to pack his underwear.","傑克打開手提箱時，他才意識到他忘記把內衣放進去了。"]]},{"word":"trumpet","zh":"小號","pos":"n.","ipa":"/ˈtrʌmpɪt/","bookNo":"30","family":["blow one’s own trumpet","blow one’s own horn","trumpeter"],"syn":["horn"],"ant":[],"ex":[["The young man seemed to keep blowing his own trumpet in the interview.","在這段訪談中，這位年輕人好像不停地在自吹自擂。"],["Roger is a talented trumpet player.","羅傑是個很有天分的小號手。"]]},{"word":"tower","zh":"塔","pos":"n.","ipa":"/ˈtaʊər/","bookNo":"31","family":["the Eiffel Tower","100 meters high"],"syn":["turret"],"ant":[],"ex":[["The tower is about 100 meters high.","這座塔約有一百公尺高。"]]},{"word":"tangerine","zh":"橘子","pos":"n.","ipa":"/ˌtændʒəˈriːn/","bookNo":"32","family":["orange","pineapple","melon","cantaloupe","lemonade","lemon","snack","dessert"],"syn":["mandarin"],"ant":[],"ex":[["What’s the difference between an orange and a tangerine?","柳橙和橘子的差別是什麼？"],["Pineapples make great snacks and desserts.","鳳梨很適合做各類點心和甜點。"],["There are many kinds of melons in this market.","這個市場有很多種類的甜瓜。"],["My uncle made a small fortune selling lemonade.","我叔叔靠著賣檸檬水發了一筆小財。"]]},{"word":"surround","zh":"環繞","pos":"vt.","ipa":"/səˈraʊnd/","bookNo":"33","family":["be surrounded with / by...","surroundings","lush"],"syn":["encircle"],"ant":["expose"],"ex":[["All the classmates surrounded Tom, praising him for his musical talent at the concert.","所有班上同學都圍繞著湯姆，讚美他在演唱會所展現的音樂天賦。"],["I live in a small village which is surrounded by lush hills.","我住在青山環繞的一座小村莊裡。"]]},{"word":"snap","zh":"啪擦一聲；折斷；快速拍攝；快照","pos":"vt. / n.","ipa":"/snæp/","bookNo":"34","family":["snap–snapped–snapped","snap one’s fingers","take a snap of...","snappy","make it snappy","hurry up"],"syn":["break","photograph"],"ant":[],"ex":[["It’s really impolite for you to snap your fingers at a waiter.","對服務生彈指是件很沒禮貌的事。"],["During our visit to the Eiffel Tower, Lucy snapped over 100 pictures.","我們去參觀艾菲爾鐵塔時，露西猛拍了一百多張相片。"],["There was a loud snap and the tree branch hit the ground.","那根樹枝啪擦一聲斷掉，然後掉落到地上。"],["We took a few snaps of the happy couple.","我們替那對開心的夫婦拍了幾張照片。"]]}]};
