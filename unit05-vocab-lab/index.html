<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Unit 05 Vocabulary Lab</title><style>:root{--bg:#f5f7fb;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--blue:#2563eb;--shadow:0 18px 55px rgba(15,23,42,.1)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}button,input{font:inherit}.app{max-width:1180px;margin:0 auto;padding:18px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.top a{color:#2563eb;font-weight:900;text-decoration:none}.hero{background:#111827;color:white;border-radius:28px;padding:28px;box-shadow:var(--shadow)}h1{margin:0;font-size:42px;letter-spacing:-.05em}.hero p{color:#cbd5e1;line-height:1.7}.layout{display:grid;grid-template-columns:380px 1fr;gap:16px;margin-top:16px}.list,.side,.quiz{background:#fff;border:1px solid var(--line);border-radius:26px;padding:16px;box-shadow:var(--shadow)}.search{width:100%;border:1px solid var(--line);border-radius:16px;padding:13px;margin-bottom:12px}.item{display:flex;justify-content:space-between;gap:8px;align-items:center;border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:8px;cursor:pointer;background:white;text-align:left}.item.active{border-color:#2563eb;background:#eff6ff}.word{font-size:22px;color:#1d4ed8;font-weight:950}.meta{color:var(--muted);font-size:13px}.title{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}.title h2{margin:0;font-size:42px;color:#1d4ed8}.tag{border-radius:999px;background:#eff6ff;color:#1d4ed8;padding:7px 10px;font-weight:900}.zh{font-size:20px;font-weight:900;margin:8px 0}.section{border-top:1px solid var(--line);padding-top:14px;margin-top:14px}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{border-radius:999px;background:#f3f4f6;padding:8px 11px;font-weight:800}.ex{border:1px solid var(--line);border-radius:18px;p let state={selected:words[0].word};const $=s=>document.querySelector(s);function speak(t){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=.78;speechSynthesis.speak(u)}function current(){return words.find(w=>w.word===state.selected)||words[0]}function highlight(sentence,word){return sentence.replace(new RegExp('\\b'+word+'\\b','gi'),m=>`<strong>${m}</strong>`)}function renderList(){const q=$('#search').value.toLowerCase();$('#list').innerHTML=words.filter(w=>(w.word+w.zh+w.related.join(' ')+w.forms.join(' ')).toLowerCase().includes(q)).map(w=>`<button class="item ${w.word===state.selected?'active':''}" onclick="state.selected='${w.word}';render()"><span><span class="word">${w.word}</span><br><span class="meta">${w.pos} ${w.zh}</span></span><span>›</span></button>`).join('')}function renderDetail(){const w=current();$('#detail').innerHTML=`<div class="title"><h2>${w.word}</h2><span class="tag">${w.pos}</span></div><div class="zh">${w.zh}</div><div class="btns"><button class="btn primary" onclick="speak('${w.word.replace(/'/g,"\\'")}')">🔊 朗讀單字</button><button class="btn" onclick="speakAll()">🔊 朗讀全部例句</button></div><div class="section"><b>用法 / 字族</b><div class="chips">${w.forms.map(x=>`<span class="chip">${x}</span>`).join('')||'<span class="meta">無</span>'}</div></div><div class="section"><b>相關詞 / 近反義</b><div class="chips">${w.related.map(x=>`<span class="chip">${x}</span>`).join('')||'<span class="meta">無</span>'}</div></div><div class="section"><b>例句</b>${w.ex.map(e=>`<div class="ex"><button class="btn" onclick="speak('${e[0].replace(/'/g,"\\'")}')">🔊 例句</button><p>${highlight(e[0],w.word)}</p><p class="meta">${e[1]}</p></div>`).join('')}</div>`}function render(){renderList();renderDetail()}function speakAll(){const w=current();let i=0;function go(){if(i>=w.ex.length)return;const u=new SpeechSynthesisUtterance(w.ex[i][0]);u.lang='en-US';u.rate=.78;u.onend=()=>{i++;setTimeout(go,350)};speechSynthesis.cancel();speechSynthesis.speak(u)}go()}$('#search').oninput=renderList;render();
function cloze(sentence,word){const re=new RegExp('\\b'+word+'(?:s|ed|ing)?\\b','i');return sentence.replace(re,'______')}const quizData=words.map(w=>{const e=w.ex[0];return{word:w.word,q:cloze(e[0],w.word),zh:e[1],ans:w.word,exp:`${w.word}：${w.zh}`}});let order=[...quizData].sort(()=>Math.random()-.5),qi=0;function qopts(q){const pool=words.map(w=>w.word).filter(x=>x!==q.ans);return[q.ans,...pool.slice(qi%pool.length,qi%pool.length+3)].sort((a,b)=>a.localeCompare(b))}function renderQuiz(){const q=order[qi%order.length];$('#quiz').innerHTML=`<div class="qcard"><small>Unit 05｜${qi+1} / ${order.length}</small><div class="q">${q.q}</div></div><div class="opts">${qopts(q).map(o=>`<button class="opt" onclick="checkQuiz(this,'${o}')">${o}</button>`).join('')}</div><div class="fb" id="qfb">選出最適合填入空格的單字。</div><div class="btns"><button class="btn" onclick="qi++;renderQuiz()">下一題</button><button class="btn primary" onclick="speak('${q.q.replace('______','blank').replace(/'/g,"\\'")}')">朗讀題句</button></div>`}function checkQuiz(btn,val){const q=order[qi%order.length];document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.textContent===q.ans)b.classList.add('correct')});if(val===q.ans){btn.classList.add('correct');$('#qfb').textContent=`正確。\n中文：${q.zh}\n解析：${q.exp}`}else{btn.classList.add('wrong');$('#qfb').textContent=`錯誤。正確答案：${q.ans}\n中文：${q.zh}\n解析：${q.exp}`}}renderQuiz();</script><script>window.VOCAB_UNIT={no:'05',zh:'第 5 課'};</script><script src="../vocab-reading-shared.js"></script></body></html>
