hing you can imagine.","泰德臉皮厚得很，會做出任何你想像得到的事。"]]},{"word":"spit","zh":"吐出；吐痰；唾液；口水","pos":"vt. / vi. / n.","ipa":"/spɪt/","bookNo":"3","family":["spit–spat–spat","spit–spit–spit","spit something out","phlegm","suck","suck on","lollipop","popsicle"],"syn":["expectoration"],"ant":[],"ex":[["Eric spat his food out when he saw a cockroach on the dish.","艾瑞克看到菜上面有蟑螂時，就把食物吐了出來。"],["I thought the gangster was going to hit me; however, he just spat and left.","我以為那個幫派分子會打我，結果他吐了口痰就走了。"],["Donald woke up on the sofa with spit all round his mouth.","唐納在沙發上醒來時滿嘴口水。"],["The little boy is sucking on a lollipop.","小男孩在舔棒棒糖。"],["The little boy sat on the ground in silence and sucked his thumb.","那個小男孩安靜地坐在地上吸大拇指。"],["The little girl asked for a suck of her sister’s popsicle.","這個小女孩求她姊姊讓她舔一舔她的冰棒。"],["The concert I went to last night really sucked.","我昨天晚上去的那場演唱會糟透了。"]]},{"word":"timber","zh":"木材（不可數）","pos":"n.","ipa":"/ˈtɪmbər/","bookNo":"4","family":["lumber","log","oak","red oak","pine","pine tree","pine away","lumberjack"],"syn":["lumber","wood"],"ant":[],"ex":[["In this country, over 80 percent of its export earnings come from timber.","這個國家百分之八十以上的外銷收益來自木材。"],["This antique table is made of red oak.","這張古董桌是紅橡木製的。"],["The lumberjacks decided to chop down dead pine trees in the forest.","伐木工們決定把森林中凋零的松樹砍掉。"],["The widow was pining away after her husband’s death.","這名寡婦自先生過世之後便日漸憔悴。"]]},{"word":"jail","zh":"監獄；使入獄","pos":"n. / vt.","ipa":"/dʒeɪl/","bookNo":"5","family":["be put in jail","be put in prison","be jailed","be imprisoned","prison","criminal","crime","criminal law","civil law","convict"],"syn":["prison","imprison"],"ant":["release"],"ex":[["Alex was put in jail for drug trafficking.","艾力克斯因販賣毒品而鋃鐺入獄。"],["Alex was jailed for drug trafficking.","艾力克斯因販賣毒品而入獄。"],["The judge put the criminal in prison.","法官判決那名罪犯入獄服刑。"],["Stealing is a criminal act.","偷竊是犯法的行為。"],["The lawyer specializes in criminal law.","這位律師專精刑法。"]]},{"word":"flavor","zh":"口味；給……調味","pos":"n. / vt.","ipa":"/ˈfleɪvər/","bookNo":"6","family":["flavor A with B","taste","herb"],"syn":["taste"],"ant":[],"ex":[["Chocolate and vanilla are two different flavors.","巧克力和香草是兩種不同的口味。"],["This dish is flavored with garlic and herbs.","這道菜用蒜頭和香草調味。"]]},{"word":"transport","zh":"運送；運輸；運輸工具","pos":"vt. / n.","ipa":"/ˈtrænspɔːrt/","bookNo":"7","family":["transportation","public transport","public transportation","boast"],"syn":["carry","convey"],"ant":[],"ex":[["In the past, people used trains to transport coal.","過去人們利用火車運送煤炭。"],["To save money, we’ll have to transport these goods to Spain by ship.","為了省錢，我們必須以海運將這些貨物運往西班牙。"],["This city boasts a good public transport system.","這座城市以擁有很棒的大眾運輸系統而自豪。"],["This city boasts a good public transportation system.","這座城市以擁有很棒的大眾運輸系統而自豪。"]]},{"word":"hourly","zh":"每小時的；每小時地","pos":"adj. / adv.","ipa":"/ˈaʊərli/","bookNo":"8","family":["on an hourly basis","every hour","weekly","on a weekly basis","biweekly","monthly","on a monthly basis","quarterly","yearly","on a yearly basis","annual","annually"],"syn":["every hour"],"ant":[],"ex":[["I get an hourly wage of $20 at my job.","我做這工作可獲得時薪二十美元。"],["Students in our school take a 10-minute break hourly.","我們學校的學生每一小時就休息十分鐘。"],["Students in our school take a 10-minute break on an hourly basis.","我們學校的學生每一小時就休息十分鐘。"],["The employee’s weekly wage was reduced by 10%.","這名員工的週薪被扣了百分之十。"],["A meeting is held weekly in our company.","我們公司每個禮拜舉行一次會議。"],["A meeting is held on a weekly basis in our company.","我們公司每個禮拜舉行一次會議。"],["Due to poor sales, the newspaper will be turned into a weekly.","因銷售不佳，這份報紙將轉型為週報。"],["Roger usually spends his monthly allowance on clothes.","羅傑通常把他每個月的零用錢都拿去買衣服。"],["I pay my phone bill monthly.","我每個月付一次電話費。"],["I pay my phone bill on a monthly basis.","我每個月付一次電話費。"],["National Geographic is a famous monthly that is published in many languages.","《國家地理雜誌》是一份以多種語言出版的著名月刊。"],["The quarterly meeting is a big event in Jerry’s company.","一季一次的會議是傑瑞所屬公司的一件大事。"],["This periodical is published quarterly.","這本期刊每季發行一次。"],["That publishing company publishes four quarterlies every three months.","那家出版公司每三個月就出版四本季刊。"],["The doctor advised my parents to have a yearly checkup.","醫生建議我父母每年做一次健康檢查。"],["This sports event attracts thousands of tourists yearly.","這項運動盛事每年都會吸引上千名遊客。"]]},{"word":"stiff","zh":"硬的；僵硬的；激烈的","pos":"adj.","ipa":"/stɪf/","bookNo":"9","family":["be stiff from + V-ing","stiffen","stiff competition","sore"],"syn":["rigid","hard"],"ant":["flexible","soft"],"ex":[["My neck stiffened after hours of reading.","看了幾個小時的書之後，我的脖子僵硬了。"],["My legs are stiff from sitting too long.","我坐得太久，兩腳都僵硬了。"],["After a long day’s work, my back was stiff and sore.","在一整天的工作後，我的背又僵硬又痠痛。"],["Small motels are going out of business in the face of stiff competition.","面對激烈的競爭，小型的汽車旅館都快關門大吉了。"]]},{"word":"rag","zh":"破布","pos":"n.","ipa":"/ræɡ/","bookNo":"10","family":["from rags to riches","in rags","ragged","rug","carpet","blanket","tapestry","cozy"],"syn":["cloth","tatter"],"ant":[],"ex":[["I felt sorry for those children in rags.","那些穿著破爛衣服的孩子令我感到心酸。"],["The beggar went from rags to riches overnight by winning the lottery.","那個乞丐贏了彩券後一夕間由赤貧變為富有。"],["A good rug can add a cozy atmosphere to your living room.","好地毯可以為府上的客廳增添舒適的氣氛。"]]},{"word":"rob","zh":"搶奪；搶劫","pos":"vt. / vi.","ipa":"/rɑːb/","bookNo":"11","family":["rob–robbed–robbed","rob somebody of something","robbery","armed robbery","commit robbery","robber","bandit","mob"],"syn":["steal from","plunder"],"ant":[],"ex":[["The bandit robbed Ted of all the money he had.","這名土匪搶了泰德身上所有的錢。"],["These pirates rob and kill whenever and wherever they want.","這批海盜肆無忌憚，隨時隨地搶劫殺人。"],["Mark was charged with armed robbery.","馬克被控武裝搶劫。"],["The young man committed robbery and was put in jail.","這個年輕人犯了搶案被關入牢內。"]]},{"word":"aboard","zh":"在（車、船或飛機）上","pos":"prep. / adv.","ipa":"/əˈbɔːrd/","bookNo":"12","family":["go aboard + 交通工具","abroad"],"syn":["on board"],"ant":["ashore"],"ex":[["We went aboard the ship at 6:00 this morning.","我們今早六點登船。"],["All the people aboard the plane are celebrities.","機上的乘客都是名人。"]]},{"word":"athlete","zh":"運動員","pos":"n.","ipa":"/ˈæθliːt/","bookNo":"13","family":["athlete’s foot","athletic","an athletic meet","warm up"],"syn":["sportsman","competitor"],"ant":[],"ex":[["An athlete should know the importance of warming up.","運動員應該知道暖身的重要性。"],["It seems that there is no cure for athlete’s foot.","香港腳似乎沒有治療方法。"]]},{"word":"ribbon","zh":"絲帶；緞帶","pos":"n.","ipa":"/ˈrɪbən/","bookNo":"14","family":["tie a ribbon around","knot","knot–knotted–knotted","tie the knot with somebody"],"syn":["band","strip"],"ant":[],"ex":[["Mom tied a beautiful purple ribbon around my birthday gift.","媽媽在我的生日禮物上繫了一條漂亮的紫色緞帶。"],["Mary tied the wires together into a knot.","瑪莉把電線綁起來打成一個結。"],["Jane is going to tie the knot with her high school sweetheart this weekend.","珍這個週末就要和她高中時期的情人結婚了。"],["Graham took the rope and knotted it around a nearby tree.","格林拿了一條粗繩並在附近的一棵樹上把它打結。"]]},{"word":"tune","zh":"曲調；旋律；轉到……頻道；為……調音","pos":"n. / vi. / vt.","ipa":"/tjuːn/","bookNo":"15","family":["sing out of tune","sing in tune","tune in to","melody"],"syn":["melody","adjust"],"ant":[],"ex":[["The girl was singing out of tune because of stage fright.","由於怯場，這女孩唱歌走音了。"],["Don’t forget to tune in to our program every day.","別忘了每天收聽本節目。"],["David tuned his guitar before the performance.","大衛在表演前替吉他調音。"]]},{"word":"dim","zh":"微暗的；使變暗","pos":"adj. / vt. / vi.","ipa":"/dɪm/","bookNo":"16","family":["dim–dimmed–dimmed","bright"],"syn":["faint","darken"],"ant":["bright"],"ex":[["You will hurt your eyes working in such dim light.","在這樣暗淡的燈光下工作會損傷你的視力。"],["Katrina dimmed the light in the living room to create a romantic mood.","卡崔娜調暗客廳的燈以營造浪漫的氣氛。"]]},{"word":"carriage","zh":"馬車","pos":"n.","ipa":"/ˈkærɪdʒ/","bookNo":"17","family":["carrier"],"syn":["coach"],"ant":[],"ex":[["I still remember riding in Grandpa’s carriage when I was small.","我還記得小時候坐在祖父馬車裡的情景。"]]},{"word":"thankful","zh":"感謝的；感激的","pos":"adj.","ipa":"/ˈθæŋkfəl/","bookNo":"18","family":["be thankful to somebody for something","be grateful to somebody for something","be obliged to somebody for something","be indebted to somebody for something","thank","grateful"],"syn":["grateful","obliged"],"ant":["ungrateful"],"ex":[["I’m really thankful to you for all the support you gave me and my family.","我真的很感激你對我和我家人的支持。"]]},{"word":"brass","zh":"黃銅；銅管樂器的","pos":"n. / adj.","ipa":"/bræs/","bookNo":"19","family":["copper","bronze","brass instrument"],"syn":["alloy"],"ant":[],"ex":[["The medal the commander gave me was made of brass.","指揮官頒發給我的獎章是黃銅打造的。"],["The trumpet is just one example of a brass instrument.","小號只是銅管樂器的其中一種。"]]},{"word":"shallow","zh":"淺的；膚淺的","pos":"adj.","ipa":"/ˈʃæloʊ/","bookNo":"20","family":["superficial","deep","the shallow end"],"syn":["superficial"],"ant":["deep"],"ex":[["Kids should play in the shallow end of the pool.","小朋友應該待在泳池淺水的那一端玩水。"],["I don’t like to deal with shallow people.","我不喜歡和膚淺的人打交道。"]]},{"word":"kidney","zh":"腎臟","pos":"n.","ipa":"/ˈkɪdni/","bookNo":"21","family":["a kidney transplant","lung","lung cancer"],"syn":[],"ant":[],"ex":[["Johnny will die if he doesn’t have a kidney transplant soon.","如果強尼不趕快進行腎臟移植，他很快就會死掉。"],["Research has proven that smoking leads to lung cancer.","研究證實抽菸會導致肺癌。"]]},{"word":"saucer","zh":"茶托；淺碟","pos":"n.","ipa":"/ˈsɔːsər/","bookNo":"22","family":["a flying saucer","sauce","soy sauce"],"syn":["dish"],"ant":[],"ex":[["I gave Mike a set of cups and saucers for his birthday.","我送麥克一組茶杯和茶托作為生日禮物。"],["Pour the tomato sauce over the noodles and then add cheese.","將番茄醬倒在麵條上，然後加上起司。"]]},{"word":"receiver","zh":"（電話）聽筒","pos":"n.","ipa":"/rɪˈsiːvər/","bookNo":"23","family":["receive","telephone receiver","receipt"],"syn":["handset"],"ant":[],"ex":[["The receptionist picked up the telephone receiver and said, “Hello.”","接待員拿起電話聽筒說：「哈囉。」"],["When you pay the bill, don’t forget to ask for a receipt.","你付錢時，別忘了要發票。"]]},{"word":"mighty","zh":"強大的；強力的","pos":"adj.","ipa":"/ˈmaɪti/","bookNo":"24","family":["almighty","God Almighty","powerful","might"],"syn":["powerful","strong"],"ant":["weak"],"ex":[["The mighty lion roared from the hilltop.","勇猛的獅子從山頂發出怒吼。"]]},{"word":"swift","zh":"迅速的；敏捷的","pos":"adj.","ipa":"/swɪft/","bookNo":"25","family":["prompt","quick","swift current"],"syn":["prompt","quick","rapid"],"ant":["slow"],"ex":[["A swift current carried the little boat down the river.","一道急流將小船順著河流沖走。"]]},{"word":"approve","zh":"批准；核可；贊同","pos":"vt. / vi.","ipa":"/əˈpruːv/","bookNo":"26","family":["approve of","agree to","stay up"],"syn":["authorize","agree"],"ant":["disapprove","reject"],"ex":[["The manager didn’t approve our plan.","經理沒有核准我們的計畫。"],["I felt very happy when the boss approved my proposal.","老闆核准我的提案時我感到很高興。"],["Father does not approve of our staying up late at night.","老爸不贊同我們熬夜。"],["I felt upset when nobody approved of my idea at the meeting.","會議上沒有人贊同我的點子，我感到很難過。"]]},{"word":"lightning","zh":"閃電","pos":"n.","ipa":"/ˈlaɪtnɪŋ/","bookNo":"27","family":["a bolt of lightning","thunder","a crash of thunder"],"syn":["flash"],"ant":[],"ex":[["The farmer was struck by lightning but fortunately he survived.","農夫被閃電擊中，所幸他活了下來。"]]},{"word":"pitch","zh":"投（球）；紮（營）；瀝青；音調","pos":"vt. / n.","ipa":"/pɪtʃ/","bookNo":"28","family":["pitch-black","perfect pitch","pitcher","a high-pitched voice","pitch a tent"],"syn":["throw","tone"],"ant":[],"ex":[["Dad pitched the ball to my sister, and she swung the bat.","老爸投球給我妹妹，她便揮棒。"],["Let’s pitch our tent by the river.","咱們在河邊紮營吧。"],["I dare not go downstairs myself. It’s pitch-black down there.","我不敢自己一個人下樓。那裡烏漆抹黑的。"],["Andrew has perfect pitch; he can sing any note correctly without the help of instruments.","安德魯有絕對音感；他不用樂器輔助就能準確地唱出任何音符。"]]}];let V=words,F=[...V],n=0,m='learn';const $=s=>document.querySelector(s),E=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),S=a=>[...a].sort(()=>Math.random()-.5),K='unit18_vocab_lab_mistakes';function W(){try{return JSON.parse(localStorage.getItem(K)||'[]')}catch{return[]}}function save(w,k){let a=W();if(!a.some(x=>x.w===w.word&&x.k===k)){a.unshift({w:w.word,z:w.zh,k});localStorage.setItem(K,JSON.stringify(a))}}function list(){$('#list').innerHTML=F.map((w,i)=>`<button class="item ${i===n?'on':''}" data-i="${i}"><b>${E(w.word)}</b><small>${E(w.bookNo)} · ${E(w.zh)}</small></button>`).join('');document.querySelectorAll('.item').forEach(b=>b.onclick=()=>{n=Number(b.dataset.i);render()})}function chips(a){return a.length?a.map(x=>`<span class="chip">${E(x)}</span>`).join(''):'<span class="meta">—</span>'}function learn(){let w=F[n];$('#stage').innerHTML=`<button class="primary" id="say">🔊 朗讀</button><h1 class="word">${E(w.word)}</h1><p class="meta">${E(w.pos)}　${E(w.ipa)}　課本 ${E(w.bookNo)}</p><div class="meaning">${E(w.zh)}</div><div class="group"><b>常用片語／字族</b><div class="chips">${chips(w.family)}</div></div><div class="group"><b>近義詞</b><div class="chips">${chips(w.syn)}</div></div><div class="group"><b>反義詞</b><div class="chips">${chips(w.ant)}</div></div>${w.ex.map((x,i)=>`<div class="ex">${i+1}. ${E(x[0])}<small>${E(x[1])}</small></div>`).join('')}`;$('#say').onclick=()=>{speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(w.word);u.lang='en-US';u.rate=.78;speechSynthesis.speak(u)}}function blank(sentence,word){const e=word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),r=new RegExp('\\b'+e+'(?:s|es|ed|d|ing|ly)?\\b','i');return sentence.replace(r,'______')}function quiz(){let w=F[n],x=w.ex[0]||['',''],q=blank(x[0],w.word),o=S([w.word,...S(V.filter(v=>v.word!==w.word)).slice(0,3).map(v=>v.word)]);$('#stage').innerHTML=`<div class="q">${E(q)}</div><div class="opts">${o.map(a=>`<button class="opt" data-a="${E(a)}">${E(a)}</button>`).join('')}</div><div class="fb" id="fb">請選答案。</div>`;document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{document.querySelectorAll('.opt').forEach(t=>{t.disabled=true;if(t.dataset.a===w.word)t.classList.add('good')
