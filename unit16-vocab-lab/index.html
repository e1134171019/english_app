ter.","你比賽中的表現勉強可以，但可以更好一點。"]]},{"w":"charm","z":"魅力；符咒；使著迷","p":"n. / vt.","i":"/tʃɑːrm/","b":"3","f":["be charmed by...","work like a charm","lucky charm","charming","Prince Charming"],"s":["attraction","charisma","fascination"],"a":[],"x":[["The actor is not very handsome but has great charm.","這名演員不是很帥但是魅力十足。"],["This ring is my lucky charm.","這只戒指是我的幸運符。"],["I tried your idea, and it worked like a charm.","我嘗試你的點子，效果正如預期。"],["Rachel is charmed by AhXiong’s sense of humor.","瑞秋為阿雄的幽默感所吸引。"],["I’m under Jane’s spell because she is so charming.","我對珍意亂情迷因為她真迷人。"]]},{"w":"meaningful","z":"有意義的；意義深長的","p":"adj.","i":"/ˈmiːnɪŋfəl/","b":"4","f":["mean","means","meaning","significant","meaningless","insignificant","by means of..."],"s":["significant"],"a":["meaningless","insignificant"],"x":[["We had a meaningful and constructive meeting this afternoon.","今天下午我們開了一場有意義且具建設性的會議。"],["Patricia gave her husband a meaningful look as he hugged her.","派翠莎的老公擁抱她時，她意味深長地看了他一眼。"],["I find this essay utterly meaningless.","我覺得這篇文章完全沒有意義。"]]},{"w":"statue","z":"雕像","p":"n.","i":"/ˈstætʃuː/","b":"5","f":["sculpture","the Statue of Liberty","erect a statue","in honor of..."],"s":["sculpture"],"a":[],"x":[["The Statue of Liberty is probably America’s most famous landmark.","自由女神像可能是美國最知名的地標。"],["The city government erected a statue in the park in honor of the hero.","市政府在公園內豎立一座雕像以記念這位英雄。"]]},{"w":"living","z":"生計；活著的；現在的","p":"n. / adj.","i":"/ˈlɪvɪŋ/","b":"6","f":["earn / make a living + V-ing","make a living as...","live","alive","livelihood"],"s":["livelihood"],"a":["dead"],"x":[["Joseph makes a living teaching English.","喬瑟夫以教英文維生。"],["Joseph makes a living as an English teacher.","喬瑟夫以英文老師的身分維生。"],["Mr. Akins is one of the few living WWII veterans.","亞金斯先生是少數僅存的二次世界大戰老兵之一。"],["The rescuers found no one alive in the cave-in.","此次礦坑災變中救難人員未發現有任何生還者。"]]},{"w":"communicate","z":"傳達；溝通","p":"vt. / vi.","i":"/kəˈmjuːnɪkeɪt/","b":"7","f":["communicate with somebody","communication","communicative","communicable"],"s":["convey","express"],"a":[],"x":[["Richard always communicates his ideas clearly.","理查總能清楚地表達他的意見。"],["The deaf communicate through sign language.","失聰者透過手語溝通。"],["I have difficulty communicating with a stubborn man like Tony.","我很難與像東尼那樣固執的人溝通。"]]},{"w":"swell","z":"腫大；膨脹；隆起","p":"vi. / n.","i":"/swel/","b":"8","f":["swell–swelled–swelled / swollen","shrink","shrink–shrank–shrunk"],"s":["expand","rise"],"a":["shrink"],"x":[["The man’s finger swelled after the snake bit it.","該男子的手指被蛇咬後腫了起來。"],["The audience swelled to 50,000 before the concert came to an end.","演唱會結束前，觀眾人數暴增到五萬人。"],["A large swell appeared in the middle of the road.","路中央出現了一大片路面隆起。"],["Cotton clothes usually shrink in the dryer.","棉質衣服烘乾後通常會縮小。"],["Hot water shrinks woolen clothes.","熱水會使毛線衣縮水。"]]},{"w":"knight","z":"騎士","p":"n.","i":"/naɪt/","b":"9","f":["crown","crown somebody king / queen","be crowned king / queen"],"s":[],"a":[],"x":[["That knight betrayed his country for his lover.","那名騎士為了情人而背叛國家。"],["Queen Elizabeth’s crown is on display in the Jewel House in the Tower of London.","伊麗莎白女皇的皇冠在倫敦塔內的珠寶屋展示。"],["How long will it be before Prince Charles is crowned king?","要多久查爾斯王子才會被加冕為國王？"]]},{"w":"gang","z":"幫派；成群結隊","p":"n. / vi.","i":"/ɡæŋ/","b":"10","f":["gang up against / on somebody","gangster","clan","mob","a mob of + number","mobster"],"s":["group","mob"],"a":[],"x":[["Rumor has it that Peter joined a street gang when he was young.","謠傳彼得年輕時曾加入某街頭幫派。"],["The shop owners ganged together to resist the increase in rent.","這些商家店主集結起來抵制租金調漲。"],["The older prisoners would often gang up against the younger ones.","這些較資深的囚犯通常聯合對付較菜的囚犯。"],["The demonstrators got out of control and became a mob.","那些示威群眾失控，變成一群暴民。"],["A mob of some sixty occupied the building and destroyed everything they saw.","一群為數約六十人的暴徒占據大樓，看到什麼就全加以破壞。"],["The actress was mobbed by her fans as soon as she went out of the airport.","該女演員一出機場時，就被她的影迷團團圍住。"]]},{"w":"thread","z":"縫衣服的線；頭緒；穿線於","p":"n. / vt.","i":"/θred/","b":"11","f":["lose the thread of...","a thread of hope","thread a needle","cord","rope","stitch","A stitch in time saves nine."],"s":["strand"],"a":[],"x":[["Do you have a needle and thread I can borrow?","你有針和線可以借我嗎？"],["I missed a few words, so I lost the thread of what you were saying.","有幾個字我沒聽到，因此我不懂你在說什麼。"],["There is a thread of hope that the boy is still alive.","對小男孩仍存活著一事我們還抱持一線希望。"],["No one in the class knew how to thread a needle.","班上沒有人知道怎麼穿針線。"],["Jack was wounded in a fight and needed 10 stitches.","傑克因打架受了傷，需要縫十針。"],["This jacket has our brand name stitched across the back.","這件外套後面繡上了我們的品牌名稱。"]]},{"w":"explode","z":"爆炸；炸掉；激增","p":"vt. / vi.","i":"/ɪkˈsploʊd/","b":"12","f":["explosion","explosive","blow up"],"s":["blow up","burst"],"a":[],"x":[["In 1949, the Soviet Union exploded its first atomic bomb.","1949年，蘇聯引爆它的第一顆原子彈。"],["The newspapers showed pictures of the plane after it exploded.","報紙登出這架飛機爆炸後的照片。"],["We exploded the bridge so the enemy troops couldn’t cross it.","我們把橋炸掉，好讓敵軍無法通過。"],["We blew up the bridge so the enemy troops couldn’t cross it.","我們把橋炸掉，好讓敵軍無法通過。"],["The population of this town has exploded in recent years.","該鎮的人口近年來激增。"]]},{"w":"horror","z":"恐怖；恐懼","p":"n.","i":"/ˈhɔːrər/","b":"13","f":["to one’s horror","a horror movie","horrify","horrible","a detective movie","a romantic movie","a comedy movie","a tragedy movie"],"s":["fear","panic"],"a":[],"x":[["To my horror, I realized a stranger was in my house.","嚇壞我的是，我發現家裡有個陌生人。"],["Horror movies do not appeal to me. I hate to be scared.","恐怖片並不吸引我。我討厭被嚇的感覺。"],["The horrible accident was the worst one we’ve had this year.","這起可怕的意外是今年我們經歷最嚴重的一件。"]]},{"w":"gap","z":"裂縫；歧異","p":"n.","i":"/ɡæp/","b":"14","f":["the generation gap","a wide gap","difference","crack"],"s":["difference","crack"],"a":[],"x":[["Because of the generation gap, my mom doesn’t share my interest in this type of music.","因為有代溝，我媽並不和我一樣喜歡這類的音樂。"],["There is a wide gap in the views of the two opposing parties.","兩個對立的政黨看法之間有很大的歧異。"]]},{"w":"fountain","z":"噴泉；噴水池","p":"n.","i":"/ˈfaʊntən/","b":"15","f":["a fountain machine","a fountain pen"],"s":["spring"],"a":[],"x":[["Some people throw coins into fountains and make a wish, believing that their wish will come true.","有些人會擲銅幣到池子裡並許個願，他們相信這些願望會成真。"]]},{"w":"youngster","z":"年輕人","p":"n.","i":"/ˈjʌŋstər/","b":"16","f":["young","youth","youthful","elderly","the elderly","elder"],"s":["youth"],"a":["elderly"],"x":[["More and more youngsters are becoming concerned about the environment.","越來越多的年輕人開始關心環境問題。"],["These youths are my friends.","這些年輕人是我的朋友。"],["Please give your seat to elderly passengers on the bus.","在公車上請讓座給年長的乘客。"],["We should learn to respect the elderly.","我們應學習尊重長者。"]]},{"w":"tap","z":"水龍頭；輕拍；輕敲","p":"n. / vt. / vi.","i":"/tæp/","b":"17","f":["tap water","tap somebody on the shoulder","tap on...","faucet","turn on / off the faucet"],"s":["faucet","pat"],"a":[],"x":[["This tap water is not potable; it’s polluted.","不能飲用這自來水；它被汙染了。"],["I tapped John on the shoulder to get his attention.","我輕拍約翰的肩膀，想引起他的注意。"],["Paul tapped on the window of the room to wake up his brother.","保羅輕敲房間的窗戶，要叫醒他弟弟。"],["I turned on the faucet, but no water came out.","我打開水龍頭，卻沒有水流出來。"]]},{"w":"racial","z":"種族的","p":"adj.","i":"/ˈreɪʃəl/","b":"18","f":["racial discrimination","race","tolerate"],"s":[],"a":[],"x":[["Racial discrimination is something that shouldn’t be tolerated.","種族歧視不應該被容忍。"]]},{"w":"summit","z":"頂峰；頂點","p":"n.","i":"/ˈsʌmɪt/","b":"19","f":["summit talks","the summit of one’s career","peak"],"s":["peak"],"a":["bottom"],"x":[["The world leaders held summit talks in Manila last month.","上個月各國領袖在馬尼拉舉行高峰會議。"],["Winning the heavyweight title was the summit of Albert’s professional career.","贏得重量級冠軍是亞伯特職業生涯的最高峰。"]]},{"w":"follower","z":"擁護者；信徒","p":"n.","i":"/ˈfɑːloʊər/","b":"20","f":["follow","leader"],"s":["supporter","disciple"],"a":["leader"],"x":[["The followers of the church all participated in t
