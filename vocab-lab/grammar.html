<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Unit 01-03 Vocabulary Cloze Choice</title><style>:root{--bg:#f5f7fb;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--blue:#2563eb;--shadow:0 18px 55px rgba(15,23,42,.1)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}button{font:inherit;border:0;cursor:pointer}.app{max-width:980px;margin:0 auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}.top a{color:#2563eb;font-weight:900;text-decoration:none}.brand h1{margin:0;font-size:32px;letter-spacing:-.05em}.brand p{margin:6px 0 0;color:var(--muted);line-height:1.6}.filters{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.filter{border-radius:999px;padding:10px 14px;background:#fff;border:1px solid var(--line);font-weight:900;color:var(--muted)}.filter.active{background:#111827;color:#fff}.stat{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.pill{border-radius:999px;background:#eef2ff;color:#1d4ed8;padding:8px 12px;font-weight:900}.panel{margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:var(--shadow)}.qcard{background:#111827;color:#fff;border-radius:24px;padding:24px;margin-bottom:14px}.qcard small{color:#cbd5e1;font-weight:900}.q{font-size:28px;line-height:1.45;font-weight:950;margin:10px 0 0}.zh{margin:10px 0 0;color:#cbd5e1;line-height:1.6}.options{display:grid;grid-template-columns:1fr 1fr;gap:10px}.opt{border-radius:16px;padding:15px;background:#fff;border:1px solid var(--line);font-weight:900;text-align:left}.opt.correct{background:#dcfce7;color:#166534;border-color:#86efac}.opt.wrong{background:#ffe4e6;color:#be123c;border-color:#fda4af}.feedback{margin-top:14px;border-radius:18px;padding:14px;background:#f9fafb;border:1px solid var(--line);white-space:pre-wrap;line-height:1.7}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.btn{border-radius:16px;padding:14px;font-weight:900;background:#e5e7eb}.primary{background:var(--blue);color:#fff}@media(max-width:700px){.options,.btns{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.q{font-size:23px}.panel{padding:18px;border-radius:22px}}</style></head><body><main class="app"><header class="top"><div class="brand"><h1>1-3 課單字填空選擇題</h1><p>看到英文句子空格，從四個「單字」中選出最適合的一個。這裡不是考詞形變化，而是考單字語意與句子搭配。</p></div><a href="./">回選單</a></header><nav class="filters"><button class="filter active" data-unit="all">全部</button><button class="filter" data-unit="Unit 01">Unit 01</button><button class="filter" data-unit="Unit 02">Unit 02</button><button class="filter" data-unit="Unit 03">Unit 03</button><button class="filter" data-unit="wrong">錯題</button></nav><section class="stat"><span class="pill" id="score">0 correct</span><span class="pill" id="count">0 / 0</span><span class="pill" id="unitLabel">全部</span></section><section class="panel" id="app"></section></main><script>
const questions=[
{unit:'Unit 01',q:'Our goal is to ______ the labor unions to oppose the new policy.',zh:'我們的目標是聯合勞工團體反對新政策。',opts:['unite','remain','locate','recognize'],ans:'unite',exp:'unite = 使聯合；團結。句子語意是把 labor unions 聯合起來。'},
{unit:'Unit 01',q:'The problem still ______ unsolved.',zh:'這個問題仍然沒有解決。',opts:['remains','unites','locates','processes'],ans:'remains',exp:'remain = 繼續存在；仍是。remain unsolved = 仍未解決。'},
{unit:'Unit 01',q:'It seems ______ that the accident was caused by carelessness.',zh:'看來意外很可能是由粗心造成。',opts:['probable','political','unique','costly'],ans:'probable',exp:'probable = 很可能的。'},
{unit:'Unit 01',q:'The police were able to ______ the cause of the accident.',zh:'警方能夠確定事故原因。',opts:['determine','recognize','process','locate'],ans:'determine',exp:'determine = 決定；確定。'},
{unit:'Unit 01',q:'It will take about three weeks to ______ your application.',zh:'處理你的申請大約要三週。',opts:['process','unite','remain','envy'],ans:'process',exp:'process 當動詞是「處理」。'},
{unit:'Unit 01',q:'Jack could not ______ his daughter after twenty years.',zh:'二十年後傑克認不出他的女兒。',opts:['recognize','determine','hire','locate'],ans:'recognize',exp:'recognize = 認出。'},
{unit:'Unit 01',q:'Every person’s fingerprints are ______.',zh:'每個人的指紋都是獨一無二的。',opts:['unique','costly','jealous','political'],ans:'unique',exp:'unique = 獨特的；獨一無二的。'},
{unit:'Unit 01',q:'Our school is ______ in that area.',zh:'我們學校位在那個區域。',opts:['located','recognized','processed','hired'],ans:'located',exp:'be located in = 位於。'},
{unit:'Unit 01',q:'I never buy ______ clothes because money is hard to earn.',zh:'我從不買昂貴的衣服，因為錢很難賺。',opts:['costly','unique','jealous','hopeful'],ans:'costly',exp:'costly = 昂貴的；代價高的。'},
{unit:'Unit 01',q:'Why are you so ______ of David’s promotion?',zh:'你為什麼那麼嫉妒大衛升遷？',opts:['jealous','joyful','fearful','hopeful'],ans:'jealous',exp:'jealous of = 嫉妒……。'},
{unit:'Unit 01',q:'Ms. Wilson took up photography as her ______.',zh:'威爾森女士以攝影作為職業。',opts:['career','property','opportunity','majority'],ans:'career',exp:'career = 職業；生涯。'},
{unit:'Unit 02',q:'We are not ______ to smoke here.',zh:'我們不能在這裡抽菸。',opts:['permitted','represented','reduced','performed'],ans:'permitted',exp:'be permitted to = 被允許做。'},
{unit:'Unit 02',q:'You are not allowed to use the machine without my ______.',zh:'沒有我的許可，你不能使用這台機器。',opts:['permission','volume','attitude','response'],ans:'permission',exp:'permission = 許可；准許。'},
{unit:'Unit 02',q:'Would you mind turning the ______ down?',zh:'你介意把音量關小嗎？',opts:['volume','strength','response','attitude'],ans:'volume',exp:'turn the volume down = 把音量調小。'},
{unit:'Unit 02',q:'This ring ______ my love for you.',zh:'這枚戒指代表我對你的愛。',opts:['represents','reduces','prevents','performs'],ans:'represents',exp:'represent = 代表；象徵。'},
{unit:'Unit 02',q:'Tony has a positive ______ toward life.',zh:'東尼對人生持積極態度。',opts:['attitude','volume','product','technique'],ans:'attitude',exp:'attitude toward = 對……的態度。'},
{unit:'Unit 02',q:'He will not ______ his standard of living.',zh:'他不願降低生活水準。',opts:['reduce','permit','represent','achieve'],ans:'reduce',exp:'reduce = 降低；減少。'},
{unit:'Unit 02',q:'Brian was caught using ______ money.',zh:'布萊恩因使用假鈔被抓。',opts:['fake','moral','normal','technical'],ans:'fake',exp:'fake = 假的；偽造的。'},
{unit:'Unit 02',q:'Operating this machine requires physical ______.',zh:'操作這台機器需要體力。',opts:['strength','weakness','response','technique'],ans:'strength',exp:'strength = 力量。'},
{unit:'Unit 02',q:'Math is my ______, but music is my forte.',zh:'數學是我的弱項，但音樂是我的強項。',opts:['weakness','strength','technique','achievement'],ans:'weakness',exp:'weakness = 弱點。'},
{unit:'Unit 02',q:'Precautions will ______ many accidents from happening.',zh:'預防措施能防止許多意外發生。',opts:['prevent','perform','permit','produce'],ans:'prevent',exp:'prevent A from V-ing = 阻止 A 發生。'},
{unit:'Unit 02',q:'Has there been any ______ to your letter?',zh:'你的信有回音了嗎？',opts:['response','responsibility','performance','permission'],ans:'response',exp:'response = 回應；回答。'},
{unit:'Unit 02',q:'You should take ______ for what you have done.',zh:'你應該對自己做過的事負責。',opts:['responsibility','response','strength','permission'],ans:'responsibility',exp:'take responsibility for = 對……負責。'},
{unit:'Unit 02',q:'The surgeon has ______ this operation before.',zh:'這位外科醫生以前做過這個手術。',opts:['performed','permitted','prevented','represented'],ans:'performed',exp:'perform = 執行；履行；表演。'},
{unit:'Unit 02',q:'If you work hard, you will eventually ______ your goals.',zh:'如果你努力，最後會達成目標。',opts:['achieve','perform','reduce','prevent'],ans:'achieve',exp:'achieve one’s goals = 達成目標。'},
{unit:'Unit 03',q:'Ted ______ calmly to the accusation.',zh:'泰德冷靜回應指控。',opts:['reacted','announced','suffered','destroyed'],ans:'reacted',exp:'react to = 對……反應。'},
{unit:'Unit 03',q:'We contributed to the charity ______.',zh:'我們捐款給慈善基金。',opts:['fund','audience','mission','structure'],ans:'fund',exp:'fund = 基金；資金。'},
{unit:'Unit 03',q:'The concert drew a large ______.',zh:'那場演唱會吸引大量觀眾。',opts:['audience','staff','crew','mission'],ans:'audience',exp:'audience = 觀眾。'},
{unit:'Unit 03',q:'The film has a good ______ lesson.',zh:'這部影片有很好的道德教訓。',opts:['moral','original','specific','tropical'],ans:'moral',exp:'moral lesson = 道德教訓。'},
{unit:'Unit 03',q:'John will ______ who will play the characters.',zh:'約翰會公布誰要演出角色。',opts:['announce','react','suffer','reveal'],ans:'announce',exp:'announce = 公布；宣布。'},
{unit:'Unit 03',q:'Many scientists believe the ______ that the universe is getting larger.',zh:'很多科學家相信宇宙正在變大的理論。',opts:['theory','structure','mission','fund'],ans:'theory',exp:'theory = 理論；學說。'},
{unit:'Unit 03',q:'The ______ of the poem is very complicated.',zh:'這首詩的結構很複雜。',opts:['structure','audience','fund','column'],ans:'structure',exp:'structure = 結構。'},
{unit:'Unit 03',q:'My father ______ from diabetes.',zh:'我爸爸患有糖尿病。',opts:['suffers','reacts','announces','reveals'],ans:'suffers',exp:'suffer from + 疾病 = 患有……。'},
{unit:'Unit 03',q:'The ______ plan was later changed.',zh:'最初的計畫後來被改了。',opts:['original','additional','specific','moral'],ans:'original',exp:'original = 原來的；最初的。'},
{unit:'Unit 03',q:'______ tables and chairs were required.',zh:'需要額外的桌椅。',opts:['Additional','Original','Specific','Tropical'],ans:'Additional',exp:'additional = 額外的；另加的。'},
{unit:'Unit 03',q:'This book has the ______ of being easy to use.',zh:'這本書的優點在於容易使用。',opts:['advantage','mission','theory','reaction'],ans:'advantage',exp:'advantage = 優勢；優點。'},
{unit:'Unit 03',q:'The man went there for a ______ purpose.',zh:'那名男子去那裡有特定目的。',opts:['specific','additional','tropical','naked'],ans:'specific',exp:'specific = 特定的；明確的。'},
{unit:'Unit 03',q:'The typhoon ______ the whole area.',zh:'颱風摧毀了整個區域。',opts:['destroyed','announced','reacted','funded'],ans:'destroyed',exp:'destroy = 毀壞；破壞。'},
{unit:'Unit 03',q:'Michael is on a secret ______ in Syria.',zh:'麥可在敘利亞執行祕密任務。',opts:['mission','fund','audience','structure'],ans:'mission',exp:'mission = 任務。'},
{unit:'Unit 03',q:'College students are ______ about their future.',zh:'大學生對未來感到焦慮。',opts:['anxious','moral','original','neat'],ans:'anxious',exp:'anxious about = 對……焦慮。'},
{unit:'Unit 03',q:'Make sure that the door is ______ when you leave.',zh:'離開時確認門已上鎖。',opts:['locked','neat','naked','juicy'],ans:'locked',exp:'locked = 已上鎖的。'},
{unit:'Unit 03',q:'Judy’s handwriting is very ______.',zh:'茱蒂的筆跡很整齊。',opts:['neat','anxious','tasty','dizzy'],ans:'neat',exp:'neat = 整齊的；整潔的。'}
];
let unit='all',i=0,score=0,wrong=JSON.parse(localStorage.getItem('vocab_cloze_wrong_123')||'[]');const $=s=>document.querySelector(s);function pool(){return unit==='wrong'?wrong:unit==='all'?questions:questions.filter(q=>q.unit===unit)}function shuffle(a){return[...a].sort(()=>Math.random()-.5)}function randomIndex(){const p=pool();i=p.length?Math.floor(Math.random()*p.length):0}function cur(){return pool()[i]}function setTop(){document.querySelectorAll('.filter').forEach(b=>b.classList.toggle('active',b.dataset.unit===unit));const p=pool();$('#score').textContent=`${score} correct`;$('#count').textContent=`${p.length?i+1:0} / ${p.length}`;$('#unitLabel').textContent=unit==='all'?'全部':unit==='wrong'?'錯題':unit}function render(){setTop();const q=cur();if(!q){$('#app').innerHTML='<div class="feedback">目前沒有題目。</div>';return}$('#app').innerHTML=`<div class="qcard"><small>${q.unit}｜選擇適合單字</small><p class="q">${q.q}</p><p class="zh">${q.zh}</p></div><div class="options">${shuffle(q.opts).map(o=>`<button class="opt" onclick='check(this,${JSON.stringify(o)})'>${o}</button>`).join('')}</div><div class="feedback" id="fb">選出最適合填入空格的單字。</div><div class="btns"><button class="btn" onclick="next()">下一題</button><button class="btn primary" onclick="speakQuestion()">朗讀題句</button></div>`}function saveWrong(q){if(!wrong.some(x=>x.q===q.q)){wrong.unshift(q);localStorage.setItem('vocab_cloze_wrong_123',JSON.stringify(wrong))}}function check(btn,val){const q=cur();document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.textContent===q.ans)b.classList.add('correct')});if(val===q.ans){btn.classList.add('correct');score++;$('#fb').textContent=`正確。\n${q.exp}`}else{btn.classList.add('wrong');saveWrong(q);$('#fb').textContent=`錯誤。正確答案：${q.ans}\n${q.exp}`}}function next(){randomIndex();render()}function speakQuestion(){const q=cur();if(!q||!('speechSynthesis' in window))return;const text=q.q.replace('______','blank');speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=.78;speechSynthesis.speak(u)}document.querySelectorAll('.filter').forEach(b=>b.onclick=()=>{unit=b.dataset.unit;randomIndex();render()});randomIndex();render();</script></body></html>
