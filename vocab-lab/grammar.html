<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Unit 01-03 Grammar Word Choice</title><style>:root{--bg:#f5f7fb;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--blue:#2563eb;--shadow:0 18px 55px rgba(15,23,42,.1)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}button{font:inherit;border:0;cursor:pointer}.app{max-width:980px;margin:0 auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}.top a{color:#2563eb;font-weight:900;text-decoration:none}.brand h1{margin:0;font-size:32px;letter-spacing:-.05em}.brand p{margin:6px 0 0;color:var(--muted);line-height:1.6}.filters{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.filter{border-radius:999px;padding:10px 14px;background:#fff;border:1px solid var(--line);font-weight:900;color:var(--muted)}.filter.active{background:#111827;color:#fff}.stat{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.pill{border-radius:999px;background:#eef2ff;color:#1d4ed8;padding:8px 12px;font-weight:900}.panel{margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:var(--shadow)}.qcard{background:#111827;color:#fff;border-radius:24px;padding:24px;margin-bottom:14px}.qcard small{color:#cbd5e1;font-weight:900}.q{font-size:28px;line-height:1.45;font-weight:950;margin:10px 0 0}.zh{margin:10px 0 0;color:#cbd5e1;line-height:1.6}.options{display:grid;grid-template-columns:1fr 1fr;gap:10px}.opt{border-radius:16px;padding:15px;background:#fff;border:1px solid var(--line);font-weight:900;text-align:left}.opt.correct{background:#dcfce7;color:#166534;border-color:#86efac}.opt.wrong{background:#ffe4e6;color:#be123c;border-color:#fda4af}.feedback{margin-top:14px;border-radius:18px;padding:14px;background:#f9fafb;border:1px solid var(--line);white-space:pre-wrap;line-height:1.7}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.btn{border-radius:16px;padding:14px;font-weight:900;background:#e5e7eb}.primary{background:var(--blue);color:#fff}.list{display:grid;gap:10px}.row{border:1px solid var(--line);border-radius:18px;padding:14px}.row strong{font-size:18px}.row span{color:var(--muted);font-size:14px;line-height:1.55}@media(max-width:700px){.options,.btns{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.q{font-size:23px}.panel{padding:18px;border-radius:22px}}</style></head><body><main class="app"><header class="top"><div class="brand"><h1>1-3 課文法單字選擇題</h1><p>用「單字選項」練文法位置與句型搭配：看到句子空格，判斷該放哪個單字或正確詞形。</p></div><a href="./">回選單</a></header><nav class="filters"><button class="filter active" data-unit="all">全部</button><button class="filter" data-unit="Unit 01">Unit 01</button><button class="filter" data-unit="Unit 02">Unit 02</button><button class="filter" data-unit="Unit 03">Unit 03</button><button class="filter" data-unit="wrong">錯題</button></nav><section class="stat"><span class="pill" id="score">0 correct</span><span class="pill" id="count">0 / 0</span><span class="pill" id="unitLabel">全部</span></section><section class="panel" id="app"></section></main><script>
const grammarQuestions=[
{unit:'Unit 01',type:'remain + 形容詞補語',q:'The problem still ______ unsolved.',zh:'這個問題仍然沒有解決。',opts:['remains','remain','remaining','remains to'],ans:'remains',exp:'主詞 The problem 是單數，remain 作連綴動詞，後接形容詞 unsolved，所以用 remains。'},
{unit:'Unit 01',type:'probable 詞性',q:'It seems ______ that this accident was caused by carelessness.',zh:'看來這場意外很可能是粗心造成的。',opts:['probable','probably','probability','probing'],ans:'probable',exp:'seem 後面接形容詞作補語；probable 是形容詞。'},
{unit:'Unit 01',type:'名詞位置',q:'The ______ is that the match will be postponed.',zh:'這場比賽很可能會延期。',opts:['probability','probable','probably','probing'],ans:'probability',exp:'The ___ is that... 空格需要名詞，所以用 probability。'},
{unit:'Unit 01',type:'determine to V',q:'Lilly ______ to leave for the hospital at once.',zh:'莉莉決定立刻前往醫院。',opts:['determined','determination','determinedly','determine'],ans:'determined',exp:'句子是過去式；determine to V = 決定要做。'},
{unit:'Unit 01',type:'be determined to V',q:'I am ______ to quit gambling.',zh:'我下定決心要戒賭。',opts:['determined','determine','determination','determining'],ans:'determined',exp:'be determined to + V = 下定決心要做。'},
{unit:'Unit 01',type:'process 名詞',q:'Getting things changed will be a slow ______.',zh:'事情要改變會是一個緩慢的過程。',opts:['process','processed','processing','produce'],ans:'process',exp:'冠詞 a 後面接單數名詞，a slow process。'},
{unit:'Unit 01',type:'process 動詞',q:'It will take about 3 weeks to ______ your application.',zh:'處理您的申請約要三星期。',opts:['process','processed','processing','processor'],ans:'process',exp:'to 後面接原形動詞，所以用 process。'},
{unit:'Unit 01',type:'recognize 動詞',q:'After twenty years, Jack cannot ______ his daughter.',zh:'二十年後，傑克認不出他的女兒。',opts:['recognize','recognition','recognizable','recognizably'],ans:'recognize',exp:'cannot 後面接原形動詞。'},
{unit:'Unit 01',type:'unique 形容詞',q:'Every person’s fingerprints are ______.',zh:'每個人的指紋都是獨一無二的。',opts:['unique','uniquely','unity','union'],ans:'unique',exp:'be 動詞後面接形容詞作補語，unique = 獨特的。'},
{unit:'Unit 01',type:'located 被動形容詞',q:'Our school is ______ in that area.',zh:'我們學校位在那個區域。',opts:['located','locate','location','locating'],ans:'located',exp:'be located in = 位於。'},
{unit:'Unit 01',type:'location 名詞',q:'Please come visit our store at its new ______.',zh:'請到我們店的新址參觀。',opts:['location','locate','located','locating'],ans:'location',exp:'new 後面接名詞，location = 地點、位置。'},
{unit:'Unit 01',type:'costly 形容詞',q:'I never buy ______ clothes.',zh:'我從不買昂貴的衣服。',opts:['costly','cost','costing','costs'],ans:'costly',exp:'修飾名詞 clothes 要用形容詞 costly。'},
{unit:'Unit 02',type:'permit 被動',q:'We are not ______ to smoke here.',zh:'我們不能在此地抽菸。',opts:['permitted','permit','permission','permissive'],ans:'permitted',exp:'be permitted to + V = 被允許做。'},
{unit:'Unit 02',type:'permission 名詞',q:'You are not allowed to use the machine without my ______.',zh:'沒有我的許可，你不能使用這臺機器。',opts:['permission','permit','permitted','permissive'],ans:'permission',exp:'without my 後面接名詞，permission = 許可。'},
{unit:'Unit 02',type:'volume 名詞',q:'Would you mind turning the ______ down?',zh:'你介意把音量關小嗎？',opts:['volume','value','variety','voice'],ans:'volume',exp:'turn the volume down = 把音量調小。'},
{unit:'Unit 02',type:'represent 動詞',q:'This ring ______ my love for you.',zh:'這枚戒指代表我對你的愛。',opts:['represents','representative','representation','representing'],ans:'represents',exp:'主詞 This ring 是單數，動詞用 represents。'},
{unit:'Unit 02',type:'representative 名詞',q:'The union sent a ______ to negotiate with management.',zh:'工會派出一位代表和資方談判。',opts:['representative','represent','representation','represented'],ans:'representative',exp:'a 後面接單數名詞；representative = 代表。'},
{unit:'Unit 02',type:'attitude 名詞',q:'Tony has a positive ______ towards life.',zh:'東尼對人生持積極態度。',opts:['attitude','altitude','attraction','attention'],ans:'attitude',exp:'positive 後面接名詞，attitude towards life = 對人生的態度。'},
{unit:'Unit 02',type:'reduce 動詞',q:'He won’t ______ his standard of living.',zh:'他不願降低生活水準。',opts:['reduce','reduction','reduced','reducing'],ans:'reduce',exp:'won’t 後面接原形動詞。'},
{unit:'Unit 02',type:'fake 形容詞',q:'Brian was caught using ______ money.',zh:'布萊恩因使用假鈔被抓。',opts:['fake','faked','faking','genuine'],ans:'fake',exp:'修飾 money 要用形容詞 fake。'},
{unit:'Unit 02',type:'strength 名詞',q:'This machine requires physical ______.',zh:'操作這台機器需要體力。',opts:['strength','strengthen','strong','strongly'],ans:'strength',exp:'physical 後面接名詞，strength = 力量。'},
{unit:'Unit 02',type:'weakness 名詞',q:'Math is my ______, but music is my forte.',zh:'數學是我的弱項，但音樂是我的強項。',opts:['weakness','weak','weaken','weakly'],ans:'weakness',exp:'my 後面接名詞，weakness = 弱點。'},
{unit:'Unit 02',type:'prevent 動詞',q:'Precautions will ______ many accidents from happening.',zh:'預防措施能防止許多意外發生。',opts:['prevent','prevention','preventive','prevented'],ans:'prevent',exp:'will 後面接原形動詞；prevent A from V-ing。'},
{unit:'Unit 02',type:'response 名詞',q:'Has there been any ______ to your letter?',zh:'你的信有回音了嗎？',opts:['response','respond','responsive','responsibility'],ans:'response',exp:'any 後面接名詞，response = 回應。'},
{unit:'Unit 02',type:'responsibility 名詞',q:'You should take ______ for what you have done.',zh:'你應該為自己做過的事負責。',opts:['responsibility','response','responsible','responsive'],ans:'responsibility',exp:'take responsibility for = 對……負責。'},
{unit:'Unit 02',type:'perform 動詞',q:'The surgeon has ______ this operation before.',zh:'這位外科醫生以前做過這個手術。',opts:['performed','perform','performance','performer'],ans:'performed',exp:'has + 過去分詞，現在完成式用 performed。'},
{unit:'Unit 02',type:'performance 名詞',q:'The actress gave a great ______ in the play.',zh:'那位女演員在劇中有精彩演出。',opts:['performance','perform','performed','performer'],ans:'performance',exp:'a great 後面接單數名詞，performance = 表演。'},
{unit:'Unit 02',type:'achieve 動詞',q:'If you work hard, you will ______ your goals.',zh:'如果你努力，最後會達成目標。',opts:['achieve','achievement','achieved','achieving'],ans:'achieve',exp:'will 後面接原形動詞。'},
{unit:'Unit 02',type:'achievement 名詞',q:'Getting into Harvard is quite an ______.',zh:'進入哈佛是一項了不起的成就。',opts:['achievement','achieve','achieved','achieving'],ans:'achievement',exp:'an 後面接母音開頭的單數名詞，achievement = 成就。'},
{unit:'Unit 03',type:'react 動詞',q:'Ted ______ calmly to the accusation.',zh:'泰德冷靜回應指控。',opts:['reacted','reaction','reactive','reacting'],ans:'reacted',exp:'句子為過去式，所以用 reacted。'},
{unit:'Unit 03',type:'reaction 名詞',q:'What is Tom’s ______ to my proposal?',zh:'湯姆對我的提議有什麼反應？',opts:['reaction','react','reacted','reactive'],ans:'reaction',exp:'Tom’s 後面接名詞，reaction to = 對……的反應。'},
{unit:'Unit 03',type:'fund 名詞',q:'We contributed to the charity ______.',zh:'我們捐款給這個慈善基金。',opts:['fund','funded','fundraiser','finance'],ans:'fund',exp:'charity fund = 慈善基金。'},
{unit:'Unit 03',type:'audience 名詞',q:'The concert drew a large ______.',zh:'那場演唱會吸引了很多觀眾。',opts:['audience','spectator','staff','crew'],ans:'audience',exp:'a large audience = 大量觀眾。'},
{unit:'Unit 03',type:'moral 形容詞',q:'The film has a good ______ lesson.',zh:'這部影片有很好的道德教訓。',opts:['moral','morality','immoral','ethical'],ans:'moral',exp:'修飾 lesson 要用形容詞 moral。'},
{unit:'Unit 03',type:'announce 動詞',q:'John will ______ who will play the characters.',zh:'約翰會公布誰要演出角色。',opts:['announce','announcement','announced','announcing'],ans:'announce',exp:'will 後面接原形動詞。'},
{unit:'Unit 03',type:'announcement 名詞',q:'The ______ will be made at three o’clock.',zh:'公告將在三點發布。',opts:['announcement','announce','announced','announcing'],ans:'announcement',exp:'The 後面需要名詞作主詞。'},
{unit:'Unit 03',type:'theory 名詞',q:'Many scientists believe the ______.',zh:'很多科學家相信這個理論。',opts:['theory','theoretical','theoretically','practice'],ans:'theory',exp:'the 後面接名詞，theory = 理論。'},
{unit:'Unit 03',type:'structure 名詞',q:'The ______ of the poem is very complicated.',zh:'這首詩的結構很複雜。',opts:['structure','structural','framework','structured'],ans:'structure',exp:'The ___ of... 位置需要名詞。'},
{unit:'Unit 03',type:'suffer 動詞',q:'My father ______ from diabetes.',zh:'我爸爸患有糖尿病。',opts:['suffers','suffer','suffering','suffered'],ans:'suffers',exp:'主詞 My father 是單數現在式，suffer from + 疾病。'},
{unit:'Unit 03',type:'original 形容詞',q:'The ______ plan was later changed.',zh:'最初的計畫後來被改了。',opts:['original','originally','origin','originality'],ans:'original',exp:'修飾名詞 plan 要用形容詞 original。'},
{unit:'Unit 03',type:'additional 形容詞',q:'______ tables and chairs were required.',zh:'需要額外的桌椅。',opts:['Additional','Additionally','Addition','Add'],ans:'Additional',exp:'修飾 tables and chairs 要用形容詞 additional。'},
{unit:'Unit 03',type:'advantage 名詞',q:'This book has the ______ of being easy to use.',zh:'這本書的優點在於容易使用。',opts:['advantage','disadvantage','advanced','advance'],ans:'advantage',exp:'has the advantage of + V-ing = 有……的優點。'},
{unit:'Unit 03',type:'specific 形容詞',q:'The man went there for a ______ purpose.',zh:'那名男子去那裡有特定目的。',opts:['specific','specifically','specify','general'],ans:'specific',exp:'修飾 purpose 要用形容詞 specific。'},
{unit:'Unit 03',type:'destroy 動詞',q:'The typhoon ______ the whole area.',zh:'颱風摧毀了整個區域。',opts:['destroyed','destroy','destruction','destructive'],ans:'destroyed',exp:'句子為過去式，所以用 destroyed。'},
{unit:'Unit 03',type:'mission 名詞',q:'Michael is on a secret ______ in Syria.',zh:'麥可在敘利亞執行祕密任務。',opts:['mission','missionary','message','moral'],ans:'mission',exp:'on a mission = 執行任務。'},
{unit:'Unit 03',type:'anxious 形容詞',q:'College students are ______ about their future.',zh:'大學生對未來感到焦慮。',opts:['anxious','anxiety','anxiously','eager'],ans:'anxious',exp:'be anxious about + N。'},
{unit:'Unit 03',type:'lock 過去分詞',q:'Make sure that the door is ______ when you leave.',zh:'離開時確認門已上鎖。',opts:['locked','lock','locker','unlock'],ans:'locked',exp:'be locked = 被鎖上 / 已上鎖。'},
{unit:'Unit 03',type:'neat 形容詞',q:'Judy’s handwriting is very ______.',zh:'茱蒂的筆跡很整齊。',opts:['neat','neatly','tidy','untidy'],ans:'neat',exp:'be 動詞後面接形容詞，neat = 整齊的。'}
];
let unit='all',i=0,score=0,wrong=JSON.parse(localStorage.getItem('grammar_word_wrong_123')||'[]');const $=s=>document.querySelector(s);function pool(){return unit==='wrong'?wrong:unit==='all'?grammarQuestions:grammarQuestions.filter(q=>q.unit===unit)}function shuffle(a){return[...a].sort(()=>Math.random()-.5)}function randomIndex(){const p=pool();i=p.length?Math.floor(Math.random()*p.length):0}function cur(){return pool()[i]}function setTop(){document.querySelectorAll('.filter').forEach(b=>b.classList.toggle('active',b.dataset.unit===unit));const p=pool();$('#score').textContent=`${score} correct`;$('#count').textContent=`${p.length?i+1:0} / ${p.length}`;$('#unitLabel').textContent=unit==='all'?'全部':unit==='wrong'?'錯題':unit}function render(){setTop();const q=cur();if(!q){$('#app').innerHTML='<div class="feedback">目前沒有題目。</div>';return}$('#app').innerHTML=`<div class="qcard"><small>${q.unit}｜${q.type}</small><p class="q">${q.q}</p><p class="zh">${q.zh}</p></div><div class="options">${shuffle(q.opts).map(o=>`<button class="opt" onclick='check(this,${JSON.stringify(o)})'>${o}</button>`).join('')}</div><div class="feedback" id="fb">選答案後會顯示解析。</div><div class="btns"><button class="btn" onclick="next()">下一題</button><button class="btn primary" onclick="speakQuestion()">朗讀題句</button></div>`}function saveWrong(q){if(!wrong.some(x=>x.q===q.q)){wrong.unshift(q);localStorage.setItem('grammar_word_wrong_123',JSON.stringify(wrong))}}function check(btn,val){const q=cur();document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.textContent===q.ans)b.classList.add('correct')});if(val===q.ans){btn.classList.add('correct');score++;$('#fb').textContent=`正確。\n${q.exp}`}else{btn.classList.add('wrong');saveWrong(q);$('#fb').textContent=`錯誤。正確答案：${q.ans}\n${q.exp}`}}function next(){randomIndex();render()}function speakQuestion(){const q=cur();if(!q||!('speechSynthesis' in window))return;const text=q.q.replace('______','blank');speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=.78;speechSynthesis.speak(u)}document.querySelectorAll('.filter').forEach(b=>b.onclick=()=>{unit=b.dataset.unit;randomIndex();render()});randomIndex();render();</script></body></html>
