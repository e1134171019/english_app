<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Unit 01-03 Exam Vocabulary Cloze</title><style>:root{--bg:#f5f7fb;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--blue:#2563eb;--shadow:0 18px 55px rgba(15,23,42,.1)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}button{font:inherit;border:0;cursor:pointer}.app{max-width:980px;margin:0 auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}.top a{color:#2563eb;font-weight:900;text-decoration:none}.brand h1{margin:0;font-size:32px;letter-spacing:-.05em}.brand p{margin:6px 0 0;color:var(--muted);line-height:1.6}.filters{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.filter{border-radius:999px;padding:10px 14px;background:#fff;border:1px solid var(--line);font-weight:900;color:var(--muted)}.filter.active{background:#111827;color:#fff}.stat{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.pill{border-radius:999px;background:#eef2ff;color:#1d4ed8;padding:8px 12px;font-weight:900}.panel{margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:var(--shadow)}.qcard{background:#111827;color:#fff;border-radius:24px;padding:24px;margin-bottom:14px}.qcard small{color:#cbd5e1;font-weight:900}.q{font-size:28px;line-height:1.45;font-weight:950;margin:10px 0 0}.options{display:grid;grid-template-columns:1fr 1fr;gap:10px}.opt{border-radius:16px;padding:15px;background:#fff;border:1px solid var(--line);font-weight:900;text-align:left}.opt.correct{background:#dcfce7;color:#166534;border-color:#86efac}.opt.wrong{background:#ffe4e6;color:#be123c;border-color:#fda4af}.feedback{margin-top:14px;border-radius:18px;padding:14px;background:#f9fafb;border:1px solid var(--line);white-space:pre-wrap;line-height:1.7}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.btn{border-radius:16px;padding:14px;font-weight:900;background:#e5e7eb}.primary{background:var(--blue);color:#fff}@media(max-width:700px){.app{padding:12px}.options,.btns{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.q{font-size:22px}.panel{padding:18px;border-radius:22px}.brand h1{font-size:28px}}</style></head><body><main class="app"><header class="top"><div class="brand"><h1>1-3 課例句單字選擇題</h1><p>考試實戰版：每一課 40 題，共 120 題。不是只選原形單字，而是依照例句需要選出正確詞形，例如 suffers、reacted、performed、expectations。</p></div><a href="./">回選單</a></header><nav class="filters"><button class="filter active" data-unit="all">全部</button><button class="filter" data-unit="Unit 01">Unit 01</button><button class="filter" data-unit="Unit 02">Unit 02</button><button class="filter" data-unit="Unit 03">Unit 03</button><button class="filter" data-unit="wrong">錯題</button></nav><section class="stat"><span class="pill" id="score">0 correct</span><span class="pill" id="count">0 / 0</span><span class="pill" id="unitLabel">全部</span></section><section class="panel" id="app"></section></main><script>
const unitWords={
'Unit 01':[ ['unite','Our goal is to ______ the labor unions to oppose the new policy.','我們的目標是聯合勞工團體反對新政策。','unite：使聯合；團結。to 後面接原形動詞。'],['unity','Without ______, we will face failure.','沒有團結，我們將面臨失敗。','unity：名詞，團結。without 後面接名詞。'],['union','The ______ decided to go on strike.','工會決定罷工。','union：工會。The 後面需要名詞主詞。'],['remains','The problem still ______ unsolved.','這個問題仍然沒有解決。','remains：主詞 The problem 是單數，現在式動詞加 s。'],['remains','The ancient ______ attract many tourists.','古代遺跡吸引許多遊客。','remains：複數名詞，遺跡。'],['probable','It seems ______ that the accident was caused by carelessness.','看來意外很可能是由粗心造成。','probable：形容詞，放在 seems 後作補語。'],['probability','The ______ is that the match will be postponed.','這場比賽很可能會延期。','probability：名詞，作主詞。'],['situation','This company’s financial ______ is getting worse.','這家公司的財務狀況越來越糟。','situation：名詞，狀況。'],['determine','The police were able to ______ the cause of the accident.','警方能確定事故原因。','determine：be able to 後接原形動詞。'],['determined','I am ______ to quit gambling.','我下定決心要戒賭。','determined：be determined to V。'],['rate','The unemployment ______ has been rising.','失業率一直上升。','rate：名詞，比率。'],['political','The writer sought ______ asylum abroad.','作家在國外尋求政治庇護。','political：形容詞，修飾 asylum。'],['politics','Many young people are not interested in ______.','許多年輕人對政治不感興趣。','politics：名詞，政治。'],['politician','I would rather trust a wolf than a ______.','我寧願相信狼也不相信政客。','politician：名詞，政客。'],['process','It will take three weeks to ______ your application.','處理你的申請約需三週。','process：to 後接原形動詞，處理。'],['majority','The ______ of residents speak their own dialect.','大多數居民說自己的方言。','majority：the majority of，大多數。'],['property','They lost all their ______ in the fire.','他們在火災中失去所有財產。','property：不可數名詞，財產。'],['opportunity','This trip is a great ______ to practice English.','這趟旅行是練英文的好機會。','opportunity：名詞，機會。'],['actually','Nick acts young, but ______ he is over thirty.','尼克裝年輕，但事實上他三十多歲了。','actually：副詞，事實上。'],['recognize','Jack could not ______ his daughter after twenty years.','二十年後傑克認不出女兒。','recognize：could not 後接原形動詞。'],['enjoyable','The party last Friday was really ______.','上週五的派對真的很愉快。','enjoyable：形容詞，愉快的。'],['joyful','We were excited and ______ after our team won.','我們隊贏後，我們興奮又高興。','joyful：形容詞，喜悅的。'],['unique','Every person’s fingerprints are ______.','每個人的指紋都是獨一無二的。','unique：形容詞，獨特的。'],['terrific','The restaurant serves ______ food.','那家餐廳供應很棒的食物。','terrific：形容詞，修飾 food。'],['wedded','They ______ on a beautiful autumn day.','他們在美麗的秋日結婚。','wedded：過去式，表示過去發生。'],['tough','This meat is too ______.','這塊肉太硬了。','tough：形容詞，堅韌的、困難的。'],['hired','We ______ a consultant to design a new system.','我們雇用顧問設計新制度。','hired：過去式，雇用。'],['homesick','I felt ______ on sleepless nights.','失眠的夜晚我感到想家。','homesick：形容詞，思鄉的。'],['invitation','Have you received an ______ to the party?','你收到派對邀請了嗎？','invitation：名詞，邀請。'],['jealous','Why are you so ______ of David’s promotion?','你為什麼嫉妒大衛升遷？','jealous：be jealous of。'],['envy','I do not ______ Peter his success.','我不羨慕彼得的成功。','envy：do not 後接原形動詞。'],['fright','Andy looked at the barking dog with ______.','安迪害怕地看著吠叫的狗。','fright：名詞，驚嚇。'],['frighten','The movie might ______ your son.','那部電影可能會嚇到你兒子。','frighten：might 後接原形動詞。'],['locate','The leader could not ______ the meeting point.','隊長找不到會合點。','locate：could not 後接原形動詞。'],['location','Please visit our store at its new ______.','請到我們店的新址參觀。','location：名詞，位置。'],['costly','I never buy ______ clothes.','我從不買昂貴的衣服。','costly：形容詞，昂貴的。'],['mostly','John succeeded ______ because he worked hard.','約翰成功主要因為他努力。','mostly：副詞，主要地。'],['lately','Have you seen James ______?','你最近見到詹姆士了嗎？','lately：副詞，最近。'],['Besides','I have seen the movie before. ______, it is not that good.','我以前看過那部電影，而且它也沒那麼好。','Besides：句首副詞，此外。'],['career','Ms. Wilson took up photography as her ______.','威爾森女士以攝影為職業。','career：名詞，職業。']],
'Unit 02':[ ['permitted','We are not ______ to smoke here.','我們不能在這裡抽菸。','permitted：be permitted to V，被允許做。'],['permission','You cannot use the machine without my ______.','沒有我的許可你不能使用機器。','permission：名詞，許可。'],['volume','Please turn the ______ down.','請把音量關小。','volume：turn the volume down。'],['represents','This ring ______ my love for you.','這枚戒指代表我對你的愛。','represents：主詞 This ring 是單數，動詞加 s。'],['representative','The union sent a ______ to negotiate.','工會派出代表談判。','representative：名詞，代表。'],['attitude','Tony has a positive ______ toward life.','東尼對人生持積極態度。','attitude：名詞，態度。'],['reduce','He will not ______ his standard of living.','他不願降低生活水準。','reduce：will not 後接原形動詞。'],['fake','Brian was caught using ______ money.','布萊恩因使用假鈔被抓。','fake：形容詞，假的。'],['religious','Never talk about ______ issues at parties.','聚會不要談宗教議題。','religious：形容詞，宗教的。'],['strength','This machine requires physical ______.','這台機器需要體力。','strength：名詞，力量。'],['weakness','Math is my ______.','數學是我的弱項。','weakness：名詞，弱點。'],['vary','The weather here can ______ a lot.','這裡的天氣變化很大。','vary：can 後接原形動詞。'],['various','There are ______ solutions to the problem.','這問題有各種解決方法。','various：形容詞，各式各樣的。'],['variety','The library offers a wide ______ of books.','圖書館提供各種類書。','variety：a wide variety of。'],['product','The country’s main ______ is timber.','該國主要產品是木材。','product：名詞，產品。'],['imagination','Use your ______ to find a better idea.','運用想像力找更好的點子。','imagination：名詞，想像力。'],['prevent','Precautions can ______ many accidents.','預防措施能防止許多意外。','prevent：can 後接原形動詞。'],['response','Has there been any ______ to your letter?','你的信有回音了嗎？','response：名詞，回應。'],['responsibility','You should take ______ for your actions.','你應該為自己的行為負責。','responsibility：take responsibility for。'],['performed','The surgeon has ______ this operation before.','外科醫生以前做過這手術。','performed：has + 過去分詞。'],['performance','The actress gave a great ______.','女演員有精彩演出。','performance：名詞，表演。'],['techniques','The artist is famous for painting ______.','藝術家以繪畫技巧聞名。','techniques：複數名詞，技巧。'],['technical','Frank studied at a ______ school.','法蘭克在技術學校讀書。','technical：形容詞，技術的。'],['normal','It is ______ to feel nervous before a test.','考前緊張是正常的。','normal：形容詞，正常的。'],['committee','How many members are on your ______?','你的委員會有多少人？','committee：名詞，委員會。'],['achieve','Hard work helps you ______ your goals.','努力能幫你達成目標。','achieve：help + O + V。'],['achievement','Getting into Harvard is a great ______.','進入哈佛是很大的成就。','achievement：名詞，成就。'],['immediate','There was an ______ response to her request.','她的要求立刻得到回應。','immediate：形容詞，立即的。'],['immediately','I went over ______ after the meeting.','會議後我立刻過去。','immediately：副詞，立刻。'],['magical','No medicine is so ______ that it cures everything.','沒有神奇到能治百病的藥。','magical：形容詞，神奇的。'],['magician','The ______ pulled a rabbit from his hat.','魔術師從帽子拿出兔子。','magician：名詞，魔術師。'],['expectations','Lower your ______ and you will not be disappointed.','降低期望就不會失望。','expectations：常用複數，期望。'],['ongoing','There is an ______ crisis.','危機仍持續中。','ongoing：形容詞，持續的。'],['underlying','What are the ______ causes of this problem?','這問題的根本原因是什麼？','underlying：形容詞，根本的。'],['semester','I will take thirteen credits this ______.','這學期我要修十三學分。','semester：名詞，學期。'],['pepper','Please pass me the salt and ______.','請把鹽和胡椒給我。','pepper：名詞，胡椒。'],['colorful','The paintings are very ______.','那些畫色彩豐富。','colorful：形容詞，色彩豐富的。'],['fearful','John was ______ of losing his job.','約翰害怕失去工作。','fearful：形容詞，害怕的。'],['hopeful','Everyone felt ______ about the future.','大家對未來充滿希望。','hopeful：形容詞，充滿希望的。'],['downtown','I am heading ______.','我要去市中心。','downtown：副詞，往市中心。']],
'Unit 03':[ ['reacted','Ted ______ calmly to the accusation.','泰德冷靜回應指控。','reacted：過去式，react to。'],['reaction','What is Tom’s ______ to my proposal?','湯姆對我的提議有何反應？','reaction：名詞，反應。'],['fund','We contributed to the charity ______.','我們捐款給慈善基金。','fund：名詞，基金。'],['audience','The concert drew a large ______.','演唱會吸引大量觀眾。','audience：名詞，觀眾。'],['moral','The film has a good ______ lesson.','影片有好的道德教訓。','moral：形容詞，修飾 lesson。'],['immoral','Using others’ misfortune for gain is ______.','利用別人的不幸謀利是不道德的。','immoral：形容詞，不道德的。'],['announce','John will ______ who will play the characters.','約翰會公布誰演出角色。','announce：will 後接原形動詞。'],['announcement','The ______ will be made at three o’clock.','公告將在三點發布。','announcement：名詞，公告。'],['theory','Many scientists believe the ______.','許多科學家相信這理論。','theory：名詞，理論。'],['skates','I want to buy a new pair of ______.','我想買一雙新溜冰鞋。','skates：複數名詞，溜冰鞋。'],['skiing','Where will you go ______ this winter?','今年冬天你要去哪裡滑雪？','skiing：go skiing，去滑雪。'],['structure','The ______ of the poem is complicated.','這首詩的結構很複雜。','structure：名詞，結構。'],['staff','Our company has a ______ of 500.','我們公司有五百名員工。','staff：a staff of。'],['crew','We have a ______ of twenty on our ship.','我們船上有二十位工作人員。','crew：名詞，全體工作人員。'],['suffers','My father ______ from diabetes.','我爸爸患糖尿病。','suffers：主詞 My father 是單數；suffer from + 疾病。'],['spite','Jason vandalized the cars out of ______.','傑森因怨恨破壞那些車。','spite：out of spite，出於怨恨。'],['lifestyle','The magazine discusses a healthy ______.','雜誌討論健康生活方式。','lifestyle：名詞，生活方式。'],['somehow','We have to finish it ______.','我們總得設法完成它。','somehow：副詞，設法。'],['original','The ______ plan was later changed.','最初的計畫後來改了。','original：形容詞，原來的。'],['originally','The town was ______ quite small.','這城鎮最初很小。','originally：副詞，最初。'],['Additional','______ tables and chairs were required.','需要額外的桌椅。','Additional：形容詞，額外的。'],['Additionally','The rent is cheap. ______, the location is perfect.','房租便宜，此外地點也很好。','Additionally：句首副詞，此外。'],['advantage','This book has the ______ of being easy to use.','這本書的優點是容易使用。','advantage：名詞，優點。'],['specific','The man went there for a ______ purpose.','男子去那裡有特定目的。','specific：形容詞，特定的。'],['specifically','The doctor warned Mark ______ not to eat eggs.','醫生特別警告馬克不要吃蛋。','specifically：副詞，特別地。'],['destroyed','The typhoon ______ the whole area.','颱風摧毀整個區域。','destroyed：過去式，摧毀。'],['column','Nicole writes a weekly ______.','妮可每週寫專欄。','column：名詞，專欄。'],['mission','Michael is on a secret ______.','麥可在執行秘密任務。','mission：名詞，任務。'],['revealing','The agent was jailed for ______ secrets.','探員因洩密入獄。','revealing：介系詞 for 後接 V-ing。'],['tropical','I like ______ fruits such as bananas.','我喜歡香蕉等熱帶水果。','tropical：形容詞，熱帶的。'],['agriculture','New technology can improve our ______.','新科技能改善農業。','agriculture：名詞，農業。'],['drag','Do not ______ the chair around.','不要拖著椅子到處走。','drag：Do not 後接原形動詞。'],['drugstore','The ______ is open 24 hours a day.','藥妝店全天候營業。','drugstore：名詞，藥妝店。'],['cough','Cover your mouth when you ______.','咳嗽時摀住嘴巴。','cough：動詞，咳嗽。'],['dizzy','I felt slightly ______ after three beers.','喝三杯啤酒後我有點暈。','dizzy：形容詞，暈眩的。'],['tasty','My mother makes very ______ cakes.','我媽媽做的蛋糕很好吃。','tasty：形容詞，好吃的。'],['weapons','The police found many ______ in the warehouse.','警方在倉庫發現許多武器。','weapons：many 後接複數名詞。'],['anxious','College students are ______ about their future.','大學生對未來焦慮。','anxious：be anxious about。'],['flash','The ______ of lightning scared the birds away.','閃電的閃光嚇走鳥群。','flash：名詞，閃光。'],['neat','Judy’s handwriting is very ______.','茱蒂的字跡很整齊。','neat：形容詞，整齊的。']]
};
const questions=Object.entries(unitWords).flatMap(([unit,arr])=>arr.map(([ans,q,zh,meaning])=>({unit,q,zh,ans,meaning})));
const allAnswers=[...new Set(questions.map(q=>q.ans))];let unit='all',i=0,score=0,wrong=JSON.parse(localStorage.getItem('vocab_example_exam_wrong_123')||'[]');const $=s=>document.querySelector(s);function pool(){return unit==='wrong'?wrong:unit==='all'?questions:questions.filter(q=>q.unit===unit)}function shuffle(a){return[...a].sort(()=>Math.random()-.5)}function randomIndex(){const p=pool();i=p.length?Math.floor(Math.random()*p.length):0}function cur(){return pool()[i]}function setTop(){document.querySelectorAll('.filter').forEach(b=>b.classList.toggle('active',b.dataset.unit===unit));const p=pool();$('#score').textContent=`${score} correct`;$('#count').textContent=`${p.length?i+1:0} / ${p.length}`;$('#unitLabel').textContent=unit==='all'?'全部':unit==='wrong'?'錯題':unit}function optionSet(q){const sameUnit=questions.filter(x=>x.unit===q.unit).map(x=>x.ans);let pool=[...new Set([...sameUnit,...allAnswers])].filter(x=>x!==q.ans);return shuffle([q.ans,...shuffle(pool).slice(0,3)])}function render(){setTop();const q=cur();if(!q){$('#app').innerHTML='<div class="feedback">目前沒有題目。</div>';return}$('#app').innerHTML=`<div class="qcard"><small>${q.unit}｜考試實戰選字</small><p class="q">${q.q}</p></div><div class="options">${optionSet(q).map(o=>`<button class="opt" onclick='check(this,${JSON.stringify(o)})'>${o}</button>`).join('')}</div><div class="feedback" id="fb">選出最適合填入空格的單字或詞形。中文與解析會在作答後顯示。</div><div class="btns"><button class="btn" onclick="next()">下一題</button><button class="btn primary" onclick="speakQuestion()">朗讀題句</button></div>`}function saveWrong(q){if(!wrong.some(x=>x.q===q.q)){wrong.unshift(q);localStorage.setItem('vocab_example_exam_wrong_123',JSON.stringify(wrong))}}function check(btn,val){const q=cur();document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.textContent===q.ans)b.classList.add('correct')});if(val===q.ans){btn.classList.add('correct');score++;$('#fb').textContent=`正確。\n中文：${q.zh}\n解析：${q.meaning}`}else{btn.classList.add('wrong');saveWrong(q);$('#fb').textContent=`錯誤。正確答案：${q.ans}\n中文：${q.zh}\n解析：${q.meaning}`}}function next(){randomIndex();render()}function speakQuestion(){const q=cur();if(!q||!('speechSynthesis' in window))return;const text=q.q.replace('______','blank');speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=.78;speechSynthesis.speak(u)}document.querySelectorAll('.filter').forEach(b=>b.onclick=()=>{unit=b.dataset.unit;randomIndex();render()});randomIndex();render();</script></body></html>
