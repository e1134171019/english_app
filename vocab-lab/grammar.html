<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Unit 01-03 Example Vocabulary Choice</title><style>:root{--bg:#f5f7fb;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--blue:#2563eb;--shadow:0 18px 55px rgba(15,23,42,.1)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}button{font:inherit;border:0;cursor:pointer}.app{max-width:980px;margin:0 auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}.top a{color:#2563eb;font-weight:900;text-decoration:none}.brand h1{margin:0;font-size:32px;letter-spacing:-.05em}.brand p{margin:6px 0 0;color:var(--muted);line-height:1.6}.filters{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.filter{border-radius:999px;padding:10px 14px;background:#fff;border:1px solid var(--line);font-weight:900;color:var(--muted)}.filter.active{background:#111827;color:#fff}.stat{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.pill{border-radius:999px;background:#eef2ff;color:#1d4ed8;padding:8px 12px;font-weight:900}.panel{margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:var(--shadow)}.qcard{background:#111827;color:#fff;border-radius:24px;padding:24px;margin-bottom:14px}.qcard small{color:#cbd5e1;font-weight:900}.q{font-size:28px;line-height:1.45;font-weight:950;margin:10px 0 0}.options{display:grid;grid-template-columns:1fr 1fr;gap:10px}.opt{border-radius:16px;padding:15px;background:#fff;border:1px solid var(--line);font-weight:900;text-align:left}.opt.correct{background:#dcfce7;color:#166534;border-color:#86efac}.opt.wrong{background:#ffe4e6;color:#be123c;border-color:#fda4af}.feedback{margin-top:14px;border-radius:18px;padding:14px;background:#f9fafb;border:1px solid var(--line);white-space:pre-wrap;line-height:1.7}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.btn{border-radius:16px;padding:14px;font-weight:900;background:#e5e7eb}.primary{background:var(--blue);color:#fff}.loading{color:var(--muted);font-weight:900}@media(max-width:700px){.options,.btns{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.q{font-size:23px}.panel{padding:18px;border-radius:22px}}</style></head><body><main class="app"><header class="top"><div class="brand"><h1>1-3 課例句單字選擇題</h1><p>自動讀取 Unit 01、Unit 02、Unit 03 單字庫，把每個單字的課本例句挖空，從四個單字選項中選出最適合填入的一個。題目區不顯示中文，答題後才顯示解析。</p></div><a href="./">回選單</a></header><nav class="filters"><button class="filter active" data-unit="all">全部</button><button class="filter" data-unit="Unit 01">Unit 01</button><button class="filter" data-unit="Unit 02">Unit 02</button><button class="filter" data-unit="Unit 03">Unit 03</button><button class="filter" data-unit="wrong">錯題</button></nav><section class="stat"><span class="pill" id="score">0 correct</span><span class="pill" id="count">0 / 0</span><span class="pill" id="unitLabel">全部</span></section><section class="panel" id="app"><div class="loading">正在載入 1-3 課單字庫...</div></section></main><script>
const unitSources=[
  {unit:'Unit 01',url:'../unit01-vocab-lab/'},
  {unit:'Unit 02',url:'../unit02-vocab-lab/'},
  {unit:'Unit 03',url:'../unit03-vocab-lab/'}
];
let questions=[],unit='all',i=0,score=0;
let wrong=JSON.parse(localStorage.getItem('vocab_example_wrong_123')||'[]');
const $=s=>document.querySelector(s);
function escapeRegExp(s){return String(s).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function pool(){return unit==='wrong'?wrong:unit==='all'?questions:questions.filter(q=>q.unit===unit)}
function randomIndex(){const p=pool();i=p.length?Math.floor(Math.random()*p.length):0}
function cur(){return pool()[i]}
function setTop(){document.querySelectorAll('.filter').forEach(b=>b.classList.toggle('active',b.dataset.unit===unit));const p=pool();$('#score').textContent=`${score} correct`;$('#count').textContent=`${p.length?i+1:0} / ${p.length}`;$('#unitLabel').textContent=unit==='all'?'全部':unit==='wrong'?'錯題':unit}
function extractWords(html){const m=html.match(/const\s+words\s*=\s*(\[[\s\S]*?\]);\s*const\s+key/);if(!m)throw new Error('找不到 words 陣列');return Function('"use strict";return ('+m[1]+')')()}
function findExampleForWord(w){const head=String(w.word||'').trim();const patterns=[
  new RegExp('\\b'+escapeRegExp(head)+'(?:s|es|ed|d|ing)?\\b','i'),
  new RegExp('\\b'+escapeRegExp(head.replace(/y$/,'i'))+'(?:es|ed)\\b','i')
];
for(const ex of (w.ex||[])){const sentence=String(ex[0]||'');for(const re of patterns){const m=sentence.match(re);if(m){return{sentence,zh:String(ex[1]||''),answer:m[0],question:sentence.replace(re,'______')}}}}
const first=(w.ex&&w.ex[0])?w.ex[0]:['',''];return{sentence:String(first[0]||head),zh:String(first[1]||w.zh||''),answer:head,question:'______ — '+String(first[0]||w.zh||head)} }
function makeQuestion(w,unitName){const found=findExampleForWord(w);return{unit:unitName,head:w.word,answer:found.answer,question:found.question,full:found.sentence,zh:found.zh,meaning:w.zh||'',pos:w.pos||'',exp:`${w.word} ${w.pos||''}：${w.zh||''}`}}
async function loadQuestions(){try{const all=[];for(const src of unitSources){const html=await fetch(src.url,{cache:'no-store'}).then(r=>r.text());const ws=extractWords(html);ws.forEach(w=>all.push(makeQuestion(w,src.unit)))}questions=all;randomIndex();render()}catch(err){$('#app').innerHTML=`<div class="feedback">載入失敗：${err.message}\n請按 Ctrl + F5 後再試一次。</div>`}}
function optionSet(q){const answers=questions.map(x=>x.answer).filter(Boolean);const distractors=shuffle([...new Set(answers.filter(x=>x.toLowerCase()!==q.answer.toLowerCase()))]).slice(0,3);return shuffle([q.answer,...distractors])}
function render(){setTop();const q=cur();if(!q){$('#app').innerHTML='<div class="feedback">目前沒有題目。</div>';return}$('#app').innerHTML=`<div class="qcard"><small>${q.unit}｜${q.head}｜選擇適合單字</small><p class="q">${q.question}</p></div><div class="options">${optionSet(q).map(o=>`<button class="opt" onclick='check(this,${JSON.stringify(o)})'>${o}</button>`).join('')}</div><div class="feedback" id="fb">選出最適合填入空格的單字。中文與解析會在作答後顯示。</div><div class="btns"><button class="btn" onclick="next()">下一題</button><button class="btn primary" onclick="speakQuestion()">朗讀題句</button></div>`}
function saveWrong(q){if(!wrong.some(x=>x.unit===q.unit&&x.head===q.head&&x.full===q.full)){wrong.unshift(q);localStorage.setItem('vocab_example_wrong_123',JSON.stringify(wrong))}}
function check(btn,val){const q=cur();document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.textContent===q.answer)b.classList.add('correct')});if(val===q.answer){btn.classList.add('correct');score++;$('#fb').textContent=`正確。\n原句：${q.full}\n中文：${q.zh}\n解析：${q.exp}`}else{btn.classList.add('wrong');saveWrong(q);$('#fb').textContent=`錯誤。正確答案：${q.answer}\n原句：${q.full}\n中文：${q.zh}\n解析：${q.exp}`}}
function next(){randomIndex();render()}
function speakQuestion(){const q=cur();if(!q||!('speechSynthesis' in window))return;const text=q.question.replace('______','blank');speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=.78;speechSynthesis.speak(u)}
document.querySelectorAll('.filter').forEach(b=>b.onclick=()=>{unit=b.dataset.unit;randomIndex();render()});
loadQuestions();
</script></body></html>
