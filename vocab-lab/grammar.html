<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Unit 01-07 Exam Vocabulary Cloze</title><style>:root{--bg:#f5f7fb;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--blue:#2563eb;--shadow:0 18px 55px rgba(15,23,42,.1)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}button{font:inherit;border:0;cursor:pointer}.app{max-width:1080px;margin:0 auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}.top a{color:#2563eb;font-weight:900;text-decoration:none}.brand h1{margin:0;font-size:32px;letter-spacing:-.05em}.brand p{margin:6px 0 0;color:var(--muted);line-height:1.6}.filters{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.filter{border-radius:999px;padding:10px 14px;background:#fff;border:1px solid var(--line);font-weight:900;color:var(--muted)}.filter.active{background:#111827;color:#fff}.stat{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.pill{border-radius:999px;background:#eef2ff;color:#1d4ed8;padding:8px 12px;font-weight:900}.panel{margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:var(--shadow)}.qcard{background:#111827;color:#fff;border-radius:24px;padding:24px;margin-bottom:14px}.qcard small{color:#cbd5e1;font-weight:900}.q{font-size:28px;line-height:1.45;font-weight:950;margin:10px 0 0}.options{display:grid;grid-template-columns:1fr 1fr;gap:10px}.opt{border-radius:16px;padding:15px;background:#fff;border:1px solid var(--line);font-weight:900;text-align:left}.opt.correct{background:#dcfce7;color:#166534;border-color:#86efac}.opt.wrong{background:#ffe4e6;color:#be123c;border-color:#fda4af}.feedback{margin-top:14px;border-radius:18px;padding:14px;background:#f9fafb;border:1px solid var(--line);white-space:pre-wrap;line-height:1.7}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.btn{border-radius:16px;padding:14px;font-weight:900;background:#e5e7eb}.primary{background:var(--blue);color:#fff}.loading{color:var(--muted);font-weight:900;line-height:1.8}@media(max-width:700px){.app{padding:12px}.options,.btns{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.q{font-size:22px}.panel{padding:18px;border-radius:22px}.brand h1{font-size:28px}}</style></head><body><main class="app"><header class="top"><div class="brand"><h1>1-7 課例句單字選擇題</h1><p>整合 Unit 01 到 Unit 07。重新整理頁面時會先把題目洗牌；按「下一題」會依照本次洗牌後的順序出題。中文與解析作答後才顯示。</p></div><a href="./">回選單</a></header><nav class="filters" id="filters"><button class="filter active" data-unit="all">全部</button><button class="filter" data-unit="wrong">錯題</button></nav><section class="stat"><span class="pill" id="score">0 correct</span><span class="pill" id="count">0 / 0</span><span class="pill" id="unitLabel">全部</span></section><section class="panel" id="app"><div class="loading">正在載入 Unit 01-07 題庫...</div></section></main><script>
const unitSources=[
  ['Unit 01','../unit01-vocab-lab/'],['Unit 02','../unit02-vocab-lab/'],['Unit 03','../unit03-vocab-lab/'],['Unit 04','../unit04-vocab-lab/'],['Unit 05','../unit05-vocab-lab/'],['Unit 06','../unit06-vocab-lab/'],['Unit 07','../unit07-vocab-lab/']
];
let questions=[],sessionOrder=[],unit='all',i=0,score=0;
let wrong=JSON.parse(localStorage.getItem('vocab_example_exam_wrong_17')||'[]');
const $=s=>document.querySelector(s);
function escapeRegExp(s){return String(s).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
function shuffle(a){const b=[...a];for(let j=b.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[b[j],b[k]]=[b[k],b[j]]}return b}
function extractWords(html){const m=html.match(/const\s+words\s*=\s*(\[[\s\S]*?\]);\s*let\s+state/);if(!m)throw new Error('找不到 words 陣列');return Function('"use strict";return ('+m[1]+')')()}
function matchAnswer(sentence,word){const raw=String(word||'').trim();const candidates=[raw,raw.replace(/y$/,'i')];for(const c of candidates){const re=new RegExp('\\b'+escapeRegExp(c)+'(?:s|es|ed|d|ing)?\\b','i');const m=String(sentence).match(re);if(m)return m[0]}return raw}
function makeQuestion(unitName,w){const ex=(w.ex&&w.ex[0])?w.ex[0]:['',''];const sentence=String(ex[0]||'');const answer=matchAnswer(sentence,w.word);const q=sentence?sentence.replace(new RegExp('\\b'+escapeRegExp(answer)+'\\b','i'),'______'):'______';return{unit:unitName,head:w.word,ans:answer,q,zh:String(ex[1]||w.zh||''),meaning:`${w.word} ${w.pos||''}：${w.zh||''}`}}
async function loadQuestions(){try{const all=[];for(const [unitName,url] of unitSources){const html=await fetch(url,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error(unitName+' 載入失敗');return r.text()});const words=extractWords(html);words.forEach(w=>{if(w.ex&&w.ex.length)all.push(makeQuestion(unitName,w))})}questions=all;buildFilters();resetOrder();render()}catch(err){$('#app').innerHTML=`<div class="feedback">載入失敗：${err.message}\n請確認 Unit 01-07 頁面已發布，或按 Ctrl + F5 重新整理。</div>`}}
function filteredBase(){if(unit==='wrong')return wrong;if(unit==='all')return questions;return questions.filter(q=>q.unit===unit)}
function resetOrder(){sessionOrder=shuffle(filteredBase());i=0}
function pool(){return sessionOrder}
function cur(){return pool()[i]}
function nextIndex(){const p=pool();if(!p.length){i=0;return}i=(i+1)%p.length}
function buildFilters(){const html=['<button class="filter active" data-unit="all">全部</button>',...unitSources.map(([u])=>`<button class="filter" data-unit="${u}">${u}</button>`),'<button class="filter" data-unit="wrong">錯題</button>'].join('');$('#filters').innerHTML=html;document.querySelectorAll('.filter').forEach(b=>b.onclick=()=>{unit=b.dataset.unit;score=0;resetOrder();render()})}
function setTop(){document.querySelectorAll('.filter').forEach(b=>b.classList.toggle('active',b.dataset.unit===unit));const p=pool();$('#score').textContent=`${score} correct`;$('#count').textContent=`${p.length?i+1:0} / ${p.length}`;$('#unitLabel').textContent=unit==='all'?'全部':unit==='wrong'?'錯題':unit}
function optionSet(q){const sameUnit=questions.filter(x=>x.unit===q.unit).map(x=>x.ans);const allAnswers=[...new Set(questions.map(x=>x.ans))];const candidates=[...new Set([...sameUnit,...allAnswers])].filter(x=>x&&x.toLowerCase()!==q.ans.toLowerCase());return shuffle([q.ans,...shuffle(candidates).slice(0,3)])}
function render(){setTop();const q=cur();if(!q){$('#app').innerHTML='<div class="feedback">目前沒有題目。</div>';return}$('#app').innerHTML=`<div class="qcard"><small>${q.unit}｜${q.head}｜考試實戰選字</small><p class="q">${q.q}</p></div><div class="options">${optionSet(q).map(o=>`<button class="opt" onclick='check(this,${JSON.stringify(o)})'>${o}</button>`).join('')}</div><div class="feedback" id="fb">選出最適合填入空格的單字或詞形。中文與解析會在作答後顯示。</div><div class="btns"><button class="btn" onclick="next()">下一題</button><button class="btn primary" onclick="speakQuestion()">朗讀題句</button></div>`}
function saveWrong(q){if(!wrong.some(x=>x.unit===q.unit&&x.q===q.q)){wrong.unshift(q);localStorage.setItem('vocab_example_exam_wrong_17',JSON.stringify(wrong))}}
function check(btn,val){const q=cur();document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.textContent===q.ans)b.classList.add('correct')});if(String(val).toLowerCase()===String(q.ans).toLowerCase()){btn.classList.add('correct');score++;$('#fb').textContent=`正確。\n中文：${q.zh}\n解析：${q.meaning}`}else{btn.classList.add('wrong');saveWrong(q);$('#fb').textContent=`錯誤。正確答案：${q.ans}\n中文：${q.zh}\n解析：${q.meaning}`}}
function next(){nextIndex();render()}
function speakQuestion(){const q=cur();if(!q||!('speechSynthesis' in window))return;const text=q.q.replace('______','blank');speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=.78;speechSynthesis.speak(u)}
loadQuestions();
</script></body></html>
