<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Unit 01-03 Grammar Test</title><style>:root{--bg:#f5f7fb;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--blue:#2563eb;--green:#16a34a;--red:#e11d48;--shadow:0 18px 55px rgba(15,23,42,.1)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}button{font:inherit;border:0;cursor:pointer}.app{max-width:980px;margin:0 auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}.top a{color:#2563eb;font-weight:900;text-decoration:none}.brand h1{margin:0;font-size:32px;letter-spacing:-.05em}.brand p{margin:6px 0 0;color:var(--muted);line-height:1.6}.filters{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.filter{border-radius:999px;padding:10px 14px;background:#fff;border:1px solid var(--line);font-weight:900;color:var(--muted)}.filter.active{background:#111827;color:#fff}.stat{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.pill{border-radius:999px;background:#eef2ff;color:#1d4ed8;padding:8px 12px;font-weight:900}.panel{margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:var(--shadow)}.qcard{background:#111827;color:#fff;border-radius:24px;padding:24px;margin-bottom:14px}.qcard small{color:#cbd5e1;font-weight:900}.q{font-size:28px;line-height:1.45;font-weight:950;margin:10px 0 0}.zh{margin:10px 0 0;color:#cbd5e1;line-height:1.6}.options{display:grid;grid-template-columns:1fr 1fr;gap:10px}.opt{border-radius:16px;padding:15px;background:#fff;border:1px solid var(--line);font-weight:900;text-align:left}.opt.correct{background:#dcfce7;color:#166534;border-color:#86efac}.opt.wrong{background:#ffe4e6;color:#be123c;border-color:#fda4af}.feedback{margin-top:14px;border-radius:18px;padding:14px;background:#f9fafb;border:1px solid var(--line);white-space:pre-wrap;line-height:1.7}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.btn{border-radius:16px;padding:14px;font-weight:900;background:#e5e7eb}.primary{background:var(--blue);color:#fff}.list{display:grid;gap:10px}.row{border:1px solid var(--line);border-radius:18px;padding:14px}.row strong{font-size:18px}.row span{color:var(--muted);font-size:14px;line-height:1.55}@media(max-width:700px){.options,.btns{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.q{font-size:23px}.panel{padding:18px;border-radius:22px}}</style></head><body><main class="app"><header class="top"><div class="brand"><h1>1-3 課文法測驗</h1><p>專門練 Unit 01、Unit 02、Unit 03 的句型與用法：介系詞、動名詞、不定詞、片語搭配、集合名詞、轉折連接詞。</p></div><a href="./">回選單</a></header><nav class="filters"><button class="filter active" data-unit="all">全部</button><button class="filter" data-unit="Unit 01">Unit 01</button><button class="filter" data-unit="Unit 02">Unit 02</button><button class="filter" data-unit="Unit 03">Unit 03</button><button class="filter" data-unit="wrong">錯題</button></nav><section class="stat"><span class="pill" id="score">0 correct</span><span class="pill" id="count">0 / 0</span><span class="pill" id="unitLabel">全部</span></section><section class="panel" id="app"></section></main><script>
const grammarQuestions=[
{unit:'Unit 01',type:'remain + 補語',q:'The problem still ______ unsolved.',zh:'這個問題仍然沒有解決。',opts:['remains','remains to','remains as','is remained'],ans:'remains',exp:'remain 可作連綴動詞，後面直接接形容詞作補語：remain unsolved。'},
{unit:'Unit 01',type:'It remains to be seen',q:'It remains ______ which team will win.',zh:'哪一隊會贏尚有待觀察。',opts:['to be seen','seeing','seen','to seeing'],ans:'to be seen',exp:'固定句型：It remains to be seen + 疑問詞子句。'},
{unit:'Unit 01',type:'probable / likely',q:'It seems ______ that this accident was caused by carelessness.',zh:'看來這場意外很可能是粗心造成的。',opts:['probable','probably','probability','probing'],ans:'probable',exp:'seem 後接形容詞作補語；probable 是形容詞。'},
{unit:'Unit 01',type:'determine to V',q:'Lilly determined ______ for the hospital at once.',zh:'莉莉決定立刻前往醫院。',opts:['to leave','leaving','leave','left'],ans:'to leave',exp:'determine to + 原形動詞，表示「決定要……」。'},
{unit:'Unit 01',type:'be determined to V',q:'I am determined ______ gambling.',zh:'我下定決心要戒賭。',opts:['to quit','quitting','quit','for quitting'],ans:'to quit',exp:'be determined to + V，表示「下定決心要做」。'},
{unit:'Unit 01',type:'rate as',q:'This resort is rated ______ the most beautiful place in the country.',zh:'這個觀光勝地被評為國內最美的地方。',opts:['as','to','for','with'],ans:'as',exp:'rate A as B / be rated as B，表示「被評為」。'},
{unit:'Unit 01',type:'in the process of',q:'We are still in the process of ______ a market survey.',zh:'我們仍在進行市場調查。',opts:['conducting','conduct','to conduct','conducted'],ans:'conducting',exp:'in the process of + N / V-ing。'},
{unit:'Unit 01',type:'be unique to',q:'Kiwi birds are unique ______ New Zealand.',zh:'鷸鴕是紐西蘭獨有的。',opts:['to','for','in','with'],ans:'to',exp:'be unique to + 地方，表示「某地所獨有」。'},
{unit:'Unit 01',type:'be located in/on/at',q:'Our school is located ______ that area.',zh:'我們學校位在那個區域。',opts:['in','on','at','to'],ans:'in',exp:'area 屬於區域，搭配 in。街道用 on，精確地點常用 at。'},
{unit:'Unit 01',type:'be anxious about / to',q:'College students are anxious ______ their future.',zh:'大學生對未來感到焦慮。',opts:['about','to','for','with'],ans:'about',exp:'be anxious about + N 表示「對……焦慮」。be anxious to + V 表示「渴望做」。'},
{unit:'Unit 02',type:'permit + O + to V',q:'The guard did not permit us ______ the building.',zh:'警衛不准我們進入大樓。',opts:['to enter','entering','enter','entered'],ans:'to enter',exp:'permit sb to + V。'},
{unit:'Unit 02',type:'permit + V-ing',q:'This school does not permit ______ in the classroom.',zh:'這所學校不允許在教室內飲食。',opts:['eating','to eat','eat','ate'],ans:'eating',exp:'permit + V-ing 表示「允許做某事」。'},
{unit:'Unit 02',type:'without permission',q:'You are not allowed to use the machine ______ my permission.',zh:'沒有我的許可，你不能使用這台機器。',opts:['without','with','under','by'],ans:'without',exp:'without sb’s permission = 未經某人允許。'},
{unit:'Unit 02',type:'represent / stand for',q:'This ring represents my love for you. = This ring ______ my love for you.',zh:'這枚戒指代表我對你的愛。',opts:['stands for','stands by','stands out','stands up'],ans:'stands for',exp:'represent = stand for = 代表、象徵。'},
{unit:'Unit 02',type:'attitude toward(s)',q:'Tony has a positive attitude ______ life.',zh:'東尼對人生持積極態度。',opts:['towards','to be','for being','with'],ans:'towards',exp:'attitude to / toward(s) sth。'},
{unit:'Unit 02',type:'reduce sb to V-ing',q:'Bankruptcy reduced Bruce ______ begging.',zh:'破產使布魯斯淪為乞丐。',opts:['to','for','with','as'],ans:'to',exp:'reduce sb to + N / V-ing，表示使某人淪為……。'},
{unit:'Unit 02',type:'suffer from',q:'My father suffers ______ diabetes.',zh:'我爸爸患有糖尿病。',opts:['from','with','by','for'],ans:'from',exp:'suffer from + 疾病，表示罹患疾病。'},
{unit:'Unit 02',type:'prevent from V-ing',q:'His sore legs prevented him from ______ the marathon.',zh:'他的腿痠使他無法參加馬拉松。',opts:['joining','to join','join','joined'],ans:'joining',exp:'prevent sb from + V-ing。'},
{unit:'Unit 02',type:'in response to',q:'______ your letter, we regret to say that we must cancel the deal.',zh:'關於你的來信，我們很遺憾必須取消交易。',opts:['In response to','Responding','Response for','In responsible to'],ans:'In response to',exp:'in response to + N，表示「回應……」。'},
{unit:'Unit 02',type:'take responsibility for',q:'You should take responsibility ______ what you have done.',zh:'你應該為自己做過的事負責。',opts:['for','to','with','about'],ans:'for',exp:'take responsibility for + N / V-ing。'},
{unit:'Unit 02',type:'perform duties',q:'The teacher told us to perform our civic ______.',zh:'老師告訴我們要履行公民義務。',opts:['duties','duty to','duty for','dutying'],ans:'duties',exp:'perform one’s duties = 履行某人的義務。'},
{unit:'Unit 02',type:'It is normal to V',q:'It is normal ______ nervous before a test.',zh:'考前感到緊張是正常的。',opts:['to feel','feeling','feel','felt'],ans:'to feel',exp:'It is + adj. + to V。'},
{unit:'Unit 02',type:'achieve goals',q:'If you work hard, you will eventually ______ your goals.',zh:'如果你努力，最後會達成目標。',opts:['achieve','achievement','achieving','achieved'],ans:'achieve',exp:'will + 原形動詞；achieve one’s goals = 達成目標。'},
{unit:'Unit 02',type:'meet expectations',q:'Without hard work, you cannot meet your parents’ ______.',zh:'若不努力，你無法達到父母期望。',opts:['expectations','expect','expected','expecting'],ans:'expectations',exp:'meet one’s expectations = 符合某人的期望。'},
{unit:'Unit 03',type:'react to',q:'Ted reacted calmly ______ the plaintiff’s accusation.',zh:'泰德冷靜回應原告的指控。',opts:['to','for','with','about'],ans:'to',exp:'react to sth = 對某事反應。'},
{unit:'Unit 03',type:'raise funds for',q:'The hospital is trying to raise funds ______ research into AIDS.',zh:'醫院正設法為愛滋病研究募款。',opts:['for','to','with','about'],ans:'for',exp:'raise funds for + N，表示為……募款。'},
{unit:'Unit 03',type:'集合名詞 audience',q:'The concert drew ______ audience.',zh:'那場演唱會吸引了很多觀眾。',opts:['a large','many','much','a many'],ans:'a large',exp:'audience 是集合名詞，表示觀眾多寡時常用 a large / small audience。'},
{unit:'Unit 03',type:'in theory / in practice',q:'That sounds good ______ theory, but it may not work ______ practice.',zh:'那在理論上不錯，但實際上可能不可行。',opts:['in; in','on; on','at; at','for; for'],ans:'in; in',exp:'in theory = 理論上；in practice = 實際上。'},
{unit:'Unit 03',type:'go skating / skiing',q:'Would you like to join us in ______ skating this weekend?',zh:'這週末要不要跟我們去溜冰？',opts:['going','go','to go','gone'],ans:'going',exp:'in 是介系詞，後面接 V-ing。'},
{unit:'Unit 03',type:'a staff of',q:'Our company has ______ 500, working in both Canada and Taiwan.',zh:'我們公司有五百名員工。',opts:['a staff of','many staff of','staffs of','a staff'],ans:'a staff of',exp:'staff 作集合名詞，a staff of 500 = 五百名員工。'},
{unit:'Unit 03',type:'in spite of',q:'______ his dad’s warning, Paul went fishing alone.',zh:'儘管爸爸警告，保羅仍獨自去釣魚。',opts:['In spite of','Although','Even though','Because'],ans:'In spite of',exp:'in spite of / despite 後面接名詞；although / even though 後面接子句。'},
{unit:'Unit 03',type:'somewhat + adj.',q:'John is ______ lazy, which is why I don’t like him.',zh:'約翰有點懶，這就是我不喜歡他的原因。',opts:['somewhat','somehow','somewhatly','some way'],ans:'somewhat',exp:'somewhat 修飾形容詞或副詞，表示「有點、稍微」。'},
{unit:'Unit 03',type:'additional + N',q:'Additional tables and chairs ______ required.',zh:'需要額外的桌椅。',opts:['were','was','is','be'],ans:'were',exp:'tables and chairs 是複數主詞，所以用 were。'},
{unit:'Unit 03',type:'take advantage of',q:'All students are invited to take advantage ______ our student discounts.',zh:'歡迎所有學生利用學生折扣。',opts:['of','for','to','with'],ans:'of',exp:'take advantage of = 利用。'},
{unit:'Unit 03',type:'be specific about',q:'Please be more specific ______ what you want.',zh:'請把你要的東西說明確一點。',opts:['about','to','for','with'],ans:'about',exp:'be specific about sth = 對某事說明清楚。'},
{unit:'Unit 03',type:'visible to naked eye',q:'Germs are not visible ______ the naked eye.',zh:'細菌是肉眼看不見的。',opts:['to','for','with','by'],ans:'to',exp:'visible to + 觀看者/感官。'},
{unit:'Unit 03',type:'make sure that',q:'Always make sure that the door ______ locked when you leave.',zh:'離開時務必確認門已上鎖。',opts:['is','be','to be','being'],ans:'is',exp:'make sure that + 子句；door 是單數，所以用 is。'}
];
let unit='all',i=0,score=0,wrong=JSON.parse(localStorage.getItem('grammar_wrong_123')||'[]');const $=s=>document.querySelector(s);function pool(){return unit==='wrong'?wrong:unit==='all'?grammarQuestions:grammarQuestions.filter(q=>q.unit===unit)}function shuffle(a){return[...a].sort(()=>Math.random()-.5)}function randomIndex(){const p=pool();i=p.length?Math.floor(Math.random()*p.length):0}function cur(){return pool()[i]}function setTop(){document.querySelectorAll('.filter').forEach(b=>b.classList.toggle('active',b.dataset.unit===unit));const p=pool();$('#score').textContent=`${score} correct`;$('#count').textContent=`${p.length?i+1:0} / ${p.length}`;$('#unitLabel').textContent=unit==='all'?'全部':unit==='wrong'?'錯題':unit}function render(){setTop();const q=cur();if(!q){$('#app').innerHTML='<div class="feedback">目前沒有題目。</div>';return}$('#app').innerHTML=`<div class="qcard"><small>${q.unit}｜${q.type}</small><p class="q">${q.q}</p><p class="zh">${q.zh}</p></div><div class="options">${shuffle(q.opts).map(o=>`<button class="opt" onclick='check(this,${JSON.stringify(o)})'>${o}</button>`).join('')}</div><div class="feedback" id="fb">選答案後會顯示文法解析。</div><div class="btns"><button class="btn" onclick="next()">下一題</button><button class="btn primary" onclick="speakQuestion()">朗讀題句</button></div>`}function saveWrong(q){if(!wrong.some(x=>x.q===q.q)){wrong.unshift(q);localStorage.setItem('grammar_wrong_123',JSON.stringify(wrong))}}function check(btn,val){const q=cur();document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.textContent===q.ans)b.classList.add('correct')});if(val===q.ans){btn.classList.add('correct');score++;$('#fb').textContent=`正確。\n${q.exp}`}else{btn.classList.add('wrong');saveWrong(q);$('#fb').textContent=`錯誤。正確答案：${q.ans}\n${q.exp}`}}function next(){randomIndex();render()}function speakQuestion(){const q=cur();if(!q||!('speechSynthesis' in window))return;const text=q.q.replace('______','blank');speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=.78;speechSynthesis.speak(u)}document.querySelectorAll('.filter').forEach(b=>b.onclick=()=>{unit=b.dataset.unit;randomIndex();render()});randomIndex();render();</script></body></html>
