<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vocabulary Lab 綜合練習</title><style>:root{--bg:#f5f7fb;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--blue:#2563eb;--shadow:0 18px 55px rgba(15,23,42,.1)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}button,input{font:inherit}button{border:0;cursor:pointer}.app{max-width:900px;margin:0 auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}.top a{color:#2563eb;font-weight:900;text-decoration:none}.brand h1{margin:0;font-size:30px;letter-spacing:-.05em}.brand p{margin:6px 0 0;color:var(--muted)}.panel{margin-top:18px;background:#fff;border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:var(--shadow)}.qcard{background:#111827;color:#fff;border-radius:24px;padding:24px;margin-bottom:14px}.qcard small{color:#cbd5e1;font-weight:900}.q{font-size:32px;line-height:1.35;font-weight:950;margin:10px 0 0}.options{display:grid;grid-template-columns:1fr 1fr;gap:10px}.opt{border-radius:16px;padding:15px;background:#fff;border:1px solid var(--line);font-weight:900;text-align:left}.opt.correct{background:#dcfce7;color:#166534;border-color:#86efac}.opt.wrong{background:#ffe4e6;color:#be123c;border-color:#fda4af}.input{width:100%;border:1px solid var(--line);border-radius:16px;padding:14px;font-size:20px;font-weight:900}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.btn{border-radius:16px;padding:14px;font-weight:900;background:#e5e7eb}.primary{background:var(--blue);color:#fff}.feedback{margin-top:14px;border-radius:18px;padding:14px;background:#f9fafb;border:1px solid var(--line);white-space:pre-wrap;line-height:1.7}.stat{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.pill{border-radius:999px;background:#eef2ff;color:#1d4ed8;padding:8px 12px;font-weight:900}@media(max-width:640px){.options,.btns{grid-template-columns:1fr}.q{font-size:26px}.panel{padding:18px;border-radius:22px}.top{align-items:flex-start;flex-direction:column}}</style></head><body><main class="app"><header class="top"><div class="brand"><h1>綜合練習</h1><p>Unit 01 + Unit 02 混合測驗：英選中、中選英、例句填空、主動輸入。</p></div><a href="./">回選單</a></header><section class="stat"><span class="pill" id="score">0 correct</span><span class="pill" id="count">0 / 0</span><span class="pill" id="mode">Level 1</span></section><section class="panel" id="app"></section></main><script>
const words=[
{u:'Unit 01',w:'unite',z:'使聯合；團結',e:'Our goal is to unite the labor unions to oppose the new policy.',t:'我們的目標是聯合這些勞工團體反對這項新政策。'},
{u:'Unit 01',w:'remain',z:'繼續存在；仍是',e:'The problem still remains unsolved.',t:'這個問題仍然一直沒被解決。'},
{u:'Unit 01',w:'probable',z:'很可能的',e:'It seems probable that this accident is the result of the driver\'s carelessness.',t:'看來意外很可能是因為駕駛的粗心所致。'},
{u:'Unit 01',w:'determine',z:'決定；確定',e:'The police were finally able to determine the cause of the accident.',t:'警方終於能確定這起意外的肇因了。'},
{u:'Unit 01',w:'process',z:'過程；處理',e:'It will take about 3 weeks to process your application.',t:'處理您的申請約要三星期的時間。'},
{u:'Unit 01',w:'recognize',z:'認出；承認；認可',e:'Jack cannot recognize his daughter.',t:'傑克認不出他的女兒來了。'},
{u:'Unit 01',w:'unique',z:'與眾不同的；獨有的',e:'Every person\'s fingerprints are unique.',t:'每個人的指紋都是獨一無二的。'},
{u:'Unit 01',w:'locate',z:'位於；找到位置；設置',e:'Our school is located in that area.',t:'我們學校位在那個區域。'},
{u:'Unit 01',w:'career',z:'職業；終身職業的',e:'Ms. Wilson took up photography as her career.',t:'魏爾遜女士以攝影作為她的終身職業。'},
{u:'Unit 02',w:'permit',z:'准許；允許；許可證',e:'We are not permitted to smoke here.',t:'我們不能在此地抽菸。'},
{u:'Unit 02',w:'volume',z:'量；容量；冊；音量',e:'The volume of traffic reaches its peak during rush hour.',t:'交通流量在上下班尖峰時間會達到高峰。'},
{u:'Unit 02',w:'represent',z:'代表；象徵',e:'George represented his company at the press conference.',t:'喬治代表公司出席記者會。'},
{u:'Unit 02',w:'attitude',z:'態度',e:'Tony has a positive attitude towards life.',t:'東尼對人生持積極的態度。'},
{u:'Unit 02',w:'strength',z:'力量；優點',e:'Operating this machine requires skill more than physical strength.',t:'操作這臺機器需要的技巧比體力還多。'},
{u:'Unit 02',w:'prevent',z:'阻止；預防；避免',e:'Taking necessary precautions will prevent many accidents from happening.',t:'採取必要的預防措施能防止許多意外的發生。'},
{u:'Unit 02',w:'response',z:'回應；回答；反應',e:'Has there been any response to your letter?',t:'你的信有回音了嗎？'},
{u:'Unit 02',w:'perform',z:'執行；履行；表演；表現',e:'The surgeon has performed this operation before.',t:'該外科醫生以前動過這種手術。'},
{u:'Unit 02',w:'achieve',z:'達成；達到',e:'If you work hard, you will eventually achieve your goals.',t:'如果你努力，最後終將達成目標。'},
{u:'Unit 02',w:'expectation',z:'期望；預期',e:'If you lower your expectations, you will never be disappointed.',t:'假使你不多所期待，就永遠不會失望。'},
{u:'Unit 02',w:'downtown',z:'市中心的；在市區；往市區',e:'I am heading downtown.',t:'我要到市中心去。'}];
let i=0,score=0,level=1;const $=s=>document.querySelector(s);function shuffle(a){return[...a].sort(()=>Math.random()-.5)}function cur(){return words[i%words.length]}function opts(ans,field){return shuffle([ans,...shuffle(words.filter(x=>x[field]!==ans).map(x=>x[field])).slice(0,3)])}function qdata(){let x=cur();if(level===1)return{type:'choice',label:`${x.u}｜Level 1 英選中`,q:`${x.w} 的中文意思是？`,ans:x.z,opts:opts(x.z,'z')};if(level===2)return{type:'choice',label:`${x.u}｜Level 2 中選英`,q:`${x.z} 的英文是？`,ans:x.w,opts:opts(x.w,'w')};if(level===3)return{type:'choice',label:`${x.u}｜Level 3 例句填空`,q:x.e.replace(new RegExp('\\b'+x.w+'s?\\b','i'),'______'),ans:x.w,opts:opts(x.w,'w')};return{type:'input',label:`${x.u}｜Level 4 主動輸出`,q:`請輸入英文：${x.z}`,ans:x.w}}function render(){let q=qdata();$('#score').textContent=`${score} correct`;$('#count').textContent=`${i+1} / ${words.length}`;$('#mode').textContent=`Level ${level}`;$('#app').innerHTML=`<div class="qcard"><small>${q.label}</small><p class="q">${q.q}</p></div>${q.type==='choice'?`<div class="options">${q.opts.map(o=>`<button class="opt" onclick='checkChoice(this,${JSON.stringify(o)})'>${o}</button>`).join('')}</div>`:`<input id="answer" class="input" placeholder="輸入英文單字"><div class="btns"><button class="btn primary" onclick="checkInput()">檢查</button><button class="btn" onclick="next()">跳過</button></div>`}<div class="feedback" id="fb">答題後會顯示完整例句。Level 1→2→3→4 循環。</div>`;if($('#answer'))$('#answer').focus()}function checkChoice(btn,val){let q=qdata(),x=cur();document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.textContent===q.ans)b.classList.add('correct')});if(val===q.ans){btn.classList.add('correct');score++;$('#fb').textContent=`正確\n${x.e}\n${x.t}`}else{btn.classList.add('wrong');$('#fb').textContent=`錯誤。答案：${q.ans}\n${x.e}\n${x.t}`}setTimeout(next,900)}function checkInput(){let q=qdata(),x=cur(),v=$('#answer').value.trim().toLowerCase();if(v===q.ans.toLowerCase()){score++;$('#fb').textContent=`正確\n${x.e}\n${x.t}`}else{$('#fb').textContent=`錯誤。答案：${q.ans}\n${x.e}\n${x.t}`}setTimeout(next,1000)}function next(){i=(i+1)%words.length;level=level===4?1:level+1;render()}render();</script></body></html>
