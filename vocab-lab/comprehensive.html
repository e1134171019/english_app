<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Vocabulary Lab 綜合練習</title>
  <style>
    :root{--bg:#f5f7fb;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--blue:#2563eb;--shadow:0 18px 55px rgba(15,23,42,.1)}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}
    button,input{font:inherit}button{border:0;cursor:pointer}.app{max-width:1020px;margin:0 auto;padding:18px}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:center}.top a{color:#2563eb;font-weight:900;text-decoration:none}
    .brand h1{margin:0;font-size:32px;letter-spacing:-.05em}.brand p{margin:6px 0 0;color:var(--muted);line-height:1.6}
    .unitPanel{margin-top:18px;background:#fff;border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:var(--shadow)}
    .unitHead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.unitHead h2{margin:0;font-size:20px}.unitHead p{margin:5px 0 0;color:var(--muted);line-height:1.55}
    .unitChoices{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-top:14px}
    .unitToggle{display:flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--line);border-radius:14px;padding:11px;background:#fff;font-weight:900;cursor:pointer;user-select:none}
    .unitToggle.selected{background:#eff6ff;border-color:#93c5fd;color:#1d4ed8}.unitToggle input{accent-color:#2563eb;width:17px;height:17px}
    .unitActions{display:flex;gap:9px;flex-wrap:wrap;margin-top:12px}.smallBtn{border-radius:13px;padding:10px 14px;background:#e5e7eb;font-weight:900}.smallBtn.primary{background:var(--blue);color:#fff}
    .scope{margin-top:12px;border-radius:14px;background:#f8fafc;border:1px solid var(--line);padding:11px 13px;color:#475569;font-weight:800;line-height:1.55}
    .scope.error{background:#fff1f2;color:#be123c;border-color:#fecdd3}
    .modes{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:18px}.mode{border-radius:16px;padding:12px 10px;background:#fff;border:1px solid var(--line);font-weight:900;color:var(--muted)}.mode.active{background:#111827;color:#fff}
    .stat{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.pill{border-radius:999px;background:#eef2ff;color:#1d4ed8;padding:8px 12px;font-weight:900}
    .panel{margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:var(--shadow)}
    .qcard{background:#111827;color:#fff;border-radius:24px;padding:24px;margin-bottom:14px}.qcard small{color:#cbd5e1;font-weight:900}.q{font-size:30px;line-height:1.35;font-weight:950;margin:10px 0 0}
    .options{display:grid;grid-template-columns:1fr 1fr;gap:10px}.opt{border-radius:16px;padding:15px;background:#fff;border:1px solid var(--line);font-weight:900;text-align:left}.opt.correct{background:#dcfce7;color:#166534;border-color:#86efac}.opt.wrong{background:#ffe4e6;color:#be123c;border-color:#fda4af}
    .input{width:100%;border:1px solid var(--line);border-radius:16px;padding:14px;font-size:20px;font-weight:900}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.btn{border-radius:16px;padding:14px;font-weight:900;background:#e5e7eb}.primary{background:var(--blue);color:#fff}
    .feedback{margin-top:14px;border-radius:18px;padding:14px;background:#f9fafb;border:1px solid var(--line);white-space:pre-wrap;line-height:1.7}.list{display:grid;gap:10px}.row{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);border-radius:18px;padding:14px}.row strong{font-size:20px}.row span{color:var(--muted);font-size:14px;line-height:1.55}
    .loading{text-align:center;padding:34px 10px;color:var(--muted);font-weight:900}
    @media(max-width:860px){.modes{grid-template-columns:1fr 1fr}.unitChoices{grid-template-columns:repeat(2,1fr)}.options,.btns{grid-template-columns:1fr}.q{font-size:25px}.panel{padding:18px;border-radius:22px}.top{align-items:flex-start;flex-direction:column}}
    @media(max-width:520px){.unitChoices{grid-template-columns:1fr}.unitActions{display:grid;grid-template-columns:1fr 1fr}.unitActions .primary{grid-column:1/-1}}
  </style>
</head>
<body>
<main class="app">
  <header class="top">
    <div class="brand">
      <h1>綜合練習</h1>
      <p>自選 Unit 01～Unit 10；套用後，所有測驗模式只會從已選課別出題。</p>
    </div>
    <a href="./">回選單</a>
  </header>

  <section class="unitPanel">
    <div class="unitHead">
      <div>
        <h2>選擇練習課別</h2>
        <p>可單選或複選；系統會記住你最後一次套用的組合。</p>
      </div>
    </div>
    <div class="unitChoices" id="unitChoices"></div>
    <div class="unitActions">
      <button class="smallBtn" id="selectAll" type="button">全選</button>
      <button class="smallBtn" id="clearAll" type="button">清除</button>
      <button class="smallBtn primary" id="applyUnits" type="button">套用課別</button>
    </div>
    <div class="scope" id="scopeText">正在準備題庫……</div>
  </section>

  <nav class="modes">
    <button class="mode active" data-mode="choice">中英選擇題</button>
    <button class="mode" data-mode="quick">快速測驗</button>
    <button class="mode" data-mode="cloze">例句填空</button>
    <button class="mode" data-mode="family">字族挑戰</button>
    <button class="mode" data-mode="semantic">近反義詞</button>
    <button class="mode" data-mode="wrong">錯題複習</button>
  </nav>

  <section class="stat">
    <span class="pill" id="score">0 correct</span>
    <span class="pill" id="count">0 / 0</span>
    <span class="pill" id="modeName">中英選擇題</span>
  </section>
  <section class="panel" id="app"><div class="loading">正在載入題庫……</div></section>
</main>

<script>
const UNIT_TOTAL = 10;
const UNIT_STORAGE_KEY = 'vocab_selected_units_v1';
const WRONG_STORAGE_KEY = 'mixed_wrong';
const DATA_VERSION = '20260707-custom-units-v1';

let mode = 'choice';
let score = 0;
let selectedUnits = readSelectedUnits();
let words = [];
let deck = [];
let deckPosition = 0;
let currentQuestion = null;
let loading = false;
let wrong = readWrongItems();
const unitCache = new Map();
const $ = selector => document.querySelector(selector);

function readSelectedUnits(){
  try{
    const saved = JSON.parse(localStorage.getItem(UNIT_STORAGE_KEY) || 'null');
    if(Array.isArray(saved)){
      const valid = [...new Set(saved.map(Number).filter(n => Number.isInteger(n) && n >= 1 && n <= UNIT_TOTAL))].sort((a,b)=>a-b);
      if(valid.length) return valid;
    }
  }catch(error){ console.warn('Unable to read selected units', error); }
  return [1,2,3];
}

function readWrongItems(){
  try{
    const saved = JSON.parse(localStorage.getItem(WRONG_STORAGE_KEY) || '[]');
    return Array.isArray(saved) ? saved : [];
  }catch(error){
    return [];
  }
}

function unitLabel(no){ return `Unit ${String(no).padStart(2,'0')}`; }
function shuffle(items){ return [...items].sort(() => Math.random() - 0.5); }
function unique(items){ return [...new Set((items || []).filter(Boolean).map(String))]; }
function escapeHtml(value){
  return String(value ?? '').replace(/[&<>'"]/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
}
function escapeRegExp(value){ return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function buildUnitSelector(){
  $('#unitChoices').innerHTML = Array.from({length:UNIT_TOTAL},(_,index)=>index+1).map(no => `
    <label class="unitToggle${selectedUnits.includes(no)?' selected':''}">
      <input type="checkbox" value="${no}" ${selectedUnits.includes(no)?'checked':''}>
      ${unitLabel(no)}
    </label>`).join('');

  $('#unitChoices').addEventListener('change', event => {
    const label = event.target.closest('.unitToggle');
    if(label) label.classList.toggle('selected', event.target.checked);
  });

  $('#selectAll').onclick = () => setAllUnitChecks(true);
  $('#clearAll').onclick = () => setAllUnitChecks(false);
  $('#applyUnits').onclick = applyCheckedUnits;
}

function setAllUnitChecks(checked){
  document.querySelectorAll('#unitChoices input').forEach(input => {
    input.checked = checked;
    input.closest('.unitToggle').classList.toggle('selected', checked);
  });
}

function checkedUnits(){
  return [...document.querySelectorAll('#unitChoices input:checked')].map(input => Number(input.value)).sort((a,b)=>a-b);
}

function extractWordsArray(source){
  const token = /const\s+words\s*=\s*/.exec(source);
  if(!token) throw new Error('找不到 const words 題庫');
  const start = source.indexOf('[', token.index + token[0].length);
  if(start < 0) throw new Error('找不到題庫陣列起點');

  let depth = 0;
  let quote = null;
  let escaped = false;
  for(let index = start; index < source.length; index++){
    const char = source[index];
    if(quote){
      if(escaped){ escaped = false; continue; }
      if(char === '\\'){ escaped = true; continue; }
      if(char === quote) quote = null;
      continue;
    }
    if(char === "'" || char === '"' || char === '`'){ quote = char; continue; }
    if(char === '[') depth++;
    if(char === ']'){
      depth--;
      if(depth === 0){
        const literal = source.slice(start, index + 1);
        return Function(`"use strict";return (${literal});`)();
      }
    }
  }
  throw new Error('題庫陣列不完整');
}

function normalizeWord(item, unitNo){
  const examples = Array.isArray(item.ex) ? item.ex : [];
  const firstExample = Array.isArray(examples[0]) ? examples[0] : ['', ''];
  const word = item.word || item.w || '';
  const zh = item.zh || item.z || '';
  const related = unique([...(item.related || []), ...(item.forms || []), ...(item.family || [])]);
  return {
    u: unitLabel(unitNo),
    unitNo,
    w: String(word).trim(),
    z: String(zh).trim(),
    e: String(firstExample[0] || item.e || '').trim(),
    t: String(firstExample[1] || item.t || '').trim(),
    family: related,
    syn: unique(item.syn || []),
    ant: unique(item.ant || [])
  };
}

async function loadUnit(unitNo){
  if(unitCache.has(unitNo)) return unitCache.get(unitNo);
  const id = String(unitNo).padStart(2,'0');
  const response = await fetch(`../unit${id}-vocab-lab/index.html?v=${DATA_VERSION}`, {cache:'no-store'});
  if(!response.ok) throw new Error(`${unitLabel(unitNo)} 載入失敗（HTTP ${response.status}）`);
  const source = await response.text();
  const rawWords = extractWordsArray(source);
  if(!Array.isArray(rawWords)) throw new Error(`${unitLabel(unitNo)} 題庫格式錯誤`);
  const normalized = rawWords.map(item => normalizeWord(item, unitNo)).filter(item => item.w && item.z);
  if(!normalized.length) throw new Error(`${unitLabel(unitNo)} 沒有可用單字`);
  unitCache.set(unitNo, normalized);
  return normalized;
}

async function applyCheckedUnits(){
  const units = checkedUnits();
  if(!units.length){
    setScope('至少選擇一個 Unit 才能開始。', true);
    return;
  }
  await applyUnits(units);
}

async function applyUnits(units){
  if(loading) return;
  loading = true;
  setScope(`正在載入：${units.map(unitLabel).join(' + ')}……`);
  $('#app').innerHTML = '<div class="loading">正在載入所選課別題庫……</div>';
  $('#applyUnits').disabled = true;

  try{
    const loaded = await Promise.all(units.map(loadUnit));
    selectedUnits = units;
    localStorage.setItem(UNIT_STORAGE_KEY, JSON.stringify(selectedUnits));
    words = loaded.flat();
    score = 0;
    currentQuestion = null;
    resetDeck();
    setScope(`目前範圍：${selectedUnits.map(unitLabel).join(' + ')}｜已選 ${selectedUnits.length} 課，共 ${words.length} 個單字`);
    render();
  }catch(error){
    console.error(error);
    setScope(`題庫載入失敗：${error.message}`, true);
    $('#app').innerHTML = `<div class="feedback">${escapeHtml(error.message)}<br>請重新整理後再試一次。</div>`;
  }finally{
    loading = false;
    $('#applyUnits').disabled = false;
  }
}

function setScope(message, isError=false){
  $('#scopeText').textContent = message;
  $('#scopeText').classList.toggle('error', isError);
}

function resetDeck(){
  deck = shuffle(words.map((_,index)=>index));
  deckPosition = 0;
}

function currentWord(){
  if(!words.length) return null;
  if(!deck.length) resetDeck();
  return words[deck[deckPosition] ?? 0];
}

function optionSet(answer, pool){
  const distractors = shuffle(unique(pool).filter(value => value && value !== answer)).slice(0,3);
  return shuffle([answer, ...distractors]);
}

function setTop(){
  document.querySelectorAll('.mode').forEach(button => button.classList.toggle('active', button.dataset.mode === mode));
  $('#score').textContent = `${score} correct`;
  $('#count').textContent = words.length ? `${deckPosition + 1} / ${words.length}` : '0 / 0';
  $('#modeName').textContent = {
    choice:'中英選擇題',quick:'快速測驗',cloze:'例句填空',family:'字族挑戰',semantic:'近反義詞',wrong:'錯題複習'
  }[mode];
}

function makeQuestion(){
  const item = currentWord();
  if(!item) return null;
  const wordPool = words.map(word => word.w);
  const zhPool = words.map(word => word.z);

  if(mode === 'choice'){
    return Math.random() > 0.5
      ? {type:'choice',label:`${item.u}｜英選中`,q:`${item.w} 的中文意思是？`,ans:item.z,opts:optionSet(item.z,zhPool),item}
      : {type:'choice',label:`${item.u}｜中選英`,q:`${item.z} 的英文是？`,ans:item.w,opts:optionSet(item.w,wordPool),item};
  }
  if(mode === 'quick'){
    return Math.random() > 0.5
      ? {type:'choice',label:`${item.u}｜英選中`,q:`${item.w} 的中文意思是？`,ans:item.z,opts:optionSet(item.z,zhPool),item}
      : {type:'input',label:`${item.u}｜主動輸出`,q:`請輸入英文：${item.z}`,ans:item.w,item};
  }
  if(mode === 'cloze'){
    const pattern = new RegExp(`\\b${escapeRegExp(item.w)}(?:s|es|ed|ing)?\\b`, 'i');
    let sentence = item.e ? item.e.replace(pattern, '______') : '';
    if(!sentence || sentence === item.e) sentence = item.e ? `${item.e}\n目標單字：______` : `請填入英文：${item.z}`;
    return {type:'choice',label:`${item.u}｜例句填空`,q:sentence,ans:item.w,opts:optionSet(item.w,wordPool),item};
  }
  if(mode === 'family'){
    const familyPool = unique(words.flatMap(word => word.family));
    const answer = item.family.find(value => value !== item.w) || item.w;
    return {type:'choice',label:`${item.u}｜字族挑戰`,q:`請選出與 ${item.w} 同字族／相關延伸的單字`,ans:answer,opts:optionSet(answer,wordPool.concat(familyPool)),item};
  }

  const hasAntonym = item.ant.length > 0;
  const candidates = hasAntonym ? item.ant : item.syn;
  const answer = candidates[0] || item.w;
  const semanticPool = wordPool.concat(words.flatMap(word => word.ant), words.flatMap(word => word.syn));
  return {
    type:'choice',
    label:`${item.u}｜近反義詞挑戰`,
    q:hasAntonym ? `請選出 ${item.w} 的反義詞` : `請選出 ${item.w} 的近義詞`,
    ans:answer,
    opts:optionSet(answer,semanticPool),
    item
  };
}

function render(){
  setTop();
  if(mode === 'wrong'){
    renderWrong();
    return;
  }
  if(!words.length){
    $('#app').innerHTML = '<div class="feedback">尚未載入題庫。</div>';
    return;
  }

  currentQuestion = makeQuestion();
  const question = currentQuestion;
  $('#app').innerHTML = `
    <div class="qcard"><small>${escapeHtml(question.label)}</small><p class="q">${escapeHtml(question.q)}</p></div>
    ${question.type === 'choice'
      ? `<div class="options">${question.opts.map(option => `<button class="opt" data-value="${escapeHtml(option)}">${escapeHtml(option)}</button>`).join('')}</div>`
      : `<input id="answer" class="input" placeholder="輸入英文單字" autocomplete="off"><div class="btns"><button class="btn primary" id="checkInput">檢查</button><button class="btn" id="skipQuestion">跳過</button></div>`}
    <div class="feedback" id="fb">答題後會顯示完整例句。答錯會加入錯題複習。</div>`;

  document.querySelectorAll('.opt').forEach(button => button.onclick = () => checkChoice(button, button.dataset.value));
  if($('#checkInput')) $('#checkInput').onclick = checkInput;
  if($('#skipQuestion')) $('#skipQuestion').onclick = nextQuestion;
  if($('#answer')){
    $('#answer').focus();
    $('#answer').addEventListener('keydown', event => { if(event.key === 'Enter') checkInput(); });
  }
}

function markWrong(item, kind){
  if(!wrong.some(entry => entry.w === item.w && entry.u === item.u && entry.kind === kind)){
    wrong.unshift({w:item.w,z:item.z,u:item.u,e:item.e,t:item.t,kind});
    localStorage.setItem(WRONG_STORAGE_KEY, JSON.stringify(wrong));
  }
}

function exampleFeedback(prefix, question){
  const example = question.item.e || '此單字目前沒有例句。';
  const translation = question.item.t || '';
  return `${prefix}\n${example}${translation ? `\n${translation}` : ''}`;
}

function checkChoice(button, value){
  const question = currentQuestion;
  if(!question) return;
  document.querySelectorAll('.opt').forEach(option => {
    option.disabled = true;
    if(option.dataset.value === question.ans) option.classList.add('correct');
  });
  if(value === question.ans){
    button.classList.add('correct');
    score++;
    $('#fb').textContent = exampleFeedback('正確', question);
  }else{
    button.classList.add('wrong');
    markWrong(question.item, question.label);
    $('#fb').textContent = exampleFeedback(`錯誤。答案：${question.ans}`, question);
  }
  setTop();
  setTimeout(nextQuestion, 1000);
}

function checkInput(){
  const question = currentQuestion;
  if(!question || !$('#answer')) return;
  const value = $('#answer').value.trim().toLowerCase();
  $('#answer').disabled = true;
  if(value === question.ans.toLowerCase()){
    score++;
    $('#fb').textContent = exampleFeedback('正確', question);
  }else{
    markWrong(question.item, question.label);
    $('#fb').textContent = exampleFeedback(`錯誤。答案：${question.ans}`, question);
  }
  setTop();
  setTimeout(nextQuestion, 1100);
}

function nextQuestion(){
  if(!words.length) return;
  deckPosition++;
  if(deckPosition >= deck.length) resetDeck();
  currentQuestion = null;
  render();
}

function wrongUnitNumber(item){
  const match = String(item.u || '').match(/\d+/);
  return match ? Number(match[0]) : null;
}

function renderWrong(){
  setTop();
  const filtered = wrong.filter(item => selectedUnits.includes(wrongUnitNumber(item)));
  $('#app').innerHTML = filtered.length
    ? `<h2>錯題複習</h2><div class="list">${filtered.map(item => `<div class="row"><div><strong>${escapeHtml(item.w)}</strong><br><span>${escapeHtml(item.u)}｜${escapeHtml(item.z)}<br>${escapeHtml(item.kind)}<br>${escapeHtml(item.e || '')}<br>${escapeHtml(item.t || '')}</span></div></div>`).join('')}</div><div class="btns"><button class="btn" id="clearWrong">清空目前範圍錯題</button><button class="btn primary" id="backPractice">回中英選擇題</button></div>`
    : '<div class="feedback">目前所選課別沒有錯題。答錯後會自動加入這裡。</div>';

  if($('#clearWrong')) $('#clearWrong').onclick = () => {
    wrong = wrong.filter(item => !selectedUnits.includes(wrongUnitNumber(item)));
    localStorage.setItem(WRONG_STORAGE_KEY, JSON.stringify(wrong));
    renderWrong();
  };
  if($('#backPractice')) $('#backPractice').onclick = () => {
    mode = 'choice';
    resetDeck();
    render();
  };
}

document.querySelectorAll('.mode').forEach(button => {
  button.onclick = () => {
    if(loading) return;
    mode = button.dataset.mode;
    currentQuestion = null;
    if(mode !== 'wrong') resetDeck();
    render();
  };
});

buildUnitSelector();
applyUnits(selectedUnits);
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/english_app/vocab-sw.js').catch(()=>{});}</script>
<script src="/english_app/speech-upgrade.js"></script>
</body>
</html>
