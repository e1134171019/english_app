<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vocabulary Lab 綜合練習</title><style>:root{--bg:#f5f7fb;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--blue:#2563eb;--shadow:0 18px 55px rgba(15,23,42,.1)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}button,input{font:inherit}button{border:0;cursor:pointer}.app{max-width:980px;margin:0 auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}.top a{color:#2563eb;font-weight:900;text-decoration:none}.brand h1{margin:0;font-size:32px;letter-spacing:-.05em}.brand p{margin:6px 0 0;color:var(--muted);line-height:1.6}.modes{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:18px}.mode{border-radius:16px;padding:12px 10px;background:#fff;border:1px solid var(--line);font-weight:900;color:var(--muted)}.mode.active{background:#111827;color:#fff}.stat{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.pill{border-radius:999px;background:#eef2ff;color:#1d4ed8;padding:8px 12px;font-weight:900}.panel{margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:var(--shadow)}.qcard{background:#111827;color:#fff;border-radius:24px;padding:24px;margin-bottom:14px}.qcard small{color:#cbd5e1;font-weight:900}.q{font-size:30px;line-height:1.35;font-weight:950;margin:10px 0 0}.options{display:grid;grid-template-columns:1fr 1fr;gap:10px}.opt{border-radius:16px;padding:15px;background:#fff;border:1px solid var(--line);font-weight:900;text-align:left}.opt.correct{background:#dcfce7;color:#166534;border-color:#86efac}.opt.wrong{background:#ffe4e6;color:#be123c;border-color:#fda4af}.input{width:100%;border:1px solid var(--line);border-radius:16px;padding:14px;font-size:20px;font-weight:900}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.btn{border-radius:16px;padding:14px;font-weight:900;background:#e5e7eb}.primary{background:var(--blue);color:#fff}.feedback{margin-top:14px;border-radius:18px;padding:14px;background:#f9fafb;border:1px solid var(--line);white-space:pre-wrap;line-height:1.7}.list{display:grid;gap:10px}.row{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);border-radius:18px;padding:14px}.row strong{font-size:20px}.row span{color:var(--muted);font-size:14px;line-height:1.55}@media(max-width:760px){.modes{grid-template-columns:1fr 1fr}.options,.btns{grid-template-columns:1fr}.q{font-size:25px}.panel{padding:18px;border-radius:22px}.top{align-items:flex-start;flex-direction:column}}</style></head><body><main class="app"><header class="top"><div class="brand"><h1>綜合練習</h1><p>Unit 01 + Unit 02 考前整合：快速測驗、例句填空、字族挑戰、近反義詞挑戰、錯題複習。</p></div><a href="./">回選單</a></header><nav class="modes"><button class="mode active" data-mode="quick">快速測驗</button><button class="mode" data-mode="cloze">例句填空</button><button class="mode" data-mode="family">字族挑戰</button><button class="mode" data-mode="semantic">近反義詞</button><button class="mode" data-mode="wrong">錯題複習</button></nav><section class="stat"><span class="pill" id="score">0 correct</span><span class="pill" id="count">0 / 0</span><span class="pill" id="modeName">快速測驗</span></section><section class="panel" id="app"></section></main><script>
const words=[
{u:'Unit 01',w:'unite',z:'使聯合；團結',e:'Our goal is to unite the labor unions to oppose the new policy.',t:'我們的目標是聯合這些勞工團體反對這項新政策。',family:['unity','union','united'],syn:['join','combine'],ant:['divide','separate']},
{u:'Unit 01',w:'remain',z:'繼續存在；仍是',e:'The problem still remains unsolved.',t:'這個問題仍然一直沒被解決。',family:['remaining','remains'],syn:['stay','continue'],ant:['leave','disappear']},
{u:'Unit 01',w:'determine',z:'決定；確定',e:'The police were finally able to determine the cause of the accident.',t:'警方終於能確定這起意外的肇因了。',family:['determined','determination'],syn:['decide','resolve'],ant:[]},
{u:'Unit 01',w:'recognize',z:'認出；承認；認可',e:'Jack cannot recognize his daughter.',t:'傑克認不出他的女兒來了。',family:['recognition','recognizable'],syn:['identify','acknowledge'],ant:[]},
{u:'Unit 01',w:'unique',z:'與眾不同的；獨有的',e:'Every person\'s fingerprints are unique.',t:'每個人的指紋都是獨一無二的。',family:[],syn:['special','distinctive'],ant:['common']},
{u:'Unit 01',w:'costly',z:'昂貴的；代價高的',e:'Money is hard to earn, so I never buy costly clothes.',t:'錢很難賺，因此我絕不買昂貴的衣服。',family:['cost'],syn:['expensive'],ant:['cheap']},
{u:'Unit 01',w:'jealous',z:'嫉妒的；吃醋的',e:'Why are you so jealous of David\'s promotion?',t:'為什麼大衛升遷你會那麼嫉妒？',family:['jealousy'],syn:['envious'],ant:[]},
{u:'Unit 01',w:'locate',z:'位於；找到位置；設置',e:'Our school is located in that area.',t:'我們學校位在那個區域。',family:['location','located'],syn:['find','situate'],ant:[]},
{u:'Unit 02',w:'permit',z:'准許；允許；許可證',e:'We are not permitted to smoke here.',t:'我們不能在此地抽菸。',family:['permission','permissive','permissible'],syn:['allow'],ant:['ban','prohibit']},
{u:'Unit 02',w:'represent',z:'代表；象徵',e:'George represented his company at the press conference.',t:'喬治代表公司出席記者會。',family:['representative','representation'],syn:['symbolize'],ant:[]},
{u:'Unit 02',w:'reduce',z:'使減少；使淪為',e:'Despite Andy\'s pay cut, he won\'t reduce his standard of living.',t:'儘管安迪被減薪，他仍不願降低他的生活水準。',family:['reduction'],syn:['decrease'],ant:['increase']},
{u:'Unit 02',w:'fake',z:'假的；贗品；偽造；假裝',e:'Brian was caught using fake money.',t:'布萊恩因為使用假鈔被抓。',family:['faked'],syn:['false','counterfeit'],ant:['genuine']},
{u:'Unit 02',w:'strength',z:'力量；優點',e:'Operating this machine requires skill more than physical strength.',t:'操作這臺機器需要的技巧比體力還多。',family:['strong','strengthen'],syn:['power','advantage'],ant:['weakness']},
{u:'Unit 02',w:'weakness',z:'虛弱；弱點',e:'Math is my weakness, but music is my forte.',t:'數學是我的弱項，不過音樂卻是我的強項。',family:['weak','weaken'],syn:['shortcoming'],ant:['strength']},
{u:'Unit 02',w:'vary',z:'變化；改變',e:'The weather here varies between cool and very hot.',t:'這裡的天氣變化很大，忽而涼爽忽而酷熱。',family:['various','variety','variation'],syn:['differ','change'],ant:[]},
{u:'Unit 02',w:'prevent',z:'阻止；預防；避免',e:'Taking necessary precautions will prevent many accidents from happening.',t:'採取必要的預防措施能防止許多意外的發生。',family:['prevention','preventive'],syn:['avoid','stop'],ant:['cause']},
{u:'Unit 02',w:'response',z:'回應；回答；反應',e:'Has there been any response to your letter?',t:'你的信有回音了嗎？',family:['respond','responsive','responsibility'],syn:['reply','feedback'],ant:[]},
{u:'Unit 02',w:'perform',z:'執行；履行；表演；表現',e:'The surgeon has performed this operation before.',t:'該外科醫生以前動過這種手術。',family:['performance','performer'],syn:['carry out','act'],ant:[]},
{u:'Unit 02',w:'achieve',z:'達成；達到',e:'If you work hard, you will eventually achieve your goals.',t:'如果你努力，最後終將達成目標。',family:['achievement','accomplishment'],syn:['accomplish','attain'],ant:['fail']},
{u:'Unit 02',w:'hopeful',z:'充滿希望的；樂觀的',e:'After watching the film, everyone feels hopeful about the future.',t:'看完這部電影後，每個人對未來都懷抱希望。',family:['hopefully','hope'],syn:['optimistic'],ant:['hopeless']}
];
let mode='quick',i=0,score=0,wrong=JSON.parse(localStorage.getItem('mixed_wrong')||'[]');const $=s=>document.querySelector(s);function shuffle(a){return[...a].sort(()=>Math.random()-.5)}function cur(){return words[i%words.length]}function opts(ans,list){return shuffle([ans,...shuffle(list.filter(x=>x&&x!==ans)).slice(0,3)])}function setTop(){document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));$('#score').textContent=`${score} correct`;$('#count').textContent=`${i+1} / ${words.length}`;$('#modeName').textContent={quick:'快速測驗',cloze:'例句填空',family:'字族挑戰',semantic:'近反義詞',wrong:'錯題複習'}[mode]}function qdata(){let x=cur(),pool=words.map(w=>w.w),zpool=words.map(w=>w.z);if(mode==='quick')return Math.random()>.5?{type:'choice',label:`${x.u}｜英選中`,q:`${x.w} 的中文意思是？`,ans:x.z,opts:opts(x.z,zpool)}:{type:'input',label:`${x.u}｜主動輸出`,q:`請輸入英文：${x.z}`,ans:x.w};if(mode==='cloze')return{type:'choice',label:`${x.u}｜例句填空`,q:x.e.replace(new RegExp('\\b'+x.w+'s?\\b','i'),'______'),ans:x.w,opts:opts(x.w,pool)};if(mode==='family'){let fam=x.family[0]||x.w;return{type:'choice',label:`${x.u}｜字族挑戰`,q:`請選出與 ${x.w} 同字族/相關延伸的單字`,ans:fam,opts:opts(fam,pool.concat(words.flatMap(w=>w.family)))};}let arr=x.ant.length?x.ant:x.syn;let ans=arr[0]||x.w;return{type:'choice',label:`${x.u}｜近反義詞挑戰`,q:x.ant.length?`請選出 ${x.w} 的反義詞`:`請選出 ${x.w} 的近義詞`,ans,opts:opts(ans,pool.concat(words.flatMap(w=>w.ant),words.flatMap(w=>w.syn)))}}function render(){setTop();if(mode==='wrong')return renderWrong();let q=qdata(),x=cur();$('#app').innerHTML=`<div class="qcard"><small>${q.label}</small><p class="q">${q.q}</p></div>${q.type==='choice'?`<div class="options">${q.opts.map(o=>`<button class="opt" onclick='checkChoice(this,${JSON.stringify(o)})'>${o}</button>`).join('')}</div>`:`<input id="answer" class="input" placeholder="輸入英文單字"><div class="btns"><button class="btn primary" onclick="checkInput()">檢查</button><button class="btn" onclick="next()">跳過</button></div>`}<div class="feedback" id="fb">答題後會顯示完整例句。答錯會加入錯題複習。</div>`;if($('#answer'))$('#answer').focus()}function markWrong(x,kind){if(!wrong.some(w=>w.w===x.w&&w.kind===kind)){wrong.unshift({w:x.w,z:x.z,u:x.u,e:x.e,t:x.t,kind});localStorage.setItem('mixed_wrong',JSON.stringify(wrong))}}function checkChoice(btn,val){let q=qdata(),x=cur();document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.textContent===q.ans)b.classList.add('correct')});if(val===q.ans){btn.classList.add('correct');score++;$('#fb').textContent=`正確\n${x.e}\n${x.t}`}else{btn.classList.add('wrong');markWrong(x,q.label);$('#fb').textContent=`錯誤。答案：${q.ans}\n${x.e}\n${x.t}`}setTimeout(next,1000)}function checkInput(){let q=qdata(),x=cur(),v=$('#answer').value.trim().toLowerCase();if(v===q.ans.toLowerCase()){score++;$('#fb').textContent=`正確\n${x.e}\n${x.t}`}else{markWrong(x,q.label);$('#fb').textContent=`錯誤。答案：${q.ans}\n${x.e}\n${x.t}`}setTimeout(next,1100)}function next(){i=(i+1)%words.length;render()}function renderWrong(){setTop();$('#app').innerHTML=wrong.length?`<h2>錯題複習</h2><div class="list">${wrong.map(x=>`<div class="row"><div><strong>${x.w}</strong><br><span>${x.u}｜${x.z}<br>${x.kind}<br>${x.e}<br>${x.t}</span></div></div>`).join('')}</div><div class="btns"><button class="btn" onclick="wrong=[];localStorage.removeItem('mixed_wrong');renderWrong()">清空錯題</button><button class="btn primary" onclick="mode='quick';render()">回快速測驗</button></div>`:'<div class="feedback">目前沒有錯題。答錯後會自動加入這裡。</div>'}document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;i=0;render()});render();</script></body></html>
