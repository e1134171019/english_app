const words=[{"w":"dislike","z":"嫌惡；討厭","p":"n. / vt.","i":"/dɪsˈlaɪk/","b":"1","f":["have a dislike for…","dislike doing something","keep a low profile"],"s":["detest","not like"],"a":["like","enjoy"],"x":[["Tanya has a dislike for grapes.","坦雅討厭葡萄。"],["Albert dislikes keeping a low profile on the issue.","亞伯特討厭對此一問題採取低姿態。"],["I dislike doing it.","我不喜歡做這件事。"]]},{"w":"patience","z":"耐心","p":"n.","i":"/ˈpeɪʃəns/","b":"2","f":["lose one’s patience","Patience is a virtue.","be patient with somebody","impatient","impatience"],"s":["tolerance"],"a":["impatience"],"x":[["Can’t you walk a little faster? I’m losing my patience.","你難道不能走快一點嗎？我快沒耐性了。"],["Patience is a virtue.","耐心是一種美德。"]]},{"w":"bubble","z":"泡沫；冒泡","p":"n. / vi.","i":"/ˈbʌbəl/","b":"3","f":["bubble over","feel excited"],"s":["foam"],"a":[],"x":[["There are many bubbles in the bathtub.","浴缸裡有好多肥皂泡泡。"],["When the soup starts to bubble, it is nearly ready.","湯開始冒泡時，它就快煮好了。"],["I was bubbling over with joy after Jane gave me a kiss.","珍吻了我後，我真是樂翻了。"]]},{"w":"mushroom","z":"洋菇；蘑菇；迅速增加","p":"n. / vi.","i":"/ˈmʌʃruːm/","b":"4","f":["mushroom soup","mushroom rapidly"],"s":["flourish"],"a":["decline"],"x":[["Mushroom soup is my favorite.","蘑菇湯是我的最愛。"],["Coffee shops are mushrooming all over the island.","咖啡廳在全島如雨後春筍般設立。"]]},{"w":"mobile","z":"可動的；流動的","p":"adj.","i":"/ˈmoʊbəl/","b":"5","f":["mobile phone","cellphone","cellular phone","smartphone"],"s":["movable"],"a":["fixed","stationary"],"x":[["A business person cannot do without a mobile phone.","生意人沒有行動電話就無法工作。"],["A business person cannot do without a cellphone.","生意人沒有手機就無法工作。"]]},{"w":"nickname","z":"綽號；取綽號","p":"n. / vt.","i":"/ˈnɪkneɪm/","b":"6","f":["have a nickname","be nicknamed…","pen name"],"s":["alias"],"a":[],"x":[["Every student in my class has a nickname.","我班上的每位學生都有一個綽號。"],["Hank Aaron was nicknamed “Hammer” because of his hitting power.","漢克・阿倫由於他打擊的爆發力，被人們取了「榔頭」的綽號。"]]},{"w":"vivid","z":"生動的","p":"adj.","i":"/ˈvɪvɪd/","b":"7","f":["a vivid description","vividly","lively","energetic","vigorous","feeble"],"s":["graphic","lively"],"a":["dull"],"x":[["Mary’s description of the party was so vivid that I felt as though I had been there.","瑪莉把派對描述得那麼生動，讓我覺得我也曾在現場似的。"],["A good night’s sleep helped me feel lively again.","一夜好眠後，我又感到朝氣蓬勃。"],["In his speech, Mr. Johnson gave a lively description of his experience as a sailor.","強森先生在演講中生動地描述他當水手的生涯經驗。"]]},{"w":"bury","z":"埋葬；使投入；使埋首","p":"vt.","i":"/ˈberi/","b":"8","f":["bury somebody alive","be buried alive","be buried in work","burial"],"s":["inter"],"a":["dig up"],"x":[["Because of the earthquake, hundreds of people were buried alive.","數百人因為這場地震被活埋。"],["John is a devoted employee. Whenever you see him, he is buried in his work.","約翰是個很認真的員工。你看到他的時候，他都是埋首工作。"]]},{"w":"continent","z":"大陸；洲","p":"n.","i":"/ˈkɑːntɪnənt/","b":"9","f":["continental","mainland","the American Continent","on the European Continent"],"s":["landmass"],"a":[],"x":[["Australia is a continent; New Zealand isn’t.","澳洲是一塊大陸；紐西蘭不是。"],["There used to be many Native American tribes on the American Continent.","美洲大陸一度曾有許多美國原住民部落。"]]},{"w":"farther","z":"更遠的；更遠地","p":"adj. / adv.","i":"/ˈfɑːrðər/","b":"10","f":["the farther end","the farther…, the longer…","further","until further notice"],"s":["more distant"],"a":["nearer"],"x":[["You’ll find the bookcase at the farther end of the living room.","你會在客廳較遠的那一端看到書櫃。"],["The farther away you live, the longer it will take to get home.","你住得越遠，回家就越費時。"],["We won’t take any action until further notice.","我們在獲得進一步的通知後才會採取行動。"],["Walk two blocks further down, and you’ll see the post office on your right-hand side.","往下再走兩個街區，你就可看到郵局在你的右手邊。"]]},{"w":"weep","z":"流淚；哭泣","p":"vi.","i":"/wiːp/","b":"11","f":["weep–wept–wept","weep at a funeral"],"s":["sob","cry"],"a":["laugh"],"x":[["The mourners silently wept at the old man’s funeral.","哀悼者在老先生的葬禮上靜靜地哭著。"]]},{"w":"ripe","z":"成熟的；時機成熟的","p":"adj.","i":"/raɪp/","b":"12","f":["be ripe","the time is ripe for…","ripen","mature"],"s":["mature"],"a":["unripe"],"x":[["You can’t eat those oranges until they are ripe.","那些柳橙熟了才能吃。"],["The time is ripe for investing in this company.","現在正是投資這家公司的成熟時機。"]]},{"w":"boot","z":"長靴；猛踢；啟動電腦","p":"n. / vt. / vi.","i":"/buːt/","b":"13","f":["a pair of boots","give somebody the boot","boot up","boot somebody in the leg"],"s":["fire","start up"],"a":[],"x":[["I need to buy a new pair of boots for my hiking trip.","我需要買雙新的靴子以便健行之旅用。"],["Boot up the computer and let me take a look at it.","啟動電腦然後讓我看一下。"],["The player was sent off for booting another player in the leg.","這位選手因猛踢另一位選手的腿而被罰退場。"],["The employee was given the boot for being tardy too often.","這名員工因為經常遲到而被炒魷魚了。"]]},{"w":"complain","z":"抱怨","p":"vt. / vi.","i":"/kəmˈpleɪn/","b":"14","f":["complain that…","complain about something / V-ing","complaint","grievance"],"s":["grumble"],"a":["praise"],"x":[["Kevin complained that the food was terrible.","凱文抱怨食物很難吃。"],["Every time I see Christine, she complains about her job.","每次我看到克莉絲汀，她都在抱怨她的工作。"],["Stop making complaints about life and learn to appreciate what you have.","別再抱怨人生，學習感激你現有的一切。"],["We’ve received a lot of customer complaints about our new products lately.","最近我們收到許多客戶對我們新產品的投訴。"]]},{"w":"cheek","z":"臉頰；厚顏","p":"n.","i":"/tʃiːk/","b":"15","f":["rosy cheeks","have the cheek to + V","jaw","chin","forehead","brow"],"s":["side of the face"],"a":[],"x":[["The little girl has rosy cheeks and blue eyes.","這個小女孩有紅潤的臉頰及一雙碧藍的眼睛。"],["I was surprised that the new employee had the cheek to yell at the boss.","我很訝異這位新來的員工竟然有臉對老闆大吼。"],["Your jaw is the lower part of your face below your mouth.","你的下顎就是指你臉部嘴巴下方的部位。"],["The hero’s quick thinking enabled him to escape from the jaws of death.","這位英雄的機智使他能死裡逃生。"],["Peter has a big chin, but it is hidden under his thick beard.","彼得的下巴很長，不過被他的大鬍子遮住了。"],["Helen’s got a large forehead and a pointy chin.","海倫的額頭高、下巴尖。"]]},{"w":"cocktail","z":"雞尾酒","p":"n.","i":"/ˈkɑːkteɪl/","b":"16","f":["a cocktail party","bartender","pub","bar","tavern"],"s":["mixed drink"],"a":[],"x":[["We will host a cocktail party tonight in celebration of John’s birthday.","我們今晚會辦一個雞尾酒會以慶祝約翰的生日。"],["The successful businessman used to work as a bartender while in college.","這位成功的商人念大學時曾當過酒保。"],["Many foreigners frequent that pub because of its homey atmosphere.","那間酒吧有家的氣氛，因此許多老外常會到那兒光顧。"]]},{"w":"wander","z":"漫遊；閒逛","p":"vi. / n.","i":"/ˈwɑːndər/","b":"17","f":["wander through","wander along","go for a wander","wanderer"],"s":["roam","stroll"],"a":["stay"],"x":[["The confused old man wandered through the streets, unsure of where he was.","這位困惑的老先生在街頭遊蕩，不知自己身在何處。"],["The runaway girl wandered along the street, looking in the shop windows.","這個離家的女孩在街上閒逛，瀏覽商店的櫥窗。"],["Nick likes to go for a wander around the park during his lunch break.","尼克喜歡在他午休期間到公園附近閒逛。"]]},{"w":"miracle","z":"奇蹟","p":"n.","i":"/ˈmɪrəkəl/","b":"18","f":["work / perform miracles","It’s a miracle that…","miraculous","wonder"],"s":["wonder"],"a":[],"x":[["It’s a miracle that no one was killed or injured in that accident.","那起意外無人傷亡，真是個奇蹟。"],["Maybe you should try this medicine for your headache—it worked miracles for me.","也許你該試試這種藥來治頭痛——它對我蠻有效的。"]]},{"w":"whip","z":"鞭子；鞭打；攪打","p":"n. / vt.","i":"/wɪp/","b":"19","f":["whip–whipped–whipped","whip a horse","whip cream"],"s":["lash","beat"],"a":[],"x":[["The cowboy picked up his hat and whip, and then he went to find the horse.","這個牛仔撿起他的帽子和鞭子，然後去找那匹馬。"],["Some states in the US have banned jockeys from whipping their horses.","美國某些州已禁止騎師鞭打馬匹。"],["Cindy likes to whip the cream when her mother bakes a cake.","辛蒂喜歡在媽媽烤蛋糕時打奶油。"]]},{"w":"wealthy","z":"富有的","p":"adj.","i":"/ˈwelθi/","b":"20","f":["the wealthy","wealth","poverty","poverty-stricken","impoverished"],"s":["rich","affluent"],"a":["poor","impoverished"],"x":[["The wealthy are not necessarily happy; likewise, the poor are not necessarily sad.","有錢人未必快樂；同樣地，窮人未必悲傷。"],["The poverty of his family made it impossible for Paul to attend college.","保羅家境清寒，這使他不能念大學。"],["The student’s writing showed a poverty of imagination.","這位學生寫作的內容顯示他缺乏想像力。"],["The poverty of the soil caused a bad rice harvest.","這塊土壤很貧瘠導致稻米歉收。"]]},{"w":"drunk","z":"酒醉的；醉漢","p":"adj. / n.","i":"/drʌŋk/","b":"21","f":["get drunk","turn into a drunk","intoxicated"],"s":["intoxicated"],"a":["sober"],"x":[["Sam got drunk at the party, so I drove him home.","山姆在派對上喝醉了，因此我便開車送他回家。"],["You should cut down on your drinking, or you’ll turn into a drunk.","你應該少喝酒，否則你會變成酒鬼。"]]},{"w":"lawn","z":"草坪","p":"n.","i":"/lɔːn/","b":"22","f":["mow the lawn","a lawn mower","meadow","grassland","pasture","weed","grow like weeds"],"s":["grass"],"a":[],"x":[["Peter spent all morning helping his father mow the lawn.","彼得整個早上都在幫他父親剪草坪。"],["Some sheep were grazing in the meadow.","有幾隻羊在草地上吃草。"],["Is this a healthy plant or is it a weed?","這是棵健康植物還是棵雜草？"],["Kids grow like weeds. In less than three years, Johnny has grown into a tall teenager.","小孩長得真快。不到三年的時間，強尼已經長成高個子的青少年了。"],["Hannah asked her son to help her weed the garden.","漢娜要她兒子幫她為花園除草。"]]},{"w":"portrait","z":"肖像；畫像","p":"n.","i":"/ˈpɔːrtrət/","b":"23","f":["paint a portrait","portray"],"s":["picture"],"a":[],"x":[["Mary’s great-grandmother’s portrait still hangs in her father’s house.","瑪莉的曾祖母畫像還掛在她爸爸家裡。"]]},{"w":"marble","z":"大理石；玻璃彈珠","p":"n.","i":"/ˈmɑːrbəl/","b":"24","f":["be made of marble","play marbles","bead"],"s":["stone"],"a":[],"x":[["The monument is made of marble and granite.","這座紀念碑是由大理石和花崗石製成的。"],["Peter was good at playing marbles when young.","彼得年輕時很會打彈珠。"],["I’m making a necklace for my niece using colorful beads.","我正在用彩色的珠珠為我姪女做項鍊。"]]},{"w":"comma","z":"逗號","p":"n.","i":"/ˈkɑːmə/","b":"25","f":["a missing comma","coma"],"s":["punctuation mark"],"a":[],"x":[["The only mistake was a missing comma in this sentence.","這裡唯一的錯誤就是這個句子裡少了一個逗號。"]]},{"w":"laughter","z":"笑；笑聲","p":"n.","i":"/ˈlæftər/","b":"26","f":["burst into laughter","burst out laughing","grin","giggle"],"s":["laughing"],"a":["weeping"],"x":[["Laughter is the best medicine.","笑是最好的良藥。"],["Linda burst into laughter after hearing Michael’s joke.","琳達聽完麥可的笑話後大笑出聲。"],["Mary grinned at her boyfriend the moment she saw him.","瑪莉一看到男友就對他眉開眼笑。"],["The winner stepped down the stage with a wide grin on his face.","優勝者走下舞臺，臉上帶著大大的笑容。"]]},{"w":"bless","z":"祝福；保佑","p":"vt.","i":"/bles/","b":"27","f":["be blessed with…","blessing"],"s":["protect","favor"],"a":["curse"],"x":[["The priest blessed the children as they left.","那位牧師在孩子離開之際祈神祝福他們。"],["Jim is blessed with a good sense of humor.","吉姆受到老天眷顧，天生就有幽默感。"]]},{"w":"crash","z":"墜毀；撞擊聲；衝撞","p":"n. / vi. / vt.","i":"/kræʃ/","b":"28","f":["a plane crash","an air crash","crash into…","on the spot","crush","clash"],"s":["collision","clash"],"a":[],"x":[["While driving through the intersection, we heard a loud crash.","當開車經過十字路口時，我們聽到一陣很大的撞擊聲。"],["At least 100 people were killed in the plane crash.","這場空難中至少有一百人罹難。"],["The car crashed into the tree, killing the driver on the spot.","這輛車撞上樹，駕駛當場死亡。"]]},{"w":"cruel","z":"殘忍的","p":"adj.","i":"/ˈkruːəl/","b":"29","f":["be cruel to…","cruelty","cruelly"],"s":["violent","brutal","nasty","unkind"],"a":["kind"],"x":[["Children should be taught from an early age not to be cruel to animals.","孩子們應該要從小就被教導不應殘忍對待動物。"]]},{"w":"database","z":"資料庫","p":"n.","i":"/ˈdeɪtəbeɪs/","b":"30","f":["enter data into a database","data","information"],"s":["data bank"],"a":[],"x":[["The researcher entered the survey results into the database.","那位研究人員將問卷調查結果輸入資料庫裡。"]]},{"w":"grassy","z":"長滿草的","p":"adj.","i":"/ˈɡræsi/","b":"31","f":["grassy fields","grass"],"s":["grass-covered"],"a":["bare"],"x":[["Eric likes to lie down on grassy fields and watch the clouds float by.","艾瑞克喜歡躺在草地上看著空中的雲飄過。"]]},{"w":"dumpling","z":"餃子","p":"n.","i":"/ˈdʌmplɪŋ/","b":"32","f":["eat dumplings"],"s":[],"a":[],"x":[["Would you like some more dumplings?","你想要再來一點餃子嗎？"]]},{"w":"geography","z":"地理","p":"n.","i":"/dʒiˈɑːɡrəfi/","b":"33","f":["study geography","geographic / geographical"],"s":["earth science"],"a":[],"x":[["In high school, my worst subject was geography.","我念高中的時候，最差的一科就是地理了。"]]}];let V=words.map(o=>({word:o.w,zh:o.z,pos:o.p,ipa:o.i,bookNo:o.b,family:o.f||[],syn:o.s||[],ant:o.a||[],ex:o.x||[]})),F=[...V],n=0,m='learn';const $=s=>document.querySelector(s),E=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),S=a=>[...a].sort(()=>Math.random()-.5),K='unit15_wrong_v1';
function W(){try{return JSON.parse(localStorage.getItem(K)||'[]')}catch{return[]}}function save(w,k){let a=W();if(!a.some(x=>x.w===w.word&&x.k===k)){a.unshift({w:w.word,z:w.zh,k});localStorage.setItem(K,JSON.stringify(a))}}
function list(){$('#list').innerHTML=F.map((w,i)=>`<button class="item ${i===n?'on':''}" data-i="${i}"><b>${E(w.word)}</b><small>${E(w.bookNo)} · ${E(w.zh)}</small></button>`).join('');document.querySelectorAll('.item').forEach(b=>b.onclick=()=>{n=Number(b.dataset.i);render()})}
function chips(a){return a.length?a.map(x=>`<span class="chip">${E(x)}</span>`).join(''):'<span class="meta">—</span>'}
function learn(){let w=F[n];$('#stage').innerHTML=`<button class="primary" id="say">🔊 朗讀</button><h1 class="word">${E(w.word)}</h1><p class="meta">${E(w.pos)}　${E(w.ipa)}　課本 ${E(w.bookNo)}</p><div class="meaning">${E(w.zh)}</div><div class="group"><b>常用片語／字族</b><div class="chips">${chips(w.family)}</div></div><div class="group"><b>近義詞</b><div class="chips">${chips(w.syn)}</div></div><div class="group"><b>反義詞</b><div class="chips">${chips(w.ant)}</div></div>${w.ex.map((x,i)=>`<div class="ex">${i+1}. ${E(x[0])}<small>${E(x[1])}</small></div>`).join('')}`;$('#say').onclick=()=>{speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(w.word);u.lang='en-US';u.rate=.78;speechSynthesis.speak(u)}}
function blank(sentence,word){const e=word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),r=new RegExp('\\b'+e+'(?:s|es|ed|d|ing|ly)?\\b','i');return sentence.replace(r,'______')}
function quiz(){let w=F[n],x=w.ex[0]||['',''],q=blank(x[0],w.word),o=S([w.word,...S(V.filter(v=>v.word!==w.word)).slice(0,3).map(v=>v.word)]);$('#stage').innerHTML=`<div class="q">${E(q)}</div><div class="opts">${o.map(a=>`<button class="opt" data-a="${E(a)}">${E(a)}</button>`).join('')}</div><div class="fb" id="fb">請選答案。</div>`;document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{document.querySelectorAll('.opt').forEach(t=>{t.disabled=true;if(t.dataset.a===w.word)t.classList.add('good')});if(b.dataset.a===w.word)$('#fb').textContent=`正確。\n${x[0]}\n${x[1]}`;else{b.classList.add('bad');save(w,'填空');$('#fb').textContent=`錯誤。答案：${w.word}\n${x[0]}\n${x[1]}`}})}
function type(){let w=F[n];$('#stage').innerHTML=`<div class="q">${E(w.zh)}</div><div class="ans"><input id="a" placeholder="輸入英文"><button class="primary" id="c">檢查</button></div><div class="fb" id="fb">提示：${E(w.pos)}</div>`;let c=()=>{if($('#a').value.trim().toLowerCase()===w.word.toLowerCase())$('#fb').textContent='正確：'+w.word;else{save(w,'輸入');$('#fb').textContent='錯誤。答案：'+w.word}};$('#c').onclick=c;$('#a').onkeydown=e=>{if(e.key==='Enter')c()}}
function wrong(){let a=W();$('#stage').innerHTML=a.length?`<h2>錯題本</h2>${a.map(x=>`<div class="ex"><b>${E(x.w)}</b>　${E(x.z)}<small>${E(x.k)}</small></div>`).join('')}<button class="primary" id="clear">清除錯題</button>`:'目前沒有錯題。';if($('#clear'))$('#clear').onclick=()=>{localStorage.removeItem(K);wrong()}}
function render(){if(!F.length){$('#list').innerHTML='';$('#stage').innerHTML='找不到資料';return}if(n>=F.length)n=0;list();({learn,quiz,type,wrong}[m])()}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');m=b.dataset.m;render()});$('#search').oninput=e=>{let q=e.target.value.toLowerCase();F=V.filter(w=>[w.word,w.zh,w.pos,...w.family,...w.syn,...w.ant,...w.ex.flat()].join(' ').toLowerCase().includes(q));n=0;render()};render();
</script><script>if('serviceWorker'in navigator)navigator.serviceWorker.register('/english_app/vocab-sw.js').catch(()=>{})</script><script src="/english_app/speech-upgrade.js"></script></body></html>
