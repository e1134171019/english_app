let state={selected:words[0].word};const $=s=>document.querySelector(s);function speak(t){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=.78;speechSynthesis.speak(u)}function current(){return words.find(w=>w.word===state.selected)||words[0]}function esc(s){return String(s).replace(/'/g,"\\'")}function highlight(sentence,word){return sentence.replace(new RegExp('\\b'+word+'s?\\b','gi'),m=>`<strong>${m}</strong>`)}function renderList(){const q=$('#search').value.toLowerCase();$('#list').innerHTML=words.filter(w=>(w.word+w.zh+w.related.join(' ')+w.forms.join(' ')).toLowerCase().includes(q)).map(w=>`<button class="item ${w.word===state.selected?'active':''}" onclick="state.selected='${w.word}';render()"><span><span class="word">${w.word}</span><br><span class="meta">${w.pos} ${w.zh}</span></span><span>›</span></button>`).join('')}function renderDetail(){const w=current();$('#detail').innerHTML=`<div class="title"><h2>${w.word}</h2><span class="tag">${w.pos}</span></div><div class="zh">${w.zh}</div><div class="btns"><button class="btn primary" onclick="speak('${esc(w.word)}')">🔊 朗讀單字</button><button class="btn" onclick="speakAll()">🔊 朗讀全部例句</button></div><div class="section"><b>用法 / 字族</b><div class="chips">${w.forms.map(x=>`<span class="chip">${x}</span>`).join('')||'<span class="meta">無</span>'}</div></div><div class="section"><b>相關詞 / 近反義</b><div class="chips">${w.related.map(x=>`<span class="chip">${x}</span>`).join('')||'<span class="meta">無</span>'}</div></div><div class="section"><b>例句</b>${w.ex.map(e=>`<div class="ex"><button class="btn" onclick="speak('${esc(e[0])}')">🔊 例句</button><p>${highlight(e[0],w.word)}</p><p class="meta">${e[1]}</p></div>`).join('')}</div>`}function render(){renderList();renderDetail()}function speakAll(){const w=current();let i=0;function go(){if(i>=w.ex.length)return;const u=new SpeechSynthesisUtterance(w.ex[i][0]);u.lang='en-US';u.rate=.78;u.onend=()=>{i++;setTimeout(go,350)};speechSynthesis.cancel();speechSynthesis.speak(u)}go()}$('#search').oninput=renderList;render();
function cloze(sentence,word){const re=new RegExp('\\b'+word+'(?:s|ed|ing)?\\b','i');return sentence.replace(re,'______')}const quizData=words.map(w=>{const e=w.ex[0];return{word:w.word,q:cloze(e[0],w.word),zh:e[1],ans:w.word,exp:`${w.word}：${w.zh}`}});let order=[...quizData].sort(()=>Math.random()-.5),qi=0;function qopts(q){const pool=words.map(w=>w.word).filter(x=>x!==q.ans);return[q.ans,...pool.slice(qi%pool.length,qi%pool.length+3)].sort((a,b)=>a.localeCompare(b))}function renderQuiz(){const q=order[qi%order.length];$('#quiz').innerHTML=`<div class="qcard"><small>Unit 07｜${qi+1} / ${order.length}</small><div class="q">${q.q}</div></div><div class="opts">${qopts(q).map(o=>`<button class="opt" onclick="checkQuiz(this,'${o}')">${o}</button>`).join('')}</div><div class="fb" id="qfb">選出最適合填入空格的單字。</div><div class="btns"><button class="btn" onclick="qi++;renderQuiz()">下一題</button><button class="btn primary" onclick="speak('${esc(q.q.replace('______','blank'))}')">朗讀題句</button></div>`}function checkQuiz(btn,val){const q=order[qi%order.length];document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.textContent===q.ans)b.classList.add('correct')});if(val===q.ans){btn.classList.add('correct');$('#qfb').textContent=`正確。\n中文：${q.zh}\n解析：${q.exp}`}else{btn.classList.add('wrong');$('#qfb').textContent=`錯誤。正確答案：${q.ans}\n中文：${q.zh}\n解析：${q.exp}`}}renderQuiz();</script></body></html>
