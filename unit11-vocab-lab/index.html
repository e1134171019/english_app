<script>
const words = [{"bookNo":"1","word":"forever","pos":"adv.","ipa":"/fərˈevər/","zh":"永遠；長久地","family":["for good","permanently","temporary","temporarily"],"syn":["permanently","always","for good"],"ant":["temporarily","briefly"],"ex":[["After working for twenty years in New York, John plans to return to his hometown and stay there forever.","在紐約工作二十年後，約翰打算回到家鄉，永遠住在那裡。"],["I’ll love you forever and a day.","我會永遠愛你。"]]},{"bookNo":"1A","word":"temporary","pos":"adj.","ipa":"/ˈtempəreri/","zh":"暫時的；臨時的","family":["temporarily","on a temporary basis","permanent","permanently"],"syn":["short-term","provisional"],"ant":["permanent","lasting"],"ex":[["The hunter made a temporary shelter out of branches.","獵人用樹枝搭了一個臨時避難小屋。"],["I’m teaching on a temporary basis for the time being.","目前我暫時擔任教職。"]]},{"bookNo":"1B","word":"temporarily","pos":"adv.","ipa":"/ˌtempəˈrerəli/","zh":"暫時地；臨時地","family":["temporary","momentarily","permanently"],"syn":["briefly","for now"],"ant":["permanently"],"ex":[["After taking the medicine, Amber felt temporarily relieved.","吃藥之後，安柏暫時感到舒緩。"]]},{"bookNo":"2","word":"maid","pos":"n.","ipa":"/meɪd/","zh":"女僕；侍女","family":["servant","housemaid","maid service"],"syn":["servant","housekeeper"],"ant":[],"ex":[["The millionaire has a butler, three maids, and two gardeners.","那位富翁有一名男管家、三名女僕和兩名園丁。"]]},{"bookNo":"3","word":"resist","pos":"vt. / vi.","ipa":"/rɪˈzɪst/","zh":"抗拒；抵抗；忍住","family":["cannot resist V-ing","cannot help V-ing","resistant","be resistant to"],"syn":["oppose","withstand","refuse"],"ant":["accept","yield","give in"],"ex":[["How can you resist chocolate cake?","你怎麼能抗拒巧克力蛋糕？"],["I couldn’t resist taking a look at that beautiful girl.","我忍不住看了那位漂亮女孩一眼。"]]},{"bookNo":"4","word":"guidance","pos":"n. [U]","ipa":"/ˈɡaɪdəns/","zh":"指導；引導","family":["under someone’s guidance","guide","instruction"],"syn":["direction","advice","instruction"],"ant":["misdirection"],"ex":[["Under Coach Lee’s guidance and leadership, I’m sure we’ll win the contest.","在李教練的指導與帶領下，我相信我們會贏得比賽。"]]},{"bookNo":"5","word":"accurate","pos":"adj.","ipa":"/ˈækjərət/","zh":"準確的；精確的","family":["accuracy","precise","inaccurate"],"syn":["correct","precise","exact"],"ant":["inaccurate","wrong"],"ex":[["Though the clock is old, it is still accurate.","這個時鐘雖然老舊，卻依然準確。"],["These figures are not accurate.","這些數據不準確。"]]},{"bookNo":"6","word":"sake","pos":"n.","ipa":"/seɪk/","zh":"理由；緣故；利益","family":["for the sake of","for someone’s sake","for your health’s sake"],"syn":["benefit","purpose"],"ant":[],"ex":[["For the sake of your health, you should break the habit of smoking immediately.","為了你的健康，你應該立刻戒菸。"],["I hope Jerry has taken your advice for his own sake.","我希望傑瑞為自己著想，接受你的建議。"]]},{"bookNo":"7","word":"toss","pos":"vt. / n.","ipa":"/tɔːs/","zh":"扔；擲；翻來覆去；擲硬幣","family":["toss and turn","a toss of a coin","toss something into"],"syn":["throw","fling"],"ant":["catch","hold"],"ex":[["David crumpled up the letter and tossed it into the fire.","大衛把信揉成一團，丟進火裡。"],["I tossed and turned in bed last night.","我昨晚在床上輾轉難眠。"]]},{"bookNo":"8","word":"reserve","pos":"vt. / n.","ipa":"/rɪˈzɜːrv/","zh":"預訂；保留；儲備；保護區","family":["reserve a room","make a reservation","keep something in reserve","reservoir"],"syn":["book","retain","save"],"ant":["release","use up"],"ex":[["I’d like to reserve a room for three nights.","我要訂房住三晚。"],["You should keep some money in reserve for a rainy day.","你應該儲備一些錢以備不時之需。"]]},{"bookNo":"9","word":"harbor","pos":"n. / vt.","ipa":"/ˈhɑːrbər/","zh":"港口；窩藏；庇護；心懷","family":["a harbor city","harbor a grudge against","bear a grudge against","port"],"syn":["port","shelter","conceal"],"ant":["expose","release"],"ex":[["Hong Kong is a harbor city.","香港是一個港都。"],["Cindy is accused of harboring an escaped outlaw.","辛蒂被控窩藏逃犯。"]]},{"bookNo":"9A","word":"dock","pos":"n. / vt.","ipa":"/dɑːk/","zh":"碼頭；扣減","family":["in dock","dock someone’s pay","wharf"],"syn":["wharf","pier","deduct"],"ant":["add","increase"],"ex":[["The ships were all in dock before the typhoon approached.","颱風來襲前，所有船隻都停靠在碼頭。"],["The boss threatened to dock Peter’s salary.","老闆威脅要扣彼得的薪水。"]]},{"bookNo":"10","word":"trail","pos":"vt. / n.","ipa":"/treɪl/","zh":"跟蹤；拖曳；小徑","family":["trail someone to","track","follow","path"],"syn":["track","follow","path"],"ant":["lead"],"ex":[["The policeman trailed the suspect to the house he lived in.","警察跟蹤嫌犯到他的住處。"],["The trail leads to a beautiful valley.","這條小徑通往一個很美的山谷。"]]},{"bookNo":"11","word":"faint","pos":"adj. / vi. / n.","ipa":"/feɪnt/","zh":"頭暈的；微弱的；暈倒；昏厥","family":["feel faint","not have the faintest idea","pass out"],"syn":["dizzy","weak","pass out"],"ant":["strong","conscious"],"ex":[["I didn’t eat anything today and I feel faint with hunger now.","我今天什麼都沒吃，現在餓得發昏。"],["Patrick spoke in a very faint voice.","派翠克講話的聲音很微弱。"]]},{"bookNo":"12","word":"trace","pos":"vt. / n.","ipa":"/treɪs/","zh":"追蹤；蹤跡","family":["disappear without a trace","track","trace one’s ancestors"],"syn":["track","follow","detect"],"ant":["lose"],"ex":[["It isn’t easy to trace your ancestors.","追溯祖先並不容易。"],["The bank robber disappeared without a trace.","銀行大盜消失得無影無蹤。"]]},{"bookNo":"13","word":"steady","pos":"adj. / vt. / n.","ipa":"/ˈstedi/","zh":"穩定的；使穩定；固定交往對象","family":["steady–steadied–steadied","go steady","steady job"],"syn":["stable","constant","firm"],"ant":["unstable","unsteady"],"ex":[["It’s hard to find a steady job these days.","這年頭要找一份穩定工作很難。"],["James leaned on the wall in order to steady himself.","詹姆士靠在牆上以穩住身體。"]]},{"bookNo":"13A","word":"steadily","pos":"adv.","ipa":"/ˈstedəli/","zh":"不斷地；平穩地；漸漸地","family":["steady","progressively","gradually"],"syn":["gradually","consistently"],"ant":["suddenly","unevenly"],"ex":[["With the breeze blowing steadily from the window, I couldn’t help but fall asleep.","微風從窗口徐徐吹來，我忍不住睡著了。"]]},{"bookNo":"13B","word":"stable","pos":"adj.","ipa":"/ˈsteɪbəl/","zh":"穩定的","family":["be in stable condition","critical condition","stabilize"],"syn":["steady","secure","balanced"],"ant":["unstable","critical"],"ex":[["The company is currently stable and doing well.","這家公司目前狀況穩定，運作良好。"],["Shortly after treatment, the patient was in stable condition.","治療後不久，病人的情況穩定了。"]]},{"bookNo":"14","word":"injury","pos":"n.","ipa":"/ˈɪndʒəri/","zh":"身體傷害；名聲損害","family":["injuries","injure","recover from an injury"],"syn":["wound","harm","damage"],"ant":["recovery","healing"],"ex":[["It took three weeks for Sam to recover from his sports injury.","山姆花了三週才從運動傷害中復原。"],["The scandal caused terrible injury to Jill’s reputation.","醜聞嚴重損害了吉兒的名聲。"]]},{"bookNo":"15","word":"dealer","pos":"n.","ipa":"/ˈdiːlər/","zh":"業者；商人；經銷商","family":["car dealer","antique dealer","deal in used cars","merchant"],"syn":["merchant","seller","trader"],"ant":["buyer","customer"],"ex":[["Paul has made a lot of money as an antique dealer.","保羅是古董商，賺了不少錢。"],["A used car dealer is one who deals in used cars.","中古汽車商就是從事中古車買賣的人。"]]},{"bookNo":"15A","word":"trader","pos":"n.","ipa":"/ˈtreɪdər/","zh":"交易商；業者","family":["trade","diamond trader"],"syn":["dealer","merchant"],"ant":["consumer"],"ex":[["Jane’s husband is a diamond trader.","珍的老公是鑽石商人。"]]},{"bookNo":"16","word":"admire","pos":"vt.","ipa":"/ədˈmaɪər/","zh":"欣賞；欽佩","family":["admire someone for something","admirable","admiration","appreciate"],"syn":["respect","appreciate","look up to"],"ant":["despise","dislike"],"ex":[["I admire Justin for his proficiency in English.","我欣賞賈斯汀的英文能力。"]]},{"bookNo":"17","word":"heel","pos":"n. / vt. / vi.","ipa":"/hiːl/","zh":"腳後跟；高跟鞋；修理鞋跟；緊跟","family":["hard on one’s heels","high heels","a pair of high heels","get shoes heeled"],"syn":["follow closely"],"ant":["fall behind"],"ex":[["With the enemy army hard on his heels, the soldier fled.","敵軍緊追不捨，士兵只好逃跑。"],["Walking gracefully in high heels is never an easy task.","穿高跟鞋優雅行走並不容易。"]]},{"bookNo":"18","word":"satisfactory","pos":"adj.","ipa":"/ˌsætɪsˈfæktəri/","zh":"令人滿意的","family":["satisfy","satisfying","satisfied","be satisfied with"],"syn":["acceptable","adequate","pleasing"],"ant":["unsatisfactory","disappointing"],"ex":[["I couldn’t get a satisfactory explanation for what had occurred.","對於所發生的事，我找不到令人滿意的解釋。"]]},{"bookNo":"18A","word":"satisfactorily","pos":"adv.","ipa":"/ˌsætɪsˈfæktərəli/","zh":"令人滿意地","family":["satisfactory","satisfaction"],"syn":["adequately","acceptably"],"ant":["poorly"],"ex":[["The conference has been progressing satisfactorily so far.","這場會議至今進行得還算令人滿意。"]]},{"bookNo":"19","word":"splash","pos":"vt. / vi. / n.","ipa":"/splæʃ/","zh":"潑水；濺水；水花聲；引起轟動","family":["splash water on someone","splash about","splash around","make a splash"],"syn":["spray","spatter"],"ant":["dry"],"ex":[["The baby splashed water on her mother.","嬰兒把水濺到媽媽身上。"],["The two children were splashing about in the bathtub.","兩個小孩在浴缸裡到處濺水。"]]},{"bookNo":"20","word":"impress","pos":"vt.","ipa":"/ɪmˈpres/","zh":"使印象深刻；使銘記","family":["be impressed with","impress something on someone","impressive","impression"],"syn":["influence","strike","emphasize"],"ant":["disappoint","bore"],"ex":[["I was deeply impressed with the city’s boulevard.","我對該城市的林蔭大道印象極為深刻。"],["The teacher impressed the importance of honesty upon the class.","老師讓全班銘記誠實的重要。"]]},{"bookNo":"21","word":"melt","pos":"vt. / vi.","ipa":"/melt/","zh":"融化；熔化；心軟","family":["melt away","a melting pot","heart melted"],"syn":["dissolve","thaw","soften"],"ant":["freeze","harden"],"ex":[["The sun melted the ice in the buckets.","太陽把桶裡的冰融化了。"],["The snow melted away soon after the sun rose.","太陽升起後不久，雪就融化了。"]]},{"bookNo":"22","word":"desirable","pos":"adj.","ipa":"/dɪˈzaɪrəbəl/","zh":"適合的；受歡迎的；值得嚮往的；合意的","family":["It is desirable that + S + (should) + V","desirable alternative","desire"],"syn":["attractive","preferable","worthwhile"],"ant":["undesirable","unwanted"],"ex":[["That busy corner is a desirable place for a restaurant.","那個車水馬龍的角落很適合開餐廳。"],["It is desirable that the report be finished today.","這份報告最好今天完成。"]]},{"bookNo":"22A","word":"desire","pos":"vt. / n.","ipa":"/dɪˈzaɪər/", let filtered=[...words],index=0,mode='learn';const key='unit11_wrong_v1',$=s=>document.querySelector(s),esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const current=()=>filtered[index]||filtered[0]||words[0],shuffle=a=>[...a].sort(()=>Math.random()-.5),wrong=()=>{try{return JSON.parse(localStorage.getItem(key)||'[]')}catch{return[]}};
function save(w,kind){const a=wrong();if(!a.some(x=>x.word===w.word&&x.kind===kind)){a.unshift({word:w.word,zh:w.zh,kind});localStorage.setItem(key,JSON.stringify(a))}}
function speak(t){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=.78;speechSynthesis.speak(u)}
function chips(a){return a.length?a.map(x=>`<span class="chip">${esc(x)}</span>`).join(''):'—'}
function renderList(){$('#list').innerHTML=filtered.map((w,i)=>`<button class="item ${i===index?'active':''}" data-i="${i}"><strong>${esc(w.word)}</strong><span>${esc(w.bookNo)} · ${esc(w.zh)}</span></button>`).join('');document.querySelectorAll('.item').forEach(b=>b.onclick=()=>{index=+b.dataset.i;render()})}
function learn(){const w=current();$('#stage').innerHTML=`<div class="head"><div><h1 class="word">${esc(w.word)}</h1><p class="meta">${esc(w.pos)}　${esc(w.ipa)}　課本 ${esc(w.bookNo)}</p></div><button class="speak" id="speak">🔊 朗讀</button></div><section class="meaning"><h2>${esc(w.zh)}</h2></section><section class="grid"><div class="box"><h3>字族／搭配</h3><div class="chips">${chips(w.family)}</div></div><div class="box"><h3>近義詞</h3><div class="chips">${chips(w.syn)}</div></div><div class="box"><h3>反義詞</h3><div class="chips">${chips(w.ant)}</div></div></section><section class="examples">${w.ex.map((e,i)=>`<div class="example">${i+1}. ${esc(e[0])}<small>${esc(e[1])}</small></div>`).join('')}</section>`;$('#speak').onclick=()=>speak(w.word)}
function quiz(){const w=current(),e=w.ex[0]||['',''];const pattern=new RegExp('\\b'+w.word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'(?:s|es|ed|ing|ly)?\\b','i');const q=e[0].replace(pattern,'______');const opts=shuffle([w.word,...shuffle(words.filter(x=>x.word!==w.word)).slice(0,3).map(x=>x.word)]);$('#stage').innerHTML=`<h2>例句填空</h2><div class="question">${esc(q)}</div><div class="options">${opts.map(o=>`<button class="opt" data-a="${esc(o)}">${esc(o)}</button>`).join('')}</div><div class="feedback" id="fb">請選答案。</div>`;document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{document.querySelectorAll('.opt').forEach(x=>{x.disabled=true;if(x.dataset.a===w.word)x.classList.add('correct')});if(b.dataset.a===w.word)$('#fb').textContent=`正確。\n${e[0]}\n${e[1]}`;else{b.classList.add('wrong');save(w,'填空');$('#fb').textContent=`錯誤。答案：${w.word}\n${e[0]}\n${e[1]}`}})}
function typing(){const w=current();$('#stage').innerHTML=`<h2>中翻英輸入</h2><div class="question">${esc(w.zh)}</div><div class="inputrow"><input id="answer" autocomplete="off" placeholder="輸入英文"><button class="btn" id="check">檢查</button></div><div class="feedback" id="fb">提示：${esc(w.pos)}</div>`;const check=()=>{const ok=$('#answer').value.trim().toLowerCase()===w.word.toLowerCase();if(ok)$('#fb').textContent=`正確：${w.word}`;else{save(w,'輸入');$('#fb').textContent=`錯誤。答案：${w.word}`}};$('#check').onclick=check;$('#answer').onkeydown=e=>{if(e.key==='Enter')check()};$('#answer').focus()}
function wrongView(){const a=wrong();$('#stage').innerHTML=a.length?`<h2>錯題本</h2><div class="examples">${a.map(x=>`<div class="example"><b>${esc(x.word)}</b>　${esc(x.zh)}<small>${esc(x.kind)}</small></div>`).join('')}</div><p><button class="btn" id="clear">清除錯題</button></p>`:'<div class="empty">目前沒有錯題。</div>';if($('#clear'))$('#clear').onclick=()=>{localStorage.removeItem(key);wrongView()}}
function render(){if(index>=filtered.length)index=0;renderList();({learn,quiz,typing,wrong:wrongView}[mode])()}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');mode=b.dataset.mode;render()});$('#search').oninput=e=>{const q=e.target.value.toLowerCase();filtered=words.filter(w=>[w.word,w.zh,w.pos,...w.family,...w.syn,...w.ant,...w.ex.flat()].join(' ').toLowerCase().includes(q));index=0;render()};render();
