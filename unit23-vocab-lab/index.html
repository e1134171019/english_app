<script>
window.VOCAB_UNIT={"no":"23","storageKey":"unit23_vocab_wrong_v1","irregular":{"nap":["nap","naps","napped","napping"],"parcel":["parcel","parcels","parceled","parcelled","parceling","parcelling"],"pity":["pity","pities","pitied","pitying"],"pollute":["pollute","pollutes","polluted","polluting"],"rot":["rot","rots","rotted","rotting"],"rust":["rust","rusts","rusted","rusting"],"shampoo":["shampoo","shampoos","shampooed","shampooing"],"spy":["spy","spies","spied","spying"],"pat":["pat","pats","patted","patting"],"wax":["wax","waxes","waxed","waxing"],"log":["log","logs","logged","logging"]},"words":[{"word":"microphone","zh":"麥克風（＝mike）","pos":"n.","ipa":"/ˈmaɪkrəfoʊn/","bookNo":"1","family":["a wireless microphone","wireless","mike"],"syn":["mike"],"ant":[],"ex":[["Speak into the microphone so everyone can hear you.","對著麥克風講話，這樣大家才可以聽得到。"]]},{"word":"microwave","zh":"微波爐；以微波爐烹調","pos":"n. / vt.","ipa":"/ˈmaɪkroʊweɪv/","bookNo":"2","family":["microwave oven","oven","reheat","microwave some popcorn"],"syn":[],"ant":[],"ex":[["Reheat the pizza in the microwave oven for two minutes.","把比薩放到微波爐再加熱兩分鐘。"],["Before we start to watch the movie, I’d like to microwave some popcorn.","我們開始看電影前，我想先用微波爐弄點爆米花。"]]},{"word":"nap","zh":"打瞌睡；打盹；小睡","pos":"vi. / n.","ipa":"/næp/","bookNo":"3","family":["nap–napped–napped","take a nap","take a siesta","siesta","snap"],"syn":["doze"],"ant":["wake"],"ex":[["Grandfather napped in the armchair while the TV was still on.","爺爺在單人座沙發上打瞌睡，而電視還開著。"],["You look exhausted. Why don’t you take a nap?","你看來累極了。何不小睡一下？"]]},{"word":"necktie","zh":"領帶","pos":"n.","ipa":"/ˈnektaɪ/","bookNo":"4","family":["tie","wear a necktie / tie","blouse","shirt","vest","look beautiful in + clothes","stunning"],"syn":["tie"],"ant":[],"ex":[["You are required to wear a necktie if you want to get into that restaurant.","要進入那間餐廳，你得繫領帶才行。"],["Alice looks absolutely stunning in that blouse.","穿著那件罩衫的艾麗絲看起來美極了。"],["You can buy a vest to match your new shirt.","你可以買件背心搭配你這件新的襯衫。"]]},{"word":"pal","zh":"夥伴；哥兒們（口語）","pos":"n.","ipa":"/pæl/","bookNo":"5","family":["companion","buddy","pen pal"],"syn":["friend","buddy"],"ant":["enemy"],"ex":[["Hey, pal! Want to go see a movie?","嘿，哥兒們，想不想去看場電影？"],["Susan has several pen pals, some of whom she has known for ages but has never met in person.","蘇珊有幾個筆友，其中有的認識很多年了，但從沒實際見過面。"]]},{"word":"parcel","zh":"包裹（英）；分配、分給","pos":"n. / vt.","ipa":"/ˈpɑːrsəl/","bookNo":"6","family":["package（美）","parcel something out","charity","post office"],"syn":["package","distribute"],"ant":["collect"],"ex":[["Please take this parcel to the post office and have it sent immediately.","請把這個包裹拿到郵局立刻把它寄掉。"],["They plan to parcel the food out to different charities.","他們打算把食物分給不同的慈善機構。"]]},{"word":"passport","zh":"護照","pos":"n.","ipa":"/ˈpæspɔːrt/","bookNo":"7","family":["visa","expire","renew","customs","go through customs"],"syn":[],"ant":[],"ex":[["You have to present your passport as you go through customs.","你出入海關必須出示護照。"]]},{"word":"pity","zh":"同情；可惜、遺憾；同情、憐憫","pos":"n. / vt.","ipa":"/ˈpɪti/","bookNo":"8","family":["pity–pitied–pitied","take pity on somebody","have pity on somebody","It is a pity that...","It is too bad that...","It is a shame that...","pitiful","look pitiful","pitiless","sympathy"],"syn":["sympathy","compassion"],"ant":["cruelty"],"ex":[["Mr. Green took pity on me and let me postpone my presentation until Friday.","葛林老師同情我的處境，讓我延到星期五再做報告。"],["It is a pity that John didn’t come to the party.","約翰沒來派對真可惜。"],["We pitied the boy who lost his parents.","我們很同情那個失去雙親的男孩。"]]},{"word":"pollute","zh":"汙染","pos":"vt.","ipa":"/pəˈluːt/","bookNo":"9","family":["pollutant","pollution","air pollution","noise pollution","water pollution","asthma"],"syn":["contaminate"],"ant":["purify"],"ex":[["The exhaust from our cars pollutes the air and causes asthma in children.","我們汽車排放的廢氣會汙染空氣，使幼童罹患氣喘。"],["Pollution control has become one of the country’s major concerns.","汙染防制已成為該國關切的重要議題之一。"]]},{"word":"rot","zh":"使腐敗；腐化；腐爛；腐敗","pos":"vt. / vi. / n.","ipa":"/rɑːt/","bookNo":"10","family":["rot–rotted–rotted","decay","rotten","One rotten apple spoils the barrel.","barrel","weaken"],"syn":["decay"],"ant":["preserve"],"ex":[["Sweets will rot your teeth if you eat too many of them.","如果你吃太多甜食，可是會蛀牙的。"],["Fruit rots quickly on such hot days.","大熱天水果會腐爛得很快。"],["The wood has been weakened by rot.","這塊木頭因為一直腐爛而變得不結實。"],["The smell of rotten food disgusts me.","腐敗的食物味道令我作嘔。"],["The rotten official was sentenced to five years in prison.","該貪腐官員被判處五年徒刑。"]]},{"word":"rust","zh":"鏽；銹；使生鏽；生鏽；荒廢","pos":"n. / vt. / vi.","ipa":"/rʌst/","bookNo":"11","family":["rusty","corrode","corrosion","erode","erosion","be covered in / with..."],"syn":["corrosion"],"ant":["shine"],"ex":[["The old bike is covered with a lot of rust.","這輛老舊的腳踏車上生滿了鏽。"],["The lock on this old safe is rusted. We will have to saw it open.","舊保險箱上的鎖已經生鏽了。我們必須鋸開它。"],["Iron and gold are different because iron rusts and gold does not.","鐵和黃金不同，因為鐵會生鏽，而黃金不會。"],["Don’t let your talent rust. As they say, use it or lose it.","別讓你的才華荒廢了。誠如大家說的，要好好利用它，否則就會失去它。"]]},{"word":"sack","zh":"大袋子","pos":"n.","ipa":"/sæk/","bookNo":"12","family":["hit the sack","hit the hay","turn in","go to bed","get the sack","be sacked","be fired"],"syn":["bag"],"ant":[],"ex":[["I’m so tired that I think I’ll just hit the sack.","我好累，所以我想乾脆去睡覺。"],["Eric got the sack for stealing money from the company.","艾瑞克因為偷公司的錢被開除了。"],["Eric was sacked for stealing money from the company.","艾瑞克因為偷公司的錢被開除了。"],["Eric was fired for stealing money from the company.","艾瑞克因為偷公司的錢被開除了。"]]},{"word":"shampoo","zh":"洗髮精（物質名詞；不可數）；用洗髮精洗髮","pos":"n. / vt.","ipa":"/ʃæmˈpuː/","bookNo":"13","family":["conditioner","dandruff","damaged hair"],"syn":[],"ant":[],"ex":[["You should buy a special kind of shampoo for your damaged hair.","你應該買受損髮質專用的洗髮精。"],["This brand of shampoo can help get rid of your dandruff.","這種牌子的洗髮精可幫助你去除頭皮屑。"],["Mary took a shower and shampooed her hair.","瑪莉淋浴並用洗髮精洗了頭髮。"]]},{"word":"shepherd","zh":"牧羊人","pos":"n.","ipa":"/ˈʃepərd/","bookNo":"14","family":["a shepherd dog","a flock of sheep"],"syn":["herdsman"],"ant":[],"ex":[["The young shepherd led a flock of sheep up the hill.","那個年輕的牧羊人把一群羊帶到山坡上。"]]},{"word":"slippery","zh":"滑溜溜的","pos":"adj.","ipa":"/ˈslɪpəri/","bookNo":"15","family":["slip","slipper"],"syn":["slick"],"ant":["rough"],"ex":[["Be careful! The sidewalk is slippery.","小心！人行道很滑。"]]},{"word":"sorrow","zh":"悲傷","pos":"n.","ipa":"/ˈsɑːroʊ/","bookNo":"16","family":["sorrowful","sorry","grief","to one’s great sorrow"],"syn":["grief","sadness"],"ant":["joy"],"ex":[["To our great sorrow, the doctor said Edward has only another five months to live.","令我們很難過的是，醫生說愛德華只剩五個月可活。"]]},{"word":"spy","zh":"間諜；偵察、監視","pos":"n. / vi.","ipa":"/spaɪ/","bookNo":"17","family":["spy–spied–spied","spy on somebody","detective","scout","search","scout for...","a boy scout","a girl scout","deed"],"syn":["agent","observe"],"ant":[],"ex":[["The spy was caught providing information to the enemy.","這名間諜在提供情報給敵方時被逮到。"],["Celebrities always worry about people spying on them.","名人們總是擔心著有人在監視他們。"],["I’m scouting around for a school that has a good English learning program.","我在找尋有優良英語學習課程的學校。"],["The boy scouts are taught to do a good deed a day.","這些男童軍被教導要日行一善。"]]},{"word":"tease","zh":"揶揄、取笑","pos":"vt.","ipa":"/tiːz/","bookNo":"18","family":["tease somebody","laugh at somebody","make fun of somebody","pull somebody’s leg"],"syn":["mock"],"ant":["praise"],"ex":[["I couldn’t help getting angry when I found out John was teasing me.","我發現約翰在揶揄我時，就忍不住生氣了。"]]},{"word":"tender","zh":"溫柔的；年紀稚嫩的","pos":"adj.","ipa":"/ˈtendər/","bookNo":"19","family":["at the tender age of...","gentle","circus"],"syn":["gentle"],"ant":["harsh"],"ex":[["The tender look my mother gave made me smile.","我媽媽溫柔的眼神讓我笑了。"],["Michael joined the circus at the tender age of seven.","麥可在七歲的稚齡就加入馬戲團了。"]]},{"word":"trunk","zh":"樹幹；（汽車）後行李箱；象鼻","pos":"n.","ipa":"/trʌŋk/","bookNo":"20","family":["bough","branch","twig","trunks","a pair of trunks","first-aid kit","flexible"],"syn":["tree trunk","car boot"],"ant":[],"ex":[["Some mountain climbers like to carve their names on tree trunks.","有些登山客喜歡把自己的名字刻在樹幹上。"],["I always keep a first aid kit in the trunk in case of emergency.","我都會在後車箱放置一個急救箱，以防緊急事故。"],["An elephant’s trunk is flexible, and is used to drink and eat.","象鼻極富彈性，大象用它來喝水及進食。"]]},{"word":"tutor","zh":"家庭教師；教導、給某人當家庭教師","pos":"n. / vt.","ipa":"/ˈtuːtər/","bookNo":"21","family":["private tutor","tutor somebody","tutoring"],"syn":["instructor"],"ant":[],"ex":[["John’s parents are looking for a private tutor to help him with his English.","約翰的父母正在找私人家教來幫助他學英文。"],["To help support the family, I’m tutoring two junior high school students.","為了幫助養家，我目前擔任家教，教導兩個國中生。"]]},{"word":"wax","zh":"蠟；打蠟","pos":"n. / vt.","ipa":"/wæks/","bookNo":"22","family":["styling wax","earwax","become liquid","wax a car"],"syn":["polish"],"ant":[],"ex":[["Wax will become liquid when it is heated.","加熱後蠟會變成液體。"],["Father reminded me to wax his car after I finished washing it.","老爸提醒我車子洗完後要記得打蠟。"]]},{"word":"web","zh":"全球資訊網；蜘蛛網","pos":"n.","ipa":"/web/","bookNo":"23","family":["the World Wide Web","net","the internet","website","site","prey"],"syn":["network"],"ant":[],"ex":[["Nowadays you can find almost anything you’d like to know on the Web.","現今你幾乎可在全球資訊網上找到所有你想知道的東西。"],["Nowadays you can find almost anything you’d like to know on the Net.","現今你幾乎可在網際網路上找到所有你想知道的東西。"],["The spider sits back and waits for its prey on the web.","蜘蛛會在蜘蛛網上坐等獵物上門。"]]},{"word":"bulb","zh":"電燈泡（＝light bulb）","pos":"n.","ipa":"/bʌlb/","bookNo":"24","family":["light bulb","a lamp","creepy"],"syn":["lamp"],"ant":[],"ex":[["This light bulb gives off purple light, which is creepy.","這個燈泡會發出紫色的光，令人毛骨悚然。"]]},{"word":"mist","zh":"薄霧；使蒙上薄霧","pos":"n. / vt.","ipa":"/mɪst/","bookNo":"25","family":["misty","fog","foggy","frost","smog","mist up","kettle"],"syn":["fog"],"ant":["clarity"],"ex":[["Because of the mist, we didn’t have a clear view of the mountains.","我們因為霧氣而看不清楚山景。"],["The steam from the kettle misted up the window.","從水壺冒出的水蒸氣使窗戶起霧了。"]]},{"word":"organic","zh":"有機的","pos":"adj.","ipa":"/ɔːrˈɡænɪk/","bookNo":"26","family":["organ","organism","organic food"],"syn":["natural"],"ant":["inorganic"],"ex":[["More and more people are eating organic food for the sake of their health.","為了健康的緣故，吃有機食物的人越來越多了。"]]},{"word":"palm","zh":"手掌；棕櫚樹","pos":"n.","ipa":"/pɑːm/","bookNo":"27","family":["palm reading","read somebody’s palms","fist","palm trees"],"syn":["hand"],"ant":[],"ex":[["John gripped the coins tightly in his palm.","約翰把這些錢幣緊緊地握在掌中。"],["Betty and Tom were strolling under palm trees near the beach.","貝蒂和湯姆在海灘附近的棕櫚樹下散步。"],["My friend makes a living by practicing astrology and palm reading.","我朋友以占卜及看手相謀生。"]]},{"word":"pat","zh":"輕拍","pos":"vt. / n.","ipa":"/pæt/","bookNo":"28","family":["pat–patted–patted","pat somebody on the + body part","pat somebody on the back","give somebody a pat on the back","tap"],"syn":["tap"],"ant":[],"ex":[["Stop patting me on the head. I have had enough of it.","別再拍我的頭，我受夠了。"],["After the presentation, the teacher patted me on the back.","做完報告之後，老師拍拍我的背給我鼓勵。"],["After the presentation, the teacher gave me a pat on the back.","做完報告之後，老師拍拍我的背給我鼓勵。"]]},{"word":"learning","zh":"學識（不可數）","pos":"n.","ipa":"/ˈlɜːrnɪŋ/","bookNo":"29","family":["learn","learned","knowledge","a man of great learning"],"syn":["knowledge"],"ant":["ignorance"],"ex":[["Professor Koss is a man of great learning.","寇斯教授是一個博學的人。"],["Professor Koss is a man of great knowledge.","寇斯教授是一個博學的人。"]]},{"word":"kingdom","zh":"王國","pos":"n.","ipa":"/ˈkɪŋdəm/","bookNo":"30","family":["king","empire","the United Kingdom"],"syn":["realm"],"ant":[],"ex":[["The king ruled the kingdom for 50 years.","那位國王統治那個王國有五十年之久。"]]},{"word":"industrial","zh":"工業的","pos":"adj.","ipa":"/ɪnˈdʌstriəl/","bookNo":"31","family":["industry","industrious","diligent","industrialize","industrialist","the Industrial Revolution","agricultural"],"syn":["manufacturing"],"ant":["agricultural"],"ex":[["That area of the country is industrial rather than agricultural.","該國那個地區是工業區而非農業區。"]]},{"word":"humid","zh":"溼氣重的","pos":"adj.","ipa":"/ˈhjuːmɪd/","bookNo":"32","family":["humidity","damp","moist"],"syn":["damp","moist"],"ant":["dry"],"ex":[["In the summer, the weather is generally hot and humid.","夏季時，天氣通常又熱又潮溼。"]]},{"word":"rectangle","zh":"長方形","pos":"n.","ipa":"/ˈrektæŋɡəl/","bookNo":"33","family":["rectangular","square","circle","triangle","diamond"],"syn":["oblong"],"ant":[],"ex":[["The table is in the shape of a rectangle.","這個餐桌是長方形的。"]]},{"word":"scarce","zh":"稀少的","pos":"adj.","ipa":"/skers/","bookNo":"34","family":["scarcely","scarcity","natural resources"],"syn":["rare","limited"],"ant":["abundant"],"ex":[["Natural resources, such as timber and oil, are becoming scarce.","像木材和石油等這類的天然資源正日漸稀少。"]]},{"word":"silk","zh":"絲","pos":"n.","ipa":"/sɪlk/","bookNo":"35","family":["silky","silk dress"],"syn":[],"ant":[],"ex":[["Jessica wore a blue silk dress to the wedding party.","潔西卡穿一件藍色絲質洋裝參加結婚派對。"]]},{"word":"slope","zh":"斜坡；山坡","pos":"n.","ipa":"/sloʊp/","bookNo":"36","family":["a steep slope","a gentle slope"],"syn":["incline"],"ant":["level"],"ex":[["It is difficult to ride a small motorcycle up a steep slope.","沿著陡坡騎摩托車是很困難的一件事。"]]},{"word":"swan","zh":"天鵝","pos":"n.","ipa":"/swɑːn/","bookNo":"37","family":["the ugly duckling"],"syn":[],"ant":[],"ex":[["To everyone’s surprise, the ugly duckling has grown up into a beautiful swan.","令大家驚奇的是，那隻醜小鴨已經長大變成了一隻漂亮的天鵝。"]]},{"word":"log","zh":"圓木；伐木、砍樹","pos":"n. / vt.","ipa":"/lɔːɡ/","bookNo":"38","family":["log–logged–logged","sleep like a log","woods","timber","lumber"],"syn":["timber"],"ant":[],"ex":[["Dad slept like a log and I couldn’t wake him up.","老爸睡得很沉，我叫不醒。"],["Hundreds of trees have been logged in that forest.","那座森林裡有上百棵樹被砍掉了。"]]}]};
