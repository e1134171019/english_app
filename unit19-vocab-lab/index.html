const words=[{"word":"ash","zh":"灰","pos":"n.","ipa":"/æʃ/","bookNo":"1","family":["turn to ashes","ashtray"],"syn":[],"ant":[],"ex":[["Mary emptied the ashes in the trash can.","瑪莉把垃圾桶裡的灰清掉。"],["John felt that all his dreams turned to ashes when his girlfriend left him.","約翰的女友離他而去時，他感覺夢想全都化成泡影了。"]]},{"word":"rumor","zh":"謠言；傳言；散播謠言","pos":"n. / vt.","ipa":"/ˈruːmər/","bookNo":"2","family":["Rumor has it that...","It is rumored that...","It is said that...","Rumors spread that..."],"syn":["hearsay"],"ant":[],"ex":[["Rumor has it that Gatsby is going to marry a rich widow.","謠傳蓋茲比要迎娶一位有錢的寡婦。"],["It is rumored that Gatsby is going to marry a rich widow.","謠傳蓋茲比要迎娶一位有錢的寡婦。"],["It is said that Gatsby is going to marry a rich widow.","據說蓋茲比要迎娶一位有錢的寡婦。"],["Rumors spread that the mayor is going to step down.","市長就要下臺的傳聞四處散播。"]]},{"word":"echo","zh":"回音；重複","pos":"n. / vt.","ipa":"/ˈekoʊ/","bookNo":"3","family":["repeat","reiterate","vague"],"syn":["repeat","reiterate"],"ant":[],"ex":[["I heard vague echoes of someone’s footsteps.","我隱約聽見某人腳步聲的回音。"],["Our teacher echoed what the report stated.","我們老師把報告上寫的東西重述一遍。"]]},{"word":"sweat","zh":"出汗；汗","pos":"vi. / n.","ipa":"/swet/","bookNo":"4","family":["sweat a lot","sweat heavily","sweat like a pig","No sweat.","No problem.","break a sweat","perspire"],"syn":["perspire"],"ant":[],"ex":[["I sweat a lot on hot days.","大熱天我會流很多汗。"],["No sweat.","沒問題。"],["After jogging for 10 minutes, Jim started to break a sweat.","慢跑10分鐘後，吉姆就開始冒汗了。"]]},{"word":"tub","zh":"澡盆；浴缸","pos":"n.","ipa":"/tʌb/","bookNo":"5","family":["bathtub","bath"],"syn":["bathtub","bath"],"ant":[],"ex":[["My apartment, sadly, does not have a tub.","遺憾的是，我的公寓沒有浴缸。"]]},{"word":"peel","zh":"水果皮；剝／削（果皮）","pos":"n. / vt.","ipa":"/piːl/","bookNo":"6","family":["peeler","banana peel"],"syn":["skin","pare"],"ant":[],"ex":[["Scientists have discovered that banana peels contain alcohol.","科學家發現香蕉皮含有酒精。"],["I think it’s rather troublesome to peel grapes.","我認為剝葡萄皮很麻煩。"]]},{"word":"handy","zh":"在手邊的；方便的","pos":"adj.","ipa":"/ˈhændi/","bookNo":"7","family":["come in handy","handful","a handful of...","gadget","tuck"],"syn":["convenient","useful"],"ant":["inconvenient"],"ex":[["You’d better carry an umbrella with you; it may come in handy.","你最好帶把傘，它可能隨時會派得上用場。"],["This new kitchen gadget is very handy.","這個新的廚房器具使用方便。"],["The boy grabbed a handful of berries and tucked them in his pocket.","這男孩抓了一把莓果塞進口袋。"]]},{"word":"outline","zh":"大綱；輪廓；重點說明","pos":"n. / vt.","ipa":"/ˈaʊtlaɪn/","bookNo":"8","family":["sketch","summarize"],"syn":["sketch","summary"],"ant":[],"ex":[["Our teacher asked us to write an outline before writing our research papers.","老師要求我們先擬大綱再寫研究報告。"],["Jessie knows the outline of the lecture, but not the details.","潔西知道這堂課的大概，但對細節並不了解。"],["At the interview, Nancy outlined the requirements for the position.","面試時，南西就這個職位的必要條件做了重點說明。"]]},{"word":"tray","zh":"托盤","pos":"n.","ipa":"/treɪ/","bookNo":"9","family":["serving tray"],"syn":[],"ant":[],"ex":[["The waitress brought the drinks we ordered on a tray.","那名女侍用托盤送上我們點的飲料。"]]},{"word":"hasty","zh":"倉促的；草率的","pos":"adj.","ipa":"/ˈheɪsti/","bookNo":"10","family":["hasten","haste","in haste","in a hurry","in a rush","hurried","hastily","hurriedly"],"syn":["hurried","rash"],"ant":["careful"],"ex":[["A hasty decision is often regretted later.","草率的決定經常讓人事後感到懊悔。"],["Don’t do things hastily, or you’re likely to make mistakes.","做事別過急，否則你可能會出錯。"]]},{"word":"saving","zh":"存款（常用複數）；節省（費用）","pos":"n.","ipa":"/ˈseɪvɪŋ/","bookNo":"11","family":["savings","open a savings account","open a checking account","earnings","income","revenue","deposit","withdraw","deposit money in a bank","deposit money into a bank","withdraw money from a bank"],"syn":["economy"],"ant":["expense"],"ex":[["Karen opened a new savings account so she could begin saving for college.","凱倫新開了一個儲蓄帳戶，這樣就可開始存錢念大學了。"],["We made a huge saving by booking the hotel early.","我們提早訂飯店而省下一大筆費用。"],["Thanks to our successful marketing strategies, our company’s earnings increased by 20% last quarter.","由於行銷策略奏效，本公司上一季的收入增加了20%。"],["Jason deposits 200 dollars in the bank each month.","傑森每個月存200美元到銀行。"],["The country has quite a few oil deposits.","那個國家蘊藏豐富的石油。"],["The hotel requires that guests pay a deposit of 5% to book a room.","這間旅館要求房客支付5%的房間訂金。"]]},{"word":"sincere","zh":"誠懇的；誠摯的","pos":"adj.","ipa":"/sɪnˈsɪr/","bookNo":"12","family":["express one’s sincere thanks to somebody","express one’s sincere apologies to somebody","sincerity","honest","insincere"],"syn":["honest","genuine"],"ant":["insincere"],"ex":[["John was sincere in his apology, so his mom forgave him.","約翰很誠懇地道歉，所以媽媽就原諒他了。"],["I’d like to express my sincere thanks to you for all the help you’ve given me.","我想向您表達誠摯的謝意，感謝您對我的種種幫助。"]]},{"word":"inspect","zh":"檢查；視察","pos":"vt.","ipa":"/ɪnˈspekt/","bookNo":"13","family":["inspection","examine","investigate","inspector","examiner","bloodstain","defect"],"syn":["examine","investigate"],"ant":[],"ex":[["The police inspected the bloodstains at the crime scene.","警方檢查犯罪現場中的血跡。"],["The fire department inspects all pubs and KTVs in the city on a monthly basis.","消防局每個月視察該市所有的酒吧和KTV。"],["Those inspectors were busy checking our products for defects before shipment.","那些檢查人員正忙著檢查出貨前的產品是否有瑕疵。"]]},{"word":"spray","zh":"噴灑；噴霧劑","pos":"vt. / n.","ipa":"/spreɪ/","bookNo":"14","family":["sprinkle","styling spray"],"syn":["sprinkle"],"ant":[],"ex":[["Mary sprayed herself with perfume before going out on a date.","瑪莉在出門約會前噴了香水。"],["I’d like to try this new styling spray.","我想試用這款新的髮型噴霧劑。"]]},{"word":"lobby","zh":"大廳；遊說","pos":"n. / vt. / vi.","ipa":"/ˈlɑːbi/","bookNo":"15","family":["lobbyist","persuade","hallway","passage","corridor","proposal"],"syn":["hall","foyer"],"ant":[],"ex":[["Harry and I will meet in the hotel lobby tomorrow morning.","哈利和我明天早上要在飯店大廳碰面。"],["Those people were lobbying some congressmen to support their proposal.","那些人正在遊說若干國會議員支持他們的提案。"],["The restroom is at the end of the hallway on the right-hand side.","洗手間在走廊盡頭的右手邊。"]]},{"word":"halfway","zh":"中途的；在半路上","pos":"adj. / adv.","ipa":"/ˌhæfˈweɪ/","bookNo":"16","family":["a halfway house","meet somebody halfway","turn over a new leaf"],"syn":["midway"],"ant":[],"ex":[["A halfway house is a place aimed at helping former prisoners turn over a new leaf.","中途之家旨在幫助更生人改過自新。"],["I called John an hour ago, and he said he was halfway here.","我一小時前打給約翰，他說他還在來這裡的半路上。"],["Nick chose to meet Dave halfway on the business deal.","尼克決定和戴夫妥協，搞定這筆生意。"]]},{"word":"fond","zh":"喜好的","pos":"adj.","ipa":"/fɑːnd/","bookNo":"17","family":["be fond of..."],"syn":["keen on","affectionate"],"ant":["dislike"],"ex":[["Kim is really fond of heavy metal.","金真的很喜歡重金屬樂。"]]},{"word":"harvest","zh":"收穫；收割","pos":"vt. / n.","ipa":"/ˈhɑːrvɪst/","bookNo":"18","family":["reap","farmhand"],"syn":["reap","gather"],"ant":[],"ex":[["The farmers had to harvest the rice before the typhoon came.","農人必須在颱風來臨之前收割稻穀。"],["The farm owner gave his farmhands a share of profits from the harvest.","這個農場主人讓農場工人分享收穫所得的利潤。"]]},{"word":"gamble","zh":"賭博；冒險","pos":"vt. / vi. / n.","ipa":"/ˈɡæmbl/","bookNo":"19","family":["gamble A on B","take a gamble","bet","bet–bet–bet"],"syn":["bet","wager"],"ant":[],"ex":[["James loves to gamble by buying lottery tickets each week.","詹姆斯喜歡每個禮拜買彩券來賭一賭。"],["Jessica gambled all her savings on the stock market.","潔西卡拿她畢生的積蓄賭在股市上。"],["Ricky decided to take a gamble and quit his comfortable job.","瑞奇決定冒險一搏並辭去他安穩的工作。"]]},{"word":"sleeve","zh":"袖子","pos":"n.","ipa":"/sliːv/","bookNo":"20","family":["have something up one’s sleeve","roll up one’s sleeves","collar","white-collar","blue-collar","color"],"syn":[],"ant":[],"ex":[["It looks like the boxer is going to lose the fight, but I believe he still has some tricks up his sleeve.","這位拳擊手看來好像快輸了，但我認為他還留了幾手。"],["Judy rolled up her sleeves and did the dishes.","茱蒂捲起衣袖開始洗碗。"],["Todd grabbed George by the collar and punched him in the face.","陶德揪住喬治的衣領，往他臉上揍了一拳。"],["A mechanic is a blue-collar worker, whereas an editor is a white-collar worker.","技師是藍領勞工，編輯則是白領勞工。"]]},{"word":"truthful","zh":"誠實的；真實的","pos":"adj.","ipa":"/ˈtruːθfəl/","bookNo":"21","family":["honest","true","truth","upright"],"syn":["honest","true"],"ant":["dishonest","false"],"ex":[["You can trust Jim; he is a truthful and upright man.","你可以信任吉姆，他為人誠實又正直。"],["The boy’s account of what happened seems to be truthful.","這個男孩子對事件發生經過的說詞似乎是真的。"]]},{"word":"kilometer","zh":"公里","pos":"n.","ipa":"/kɪˈlɑːmətər/","bookNo":"22","family":["km","meter","m","centimeter","cm"],"syn":[],"ant":[],"ex":[["The Great Wall is thousands of kilometers long.","萬里長城有數千公里長。"]]},{"word":"awful","zh":"可怕的；很差的","pos":"adj.","ipa":"/ˈɔːfəl/","bookNo":"23","family":["horrible","terrible"],"syn":["horrible","terrible"],"ant":["excellent","wonderful"],"ex":[["Denny’s handwriting was so awful that the teacher asked him to rewrite his report.","丹尼的字跡非常潦草，所以老師要他重寫一次報告。"]]},{"word":"discount","zh":"打折；折扣","pos":"vt. / n.","ipa":"/ˈdɪskaʊnt/","bookNo":"24","family":["give somebody a discount on something","20% discount","40% discount","reduction","boutique"],"syn":["reduction"],"ant":["surcharge"],"ex":[["Shops discount everything around holidays.","商店會在假日前後大減價。"],["Since I was a regular customer at this fashion boutique, they gave me a 30% discount on that dress.","因為我是這家精品店的老顧客，所以那套洋裝他們幫我打了七折。"]]},{"word":"drain","zh":"排掉（液體）；排水","pos":"vt. / n.","ipa":"/dreɪn/","bookNo":"25","family":["brain drain"],"syn":["empty","remove"],"ant":["fill"],"ex":[["The water in the bathtub should be drained first.","浴缸的水應該先放掉。"],["Many African countries have had a problem with brain drain over the years.","多年來，非洲許多國家一直都有人才外流的問題。"]]},{"word":"pit","zh":"坑","pos":"n.","ipa":"/pɪt/","bookNo":"26","family":["hole"],"syn":["hole"],"ant":[],"ex":[["We dug a pit for the campfire.","為了生營火，我們挖了一個坑。"]]},{"word":"chip","zh":"碎片；屑片；電腦晶片；撞成碎片","pos":"n. / vt.","ipa":"/tʃɪp/","bookNo":"27","family":["chip–chipped–chipped","be a chip off the old block","silicon chip"],"syn":["fragment"],"ant":[],"ex":[["The detective found some chips of wood on the floor.","那位偵探在地板上找到了一些木屑。"],["Peter looks very much like his father. He is indeed a chip off the old block.","彼得和他爸爸很像，簡直就是一個模子刻出來似的。"],["Our computer uses the smallest silicon chip ever invented.","我們的電腦使用有史以來最小的晶片。"],["Dennis chipped his tooth when he fell down.","丹尼斯跌倒時撞碎了一顆牙。"]]},{"word":"tug","zh":"突然拉扯；拖拉","pos":"vt. / vi. / n.","ipa":"/tʌɡ/","bookNo":"28","family":["tug–tugged–tugged","tug somebody’s arm","tug on somebody’s sleeve","tug at somebody’s sleeve","tug boat","tug-of-war"],"syn":["pull","drag"],"ant":["push"],"ex":[["My girlfriend gently tugged my arm, asking me to give her a kiss.","我女友輕輕拉了拉我的手臂，要我給她一個吻。"],["My grandson tugged on my sleeve and pointed at the toy he wanted me to buy.","我孫子扯了扯我的袖子，指著他要我買的玩具。"],["My class played against Christine’s in a tug-of-war.","我這班和克莉絲汀她班比賽拔河。"]]},{"word":"beetle","zh":"甲蟲","pos":"n.","ipa":"/ˈbiːtl/","bookNo":"29","family":["dragonfly","dragonflies","moth","butterfly","pupa","cocoon"],"syn":[],"ant":[],"ex":[["My brother keeps a beetle as a pet.","我弟弟養一隻甲蟲當寵物。"],["Different species of dragonflies can be found near the lake.","靠近湖的地方可以發現各種不同的蜻蜓。"],["Can you distinguish between a moth and a butterfly?","你會分辨蛾和蝴蝶的不同嗎？"]]},{"word":"apron","zh":"圍裙","pos":"n.","ipa":"/ˈeɪprən/","bookNo":"30","family":["kitchen apron","bib"],"syn":[],"ant":[],"ex":[["Mother put on her kitchen apron and cooked us a meal.","媽媽穿上廚房圍裙為我們做飯。"]]},{"word":"cock","zh":"公雞","pos":"n.","ipa":"/kɑːk/","bookNo":"31","family":["rooster","crow"],"syn":["rooster"],"ant":[],"ex":[["Cocks usually crow in the early morning.","公雞通常一大早就會啼叫。"]]},{"word":"fighter","zh":"戰鬥機；鬥士","pos":"n.","ipa":"/ˈfaɪtər/","bookNo":"32","family":["a jet fighter","fighter plane","crime fighter"],"syn":["combatant"],"ant":[],"ex":[["The fighter plane crashed, killing its two pilots.","這架戰鬥機墜毀了，機上兩名駕駛員均罹難。"],["Such crime fighters only live in comic books.","這種打擊犯罪的鬥士只會出現在漫畫書中。"]]},{"word":"brick","zh":"磚頭","pos":"n.","ipa":"/brɪk/","bookNo":"33","family":["bricklayer"],"syn":[],"ant":[],"ex":[["Tom built a house of bricks.","湯姆用磚頭蓋了一棟房子。"]]},{"word":"spaghetti","zh":"細條義大利麵（不可數）","pos":"n.","ipa":"/spəˈɡeti/","bookNo":"34","family":["macaroni"],"syn":["pasta"],"ant":[],"ex":[["I ate two plates of spaghetti at the party.","派對上我吃了兩盤義大利麵。"]]},{"word":"steam","zh":"水蒸氣；蒸煮（食物）","pos":"n. / vt.","ipa":"/stiːm/","bookNo":"35","family":["run out of steam","let off steam","blow off steam","steam up something","steamer"],"syn":["vapor"],"ant":[],"ex":[["Steam engines were developed in the 18th century.","蒸氣引擎是在18世紀發展出來的。"],["I have been working so hard for months. Now I’m running out of steam.","我為工作拼了好幾個月，現在我快精疲力盡了。"],["After a hard day at the office, Jack went to the gym to let off some steam.","一整天辛苦工作後，傑克上健身房紓解壓力。"],["It is healthy to steam food as no oil is used in the cooking process.","蒸煮食物在烹調過程中不使用油，所以較健康。"],["Walking into the hot kitchen steamed up my glasses.","走進充滿熱氣的廚房，把我的眼鏡蒙上了一層霧氣。"]]}];

const STORAGE_KEY='unit19_vocab_wrong_v1';
const state={view:'learn',word:words[0].word,query:'',question:null,answered:false,wrong:readWrong()};
const irregular={sweat:['sweat','sweats','sweating'],echo:['echo','echoes','echoed','echoing'],peel:['peel','peels','peeled','peeling'],inspect:['inspect','inspects','inspected','inspecting'],spray:['spray','sprays','sprayed','spraying'],lobby:['lobby','lobbies','lobbied','lobbying'],gamble:['gamble','gambles','gambled','gambling'],chip:['chip','chips','chipped','chipping'],tug:['tug','tugs','tugged','tugging'],steam:['steam','steams','steamed','steaming'],drain:['drain','drains','drained','draining']};

function readWrong(){try{const data=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');return Array.isArray(data)?data:[]}catch{return[]}}
function saveWrong(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state.wrong));document.querySelector('#wrongCount').textContent=state.wrong.length}
function esc(value){return String(value??'').replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]))}
function rx(value){return String(value).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
function shuffle(items){const out=[...items];for(let i=out.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[out[i],out[j]]=[out[j],out[i]]}return out}
function unique(items){return [...new Set((items||[]).filter(Boolean).map(String))]}
function say(text){if(!text||!('speechSynthesis'in window))return;speechSynthesis.cancel();const speech=new SpeechSynthesisUtterance(text);speech.lang='en-US';speech.rate=.78;speechSynthesis.speak(speech)}
function current(){return words.find(item=>item.word===state.word)||words[0]}
function filtered(){const q=state.query.trim().toLowerCase();if(!q)return words;return words.filter(item=>[item.word,item.zh,item.pos,item.ipa,...item.family,...item.syn,...item.ant,...item.ex.flat()].join(' ').toLowerCase().includes(q))}
function variants(item){const base=item.word.toLowerCase();const set=new Set(irregular[base]||[]);[base,base+'s',base+'es',base+'ed',base+'d',base+'ing',base+'ly'].forEach(value=>set.add(value));return [...set].sort((a,b)=>b.length-a.length)}
function target(sentence,item){for(const form of variants(item)){const match=String(sentence).match(new RegExp('\\b'+rx(form)+'\\b','i'));if(match)return match[0]}return''}
function highlight(sentence,item){const match=target(sentence,item);if(!match)return esc(sentence);const safe=esc(sentence),needle=esc(match);return safe.replace(new RegExp(rx(needle),'i'),'<mark>'+needle+'</mark>')}
function chips(items,kind=''){return items.length?items.map(value=>`<span class="chip ${kind}">${esc(value)}</span>`).join(''):'<span class="muted">—</span>'}
function broadPos(item){const pos=item.pos.toLowerCase();if(pos.includes('adj'))return'adj';if(pos.includes('adv'))return'adv';if(pos.includes('v.'))return'verb';if(pos.includes('n.'))return'noun';return'other'}
function optionsFor(item,answer){const pool=words.filter(other=>other.word!==item.word&&broadPos(other)===broadPos(item)).map(other=>other.word);const fallback=words.filter(other=>other.word!==item.word).map(other=>other.word);return shuffle([answer,...shuffle(unique([...pool,...fallback])).slice(0,3)])}
function addWrong(question,userAnswer){const key=question.mode+'|'+question.item.word+'|'+question.prompt;const existing=state.wrong.find(entry=>entry.key===key);if(existing){existing.count++;existing.userAnswer=userAnswer}else{state.wrong.unshift({key,word:question.item.word,zh:question.item.zh,mode:question.mode,prompt:question.prompt,answer:question.answer,userAnswer,count:1,example:question.example})}saveWrong()}

function renderList(){const items=filtered();document.querySelector('#list').innerHTML=items.length?items.map(item=>`<button class="wi ${item.word===state.word?'on':''}" data-word="${esc(item.word)}"><b>${esc(item.word)}<span class="num">${esc(item.bookNo)}</span></b><small>${esc(item.pos)} · ${esc(item.zh)}</small></button>`).join(''):'<div class="empty">找不到資料</div>';document.querySelectorAll('[data-word]').forEach(button=>button.onclick=()=>{state.word=button.dataset.word;state.view='learn';state.question=null;render()})}
function renderLearn(){const item=current();document.querySelector('#stage').innerHTML=`<div class="head"><div><h2 class="word">${esc(item.word)}</h2><div class="muted">課本 ${esc(item.bookNo)}　${esc(item.pos)}　${esc(item.ipa)}</div></div><div class="actions"><button class="btn main" id="sayWord">🔊 單字</button><button class="btn" id="sayExamples">🔊 全部例句</button></div></div><div class="meaning">${esc(item.zh)}</div><section class="grid"><div class="box"><h3>常用片語／延伸字</h3><div class="chips">${chips(item.family)}</div></div><div class="box"><h3>近義詞</h3><div class="chips">${chips(item.syn,'syn')}</div></div><div class="box"><h3>反義詞</h3><div class="chips">${chips(item.ant,'ant')}</div></div></section><section class="examples">${item.ex.map((pair,index)=>`<article class="ex"><div class="exTop"><p>${index+1}. ${highlight(pair[0],item)}</p><button data-say="${esc(pair[0])}">🔊</button></div><small>${esc(pair[1])}</small></article>`).join('')}</section>`;document.querySelector('#sayWord').onclick=()=>say(item.word);document.querySelector('#sayExamples').onclick=()=>{speechSynthesis.cancel();let index=0;const next=()=>{if(index>=item.ex.length)return;const speech=new SpeechSynthesisUtterance(item.ex[index++][0]);speech.lang='en-US';speech.rate=.78;speech.onend=()=>setTimeout(next,220);speechSynthesis.speak(speech)};next()};document.querySelectorAll('[data-say]').forEach(button=>button.onclick=()=>say(button.dataset.say))}
function renderRead(){const query=state.query.trim().toLowerCase();const rows=words.flatMap(item=>item.ex.map(example=>({item,example}))).filter(row=>!query||[row.item.word,row.item.zh,...row.item.family,...row.example].join(' ').toLowerCase().includes(query));document.querySelector('#stage').innerHTML=`<h2>Unit 19 完整例句</h2><div class="muted">共 ${rows.length} 句；藍色標記為核心字或其變化。</div><section class="reads">${rows.map(row=>`<article class="read"><b>${esc(row.item.bookNo)} · ${esc(row.item.word)} · ${esc(row.item.pos)}</b><p>${highlight(row.example[0],row.item)}</p><small>${esc(row.example[1])}</small><div class="foot"><button class="btn" data-open="${esc(row.item.word)}">查看單字</button><button class="btn main" data-read="${esc(row.example[0])}">🔊</button></div></article>`).join('')}</section>`;document.querySelectorAll('[data-read]').forEach(button=>button.onclick=()=>say(button.dataset.read));document.querySelectorAll('[data-open]').forEach(button=>button.onclick=()=>{state.word=button.dataset.open;state.view='learn';render()})}
function makeQuiz(mode){const item=shuffle(words)[0];if(mode==='type')return{mode,item,prompt:'請輸入英文：'+item.zh,answer:item.word,example:item.ex[0]||['','']};const example=item.ex.find(pair=>target(pair[0],item))||item.ex[0]||['',''];const answer=target(example[0],item)||item.word;const prompt=example[0]?example[0].replace(new RegExp('\\b'+rx(answer)+'\\b','i'),'_____'):'請選出：'+item.zh;return{mode,item,prompt:prompt+'\n'+example[1],answer,options:optionsFor(item,answer),example}}
function ensureQuestion(mode){if(!state.question||state.question.mode!==mode){state.question=makeQuiz(mode);state.answered=false}return state.question}
function renderQuiz(mode){const question=ensureQuestion(mode);document.querySelector('#stage').innerHTML=`<div class="qcard"><small>${mode==='type'?'中翻英主動輸出':'例句填空'}</small><p>${esc(question.prompt)}</p></div>${mode==='type'?`<div class="input"><input id="answer" placeholder="輸入英文單字" autocomplete="off"><button class="btn main" id="check">檢查</button></div>`:`<div class="opts">${question.options.map(option=>`<button class="opt" data-option="${esc(option)}">${esc(option)}</button>`).join('')}</div>`}<div class="fb" id="feedback">先作答，再查看正確答案與完整例句。</div><div class="foot"><button class="btn" id="skip">跳過</button><button class="btn main" id="next" hidden>下一題</button></div>`;if(mode==='type'){const input=document.querySelector('#answer');input.focus();document.querySelector('#check').onclick=()=>checkAnswer(input.value,input);input.onkeydown=event=>{if(event.key==='Enter')checkAnswer(input.value,input)}}else{document.querySelectorAll('[data-option]').forEach(button=>button.onclick=()=>checkAnswer(button.dataset.option,button))}document.querySelector('#skip').onclick=nextQuestion;document.querySelector('#next').onclick=nextQuestion}
function checkAnswer(value,control){if(state.answered)return;const question=state.question;const correct=String(value).trim().toLowerCase()===question.answer.toLowerCase();state.answered=true;if(question.mode==='quiz'){document.querySelectorAll('.opt').forEach(button=>{button.disabled=true;if(button.dataset.option.toLowerCase()===question.answer.toLowerCase())button.classList.add('correct')});if(!correct)control.classList.add('bad')}else{control.disabled=true}if(!correct)addWrong(question,value);document.querySelector('#feedback').textContent=`${correct?'正確':'錯誤。答案：'+question.answer}\n${question.item.word}：${question.item.zh}\n${question.example[0]||''}\n${question.example[1]||''}`;document.querySelector('#next').hidden=false}
function nextQuestion(){state.question=null;state.answered=false;render()}
function renderWrong(){document.querySelector('#stage').innerHTML=`<div class="head"><div><h2>錯題複習</h2><div class="muted">保存你的答案與答錯次數。</div></div><button class="btn" id="clearWrong">清空錯題</button></div><section class="wrongs">${state.wrong.length?state.wrong.map(entry=>`<article class="wrong"><header><h3>${esc(entry.word)} × ${entry.count}</h3><button class="btn" data-remove="${esc(entry.key)}">移除</button></header><p>${esc(entry.mode==='type'?'中翻英':'例句填空')}\n題目：${esc(entry.prompt)}\n你的答案：${esc(entry.userAnswer||'未作答')}\n正確答案：${esc(entry.answer)}\n${esc(entry.example?.[0]||'')}\n${esc(entry.example?.[1]||'')}</p><button class="btn main" data-review="${esc(entry.word)}">重新學習</button></article>`).join(''):'<div class="empty">目前沒有錯題。</div>'}</section>`;document.querySelector('#clearWrong').onclick=()=>{state.wrong=[];saveWrong();renderWrong()};document.querySelectorAll('[data-remove]').forEach(button=>button.onclick=()=>{state.wrong=state.wrong.filter(entry=>entry.key!==button.dataset.remove);saveWrong();renderWrong()});document.querySelectorAll('[data-review]').forEach(button=>button.onclick=()=>{state.word=button.dataset.review;state.view='learn';render()})}
function render(){document.querySelectorAll('.tab').forEach(button=>button.classList.toggle('on',button.dataset.view===state.view));renderList();({learn:renderLearn,read:renderRead,quiz:()=>renderQuiz('quiz'),type:()=>renderQuiz('type'),wrong:renderWrong}[state.view])();saveWrong()}

document.querySelector('#search').oninput=event=>{state.query=event.target.value;const items=filtered();if(items.length&&!items.some(item=>item.word===state.word))state.word=items[0].word;render()};
document.querySelectorAll('.tab').forEach(button=>button.onclick=()=>{state.view=button.dataset.view;state.question=null;render()});
render();
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/english_app/vocab-sw.js').catch(()=>{});}</script>
<script src="/english_app/speech-upgrade.js"></script>
