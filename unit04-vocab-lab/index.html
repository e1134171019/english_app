<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Unit 04 Vocabulary Lab</title><style>:root{--bg:#f5f7fb;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--blue:#2563eb;--shadow:0 18px 55px rgba(15,23,42,.1)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}button,input{font:inherit}.app{max-width:1180px;margin:0 auto;padding:18px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.top a{color:#2563eb;font-weight:900;text-decoration:none}.hero{background:#111827;color:white;border-radius:28px;padding:28px;box-shadow:var(--shadow)}h1{margin:0;font-size:42px;letter-spacing:-.05em}.hero p{color:#cbd5e1;line-height:1.7}.layout{display:grid;grid-template-columns:380px 1fr;gap:16px;margin-top:16px}.list,.side{background:#fff;border:1px solid var(--line);border-radius:26px;padding:16px;box-shadow:var(--shadow)}.search{width:100%;border:1px solid var(--line);border-radius:16px;padding:13px;margin-bottom:12px}.item{display:flex;justify-content:space-between;gap:8px;align-items:center;border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:8px;cursor:pointer;background:white;text-align:left}.item.active{border-color:#2563eb;background:#eff6ff}.word{font-size:22px;color:#1d4ed8;font-weight:950}.meta{color:var(--muted);font-size:13px}.title{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}.title h2{margin:0;font-size:42px;color:#1d4ed8}.tag{border-radius:999px;background:#eff6ff;color:#1d4ed8;padding:7px 10px;font-weight:900}.zh{font-size:20px;font-weight:900;margin:8px 0}.section{border-top:1px solid var(--line);padding-top:14px;margin-top:14px}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{border-radius:999px;background:#f3f4f6;padding:8px 11px;font-weight:800}.ex{border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0;line-height:1.7}.ex strong{color:#1d4ed8}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.btn{border:0;border-radius:16px;padding:13px;font-weight:900;background:#e5e7eb;cursor:pointer}.primary{background:var(--blue);color:white}.quiz{margin-top:16px;background:#fff;border:1px solid var(--line);border-radius:26px;padding:18px;box-shadow:var(--shadow)}.qcard{background:#111827;color:white;border-radius:22px;padding:20px}.q{font-size:26px;font-weight:950}.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.opt{border:1px solid var(--line);border-radius:16px;padding:13px;background:white;text-align:left;font-weight:900}.correct{background:#dcfce7!important;color:#166534;border-color:#86efac}.wrong{background:#ffe4e6!important;color:#be123c;border-color:#fda4af}.fb{margin-top:12px;border:1px solid var(--line);border-radius:16px;padding:12px;background:#f9fafb;white-space:pre-wrap;line-height:1.7}@media(max-width:880px){.layout{grid-template-columns:1fr}.title h2{font-size:34px}.opts,.btns{grid-template-columns:1fr}}</style></head><body><main class="app"><section class="top"><div class="hero"><h1>Unit 04 Vocabulary Lab</h1><p>依照你提供的 Unit 04 圖片建立：單字、相關詞、近反義詞、例句、整句朗讀與例句選字練習。</p></div><a href="../vocab-lab/">回選單</a></section><section class="layout"><aside class="list"><input class="search" id="search" placeholder="搜尋 Unit 04 單字"><div id="list"></div></aside><section class="side" id="detail"></section></section><section class="quiz"><h2>Unit 04 例句單字選擇題</h2><p class="meta">進入頁面時題目會洗牌；按下一題後依本次順序出題。</p><div id="quiz"></div></section></main><script>
const words=[
{word:'pretend',pos:'vt.',zh:'假裝',forms:['pretend that...','pretend to + V'],related:['make-believe'],ex:[['Mary has broken up with John, but he pretends that nothing has happened.','瑪莉和約翰分手了，但約翰假裝什麼事都沒發生。'],['When I passed by, Peter pretended not to see me.','我走過時，彼得假裝沒有看到我。']]},
{word:'frequent',pos:'a. & vt.',zh:'經常的；經常造訪',forms:['frequency','constant','continual'],related:['visitor','celebrity'],ex:[['Nick is a frequent visitor to our house.','尼克是我們家的常客。'],['This restaurant is frequented by celebrities.','這家餐廳經常有社交名流光顧。']]},
{word:'connect',pos:'vt. & vi.',zh:'連結；關聯',forms:['connect A with B','connect A to B','connection'],related:['associate'],ex:[['The railway connects Paris and Nice.','這條鐵路連接巴黎和尼斯。'],['There is no evidence to connect David to the murder.','沒有證據顯示大衛和這樁謀殺案有關。']]},
{word:'occasion',pos:'n.',zh:'特殊大事；場合',forms:['on occasion','occasional','occasionally'],related:['event'],ex:[['This wedding is a great occasion.','這場婚禮是一件大事。'],['On occasion, I go to see a movie alone.','我偶爾會一個人去看電影。'],['Behave yourself on formal occasions.','在正式場合你要守規矩。']]},
{word:'faith',pos:'n.',zh:'信心；信任',forms:['have faith in','faithful'],related:['assurance','belief','trust'],ex:[['I have faith in your honesty.','我信任你的誠實。']]},
{word:'experiment',pos:'n. & vi.',zh:'實驗；試驗',forms:['do an experiment','experiment on sth','experiment with sth','experimental','experimentation'],related:['conduct','perform','carry out'],ex:[['This product is the result of long experiments.','這個產品是長期實驗的結果。'],['Some researchers were experimenting on the rabbits.','一些研究人員正在對那些兔子做實驗。'],['This time I will experiment with a different chemical.','這次我要用不同的化學藥劑做實驗。']]},
{word:'aware',pos:'a.',zh:'知道的；察覺的',forms:['be aware of','awareness','raise awareness'],related:['conscious','unaware','consciousness'],ex:[['You should always be aware of your surroundings.','你隨時要了解周遭的環境。'],['Mary was aware of Tom’s bad intentions.','瑪莉察覺出湯姆不懷好意。'],['The government is trying to raise public awareness about environmental protection.','政府正設法提高民眾的環保意識。']]},
{word:'security',pos:'n.',zh:'安全',forms:['secure','safety'],related:[],ex:[['Many workers see the policy as a major threat to their job security.','許多員工認為這項政策是他們工作保障的一大威脅。']]},
{word:'considerable',pos:'a.',zh:'相當大的',forms:['consider','considerate','consideration'],related:[],ex:[['The rice crop suffered considerable damage as a result of the typhoon.','由於這場颱風，稻米作物遭受相當大的損失。']]},
{word:'replace',pos:'vt.',zh:'取代',forms:['replace A with B','replaceable','replacement'],related:['substitute'],ex:[['I am considering replacing my old PC with a notebook.','我正考慮把舊電腦換成筆記型電腦。'],['We need a replacement for the waiter who left last week.','我們需要一個人來接替上週離職的服務生。']]},
{word:'conclusion',pos:'n.',zh:'結束；結論',forms:['come to a conclusion','reach a conclusion','In conclusion'],related:['conclude'],ex:[['Mr. Williams thanked his audience at the conclusion of his speech.','威廉斯先生在演講結束時向聽眾表示謝意。'],['The committee came to the conclusion that the plan was not feasible.','該委員會得到的結論是這個計畫不可行。'],['In conclusion, Tom is a man you can count on.','總之，湯姆是個你可信賴的人。']]},
{word:'collection',pos:'n.',zh:'蒐集物；收藏',forms:['a collection of','collect','collective','collector'],related:[],ex:[['Bill showed us a very fine collection of old coins.','比爾向我們展示了非常珍貴的古錢收藏。']]},
{word:'inform',pos:'vt.',zh:'通知；告知',forms:['inform sb of sth','keep sb informed of/about sth','informative','information'],related:['notify'],ex:[['Please inform us of any change of schedule.','若排程表有異動請告知我們。'],['Please keep me informed about what you are doing.','你們正在做什麼事，請隨時讓我知道。'],['Thank you for giving us all the information we need.','謝謝你提供我們一切想要的資訊。']]},
{word:'elect',pos:'vt.',zh:'選舉；選擇',forms:['elect sb as + 職位','election','elective'],related:['select','option'],ex:[['We elected John as our class leader.','我們推選約翰擔任本班班長。'],['The election results will be broadcast tomorrow morning.','這次的選舉結果將於明天早上廣播。'],['The mayor is an elective official.','市長是經由選舉產生的官員。']]},
{word:'signal',pos:'n. & vt.',zh:'號誌；信號；發出信號',forms:['signal sb to + V','sign','signature'],related:[],ex:[['You must obey the traffic signals.','你必須遵守交通號誌。'],['The referee gave the signal to stop.','裁判做出停止的手勢。'],['The traffic cop signaled us to pull over.','交通警察對我們打手勢要我們靠邊停車。']]},
{word:'gesture',pos:'n. & vi.',zh:'手勢；表示；做手勢',forms:['make a gesture','in a gesture of'],related:['express','expression','expressive'],ex:[['The foreigner used gestures to convey his idea.','這名外國人使用手勢傳達他的意思。'],['Ron made a vulgar gesture and got into a fight.','朗恩比了一個粗俗的手勢而與人打起架來。'],['Todd is not a very expressive person.','陶德不是個善於表達的人。']]},
{word:'familiar',pos:'a.',zh:'熟悉的',forms:['be familiar with','be familiar to sb','familiarity'],related:['unfamiliar','family'],ex:[['Are you familiar with my boss?','你和我老闆熟嗎？'],['The story is familiar to most students in Taiwan.','大部分臺灣的學生都熟悉這個故事。']]},
{word:'sexy',pos:'a.',zh:'性感的',forms:['sex','sexual','sexual harassment','sexual discrimination'],related:[],ex:[['Latin dances often involve sexy movements.','拉丁舞經常會出現性感的舞步。'],['Parents and school teachers should teach kids how to deal with sexual harassment.','家長和老師應該教導孩子如何處理性騷擾。']]},
{word:'explore',pos:'vt.',zh:'探尋；探索；尋找',forms:['explorer','exploration'],related:['search','investigate'],ex:[['It is said that Columbus arrived here but did not explore the area.','據說哥倫布到過這裡，但沒有探索這個地區。'],['The captain explored the causes of the leak.','船長尋找造成漏水的原因。']]},
{word:'coach',pos:'n. & vt.',zh:'教練；長途巴士；指導',forms:['coach me','by coach'],related:['bus','train','instruct'],ex:[['When did Tom become a baseball coach?','湯姆何時當起棒球教練的？'],['We toured around the US by coach.','我們搭長途巴士在美國境內旅行。'],['I will find a top-notch trainer to coach me.','我要找一位一流的訓練員來指導我。']]},
{word:'bowling',pos:'n.',zh:'保齡球運動',forms:['go bowling','a bowling ball','a bowling alley'],related:['pin'],ex:[['I seldom go bowling because I think it is a waste of time and money.','我很少去打保齡球，因為我認為這很浪費時間和金錢。'],['A regular bowling alley is 60 feet long.','正規的保齡球球道長六十呎。']]},
{word:'golf',pos:'n. & vi.',zh:'高爾夫球運動；打高爾夫球',forms:['go golfing','a golf course','a golf club'],related:['gulf'],ex:[['Golf is very popular among businessmen.','高爾夫球運動在商人間非常盛行。'],['Tammy and I will go golfing this afternoon.','塔米和我今天下午要去打高爾夫球。']]},
{word:'volleyball',pos:'n.',zh:'排球',forms:['play volleyball'],related:[],ex:[['Helen was tired out after the volleyball game.','海倫在排球比賽後整個人累垮了。']]},
{word:'vocabulary',pos:'n.',zh:'字彙量',forms:['have a large vocabulary'],related:[],ex:[['John has a very large vocabulary.','約翰懂很多單字。'],['Extensive reading will increase your vocabulary.','廣泛閱讀可以增進你的字彙量。']]},
{word:'tend',pos:'vi. & vt.',zh:'傾向；易於；照顧',forms:['tend to + V','tend sth','tendency'],related:['tent'],ex:[['We tend to take natural resources for granted nowadays.','現今，我們往往將自然資源視為理所當然。'],['Mary tended the shop for her father while he was sick.','父親生病時瑪莉替她父親看店。']]},
{word:'scissors',pos:'n.',zh:'剪刀',forms:['a pair of scissors'],related:[],ex:[['Please hand me the scissors on the table.','請遞給我桌上的剪刀。']]},
{word:'overseas',pos:'a. & adv.',zh:'海外的；國外的；在國外地',forms:['an overseas student','an overseas Chinese'],related:['foreign'],ex:[['Our overseas division has been doing very well.','我們的海外部門表現很好。'],['Jenny is going to work overseas this summer.','珍妮今年夏天要到國外工作。']]},
{word:'peanut',pos:'n.',zh:'花生；很小的金額',forms:['peanut butter'],related:[],ex:[['Mom spread peanut butter on each slice of bread.','媽媽把花生醬塗在每片麵包上。'],['Nancy’s boss is stingy. He pays her peanuts.','南西的老闆很小器，只支付她微薄薪資。']]},
{word:'kindergarten',pos:'n.',zh:'幼兒園',forms:[],related:['nursery','day care center'],ex:[['We sent our child to kindergarten last September.','我們去年九月把小孩送到幼兒園就讀。']]},
{word:'oral',pos:'a.',zh:'口語的',forms:['an oral test','a written test'],related:['spoken'],ex:[['Our language teacher gave us an oral test instead of a written one.','我們語言老師考我們口試而非筆試。']]},
{word:'oven',pos:'n.',zh:'烤箱',forms:[],related:['microwave','stove'],ex:[['I used an oven to bake the cakes.','我用烤箱烤蛋糕。'],['The kettle is boiling on the gas stove.','瓦斯爐上的水壺燒開了。']]},
{word:'shrimp',pos:'n.',zh:'蝦子',forms:['shrimp 或 shrimps 皆可'],related:['prawn','lobster'],ex:[['The fishermen cast a net and caught a lot of shrimp.','漁夫撒網捕了很多蝦子。']]}
];
let state={selected:words[0].word};const $=s=>document.querySelector(s);function speak(t){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=.78;speechSynthesis.speak(u)}function current(){return words.find(w=>w.word===state.selected)||words[0]}function highlight(sentence,word){return sentence.replace(new RegExp('\\b'+word+'\\b','gi'),m=>`<strong>${m}</strong>`)}function renderList(){const q=$('#search').value.toLowerCase();$('#list').innerHTML=words.filter(w=>(w.word+w.zh+w.related.join(' ')).toLowerCase().includes(q)).map(w=>`<button class="item ${w.word===state.selected?'active':''}" onclick="state.selected='${w.word}';render()"><span><span class="word">${w.word}</span><br><span class="meta">${w.pos} ${w.zh}</span></span><span>›</span></button>`).join('')}function renderDetail(){const w=current();$('#detail').innerHTML=`<div class="title"><h2>${w.word}</h2><span class="tag">${w.pos}</span></div><div class="zh">${w.zh}</div><div class="btns"><button class="btn primary" onclick="speak('${w.word}')">🔊 朗讀單字</button><button class="btn" onclick="speakAll()">🔊 朗讀全部例句</button></div><div class="section"><b>用法 / 字族</b><div class="chips">${w.forms.map(x=>`<span class="chip">${x}</span>`).join('')}</div></div><div class="section"><b>相關詞 / 近反義</b><div class="chips">${w.related.map(x=>`<span class="chip">${x}</span>`).join('')||'<span class="meta">無</span>'}</div></div><div class="section"><b>例句</b>${w.ex.map(e=>`<div class="ex"><button class="btn" onclick="speak('${e[0].replace(/'/g,"\\'")}')">🔊 例句</button><p>${highlight(e[0],w.word)}</p><p class="meta">${e[1]}</p></div>`).join('')}</div>`}function render(){renderList();renderDetail()}function speakAll(){const w=current();let i=0;function go(){if(i>=w.ex.length)return;const u=new SpeechSynthesisUtterance(w.ex[i][0]);u.lang='en-US';u.rate=.78;u.onend=()=>{i++;setTimeout(go,350)};speechSynthesis.cancel();speechSynthesis.speak(u)}go()}$('#search').oninput=renderList;render();
const quizData=words.map(w=>{const e=w.ex[0];return{word:w.word,q:e[0].replace(new RegExp('\\b'+w.word+'(?:s|ed|ing)?\\b','i'),'______'),zh:e[1],ans:w.word,exp:`${w.word}：${w.zh}`}});let order=[...quizData].sort(()=>Math.random()-.5),qi=0;function qopts(q){const pool=words.map(w=>w.word).filter(x=>x!==q.ans);return[q.ans,...pool.slice(qi%pool.length,qi%pool.length+3)].sort((a,b)=>a.localeCompare(b))}function renderQuiz(){const q=order[qi%order.length];$('#quiz').innerHTML=`<div class="qcard"><small>Unit 04｜${qi+1} / ${order.length}</small><div class="q">${q.q}</div></div><div class="opts">${qopts(q).map(o=>`<button class="opt" onclick="checkQuiz(this,'${o}')">${o}</button>`).join('')}</div><div class="fb" id="qfb">選出最適合填入空格的單字。</div><div class="btns"><button class="btn" onclick="qi++;renderQuiz()">下一題</button><button class="btn primary" onclick="speak('${q.q.replace('______','blank').replace(/'/g,"\\'")}')">朗讀題句</button></div>`}function checkQuiz(btn,val){const q=order[qi%order.length];document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.textContent===q.ans)b.classList.add('correct')});if(val===q.ans){btn.classList.add('correct');$('#qfb').textContent=`正確。\n中文：${q.zh}\n解析：${q.exp}`}else{btn.classList.add('wrong');$('#qfb').textContent=`錯誤。正確答案：${q.ans}\n中文：${q.zh}\n解析：${q.exp}`}}renderQuiz();</script></body></html>
