<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Unit 12 Vocabulary Lab</title><style>:root{--bg:#eef3ff;--ink:#172033;--muted:#667085;--blue:#3157c8;--line:#dbe4ff;--green:#12824c;--red:#b42318;--shadow:0 18px 55px rgba(25,55,130,.13)}*{box-sizing:border-box}body{margin:0;background:linear-gradient(160deg,#fbfcff,#e9efff);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI","Noto Sans TC",sans-serif}button,input{font:inherit}.app{width:min(1220px,calc(100% - 24px));margin:auto;padding:20px 0 40px}.hero{background:linear-gradient(135deg,#254293,#3157c8);color:#fff;border-radius:30px;padding:32px;box-shadow:var(--shadow)}.hero h1{font-size:clamp(40px,7vw,76px);margin:10px 0 8px;letter-spacing:-.06em}.hero p{margin:0;color:#dbe7ff;line-height:1.7}.back{color:#fff;text-decoration:none;font-weight:900}.tools{display:grid;grid-template-columns:1fr auto;gap:12px;margin:16px 0}.search,.tabs{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}.search{padding:0 16px}.search input{width:100%;height:54px;border:0;outline:0}.tabs{display:flex;padding:5px;overflow:auto}.tab{border:0;background:transparent;padding:12px 14px;border-radius:13px;font-weight:900;color:var(--muted);white-space:nowrap}.tab.active{background:var(--blue);color:#fff}.layout{display:grid;grid-template-columns:290px 1fr;gap:18px}.list,.stage{background:#ffffffd9;border:1px solid #fff;border-radius:26px;box-shadow:var(--shadow)}.list{padding:14px;max-height:76vh;overflow:auto;position:sticky;top:12px}.item{width:100%;text-align:left;border:1px solid transparent;background:#f7f9ff;padding:11px 12px;border-radius:14px;margin:4px 0}.item strong{font-size:17px}.item span{display:block;color:var(--muted);font-size:12px;margin-top:3px}.item.active{background:#fff;border-color:#9ab2ff;color:#173cbd}.stage{padding:clamp(20px,4vw,36px);min-height:600px}.head{display:flex;justify-content:space-between;gap:16px;align-items:start}.word{font-size:clamp(48px,8vw,86px);margin:0;letter-spacing:-.07em;color:#12255d}.meta{color:var(--muted);font-weight:700}.speak{border:0;background:var(--blue);color:#fff;border-radius:15px;padding:12px 16px;font-weight:900}.meaning{background:#edf3ff;border:1px solid var(--line);border-radius:20px;padding:18px;margin:20px 0}.meaning h2{margin:0;font-size:28px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.box{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px}.box h3{margin:0 0 10px;font-size:14px}.chips{display:flex;gap:7px;flex-wrap:wrap}.chip{background:#eef3ff;color:#28478e;padding:6px 9px;border-radius:999px;font-size:13px}.examples{display:grid;gap:10px;margin-top:16px}.example{background:#fff;border:1px solid var(--line);border-radius:17px;padding:15px;line-height:1.65}.example small{display:block;color:var(--muted);margin-top:5px}.question{background:#12255d;color:#fff;border-radius:20px;padding:22px;font-size:24px;line-height:1.55}.options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.opt{border:1px solid var(--line);background:#fff;border-radius:16px;padding:14px;text-align:left;font-weight:900}.opt.correct{background:#dcfce7;color:var(--green)}.opt.wrong{background:#fee4e2;color:var(--red)}.feedback{margin-top:12px;background:#f7f9ff;border:1px solid var(--line);border-radius:16px;padding:14px;white-space:pre-wrap;line-height:1.65}.inputrow{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:14px}.inputrow input{border:1px solid var(--line);border-radius:15px;padding:14px;outline:0}.btn{border:0;border-radius:15px;padding:13px 17px;font-weight:900;background:var(--blue);color:#fff}.empty{padding:30px;text-align:center;color:var(--muted)}@media(max-width:850px){.tools,.layout{grid-template-columns:1fr}.list{position:static;max-height:330px}.grid{grid-template-columns:1fr}.options{grid-template-columns:1fr}}@media(max-width:520px){.app{width:min(100% - 12px,1220px)}.hero{padding:23px;border-radius:23px}.head{display:block}.speak{margin-top:12px}.inputrow{grid-template-columns:1fr}}</style></head><body><main class="app"><section class="hero"><a class="back" href="../vocab-lab/">← 返回總目錄</a><h1>Unit 12</h1><p>46 個核心與延伸單字：搜尋、發音、字族、例句填空、中翻英與錯題複習。</p></section><section class="tools"><label class="search"><input id="search" placeholder="搜尋英文、中文、片語……"></label><nav class="tabs"><button class="tab active" data-mode="learn">學習</button><button class="tab" data-mode="quiz">填空</button><button class="tab" data-mode="typing">輸入</button><button class="tab" data-mode="wrong">錯題</button></nav></section><section class="layout"><aside class="list" id="list"></aside><section class="stage" id="stage"></section></section></main><script>const words=[{"bookNo":"1","word":"capture","pos":"vt. / n.","ipa":"/ˈkæptʃər/","zh":"逮捕；獲得；引起注意；逮捕行動","family":["capture / catch someone’s attention","capture the headlines","capture of"],"syn":["arrest","seize","apprehend"],"ant":["release","free"],"ex":[["Police have finally captured the leader of the criminal organization.","警方終於逮捕了該犯罪組織的首腦。"],["The singer captured the audience’s attention with her good looks and beautiful voice.","這位歌手以亮麗外型與美妙歌聲獲得觀眾注意。"],["J. K. Rowling captured the headlines shortly after the release of her novel Harry Potter.","J. K. 羅琳發表《哈利波特》後，旋即獲得媒體大篇幅報導。"],["The capture of the rebel leader is a great victory for the government troops.","俘虜叛軍領袖是政府軍的一大勝利。"]]},{"bookNo":"2","word":"ambition","pos":"n.","ipa":"/æmˈbɪʃən/","zh":"野心；抱負","family":["drive","determination","ambitious","with great ambition"],"syn":["aspiration","goal","drive"],"ant":["indifference","lack of ambition"],"ex":[["Mike’s ambition is to become the chess champion.","麥可的野心是成為西洋棋冠軍。"],["A man with great ambition is more likely to succeed.","有遠大抱負的人較容易成功。"]]},{"bookNo":"3","word":"rely","pos":"vi.","ipa":"/rɪˈlaɪ/","zh":"依賴；信賴","family":["rely on / upon","depend on / upon","relied"],"syn":["depend on","trust","count on"],"ant":["distrust","doubt"],"ex":[["A happy marriage relies on mutual trust.","幸福的婚姻端賴互相信任。"],["I trust Steve very much. I know he is a man I can always rely on.","我很信任史提夫；我知道他是一個可信賴的人。"]]},{"bookNo":"3A","word":"reliable","pos":"adj.","ipa":"/rɪˈlaɪəbəl/","zh":"可靠的；可信賴的","family":["rely","dependable","reliability"],"syn":["dependable","trustworthy"],"ant":["unreliable","undependable"],"ex":[["The weather forecast is not always reliable, so you’d better carry an umbrella with you just in case.","天氣預報並不總是可靠，因此你最好帶把傘以防萬一。"]]},{"bookNo":"4","word":"holy","pos":"adj.","ipa":"/ˈhoʊli/","zh":"神聖的","family":["divine","sacred","holy place"],"syn":["sacred","divine"],"ant":["unholy","profane"],"ex":[["Nothing is holy for Paul; he only believes in money.","對保羅來說，沒有什麼是神聖的；他眼裡只有錢。"]]},{"bookNo":"5","word":"survivor","pos":"n.","ipa":"/sərˈvaɪvər/","zh":"生還者；倖存者","family":["survive","survival","survivor of"],"syn":["surviving person"],"ant":["victim","casualty"],"ex":[["No survivors were found in this airplane crash.","這起空難沒有發現任何生還者。"]]},{"bookNo":"6","word":"wicked","pos":"adj.","ipa":"/ˈwɪkɪd/","zh":"惡毒的；缺德的","family":["wickedness","evil","wicked person"],"syn":["evil","cruel","immoral"],"ant":["kind","good","virtuous"],"ex":[["Snow White’s wicked stepmother is very jealous of her stepdaughter’s beauty.","白雪公主的惡毒繼母非常嫉妒她的美貌。"],["The wicked shopkeeper tried to rip off his customers whenever he got the chance.","這名缺德店主一有機會就敲顧客竹槓。"]]},{"bookNo":"7","word":"innocent","pos":"adj.","ipa":"/ˈɪnəsənt/","zh":"清白的；無罪的；純真的","family":["be innocent of","innocence","innocent child"],"syn":["guiltless","pure","naive"],"ant":["guilty","corrupt"],"ex":[["The suspect claimed to be innocent of the robbery, but no one believed him.","嫌犯聲稱自己沒有犯下搶案，但沒有人相信他。"],["I believe Susan is incapable of this crime because she is such an innocent girl.","我相信蘇珊不可能犯下這起案件，因為她是個非常純真的女孩。"]]},{"bookNo":"8","word":"restrict","pos":"vt.","ipa":"/rɪˈstrɪkt/","zh":"限制；制止","family":["restrict A to B","restricted","restriction","limit"],"syn":["limit","confine","control"],"ant":["allow","permit","expand"],"ex":[["Hoping that she could eventually quit smoking, Mary started restricting her smoking to half a pack a day.","瑪莉希望最後能戒菸，便開始限制自己一天抽半包菸。"],["Because of martial law, many activities are restricted.","因為戒嚴，很多活動都遭到限制。"]]},{"bookNo":"9","word":"pause","pos":"n. / vi.","ipa":"/pɔːz/","zh":"沉默；中斷；停頓","family":["pause to + V","silence","break","take a pause"],"syn":["break","stop","hesitation"],"ant":["continuation"],"ex":[["There was a long, embarrassing pause after Tommy asked a stupid question.","湯米問了個笨問題後，便是一陣漫長、尷尬的沉默。"],["Howard paused to think about his answer.","霍華德停頓了一下，思索該如何回答。"]]},{"bookNo":"10","word":"darkness","pos":"n.","ipa":"/ˈdɑːrknəs/","zh":"黑暗；漆黑","family":["leave someone in darkness","after dark","keep someone in the dark about"],"syn":["gloom","blackness"],"ant":["light","brightness"],"ex":[["It’s very dangerous to drive in such darkness without headlights.","在如此黑暗中沒開頭燈駕車非常危險。"],["The power failure left the whole town in darkness.","停電讓整個城鎮陷入一片漆黑。"],["John kept me in the dark about his wedding.","約翰把我蒙在鼓裡，不讓我知道他的婚事。"]]},{"bookNo":"10A","word":"darken","pos":"vt. / vi.","ipa":"/ˈdɑːrkən/","zh":"使變暗；變暗；使前景不樂觀","family":["dark","darkness","darkened"],"syn":["dim","blacken","cloud"],"ant":["brighten","lighten"],"ex":[["The theater room darkened and then the film began.","電影院暗了下來，接著影片開始了。"],["The loss of a big deal darkened the future of this company.","失去一筆大買賣使這家公司的前途一片茫茫。"]]},{"bookNo":"11","word":"fortune","pos":"n.","ipa":"/ˈfɔːrtʃən/","zh":"命運；運氣；財富","family":["make a fortune","cost someone a fortune","fortunate","misfortune","fortune teller","fate"],"syn":["luck","wealth","fate"],"ant":["misfortune","bad luck"],"ex":[["Frank always says it’s his good fortune to work with so many brilliant and talented people in this company.","法蘭克總說他運氣好，能在這間公司跟這麼多優秀有才華的人共事。"],["Uncle Peter made a small fortune selling hot dogs.","彼得叔叔賣熱狗發了一筆小財。"],["What a superb bike! It must’ve cost you a fortune.","這臺腳踏車真棒！一定花了你一大筆錢吧。"]]},{"bookNo":"12","word":"remote","pos":"adj.","ipa":"/rɪˈmoʊt/","zh":"偏僻的；久遠的；關係疏遠的；機會渺茫的","family":["remote control","remote relative","remote chance","distant"],"syn":["distant","isolated","unlikely"],"ant":["nearby","close","likely"],"ex":[["No gas station can be found in such a remote town.","在如此偏遠的小鎮，一間加油站都找不到。"],["Aunt Susan is a remote relative of mine.","蘇珊姑媽是我的遠親。"],["There’s not even a remote chance that Porter will pass the driving test.","波特要考到駕照根本是機會渺茫。"]]},{"bookNo":"13","word":"assist","pos":"vt. / vi.","ipa":"/əˈsɪst/","zh":"幫助；協助","family":["assist someone in V-ing","help someone (to) V","assistance","assistant"],"syn":["help","aid","support"],"ant":["hinder","obstruct"],"ex":[["I assist Mom in doing the housework on weekends.","每逢週末我都會幫老媽做家事。"],["If everybody assists, the job will get done quickly.","如果大家都能來幫忙，我們很快就能完工。"]]},{"bookNo":"13A","word":"assistance","pos":"n.","ipa":"/əˈsɪstəns/","zh":"幫助；協助","family":["come to someone’s assistance","assist","assistant"],"syn":["help","aid","support"],"ant":["hindrance"],"ex":[["A passerby came to the injured man’s assistance.","一名路人前來幫助受傷的男子。"]]},{"bookNo":"13B","word":"assistant","pos":"n. / adj.","ipa":"/əˈsɪstənt/","zh":"助理；助理的","family":["personal assistant","assistant manager","assist"],"syn":["aide","helper"],"ant":["manager","supervisor"],"ex":[["The boss always hires attractive personal assistants.","老闆總是僱用迷人的私人助理。"],["I was promoted to assistant manager last month.","我上個月被升為協理。"]]},{"bookNo":"14","word":"scatter","pos":"vt. / vi. / n.","ipa":"/ˈskætər/","zh":"撒；使分散；分散；零星散布物","family":["scatter in all directions","a scatter of","spread"],"syn":["spread","disperse","sprinkle"],"ant":["gather","collect"],"ex":[["You can scatter some sand on the ice so you don’t slip.","在冰上撒點沙子，這樣你就不會滑倒。"],["The strong wind scattered the leaves all around.","一陣強風吹得四處都是葉子。"],["The mob began to scatter in all directions after riot police fired tear gas.","鎮暴警察發射催淚瓦斯後，暴民開始四散離開。"],["There were no people in the square; just a scatter of birds.","廣場上沒有人，只有零星幾隻鳥。"]]},{"bookNo":"15","word":"regional","pos":"adj.","ipa":"/ˈriːdʒənəl/","zh":"區域的；局部的","family":["region","regional conflict","regional economy"],"syn":["local","area-wide"],"ant":["global","national"],"ex":[["Economic recession in these countries is partly caused by regional conflicts.","這些國家經濟不景氣的部分原因是區域性衝突。"]]},{"bookNo":"15A","word":"zone","pos":"n. / vt.","ipa":"/zoʊn/","zh":"地區；區域；劃為特殊用途區","family":["war zone","industrial zone","area","district","be zoned for"],"syn":["area","district","sector"],"ant":[],"ex":[["Louise volunteered to go to the war zone to report on the war.","路易斯自願前往戰區報導戰事。"],["The land has been zoned for industrial use.","該土地已被劃為工業用地。"]]},{"bookNo":"16","word":"grab","pos":"vt. / n.","ipa":"/ɡræb/","zh":"抓取；攫取；搶奪","family":["grabbed","grab a bite to eat","make a grab for"],"syn":["seize","snatch","grip"],"ant":["release","let go"],"ex":[["I grabbed a bite to eat this morning and then went to work.","早上我隨便吃了點東西，便去上班了。"],["The criminal made a grab for the old woman’s purse.","該名罪犯搶了那位老婦人的手提包。"]]},{"bookNo":"16A","word":"grasp","pos":"vt. / n.","ipa":"/ɡræsp/","zh":"緊抓；理解；抓握","family":["grasp the meaning of","understand the meaning of","a tight grasp"],"syn":["understand","grip","comprehend"],"ant":["misunderstand","release"],"ex":[["A man in a black suit grasped Paul by the arm and shook him violently.","一名黑衣人抓住保羅的手臂大力搖晃。"],["Most readers found it hard to grasp the meaning of this poem.","大部分讀者都覺得難以理解這首詩的意思。"],["Kelly held her husband’s hand in a tight grasp.","凱莉緊緊握住她先生的手。"]]},{"bookNo":"17","word":"horn","pos":"n.","ipa":"/hɔːrn/","zh":"角；號角；汽車喇叭","family":["honk the horn","play one’s own horn","blow one’s own horn","trumpet"],"syn":["trumpet","car horn"],"ant":[],"ex":[["Some goats have large and magnificent horns.","某些山羊有又大又雄偉的角。"],["Nicole drove off honking the horn and threatening to hit anyone who got in her way.","妮可一邊猛按喇叭一邊開走。"],["I don’t like Peter because he likes to blow his own horn most of the time.","我不喜歡彼得，因為他大部分時間都愛自吹自擂。"]]},{"bookNo":"17A","word":"whistle","pos":"n. / vi.","ipa":"/ˈwɪsəl/","zh":"口哨；哨子；吹口哨；吹哨子","family":["blow a whistle","whistle at someone","whistled"],"syn":["pipe","signal"],"ant":[],"ex":[["I knew Uncle George was around when I heard that tuneless whistle of his.","一聽到喬治叔叔不成曲調的口哨聲，我就知道他來了。"],["The police officer blew his whistle and asked the crowd to leave immediately.","警官吹著哨子，要求群眾立刻離開。"],["Jimmy whistled at the beautiful girl but was rewarded with a cold stare.","吉米對著那美麗女孩吹口哨，卻得到冷眼回應。"],["The referee whistled and the game started.","裁判吹起哨子，比賽開始了。"]]},{"bookNo":"18","word":"dine","pos":"vi.","ipa":"/daɪn/","zh":"用餐；進餐","family":["dine in","dine out","dinner"],"syn":["eat","have a meal"],"ant":[],"ex":[["Who are you going to dine out with tonight?","你今晚要跟誰一起外出用餐？"]]},{"bookNo":"19","word":"suburb","pos":"n.","ipa":"/ˈsʌbɜːrb/","zh":"郊區","family":["in the suburbs of","outskirts","suburban"],"syn":["outskirts","residential district"],"ant":["city center","downtown"],"ex":[["Judy used to live in the suburbs of London.","茱蒂以前住在倫敦的郊區。"]]},{"bookNo":"19A","word":"urban","pos":"adj.","ipa":"/ˈɜːrbən/","zh":"都市的；城市的","family":["urbanize","urbanization","rural"],"syn":["city","metropolitan"],"ant":["rural","country"],"ex":[["I’d rather live in a rural area than in an urban area.","我寧願住在鄉下，也不願住在都會區。"]]},{"bookNo":"20","word":"strip","pos":"vt. / vi. / n.","ipa":"/strɪp/","zh":"移除；剝除衣物；條；帶","family":["stripped","strip someone of something","strip off","strip of land","stripe"],"syn":["remove","take off","band"],"ant":["dress","cover","restore"],"ex":[["We’ll have to strip the posters off the wall before we start painting.","上油漆之前，我們得先把海報從牆上撕下來。"],["The prisoner was stripped naked and beaten up.","囚犯被剝光衣服毒打一頓。"],["The children stripped off and jumped into the swimming pool.","孩子們脫光衣服，跳進游泳池。"],["Nick was stripped of his scholarship after he was found cheating on the exam.","尼克考試作弊被發現後，獎學金被取消。"],["Cut the meat into strips, please.","請幫我把肉切成條狀。"]]},{"bookNo":"21","word":"graduate","pos":"vi. / n. / adj.","ipa":"/ˈɡrædʒuət; ˈɡrædʒueɪt/","zh":"畢業；大學畢業生；研究生的","family":["graduate from","graduate school","graduate student","graduation","undergraduate"],"syn":["complete a degree","alumnus"],"ant":["undergraduate","dropout"],"ex":[["Mary graduated in history from Yale University last year.","瑪莉去年自耶魯大學歷史系畢業。"],["Benjamin’s father is a Cambridge graduate.","班哲明的爸爸是劍橋畢業生。"],["I am currently a graduate student at that university.","我目前是那所大學的研究生。"]]},{"bookNo":"22","word":"coconut","pos":"n.","ipa":"/ˈkoʊkənʌt/","zh":"椰子","family":["coconut milk","coconut oil","palm"],"syn":[],"ant":[],"ex":[["Coconut milk is an important ingredient of Thai cuisine.","椰奶是泰式料理的重要食材。"]]},{"bookNo":"23","word":"hesitate","pos":"vi.","ipa":"/ˈhezɪteɪt/","zh":"猶豫；遲疑","family":["hesitate about / over","don’t hesitate to + V","hesitant","hesitation"],"syn":["waver","pause","be uncertain"],"ant":["decide","act promptly"],"ex":[["Katherine is still hesitating about whether or not to marry Kevin.","凱瑟琳還在猶豫是否要嫁給凱文。"],["Should you have any problems, don’t hesitate to call me.","你萬一有任何問題，別猶豫，立刻打電話給我。"]]},{"bookNo":"24","word":"fist","pos":"n. / vt.","ipa":"/fɪst/","zh":"拳頭；用拳頭打","family":["shake one’s fist","clench one’s fist","fisted"],"syn":["closed hand","punch"],"ant":[],"ex":[["The angry driver shook his fist at the slow-moving pedestrian.","憤怒的駕駛向那位行動緩慢的行人揮舞拳頭。"],["John fisted the wall in anger.","約翰憤怒地揮拳打牆壁。"]]},{"bookNo":"24A","word":"wrist","pos":"n.","ipa":"/rɪst/","zh":"手腕","family":["wristband","sprain one’s wrist"],"syn":[],"ant":[],"ex":[["I sprained my wrist bowling.","我玩保齡球時扭傷了手腕。"]]},{"bookNo":"24B","word":"elbow","pos":"n. / vt.","ipa":"/ˈelboʊ/","zh":"手肘；用肘推擠","family":["elbow one’s way","elbow someone out of the way"],"syn":["push","jostle"],"ant":[],"ex":[["Jenny hurt her elbow when playing tennis.","珍妮打網球時手肘受傷了。"],["I elbowed my way through the crowd and successfully got on the train.","我用手肘在群眾中殺出一條路，成功上了火車。"],["I tried to stop that guy, but he elbowed me out of the way.","我想阻止那傢伙，但他用手肘把我推開。"]]},{"bookNo":"25","word":"buzz","pos":"vi. / n.","ipa":"/bʌz/","zh":"嗡嗡飛；忙進忙出；發出嗡嗡聲；嗡嗡聲","family":["buzz around","give someone a buzz","give someone a call","call up"],"syn":["hum","whir","call"],"ant":["silence"],"ex":[["Bees were buzzing around the flowers in the garden.","蜜蜂在花園裡繞著花嗡嗡飛。"],["Reporters were buzzing around at the crime scene, trying to get more information about the case.","記者在犯罪現場忙進忙出，試圖取得更多資訊。"],["Steve pulled the car over when he heard something buzzing in the engine.","史提夫聽見引擎發出怪聲後，便把車停到路邊。"],["I had a bad sleep last night because of the buzz of mosquitoes.","我昨晚因為蚊子的嗡嗡聲睡得很不好。"],["Give me a buzz if you need help.","你若需要幫忙，打電話給我。"]]},{"bookNo":"25A","word":"hum","pos":"vt. / vi. / n.","ipa":"/hʌm/","zh":"哼唱；發出低沉嗡嗡聲；嗡嗡聲","family":["hummed","hum a song","sing"],"syn":["buzz","murmur"],"ant":["silence"],"ex":[["Jeff was humming a song while taking a shower.","傑夫一邊淋浴一邊哼歌。"],["The annoying hum from the speakers almost drove me nuts.","擴音器發出的擾人嗡嗡聲快讓我發瘋了。"]]},{"bookNo":"26","word":"waterfall","pos":"n.","ipa":"/ˈwɔːtərfɔːl/","zh":"瀑布","family":["cascade","go over a waterfall"],"syn":["cascade"],"ant":[],"ex":[["The boat went over the waterfall, and no one survived.","那艘船從瀑布掉下去，無人生還。"]]},{"bookNo":"27","word":"flood","pos":"n. / vt. / vi.","ipa":"/flʌd/","zh":"水災；大量；淹沒；湧入","family":["a flood of","be flooded with","flooded area"],"syn":["inundation","overflow","deluge"],"ant":["drought","drain"],"ex":[["The flood ruined hundreds of houses and claimed twenty lives.","這場水災毀了好幾百棟房舍，奪走二十條人命。"],["A flood of vehicles congests the streets of downtown at rush hour.","大批車輛在交通尖峰時刻塞爆市中心街道。"],["The storm left the whole area flooded.","暴風雨使整個地區淹水。"],["The area flooded often, so most residents moved out.","這個地區經常淹水，因此大多數居民搬走。"],["The TV station was flooded with emails after the interview.","訪談播出後，電視臺收到如潮水般湧來的電子郵件。"]]},{"bookNo":" pos)}</div>`;const check=()=>{const ok=$('#answer').value.trim().toLowerCase()===w.word.toLowerCase();if(ok)$('#fb').textContent=`正確：${w.word}`;else{save(w,'輸入');$('#fb').textContent=`錯誤。答案：${w.word}`}};$('#check').onclick=check;$('#answer').onkeydown=e=>{if(e.key==='Enter')check()};$('#answer').focus()}function wrongView(){const a=wrong();$('#stage').innerHTML=a.length?`<h2>錯題本</h2><div class="examples">${a.map(x=>`<div class="example"><b>${esc(x.word)}</b>　${esc(x.zh)}<small>${esc(x.kind)}</small></div>`).join('')}</div><p><button class="btn" id="clear">清除錯題</button></p>`:'<div class="empty">目前沒有錯題。</div>';if($('#clear'))$('#clear').onclick=()=>{localStorage.removeItem(key);wrongView()}}function render(){if(index>=filtered.length)index=0;renderList();({learn,quiz,typing,wrong:wrongView}[mode])()}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');mode=b.dataset.mode;render()});$('#search').oninput=e=>{const q=e.target.value.toLowerCase();filtered=words.filter(w=>[w.word,w.zh,w.pos,...w.family,...w.syn,...w.ant,...w.ex.flat()].join(' ').toLowerCase().includes(q));index=0;render()};render();</script><script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/english_app/vocab-sw.js').catch(()=>{});}</script><script src="/english_app/speech-upgrade.js"></script></body></html>
